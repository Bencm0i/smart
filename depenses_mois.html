<!DOCTYPE html>
<html lang="fr" data-theme="military">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DÉPENSES · Mois</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23E87722'/><text y='24' x='4' font-size='22'>💸</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════
   THÈME MILITAIRE (défaut)
══════════════════════════════ */
[data-theme="military"] {
  --bg:        #1c1f16;
  --bg2:       #23271b;
  --surface:   #2a2f21;
  --surface2:  #323828;
  --border:    #464d38;
  --border2:   #565e44;
  --text:      #d4cfb8;
  --text2:     #a09b87;
  --muted:     #6b6858;
  --accent:    #E87722;
  --accent2:   #c96218;
  --accentbg:  rgba(232,119,34,0.12);
  --gold:      #c8a842;
  --green:     #7aa85a;
  --red:       #b85a4a;
  --grid:      rgba(255,255,255,0.025);
  --hdr-bg:    rgba(28,31,22,0.96);
  --shadow:    0 4px 24px rgba(0,0,0,0.4);
  --tag:       #3d4430;
}

/* ══════════════════════════════
   THÈME BEIGE
══════════════════════════════ */
[data-theme="beige"] {
  --bg:        #f0e8d8;
  --bg2:       #e8dfc9;
  --surface:   #faf5eb;
  --surface2:  #ede5d2;
  --border:    #c8b896;
  --border2:   #b8a880;
  --text:      #3a3020;
  --text2:     #6a5a40;
  --muted:     #9a8a6a;
  --accent:    #E87722;
  --accent2:   #c96218;
  --accentbg:  rgba(232,119,34,0.1);
  --gold:      #9a7828;
  --green:     #5a8840;
  --red:       #a84030;
  --grid:      rgba(0,0,0,0.04);
  --hdr-bg:    rgba(240,232,216,0.97);
  --shadow:    0 4px 24px rgba(100,80,40,0.18);
  --tag:       #ddd0b0;
}

/* ══════════════════════════════
   BASE
══════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background-color: var(--bg);
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 28px 28px;
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px;
  min-height: 100vh;
  padding-bottom: 130px;
  transition: background-color 0.3s, color 0.3s;
}

/* ══════════════════════════════
   HEADER
══════════════════════════════ */
.header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--hdr-bg);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: background 0.3s, border-color 0.3s;
}

.logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 20px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--accent);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  line-height: 1;
}
.logo-emoji { font-size: 18px; }
.logo-sub {
  font-size: 9px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 2px;
  display: block;
  text-transform: uppercase;
}

.month-label-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.month-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  text-align: center;
}

.hbtn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  font-weight: 600;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  transition: all 0.18s;
  min-height: 32px;
  flex-shrink: 0;
}
.hbtn:active, .hbtn:hover { border-color: var(--accent); color: var(--accent); }
.hbtn.accent-btn {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 700;
}
.hbtn.accent-btn:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }

/* Bouton thème bascule */
.theme-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  font-weight: 700;
  padding: 5px 10px;
  border-radius: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all 0.25s;
  flex-shrink: 0;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.theme-btn:hover { border-color: var(--accent); color: var(--accent); }
.theme-btn .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

/* ══════════════════════════════
   BARRE BUDGET
══════════════════════════════ */
.budget-bar-wrap {
  background: var(--hdr-bg);
  border-bottom: 1px solid var(--border);
  padding: 9px 14px;
  position: sticky;
  top: 56px;
  z-index: 150;
  transition: background 0.3s;
}
.budget-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 7px;
  gap: 8px;
}
.budget-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}
.budget-amounts {
  display: flex;
  align-items: baseline;
  gap: 5px;
}
.budget-spent {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 18px;
  color: var(--text);
  letter-spacing: 0.5px;
}
.budget-total {
  font-size: 11px;
  color: var(--muted);
}
.budget-restant {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 9px;
  border-radius: 6px;
  border: 1px solid;
}
.budget-restant.ok   { color: var(--green); border-color: var(--green); background: rgba(90,136,64,0.1); }
.budget-restant.warn { color: var(--accent); border-color: var(--accent); background: var(--accentbg); }
.budget-restant.over { color: var(--red); border-color: var(--red); background: rgba(184,90,74,0.1); }

.progress-track {
  height: 4px;
  background: var(--surface2);
  border-radius: 10px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 10px;
  transition: width 0.5s ease, background 0.3s;
}

/* ══════════════════════════════
   CONTENU
══════════════════════════════ */
.content {
  padding: 14px 14px 0;
  max-width: 580px;
  margin: 0 auto;
}

/* Section unique */
.section-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  transition: background 0.3s, border-color 0.3s;
}

.section-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}
.section-icon { font-size: 18px; }
.section-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text);
  flex: 1;
}
.section-total {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 16px;
  color: var(--accent);
}

/* ══════════════════════════════
   LIGNES DE DÉPENSE
══════════════════════════════ */
.item-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-bottom: 1px solid rgba(70,77,56,0.35);
  transition: background 0.15s, opacity 0.2s;
  position: relative;
}
[data-theme="beige"] .item-row {
  border-bottom: 1px solid rgba(200,184,150,0.4);
}
.item-row:last-child { border-bottom: none; }
.item-row.paid { opacity: 0.5; }

.check-box {
  width: 22px; height: 22px;
  border-radius: 6px;
  border: 2px solid var(--border2);
  flex-shrink: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s;
  font-size: 12px;
  background: var(--surface2);
  color: transparent;
  user-select: none;
}
.check-box.done {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}

.item-info { flex: 1; min-width: 0; }
.item-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.item-row.paid .item-label {
  text-decoration: line-through;
  color: var(--muted);
}

/* Champs supplémentaires (tags) */
.item-extras {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 3px;
}
.item-tag {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  background: var(--tag);
  color: var(--text2);
  padding: 1px 6px;
  border-radius: 4px;
  border: 1px solid var(--border);
}
.item-tag.cat-tag { color: var(--accent); border-color: var(--accentbg); background: var(--accentbg); }
.item-tag.date-tag { color: var(--gold); }
.item-tag.note-tag { font-style: italic; text-transform: none; }

.item-amount {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 15px;
  color: var(--text);
  flex-shrink: 0;
  min-width: 60px;
  text-align: right;
}
.item-row.paid .item-amount { color: var(--muted); }

.item-del {
  color: var(--muted);
  font-size: 16px;
  cursor: pointer;
  padding: 4px;
  border-radius: 5px;
  transition: color 0.15s;
  flex-shrink: 0;
  line-height: 1;
  background: none;
  border: none;
}
.item-del:hover { color: var(--red); }

/* ══════════════════════════════
   FORMULAIRE AJOUT
══════════════════════════════ */
.add-form {
  padding: 12px 14px;
  background: var(--accentbg);
  border-top: 1px dashed var(--border2);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.add-form-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.add-form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.form-input {
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  border-radius: 8px;
  padding: 8px 10px;
  outline: none;
  transition: border-color 0.18s, box-shadow 0.18s;
  width: 100%;
}
.form-input::placeholder { color: var(--muted); }
.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accentbg);
}
input[type="number"].form-input { -moz-appearance: textfield; }
input[type="number"].form-input::-webkit-outer-spin-button,
input[type="number"].form-input::-webkit-inner-spin-button { -webkit-appearance: none; }

.form-select {
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  border-radius: 8px;
  padding: 8px 10px;
  outline: none;
  cursor: pointer;
  width: 100%;
  transition: border-color 0.18s;
}
.form-select:focus { border-color: var(--accent); }

/* Toggle champs sup */
.extra-toggle {
  background: none;
  border: 1px dashed var(--border2);
  color: var(--muted);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  font-weight: 600;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
  flex-shrink: 0;
}
.extra-toggle:hover { border-color: var(--accent); color: var(--accent); }
.extra-toggle.open { border-style: solid; border-color: var(--accent); color: var(--accent); background: var(--accentbg); }

.extra-fields {
  display: none;
}
.extra-fields.visible {
  display: contents;
}

.add-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 20px;
  width: 38px; height: 38px;
  border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.18s, transform 0.1s;
  line-height: 1;
}
.add-btn:hover { background: var(--accent2); }
.add-btn:active { transform: scale(0.93); }

/* ══════════════════════════════
   ÉTAT VIDE
══════════════════════════════ */
.empty-state {
  text-align: center;
  padding: 28px 16px;
  color: var(--muted);
  font-size: 12px;
}
.empty-icon {
  font-size: 28px;
  display: block;
  margin-bottom: 8px;
  opacity: 0.5;
}

/* ══════════════════════════════
   CATÉGORIES / FILTRES
══════════════════════════════ */
.cats-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.cat-chip {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  cursor: pointer;
  transition: all 0.18s;
  background: var(--surface);
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 4px;
}
.cat-chip:hover { border-color: var(--accent); color: var(--accent); }
.cat-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.cat-chip .chip-sum {
  font-size: 9px;
  opacity: 0.7;
}

/* ══════════════════════════════
   FAB BOTTOM
══════════════════════════════ */
.fab-zone {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 300;
  background: var(--hdr-bg);
  backdrop-filter: blur(14px);
  border-top: 1px solid var(--border);
  padding: 10px 14px 18px;
  display: flex;
  gap: 8px;
  max-width: 580px;
  margin: 0 auto;
  transition: background 0.3s;
}
@media (min-width: 580px) {
  .fab-zone { left: 50%; transform: translateX(-50%); right: auto; width: 580px; }
}

.stat-pill {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  transition: background 0.3s, border-color 0.3s;
}
.sp-label {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 600;
}
.sp-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 18px;
  color: var(--text);
  line-height: 1;
}
.sp-val.green { color: var(--green); }
.sp-val.orange { color: var(--accent); }
.sp-val.red   { color: var(--red); }
.sp-val.gold  { color: var(--gold); }

/* ══════════════════════════════
   MODALS
══════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 500;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}
.modal-sheet {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px 18px 0 0;
  padding: 20px 20px 36px;
  width: 100%;
  max-width: 580px;
  transform: translateY(30px);
  transition: transform 0.25s, background 0.3s;
  box-shadow: var(--shadow);
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 16px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-close {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 22px;
  cursor: pointer;
  line-height: 1;
  transition: color 0.15s;
}
.modal-close:hover { color: var(--red); }
.modal-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
  display: block;
}
.modal-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px;
  border-radius: 10px;
  padding: 12px 14px;
  outline: none;
  width: 100%;
  margin-bottom: 14px;
  transition: border-color 0.18s;
}
.modal-input:focus { border-color: var(--accent); }
.modal-save {
  background: var(--accent);
  border: none;
  color: #fff;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 13px;
  border-radius: 10px;
  cursor: pointer;
  width: 100%;
  transition: background 0.18s;
}
.modal-save:hover { background: var(--accent2); }

/* ══════════════════════════════
   TOAST
══════════════════════════════ */
.toast {
  position: fixed;
  top: 76px;
  left: 50%;
  transform: translateX(-50%) translateY(-10px);
  background: var(--surface);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-size: 12px;
  font-weight: 600;
  padding: 8px 18px;
  border-radius: 8px;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══════════════════════════════
   DIVERS
══════════════════════════════ */
.section-tools {
  display: flex;
  gap: 8px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  align-items: center;
}
.section-tools-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  flex: 1;
}

.divider-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
  padding: 8px 0 4px;
  opacity: 0.6;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <span class="logo-emoji">💸</span>
    <div>
      DÉPENSES
      <span class="logo-sub">Budget mensuel</span>
    </div>
  </div>

  <div class="month-label-wrap">
    <div class="month-label" id="monthLabel">—</div>
  </div>

  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">
    <span class="dot"></span>
    <span id="themeBtnLabel">BEIGE</span>
  </button>
  <button class="hbtn" onclick="openBudgetModal()">⚙</button>
</div>

<!-- BARRE BUDGET -->
<div class="budget-bar-wrap">
  <div class="budget-row">
    <span class="budget-title">DÉPENSÉ</span>
    <div class="budget-amounts">
      <span class="budget-spent" id="budgetSpent">0 €</span>
      <span class="budget-total" id="budgetTotal">/ — €</span>
    </div>
    <span class="budget-restant ok" id="budgetRestant">—</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%;background:var(--green)"></div>
  </div>
</div>

<!-- CONTENU -->
<div class="content">

  <!-- SECTION UNIQUE -->
  <div class="section-block">
    <div class="section-head">
      <span class="section-icon">📋</span>
      <span class="section-title">Toutes les dépenses</span>
      <span class="section-total" id="sectionTotal">0 €</span>
    </div>

    <!-- BARRE FILTRES PAR CATÉGORIE -->
    <div class="cats-bar" id="catsBar">
      <div class="cat-chip active" data-cat="all" onclick="filterCat('all')">Tout</div>
    </div>

    <!-- OUTILS SECTION -->
    <div class="section-tools">
      <span class="section-tools-label">Actions</span>
      <button class="hbtn" onclick="exportJSON()">⬇ JSON</button>
      <button class="hbtn" onclick="clearPaid()">🗑 Suppr. payées</button>
    </div>

    <!-- LISTE DES DÉPENSES -->
    <div id="itemsList">
      <div class="empty-state">
        <span class="empty-icon">📭</span>
        Aucune dépense ce mois-ci
      </div>
    </div>

    <!-- FORMULAIRE AJOUT -->
    <div class="add-form">
      <div class="add-form-row">
        <input class="form-input" type="text" id="inp-label" placeholder="Libellé de la dépense…" onkeydown="addOnEnter(event)">
        <input class="form-input" type="number" inputmode="decimal" id="inp-amt" placeholder="€" style="width:90px;" onkeydown="addOnEnter(event)">
        <button class="extra-toggle" id="extraToggle" onclick="toggleExtra()">+ détails</button>
        <button class="add-btn" onclick="addItem()">+</button>
      </div>

      <!-- Champs supplémentaires -->
      <div id="extraFields" class="extra-fields">
        <div class="add-form-grid">
          <div>
            <label class="modal-label" style="margin-bottom:4px;">Catégorie</label>
            <select class="form-select" id="inp-cat">
              <option value="">— Aucune —</option>
            </select>
          </div>
          <div>
            <label class="modal-label" style="margin-bottom:4px;">Date</label>
            <input class="form-input" type="date" id="inp-date">
          </div>
          <div style="grid-column:1/-1;">
            <label class="modal-label" style="margin-bottom:4px;">Note</label>
            <input class="form-input" type="text" id="inp-note" placeholder="Commentaire facultatif…">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bouton nouvelle catégorie -->
  <button class="hbtn" style="width:100%;justify-content:center;margin-bottom:12px;" onclick="openCatModal()">➕ Gérer les catégories</button>

</div>

<!-- FAB -->
<div class="fab-zone">
  <div class="stat-pill">
    <span class="sp-label">Payées</span>
    <span class="sp-val green" id="statPaid">0</span>
  </div>
  <div class="stat-pill">
    <span class="sp-label">En attente</span>
    <span class="sp-val red" id="statRemaining">0</span>
  </div>
  <div class="stat-pill">
    <span class="sp-label">Montant payé</span>
    <span class="sp-val orange" id="statPaidAmt">0 €</span>
  </div>
  <div class="stat-pill">
    <span class="sp-label">Total</span>
    <span class="sp-val gold" id="statTotal">0 €</span>
  </div>
</div>

<!-- MODAL BUDGET & PARAMÈTRES -->
<div class="modal-overlay" id="budgetModal">
  <div class="modal-sheet">
    <div class="modal-title">
      ⚙ Paramètres
      <button class="modal-close" onclick="closeBudgetModal()">✕</button>
    </div>
    <label class="modal-label">Budget maximum (€)</label>
    <input class="modal-input" id="budgetInput" type="number" inputmode="decimal" placeholder="ex: 3 000">
    <button class="modal-save" onclick="saveSettings()">Enregistrer</button>
  </div>
</div>

<!-- MODAL CATÉGORIES -->
<div class="modal-overlay" id="catModal">
  <div class="modal-sheet">
    <div class="modal-title">
      📁 Catégories
      <button class="modal-close" onclick="closeCatModal()">✕</button>
    </div>
    <div id="catList" style="margin-bottom:16px;display:flex;flex-direction:column;gap:8px;"></div>
    <label class="modal-label">Nouvelle catégorie</label>
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      <input class="modal-input" id="newCatIcon" type="text" placeholder="🏠" style="width:70px;margin-bottom:0;text-align:center;font-size:20px;">
      <input class="modal-input" id="newCatName" type="text" placeholder="Nom de la catégorie" style="margin-bottom:0;flex:1;">
    </div>
    <button class="modal-save" onclick="addCatFromModal()">Ajouter la catégorie</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════
// ÉTAT
// ══════════════════════════════
const STORAGE_KEY = 'depenses_v3';
const THEME_KEY   = 'depenses_theme_v3';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE)); }

let STATE = loadState();
let filterActive = 'all';

// Mois courant (fixe, pas de navigation)
const now = new Date();
const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MONTH_KEY = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
document.getElementById('monthLabel').textContent = MONTHS_FR[now.getMonth()] + ' ' + now.getFullYear();

function ensureMonth() {
  if (!STATE[MONTH_KEY]) STATE[MONTH_KEY] = { items: [], budget: STATE._budget || 0 };
  return STATE[MONTH_KEY];
}

// Catégories par défaut
const DEFAULT_CATS = [
  { id:'loyer',     icon:'🏠', name:'Logement' },
  { id:'courses',   icon:'🛒', name:'Courses' },
  { id:'transport', icon:'🚗', name:'Transport' },
  { id:'sorties',   icon:'🍕', name:'Sorties' },
  { id:'abos',      icon:'📱', name:'Abonnements' },
  { id:'sante',     icon:'💊', name:'Santé' },
  { id:'loisirs',   icon:'🎮', name:'Loisirs' },
  { id:'divers',    icon:'📦', name:'Divers' },
];

function getCats() { return STATE._cats || DEFAULT_CATS; }
function saveCats(c) { STATE._cats = c; saveState(); }

// ══════════════════════════════
// THÈME
// ══════════════════════════════
let currentTheme = localStorage.getItem(THEME_KEY) || 'military';
applyTheme(currentTheme);

function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtnLabel').textContent = t === 'military' ? 'BEIGE' : 'MILITAIRE';
  localStorage.setItem(THEME_KEY, t);
}
function toggleTheme() {
  currentTheme = currentTheme === 'military' ? 'beige' : 'military';
  applyTheme(currentTheme);
}

// ══════════════════════════════
// FORMAT
// ══════════════════════════════
function fmt(v) {
  if (!v && v !== 0) return '—';
  return new Intl.NumberFormat('fr-FR', {style:'currency', currency:'EUR', maximumFractionDigits:2}).format(v);
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════
// RENDU
// ══════════════════════════════
function render() {
  const mon   = ensureMonth();
  const items = mon.items || [];
  const cats  = getCats();
  const budget = STATE._budget || 0;

  // Totaux
  const totalAll   = items.reduce((s,i) => s + (parseFloat(i.amount)||0), 0);
  const totalPaid  = items.filter(i=>i.done).reduce((s,i) => s + (parseFloat(i.amount)||0), 0);
  const countPaid  = items.filter(i=>i.done).length;
  const countRem   = items.filter(i=>!i.done).length;

  // Budget bar
  document.getElementById('budgetSpent').textContent = fmt(totalAll);
  document.getElementById('budgetTotal').textContent = budget > 0 ? '/ ' + fmt(budget) : '';
  const pct  = budget > 0 ? Math.min((totalAll/budget)*100, 100) : 0;
  const fill = document.getElementById('progressFill');
  fill.style.width = pct + '%';
  fill.style.background = pct < 65 ? 'var(--green)' : pct < 88 ? 'var(--accent)' : 'var(--red)';
  const restEl = document.getElementById('budgetRestant');
  if (budget > 0) {
    const rest = budget - totalAll;
    restEl.textContent = (rest >= 0 ? '− ' : '+ ') + fmt(Math.abs(rest));
    restEl.className = 'budget-restant ' + (rest > budget*0.2 ? 'ok' : rest >= 0 ? 'warn' : 'over');
  } else {
    restEl.textContent = '—';
    restEl.className = 'budget-restant ok';
  }

  // Stats
  document.getElementById('statPaid').textContent      = countPaid;
  document.getElementById('statRemaining').textContent = countRem;
  document.getElementById('statPaidAmt').textContent   = fmt(totalPaid);
  document.getElementById('statTotal').textContent     = fmt(totalAll);
  document.getElementById('sectionTotal').textContent  = fmt(totalAll);

  // Chips catégorie
  renderCatsBar(items, cats);

  // Liste
  renderItems(items, cats);

  // Select catégorie du formulaire
  renderCatSelect(cats);
}

function renderCatsBar(items, cats) {
  const bar = document.getElementById('catsBar');
  let html = `<div class="cat-chip ${filterActive==='all'?'active':''}" data-cat="all" onclick="filterCat('all')">Tout</div>`;

  cats.forEach(cat => {
    const catItems = items.filter(i => i.cat === cat.id);
    if (catItems.length === 0) return;
    const sum = catItems.reduce((s,i) => s + (parseFloat(i.amount)||0), 0);
    const active = filterActive === cat.id ? 'active' : '';
    html += `<div class="cat-chip ${active}" data-cat="${cat.id}" onclick="filterCat('${cat.id}')">
      ${cat.icon} ${cat.name}
      <span class="chip-sum">${fmt(sum)}</span>
    </div>`;
  });

  bar.innerHTML = html;
}

function renderItems(items, cats) {
  const filtered = filterActive === 'all' ? items : items.filter(i => i.cat === filterActive);
  const container = document.getElementById('itemsList');

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><span class="empty-icon">📭</span>Aucune dépense${filterActive !== 'all' ? ' dans cette catégorie' : ' ce mois-ci'}</div>`;
    return;
  }

  let html = '';
  filtered.forEach(item => {
    const realIdx = items.findIndex(i => i._id === item._id);
    const cat = cats.find(c => c.id === item.cat);
    html += `<div class="item-row ${item.done ? 'paid' : ''}">
      <div class="check-box ${item.done ? 'done' : ''}" onclick="toggleItem(${realIdx})">
        ${item.done ? '✓' : ''}
      </div>
      <div class="item-info">
        <div class="item-label">${escHtml(item.label)}</div>
        <div class="item-extras">
          ${cat ? `<span class="item-tag cat-tag">${cat.icon} ${cat.name}</span>` : ''}
          ${item.date ? `<span class="item-tag date-tag">📅 ${item.date}</span>` : ''}
          ${item.note ? `<span class="item-tag note-tag">${escHtml(item.note)}</span>` : ''}
        </div>
      </div>
      <span class="item-amount">${fmt(item.amount)}</span>
      <button class="item-del" onclick="deleteItem(${realIdx})">×</button>
    </div>`;
  });

  container.innerHTML = html;
}

function renderCatSelect(cats) {
  const sel = document.getElementById('inp-cat');
  const val = sel.value;
  sel.innerHTML = '<option value="">— Aucune —</option>';
  cats.forEach(c => {
    sel.innerHTML += `<option value="${c.id}">${c.icon} ${c.name}</option>`;
  });
  sel.value = val;
}

function renderCatList(cats) {
  const container = document.getElementById('catList');
  if (cats.length === 0) { container.innerHTML = '<div style="color:var(--muted);font-size:12px;">Aucune catégorie</div>'; return; }
  container.innerHTML = cats.map((c,i) => `
    <div style="display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;">
      <span style="font-size:18px;">${c.icon}</span>
      <span style="flex:1;font-size:13px;font-weight:600;">${c.name}</span>
      <button onclick="deleteCat(${i})" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;" title="Supprimer">×</button>
    </div>
  `).join('');
}

// ══════════════════════════════
// FILTRAGE
// ══════════════════════════════
function filterCat(catId) {
  filterActive = catId;
  render();
}

// ══════════════════════════════
// ACTIONS
// ══════════════════════════════
function toggleItem(idx) {
  const mon = ensureMonth();
  mon.items[idx].done = !mon.items[idx].done;
  saveState();
  render();
}

function deleteItem(idx) {
  const mon = ensureMonth();
  mon.items.splice(idx, 1);
  saveState();
  render();
}

function clearPaid() {
  const mon = ensureMonth();
  const before = mon.items.length;
  mon.items = mon.items.filter(i => !i.done);
  saveState();
  render();
  showToast(`${before - mon.items.length} dépense(s) supprimée(s) ✓`);
}

// Champs supplémentaires
let extraOpen = false;
function toggleExtra() {
  extraOpen = !extraOpen;
  document.getElementById('extraFields').classList.toggle('visible', extraOpen);
  document.getElementById('extraToggle').classList.toggle('open', extraOpen);
  document.getElementById('extraToggle').textContent = extraOpen ? '− détails' : '+ détails';
  if (extraOpen) {
    // Pré-remplir date d'aujourd'hui
    const today = now.toISOString().split('T')[0];
    if (!document.getElementById('inp-date').value) {
      document.getElementById('inp-date').value = today;
    }
  }
}

function addItem() {
  const label  = document.getElementById('inp-label').value.trim();
  const amount = parseFloat(document.getElementById('inp-amt').value) || 0;
  const cat    = document.getElementById('inp-cat').value || '';
  const date   = document.getElementById('inp-date').value || '';
  const note   = document.getElementById('inp-note').value.trim() || '';

  if (!label) { document.getElementById('inp-label').focus(); return; }

  const mon = ensureMonth();
  mon.items.push({
    _id:    Date.now() + Math.random(),
    label, amount, cat, date, note,
    done: false
  });
  saveState();

  // Reset
  document.getElementById('inp-label').value = '';
  document.getElementById('inp-amt').value   = '';
  document.getElementById('inp-note').value  = '';
  document.getElementById('inp-cat').value   = '';
  // Garder la date

  render();
  setTimeout(() => document.getElementById('inp-label').focus(), 50);
  showToast('Dépense ajoutée ✓');
}

function addOnEnter(e) {
  if (e.key === 'Enter') addItem();
}

// ══════════════════════════════
// EXPORT JSON
// ══════════════════════════════
function exportJSON() {
  const mon  = ensureMonth();
  const cats = getCats();
  const data = {
    mois:      MONTHS_FR[now.getMonth()] + ' ' + now.getFullYear(),
    budget:    STATE._budget || 0,
    categories: cats,
    depenses:  mon.items,
    exporte_le: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `depenses_${MONTH_KEY}.json`;
  a.click();
  showToast('Export JSON téléchargé ✓');
}

// ══════════════════════════════
// MODALS
// ══════════════════════════════
function openBudgetModal() {
  document.getElementById('budgetInput').value = STATE._budget || '';
  document.getElementById('budgetModal').classList.add('open');
}
function closeBudgetModal() {
  document.getElementById('budgetModal').classList.remove('open');
}
function saveSettings() {
  STATE._budget = parseFloat(document.getElementById('budgetInput').value) || 0;
  // Synchro mois courant
  const mon = ensureMonth();
  mon.budget = STATE._budget;
  saveState();
  closeBudgetModal();
  render();
  showToast('Budget enregistré ✓');
}

function openCatModal() {
  renderCatList(getCats());
  document.getElementById('newCatName').value = '';
  document.getElementById('newCatIcon').value = '';
  document.getElementById('catModal').classList.add('open');
}
function closeCatModal() {
  document.getElementById('catModal').classList.remove('open');
}
function addCatFromModal() {
  const name = document.getElementById('newCatName').value.trim();
  const icon = document.getElementById('newCatIcon').value.trim() || '📌';
  if (!name) { document.getElementById('newCatName').focus(); return; }
  const cats = getCats();
  cats.push({ id: 'cat_' + Date.now(), icon, name });
  saveCats(cats);
  renderCatList(cats);
  renderCatSelect(cats);
  document.getElementById('newCatName').value = '';
  document.getElementById('newCatIcon').value = '';
  render();
  showToast('Catégorie ajoutée ✓');
}
function deleteCat(idx) {
  const cats = getCats();
  cats.splice(idx, 1);
  saveCats(cats);
  renderCatList(cats);
  render();
}

// Fermer en cliquant à côté
['budgetModal','catModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
});

// ══════════════════════════════
// TOAST
// ══════════════════════════════
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ══════════════════════════════
// INIT
// ══════════════════════════════
render();
</script>
</body>
</html>
