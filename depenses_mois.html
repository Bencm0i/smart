<!DOCTYPE html>
<html lang="fr" data-theme="military">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DÉPENSES · Mois</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23E87722'/><text y='24' x='4' font-size='22'>💸</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --accent:#E87722;--accent2:#c96218;--accentbg:rgba(232,119,34,0.13);
  --green:#7aa85a;--red:#c0493a;--gold:#c8a842;
}
[data-theme="military"] {
  --bg:#1c1f16;--bg2:#23271b;--surface:#2a2f21;--surface2:#323828;
  --border:#464d38;--border2:#565e44;--text:#d4cfb8;--text2:#a09b87;
  --muted:#6b6858;--hdr:#1c1f16ee;--shadow:0 4px 20px rgba(0,0,0,.5);
  --grid:rgba(255,255,255,0.025);--tag:#3d4430;
}
[data-theme="beige"] {
  --bg:#f0e8d8;--bg2:#e8dfc9;--surface:#faf5eb;--surface2:#ede5d2;
  --border:#c8b896;--border2:#b8a880;--text:#3a3020;--text2:#6a5a40;
  --muted:#9a8a6a;--hdr:#f0e8d8ef;--shadow:0 4px 20px rgba(100,80,40,.18);
  --grid:rgba(0,0,0,0.04);--tag:#ddd0b0;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  background:var(--bg);
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:28px 28px;
  color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;
  min-height:100vh;padding-bottom:200px;
}

/* ─── HEADER ─── */
.hdr{
  position:sticky;top:0;z-index:200;
  background:var(--hdr);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:8px 12px;
}
.hdr-row1{display:flex;align-items:center;gap:8px;}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);flex-shrink:0;}
.hdr-date{flex:1;text-align:center;}
.hdr-date .month{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
.hdr-date .today{font-size:10px;color:var(--muted);margin-top:1px;letter-spacing:.5px;}
.hbtn{background:var(--surface);border:1px solid var(--border);color:var(--text2);font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;padding:5px 9px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:3px;transition:all .18s;min-height:30px;flex-shrink:0;}
.hbtn:active,.hbtn:hover{border-color:var(--accent);color:var(--accent);}

/* ─── RESTE À PAYER BANNER ─── */
.rap-banner{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;
  background:var(--surface);
  border-bottom:2px solid var(--accent);
  position:sticky;top:61px;z-index:190;
}
.rap-banner.zero{border-bottom-color:var(--green);}
.rap-left{display:flex;align-items:center;gap:8px;}
.rap-icon{font-size:20px;line-height:1;}
.rap-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.rap-val{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:28px;line-height:1;color:var(--accent);transition:color .3s;}
.rap-val.zero{color:var(--green);}
.rap-right{text-align:right;}
.rap-count{font-size:9px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;font-weight:600;}
.rap-paid{font-size:11px;color:var(--green);font-weight:600;margin-top:2px;}

/* ─── ALERTE ÉCHÉANCES TODAY ─── */
.alert-today{
  margin:10px 12px 0;
  background:rgba(192,73,58,0.12);
  border:1px solid var(--red);
  border-radius:10px;
  padding:10px 12px;
  display:none;
}
.alert-today.visible{display:block;}
.alert-today-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.alert-item{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:3px 0;border-bottom:1px solid rgba(192,73,58,0.2);}
.alert-item:last-child{border-bottom:none;}
.alert-item-name{font-weight:600;color:var(--text);}
.alert-item-amt{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:var(--red);}

/* ─── LISTE ITEMS ─── */
.list-wrap{padding:10px 12px 0;max-width:580px;margin:0 auto;}

.item-row{
  display:flex;align-items:center;gap:7px;
  padding:9px 10px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  margin-bottom:6px;
  transition:opacity .2s,background .15s;
  position:relative;
}
.item-row.paid{opacity:.45;}
.item-row.overdue{
  background:rgba(192,73,58,.08);
  border-color:var(--red);
  border-left:3px solid var(--red);
}
.item-row.today-due{
  background:rgba(192,73,58,.13);
  border-color:var(--red);
  border-left:3px solid var(--red);
  animation:pulse-border 1.4s ease-in-out infinite;
}
@keyframes pulse-border{0%,100%{box-shadow:0 0 0 0 rgba(192,73,58,0)}50%{box-shadow:0 0 0 4px rgba(192,73,58,.25)}}

/* checkbox */
.chk{
  width:22px;height:22px;border-radius:6px;border:2px solid var(--border2);
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:12px;background:var(--surface2);color:transparent;user-select:none;transition:all .18s;
}
.chk.done{background:var(--green);border-color:var(--green);color:#fff;}

/* info */
.item-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;}
.item-label{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text;border-radius:4px;padding:1px 3px;margin:-1px -3px;}
.item-row.paid .item-label{text-decoration:line-through;color:var(--muted);}
.item-label:hover,.item-label:focus{outline:1px solid var(--accent);background:var(--surface2);}
.item-label[contenteditable="true"]{outline:1px solid var(--accent);background:var(--surface2);white-space:normal;overflow:visible;}

.item-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.tag{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:1px 6px;border-radius:4px;border:1px solid var(--border);background:var(--tag);color:var(--text2);}
.tag.date-tag{color:var(--gold);border-color:rgba(200,168,66,.4);}
.tag.cat-tag{color:var(--accent);background:var(--accentbg);border-color:rgba(232,119,34,.3);}
.tag.today-tag{color:#fff;background:var(--red);border-color:var(--red);}
.tag.echu-tag{color:#fff;background:rgba(192,73,58,.8);border-color:var(--red);}
.tag.note-tag{font-style:italic;text-transform:none;font-size:9px;}

/* montant */
.item-amt{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;
  color:var(--text);flex-shrink:0;min-width:64px;text-align:right;
  cursor:text;border-radius:4px;padding:1px 4px;
}
.item-row.paid .item-amt{color:var(--muted);}
.item-row.today-due .item-amt{color:var(--red);}
.item-row.overdue .item-amt{color:rgba(192,73,58,.8);}
.item-amt:hover,.item-amt:focus{outline:1px solid var(--accent);background:var(--surface2);}
.item-amt[contenteditable="true"]{outline:1px solid var(--accent);background:var(--surface2);}

/* delete */
.item-del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 4px;border-radius:5px;line-height:1;flex-shrink:0;transition:color .15s;}
.item-del:hover{color:var(--red);}

/* ─── FORM AJOUT ─── */
.add-form{
  max-width:580px;margin:10px auto 0;padding:0 12px;
}
.add-row{display:flex;gap:7px;align-items:center;margin-bottom:6px;}
.fi{background:var(--surface);border:1px solid var(--border2);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:13px;border-radius:9px;padding:9px 11px;outline:none;transition:border-color .18s,box-shadow .18s;width:100%;}
.fi::placeholder{color:var(--muted);}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accentbg);}
input[type="number"].fi{-moz-appearance:textfield;}
input[type="number"].fi::-webkit-outer-spin-button,
input[type="number"].fi::-webkit-inner-spin-button{-webkit-appearance:none;}
.fs{background:var(--surface);border:1px solid var(--border2);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:12px;border-radius:9px;padding:9px 10px;outline:none;cursor:pointer;width:100%;transition:border-color .18s;}
.fs:focus{border-color:var(--accent);}
.add-btn{background:var(--accent);border:none;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;width:40px;height:40px;min-width:40px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .18s,transform .1s;}
.add-btn:hover{background:var(--accent2);}
.add-btn:active{transform:scale(.92);}
.extra-toggle{background:none;border:1px dashed var(--border2);color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;padding:5px 9px;border-radius:7px;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0;}
.extra-toggle.open{border-style:solid;border-color:var(--accent);color:var(--accent);background:var(--accentbg);}
.extra-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:6px;}
.extra-grid-full{grid-column:1/-1;}
.elbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;display:block;}
.extra-wrap{display:none;}
.extra-wrap.visible{display:block;}

/* ─── SECTION OUTILS ─── */
.tools-bar{max-width:580px;margin:6px auto 0;padding:0 12px;display:flex;gap:6px;flex-wrap:wrap;}

/* ─── FAB (budget bar sticky bottom) ─── */
.fab{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:var(--hdr);backdrop-filter:blur(14px);
  border-top:1px solid var(--border);
  padding:8px 12px 16px;
  max-width:580px;margin:0 auto;
}
@media(min-width:580px){.fab{left:50%;transform:translateX(-50%);right:auto;width:580px;}}
.fab-budget{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;}
.fab-lbl{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:700;}
.fab-spent{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;color:var(--text);}
.fab-rest{font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;border:1px solid;}
.fab-rest.ok{color:var(--green);border-color:var(--green);background:rgba(90,136,64,.1);}
.fab-rest.warn{color:var(--accent);border-color:var(--accent);background:var(--accentbg);}
.fab-rest.over{color:var(--red);border-color:var(--red);background:rgba(192,73,58,.1);}
.prog{height:4px;background:var(--surface2);border-radius:10px;overflow:hidden;}
.prog-fill{height:100%;border-radius:10px;transition:width .5s ease,background .3s;}

/* ─── MODAL ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-sheet{background:var(--surface);border:1px solid var(--border);border-radius:18px 18px 0 0;padding:20px 18px 36px;width:100%;max-width:580px;transform:translateY(30px);transition:transform .25s,background .3s;box-shadow:var(--shadow);}
.modal-overlay.open .modal-sheet{transform:translateY(0);}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;transition:color .15s;}
.modal-close:hover{color:var(--red);}
.modal-lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;display:block;}
.modal-inp{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:15px;border-radius:10px;padding:12px 14px;outline:none;width:100%;margin-bottom:14px;transition:border-color .18s;}
.modal-inp:focus{border-color:var(--accent);}
.modal-save{background:var(--accent);border:none;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;letter-spacing:2px;text-transform:uppercase;padding:13px;border-radius:10px;cursor:pointer;width:100%;transition:background .18s;}
.modal-save:hover{background:var(--accent2);}

/* ─── TOAST ─── */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--surface);border:1px solid var(--accent);color:var(--accent);font-size:12px;font-weight:600;padding:8px 18px;border-radius:8px;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ─── EMPTY ─── */
.empty{text-align:center;padding:32px 16px;color:var(--muted);font-size:12px;}
.empty-icon{font-size:32px;display:block;margin-bottom:8px;opacity:.4;}

/* ─── SECTION LABEL ─── */
.sec-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:8px 0 4px;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-row1">
    <div class="logo">💸 DÉPENSES</div>
    <div class="hdr-date">
      <div class="month" id="monthLabel">—</div>
      <div class="today" id="todayLabel">—</div>
    </div>
    <button class="hbtn" id="themeBtn" onclick="toggleTheme()">🎨</button>
    <button class="hbtn" onclick="openBudgetModal()">⚙</button>
  </div>
</div>

<!-- RESTE À PAYER BANNER -->
<div class="rap-banner" id="rapBanner">
  <div class="rap-left">
    <span class="rap-icon">⏳</span>
    <div>
      <div class="rap-lbl">Reste à payer</div>
      <div class="rap-val" id="rapVal">0 €</div>
    </div>
  </div>
  <div class="rap-right">
    <div class="rap-count"><span id="rapCount">0</span> en attente</div>
    <div class="rap-paid" id="rapPaid">0 payées</div>
  </div>
</div>

<!-- ALERTE ÉCHÉANCES AUJOURD'HUI -->
<div class="alert-today" id="alertToday">
  <div class="alert-today-title">🔔 Échéance aujourd'hui</div>
  <div id="alertList"></div>
</div>

<!-- LISTE -->
<div class="list-wrap">
  <div class="sec-lbl" id="listHeader">Dépenses du mois</div>
  <div id="itemsList">
    <div class="empty"><span class="empty-icon">📭</span>Aucune dépense ce mois-ci</div>
  </div>

  <!-- FORMULAIRE AJOUT -->
  <div class="add-form" style="margin-top:8px;">
    <div class="add-row">
      <input class="fi" type="text" id="inp-label" placeholder="Libellé…" onkeydown="addOnEnter(event)" autocomplete="off">
      <input class="fi" type="number" inputmode="decimal" id="inp-amt" placeholder="€" style="width:80px;flex-shrink:0;" onkeydown="addOnEnter(event)">
      <button class="extra-toggle" id="extraToggle" onclick="toggleExtra()">+ détails</button>
      <button class="add-btn" onclick="addItem()">+</button>
    </div>
    <div class="extra-wrap" id="extraWrap">
      <div class="extra-grid">
        <div>
          <label class="elbl">Catégorie</label>
          <select class="fs" id="inp-cat"><option value="">— Aucune —</option></select>
        </div>
        <div>
          <label class="elbl">Échéance</label>
          <input class="fi" type="date" id="inp-date">
        </div>
        <div class="extra-grid-full">
          <label class="elbl">Note</label>
          <input class="fi" type="text" id="inp-note" placeholder="Commentaire facultatif…">
        </div>
      </div>
    </div>
  </div>

  <!-- OUTILS -->
  <div class="tools-bar">
    <button class="hbtn" onclick="exportJSON()">⬇ Export</button>
    <button class="hbtn" onclick="triggerImport()">⬆ Import</button>
    <button class="hbtn" onclick="clearPaid()">🗑 Suppr. payées</button>
    <button class="hbtn" onclick="openCatModal()">📁 Catégories</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
  </div>

  <div style="font-size:9px;color:var(--muted);text-align:right;padding:8px 0 4px;display:flex;align-items:center;justify-content:flex-end;gap:5px;">
    <span style="width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;"></span>
    Sauvegarde locale auto
  </div>
</div>

<!-- FAB BUDGET -->
<div class="fab" id="fabZone">
  <div class="fab-budget">
    <span class="fab-lbl">Dépensé</span>
    <span class="fab-spent" id="fabSpent">0 €</span>
    <span id="fabTotal" style="font-size:11px;color:var(--muted);"></span>
    <span class="fab-rest ok" id="fabRest">—</span>
  </div>
  <div class="prog"><div class="prog-fill" id="progFill" style="width:0%;background:var(--green)"></div></div>
</div>

<!-- MODAL BUDGET -->
<div class="modal-overlay" id="budgetModal">
  <div class="modal-sheet">
    <div class="modal-title">⚙ Paramètres <button class="modal-close" onclick="closeBudgetModal()">✕</button></div>
    <label class="modal-lbl">Budget maximum (€)</label>
    <input class="modal-inp" id="budgetInput" type="number" inputmode="decimal" placeholder="ex: 3 000">
    <button class="modal-save" onclick="saveSettings()">Enregistrer</button>
  </div>
</div>

<!-- MODAL CATÉGORIES -->
<div class="modal-overlay" id="catModal">
  <div class="modal-sheet">
    <div class="modal-title">📁 Catégories <button class="modal-close" onclick="closeCatModal()">✕</button></div>
    <div id="catList" style="margin-bottom:16px;display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;"></div>
    <label class="modal-lbl">Nouvelle catégorie</label>
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      <input class="modal-inp" id="newCatIcon" type="text" placeholder="🏠" style="width:60px;margin-bottom:0;text-align:center;font-size:20px;">
      <input class="modal-inp" id="newCatName" type="text" placeholder="Nom" style="margin-bottom:0;flex:1;">
    </div>
    <button class="modal-save" onclick="addCatFromModal()">Ajouter</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// ÉTAT
// ══════════════════════════════════════════════
const SK  = 'depenses_v3';
const TK  = 'depenses_theme_v3';

function loadState() { try { return JSON.parse(localStorage.getItem(SK)) || {}; } catch(e) { return {}; } }
function saveState() { localStorage.setItem(SK, JSON.stringify(STATE)); }

let STATE = loadState();

const now = new Date();
const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS_FR   = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MONTH_KEY = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
const TODAY_STR = now.toISOString().slice(0,10);

// Affiche mois et date du jour en header
document.getElementById('monthLabel').textContent = MONTHS_FR[now.getMonth()] + ' ' + now.getFullYear();
document.getElementById('todayLabel').textContent = DAYS_FR[now.getDay()] + ' ' + now.getDate() + ' ' + MONTHS_FR[now.getMonth()];

function ensureMonth() {
  if (!STATE[MONTH_KEY]) STATE[MONTH_KEY] = { items: [], budget: STATE._budget || 0 };
  return STATE[MONTH_KEY];
}

const DEFAULT_CATS = [
  {id:'loyer',   icon:'🏠', name:'Logement'},
  {id:'courses', icon:'🛒', name:'Courses'},
  {id:'transp',  icon:'🚗', name:'Transport'},
  {id:'sorties', icon:'🍕', name:'Sorties'},
  {id:'abos',    icon:'📱', name:'Abonnements'},
  {id:'sante',   icon:'💊', name:'Santé'},
  {id:'loisirs', icon:'🎮', name:'Loisirs'},
  {id:'divers',  icon:'📦', name:'Divers'},
];
function getCats()     { return STATE._cats || DEFAULT_CATS; }
function saveCats(c)   { STATE._cats = c; saveState(); }

// ── THÈME
let currentTheme = localStorage.getItem(TK) || 'military';
document.documentElement.setAttribute('data-theme', currentTheme);
function toggleTheme() {
  currentTheme = currentTheme === 'military' ? 'beige' : 'military';
  document.documentElement.setAttribute('data-theme', currentTheme);
  localStorage.setItem(TK, currentTheme);
}

// ══════════════════════════════════════════════
// FORMAT
// ══════════════════════════════════════════════
function fmt(v) {
  if (!v && v!==0) return '—';
  return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:2}).format(v);
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(d) { // YYYY-MM-DD → DD/MM
  if (!d) return '';
  const p = d.split('-');
  return p[2]+'/'+p[1];
}

// ══════════════════════════════════════════════
// RENDU
// ══════════════════════════════════════════════
function render() {
  const mon   = ensureMonth();
  const items = mon.items || [];
  const cats  = getCats();
  const budget = STATE._budget || 0;

  const totalAll   = items.reduce((s,i) => s+(parseFloat(i.amount)||0), 0);
  const totalPaid  = items.filter(i=>i.done).reduce((s,i) => s+(parseFloat(i.amount)||0), 0);
  const countPaid  = items.filter(i=>i.done).length;
  const countRem   = items.filter(i=>!i.done).length;
  const totalRap   = totalAll - totalPaid;

  // Reste à payer banner
  const rapBanner = document.getElementById('rapBanner');
  const rapVal    = document.getElementById('rapVal');
  document.getElementById('rapCount').textContent = countRem;
  document.getElementById('rapPaid').textContent  = countPaid + ' payée'+(countPaid>1?'s':'');
  rapVal.textContent = fmt(totalRap);
  rapVal.className   = 'rap-val' + (totalRap<=0?' zero':'');
  rapBanner.className= 'rap-banner' + (totalRap<=0?' zero':'');

  // Budget FAB
  document.getElementById('fabSpent').textContent = fmt(totalAll);
  document.getElementById('fabTotal').textContent = budget>0 ? '/ '+fmt(budget) : '';
  const pct  = budget>0 ? Math.min((totalAll/budget)*100,100) : 0;
  const fill = document.getElementById('progFill');
  fill.style.width = pct+'%';
  fill.style.background = pct<65?'var(--green)':pct<88?'var(--accent)':'var(--red)';
  const restEl = document.getElementById('fabRest');
  if (budget>0) {
    const rest = budget - totalAll;
    restEl.textContent = (rest>=0?'− ':'+ ')+fmt(Math.abs(rest));
    restEl.className = 'fab-rest '+(rest>budget*.2?'ok':rest>=0?'warn':'over');
  } else {
    restEl.textContent = '—'; restEl.className='fab-rest ok';
  }

  // Alerte échéances aujourd'hui (non payées)
  const todayItems = items.filter(i => !i.done && i.date === TODAY_STR);
  const alertDiv   = document.getElementById('alertToday');
  const alertList  = document.getElementById('alertList');
  if (todayItems.length) {
    alertDiv.classList.add('visible');
    alertList.innerHTML = todayItems.map(i => {
      const cat = cats.find(c=>c.id===i.cat);
      return `<div class="alert-item">
        <span class="alert-item-name">${cat?cat.icon+' ':''} ${esc(i.label)}</span>
        <span class="alert-item-amt">${fmt(i.amount)}</span>
      </div>`;
    }).join('');
  } else {
    alertDiv.classList.remove('visible');
    alertList.innerHTML = '';
  }

  // header liste
  document.getElementById('listHeader').textContent = items.length
    ? `Dépenses du mois · ${items.length} élément${items.length>1?'s':''}` : 'Dépenses du mois';

  renderItems(items, cats);
  renderCatSelect(cats);
}

function renderItems(items, cats) {
  const container = document.getElementById('itemsList');
  if (!items.length) {
    container.innerHTML = `<div class="empty"><span class="empty-icon">📭</span>Aucune dépense ce mois-ci</div>`;
    return;
  }

  // Tri : today-due first, puis overdue, puis unpaid, puis paid
  const sorted = [...items].sort((a,b) => {
    const scoreA = itemScore(a);
    const scoreB = itemScore(b);
    if (scoreA !== scoreB) return scoreA - scoreB;
    // par date croissante si date renseignée
    if (a.date && b.date) return a.date.localeCompare(b.date);
    if (a.date) return -1;
    if (b.date) return 1;
    return 0;
  });

  function itemScore(i) {
    if (i.done) return 3;
    if (i.date === TODAY_STR) return 0;
    if (i.date && i.date < TODAY_STR) return 1;
    return 2;
  }

  let html = '';
  sorted.forEach(item => {
    const realIdx = items.findIndex(i => i._id === item._id);
    const cat = cats.find(c => c.id === item.cat);

    const isToday   = !item.done && item.date === TODAY_STR;
    const isOverdue = !item.done && item.date && item.date < TODAY_STR;
    const rowClass  = item.done ? 'paid' : isToday ? 'today-due' : isOverdue ? 'overdue' : '';

    const dateTag = item.date
      ? `<span class="tag ${isToday?'today-tag':isOverdue?'echu-tag':'date-tag'}">${isToday?'🔔 ':isOverdue?'⚠ ':'📅 '}${fmtDate(item.date)}</span>`
      : '';
    const catTag  = cat ? `<span class="tag cat-tag">${cat.icon} ${esc(cat.name)}</span>` : '';
    const noteTag = item.note ? `<span class="tag note-tag">${esc(item.note)}</span>` : '';

    html += `<div class="item-row ${rowClass}" data-idx="${realIdx}">
      <div class="chk ${item.done?'done':''}" onclick="toggleItem(${realIdx})">${item.done?'✓':''}</div>
      <div class="item-info">
        <div class="item-label"
          contenteditable="false"
          onclick="startEditLabel(this,${realIdx})"
          onblur="commitLabel(this,${realIdx})"
          onkeydown="labelKey(event,this,${realIdx})"
          title="Toucher pour modifier">${esc(item.label)}</div>
        <div class="item-meta">${dateTag}${catTag}${noteTag}</div>
      </div>
      <span class="item-amt"
        contenteditable="false"
        onclick="startEditAmt(this,${realIdx})"
        onblur="commitAmt(this,${realIdx})"
        onkeydown="amtKey(event,this,${realIdx})"
        inputmode="decimal"
        title="Toucher pour modifier">${fmt(item.amount)}</span>
      <button class="item-del" onclick="deleteItem(${realIdx})">×</button>
    </div>`;
  });
  container.innerHTML = html;
}

function renderCatSelect(cats) {
  const sel = document.getElementById('inp-cat');
  const val = sel.value;
  sel.innerHTML = '<option value="">— Aucune —</option>';
  cats.forEach(c => { sel.innerHTML += `<option value="${c.id}">${c.icon} ${c.name}</option>`; });
  sel.value = val;
}

function renderCatList(cats) {
  const container = document.getElementById('catList');
  if (!cats.length) { container.innerHTML = '<div style="color:var(--muted);font-size:12px;">Aucune catégorie</div>'; return; }
  container.innerHTML = cats.map((c,i) => `
    <div style="display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;">
      <span style="font-size:18px;">${c.icon}</span>
      <span style="flex:1;font-size:13px;font-weight:600;">${c.name}</span>
      <button onclick="deleteCat(${i})" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;">×</button>
    </div>`).join('');
}

// ══════════════════════════════════════════════
// ÉDITION INLINE (contenteditable)
// ══════════════════════════════════════════════
function startEditLabel(el, idx) {
  el.contentEditable = 'true';
  el.focus();
  // place cursor à la fin
  const range = document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}
function commitLabel(el, idx) {
  el.contentEditable = 'false';
  const val = el.textContent.trim();
  if (val) {
    const mon = ensureMonth();
    mon.items[idx].label = val;
    saveState();
  }
  render();
}
function labelKey(e, el, idx) {
  if (e.key === 'Enter')  { e.preventDefault(); el.blur(); }
  if (e.key === 'Escape') { el.contentEditable = 'false'; render(); }
  e.stopPropagation();
}

function startEditAmt(el, idx) {
  const mon = ensureMonth();
  el.contentEditable = 'true';
  el.textContent = mon.items[idx].amount || '';
  el.focus();
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}
function commitAmt(el, idx) {
  el.contentEditable = 'false';
  const val = parseFloat(el.textContent.replace(',','.'));
  if (!isNaN(val) && val >= 0) {
    const mon = ensureMonth();
    mon.items[idx].amount = val;
    saveState();
  }
  render();
}
function amtKey(e, el, idx) {
  if (e.key === 'Enter')  { e.preventDefault(); el.blur(); }
  if (e.key === 'Escape') { el.contentEditable = 'false'; render(); }
  e.stopPropagation();
}

// ══════════════════════════════════════════════
// ACTIONS LISTE
// ══════════════════════════════════════════════
function toggleItem(idx) { const m=ensureMonth(); m.items[idx].done=!m.items[idx].done; saveState(); render(); }
function deleteItem(idx)  { const m=ensureMonth(); m.items.splice(idx,1); saveState(); render(); }
function clearPaid() {
  const m=ensureMonth(); const n=m.items.length;
  m.items=m.items.filter(i=>!i.done); saveState(); render();
  showToast(`${n-m.items.length} supprimée(s) ✓`);
}

// ══════════════════════════════════════════════
// FORMULAIRE AJOUT
// ══════════════════════════════════════════════
let extraOpen = false;
function toggleExtra() {
  extraOpen = !extraOpen;
  document.getElementById('extraWrap').classList.toggle('visible', extraOpen);
  document.getElementById('extraToggle').classList.toggle('open', extraOpen);
  document.getElementById('extraToggle').textContent = extraOpen ? '− détails' : '+ détails';
  if (extraOpen && !document.getElementById('inp-date').value) {
    document.getElementById('inp-date').value = TODAY_STR;
  }
}

function addItem() {
  const label  = document.getElementById('inp-label').value.trim();
  const amount = parseFloat(document.getElementById('inp-amt').value.replace(',','.')) || 0;
  const cat    = document.getElementById('inp-cat').value || '';
  const date   = document.getElementById('inp-date').value || '';
  const note   = document.getElementById('inp-note').value.trim() || '';
  if (!label) { document.getElementById('inp-label').focus(); return; }
  const mon = ensureMonth();
  mon.items.push({ _id: Date.now()+Math.random(), label, amount, cat, date, note, done: false });
  saveState();
  document.getElementById('inp-label').value = '';
  document.getElementById('inp-amt').value   = '';
  document.getElementById('inp-note').value  = '';
  document.getElementById('inp-cat').value   = '';
  render();
  setTimeout(() => document.getElementById('inp-label').focus(), 50);
  showToast('Ajouté ✓');
}
function addOnEnter(e) { if (e.key === 'Enter') addItem(); }

// ══════════════════════════════════════════════
// EXPORT / IMPORT
// ══════════════════════════════════════════════
function exportJSON() {
  const mon  = ensureMonth();
  const data = {
    mois: MONTHS_FR[now.getMonth()]+' '+now.getFullYear(),
    budget: STATE._budget || 0,
    categories: getCats(),
    depenses: mon.items,
    exporte_le: new Date().toISOString()
  };
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download = `depenses_${MONTH_KEY}.json`;
  a.click();
  showToast('Export téléchargé ✓');
}
function triggerImport() { document.getElementById('importFile').value=''; document.getElementById('importFile').click(); }
function importJSON(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.depenses || !Array.isArray(data.depenses)) throw new Error();
      const mon = ensureMonth();
      const ids = new Set(mon.items.map(i=>String(i._id)));
      let added = 0;
      data.depenses.forEach(item => {
        if (!ids.has(String(item._id))) {
          mon.items.push({ _id:item._id||Date.now()+Math.random(), label:item.label||'', amount:parseFloat(item.amount)||0, cat:item.cat||'', date:item.date||'', note:item.note||'', done:item.done||false });
          added++;
        }
      });
      if (data.categories && Array.isArray(data.categories)) {
        const cats = getCats(); const cids = new Set(cats.map(c=>c.id));
        data.categories.forEach(c => { if(!cids.has(c.id)) cats.push(c); });
        saveCats(cats);
      }
      if (data.budget && !STATE._budget) { STATE._budget=data.budget; mon.budget=data.budget; }
      saveState(); render();
      showToast(`${added} dépense(s) importée(s) ✓`);
    } catch(err) { showToast('❌ Fichier invalide'); }
  };
  reader.readAsText(file);
}

// ══════════════════════════════════════════════
// MODALS
// ══════════════════════════════════════════════
function openBudgetModal()  { document.getElementById('budgetInput').value=STATE._budget||''; document.getElementById('budgetModal').classList.add('open'); }
function closeBudgetModal() { document.getElementById('budgetModal').classList.remove('open'); }
function saveSettings() {
  STATE._budget = parseFloat(document.getElementById('budgetInput').value)||0;
  ensureMonth().budget = STATE._budget;
  saveState(); closeBudgetModal(); render();
  showToast('Budget enregistré ✓');
}

function openCatModal()  { renderCatList(getCats()); document.getElementById('newCatName').value=''; document.getElementById('newCatIcon').value=''; document.getElementById('catModal').classList.add('open'); }
function closeCatModal() { document.getElementById('catModal').classList.remove('open'); }
function addCatFromModal() {
  const name = document.getElementById('newCatName').value.trim();
  const icon = document.getElementById('newCatIcon').value.trim()||'📌';
  if (!name) { document.getElementById('newCatName').focus(); return; }
  const cats = getCats();
  cats.push({id:'cat_'+Date.now(), icon, name});
  saveCats(cats); renderCatList(cats); renderCatSelect(cats);
  document.getElementById('newCatName').value=''; document.getElementById('newCatIcon').value='';
  render(); showToast('Catégorie ajoutée ✓');
}
function deleteCat(idx) { const cats=getCats(); cats.splice(idx,1); saveCats(cats); renderCatList(cats); render(); }

['budgetModal','catModal'].forEach(id => {
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
});

// ══════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2500);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
render();
</script>
