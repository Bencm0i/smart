<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0C0F">
<title>Smart — Outils</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0A0C0F;
  --surf:    #111318;
  --surf2:   #181B22;
  --border:  rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --text:    #E8EAF0;
  --muted:   #565B6B;
  --muted2:  #8890A4;
  --accent:  #3D7FFF;
  --acc2:    #0d1f40;
  --green:   #2ECC8A;
  --orange:  #FF8C42;
  --red:     #FF4D6A;
  --yellow:  #F5C842;
  --pink:    #D966B0;
  --teal:    #2EC4C4;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Outfit', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(61,127,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(61,127,255,0.025) 1px,transparent 1px);
  background-size:32px 32px}

.wrap{position:relative;z-index:1;padding:0 16px 48px;max-width:520px;margin:0 auto}

/* ─ HEADER ─ */
.header{padding:40px 0 16px;animation:slideDown .5s cubic-bezier(.22,1,.36,1) both}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.logo-tag{font-family:var(--mono);font-size:9px;color:var(--accent);letter-spacing:2.5px;
  text-transform:uppercase;display:flex;align-items:center;gap:6px;margin-bottom:4px}
.logo-tag::before{content:'';width:14px;height:1px;background:var(--accent)}
.logo-title{font-size:27px;font-weight:800;letter-spacing:-1px;line-height:1}
.logo-title em{font-style:normal;color:var(--accent)}
.logo-sub{font-family:var(--mono);font-size:8.5px;color:var(--muted);letter-spacing:.4px;margin-top:5px}
.clock-block{text-align:right;flex-shrink:0}
.clock-time{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text);letter-spacing:1px;line-height:1}
.clock-date{font-family:var(--mono);font-size:8px;color:var(--muted);margin-top:3px;letter-spacing:.3px}

/* ─ STATUS ─ */
.status-bar{display:flex;align-items:center;gap:8px;margin-top:14px;
  font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.8px;
  animation:slideDown .5s .05s cubic-bezier(.22,1,.36,1) both}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:background .3s,box-shadow .3s}
.dot.ok     {background:var(--green);box-shadow:0 0 7px var(--green);animation:blink 2.5s infinite}
.dot.loading{background:var(--yellow);box-shadow:0 0 7px var(--yellow);animation:blink 1s infinite}
.dot.error  {background:var(--red);box-shadow:0 0 7px var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* ─ WEATHER CARD ─ */
.wx-card{display:none;text-decoration:none;border-radius:14px;
  background:var(--surf);border:1px solid var(--border);overflow:hidden;
  margin:14px 0 0;
  animation:slideUp .5s .08s cubic-bezier(.22,1,.36,1) both;
  transition:border-color .2s,box-shadow .2s}
.wx-card:active{transform:scale(.97)}
.wx-bar{height:2px;background:linear-gradient(90deg,var(--accent),transparent)}
.wx-body{padding:12px 14px;display:flex;align-items:center;gap:12px}
.wx-icon{font-size:28px;flex-shrink:0}
.wx-main{flex:1;min-width:0}
.wx-name{font-size:12px;font-weight:700;letter-spacing:-.2px;margin-bottom:2px}
.wx-file{font-family:var(--mono);font-size:8px;color:var(--muted)}
.wx-data{display:flex;align-items:baseline;gap:8px;margin-top:4px;flex-wrap:wrap}
.wx-temp{font-family:var(--mono);font-size:22px;font-weight:700;color:#7AABFF;line-height:1}
.wx-desc{font-size:10px;color:var(--muted2);font-style:italic}
.wx-details{font-family:var(--mono);font-size:8.5px;color:var(--muted);margin-top:3px;letter-spacing:.3px}
.wx-tags{display:flex;gap:4px;margin-top:6px}
.wx-tags .tag{background:rgba(61,127,255,.14);color:#7AABFF}

/* ─ SEARCH ROW ─ */
.search-row{display:flex;gap:8px;align-items:center;margin:14px 0 6px;
  animation:slideUp .5s .10s cubic-bezier(.22,1,.36,1) both}
.search-wrap{position:relative;flex:1}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);
  font-family:var(--mono);font-size:13px;color:var(--muted);pointer-events:none}
.search-input{width:100%;background:var(--surf2);border:1px solid var(--border2);
  border-radius:12px;color:var(--text);font-family:var(--mono);font-size:12px;
  padding:11px 36px 11px 36px;outline:none;transition:border-color .2s,box-shadow .2s}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(61,127,255,.12)}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,.08);border:none;border-radius:6px;
  color:var(--muted);font-size:10px;width:22px;height:22px;
  display:none;align-items:center;justify-content:center;cursor:pointer}
.search-clear.on{display:flex}
.layout-btn{background:transparent;border:1px solid var(--border2);border-radius:10px;
  color:var(--muted2);font-size:15px;width:34px;height:34px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.layout-btn:active{transform:scale(.9)}

/* ─ CHIPS ─ */
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:12px;
  scrollbar-width:none;animation:slideUp .5s .12s cubic-bezier(.22,1,.36,1) both}
.filter-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;font-family:var(--mono);font-size:9px;letter-spacing:1px;
  text-transform:uppercase;border:1px solid var(--border2);border-radius:20px;
  padding:5px 12px;cursor:pointer;transition:all .18s;
  background:transparent;color:var(--muted2);white-space:nowrap}
.chip.active{background:var(--acc2);border-color:var(--accent);color:var(--text)}
.chip:active{transform:scale(.94)}

/* ─ SECTION LABEL ─ */
.sec-label{font-family:var(--mono);font-size:8.5px;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;margin:6px 0 8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
.sec-count{color:var(--muted);font-size:8px}

/* ─ SKELETON ─ */
.skel-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.skel{height:88px;border-radius:14px;
  background:linear-gradient(90deg,var(--surf) 25%,var(--surf2) 50%,var(--surf) 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ─ GRID ─ */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;animation:slideUp .5s .14s cubic-bezier(.22,1,.36,1) both}
.grid.list{grid-template-columns:1fr}

/* ─ CARD ─ */
.card{position:relative;border-radius:14px;background:var(--surf);border:1px solid var(--border);
  text-decoration:none;display:block;overflow:hidden;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1),border-color .18s,box-shadow .18s;
  animation:cardIn .35s cubic-bezier(.22,1,.36,1) both}
.card:hover{border-color:var(--border2);box-shadow:0 4px 24px rgba(0,0,0,.32)}
.card:active{transform:scale(.95)}
.card.hidden{display:none}
.card-bar{height:2px;width:100%}
.card-body{padding:11px 12px 12px;display:flex;gap:10px;align-items:flex-start}
.card-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:18px;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-size:12px;font-weight:700;color:var(--text);letter-spacing:-.2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.card-file{font-family:var(--mono);font-size:8px;color:var(--muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.card-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-family:var(--mono);font-size:7.5px;letter-spacing:.3px;
  padding:2px 6px;border-radius:20px;white-space:nowrap}
/* List mode */
.grid.list .card-name{font-size:13px}
.grid.list .card-body{align-items:center}

/* ─ BADGE NEW ─ */
.badge-new{position:absolute;top:-1px;right:10px;
  font-family:var(--mono);font-size:7px;font-weight:700;letter-spacing:.5px;
  padding:2px 7px;border-radius:0 0 6px 6px;
  background:var(--green);color:#001a0e;text-transform:uppercase}

/* ─ AGE TAG ─ */
.age-fresh{background:rgba(46,204,138,.15);color:#5EDDA8}
.age-mid  {background:rgba(245,200,66,.12);color:#FAD966}
.age-old  {background:rgba(255,140,66,.12);color:#FFAA70}

/* ─ COLOUR THEMES ─ */
.c-blue  .card-bar{background:linear-gradient(90deg,#3D7FFF,transparent)} .c-blue  .card-ico{background:#0d1f40} .c-blue  .tag{background:rgba(61,127,255,.14);color:#7AABFF}
.c-green .card-bar{background:linear-gradient(90deg,#2ECC8A,transparent)} .c-green .card-ico{background:#0d2a1e} .c-green .tag{background:rgba(46,204,138,.14);color:#5EDDA8}
.c-orange.card-bar{background:linear-gradient(90deg,#FF8C42,transparent)} .c-orange.card-ico{background:#2a1a08} .c-orange.tag{background:rgba(255,140,66,.14);color:#FFAA70}
.c-red   .card-bar{background:linear-gradient(90deg,#FF4D6A,transparent)} .c-red   .card-ico{background:#2a0a10} .c-red   .tag{background:rgba(255,77,106,.14);color:#FF8098}
.c-yellow.card-bar{background:linear-gradient(90deg,#F5C842,transparent)} .c-yellow.card-ico{background:#2a2008} .c-yellow.tag{background:rgba(245,200,66,.14);color:#FAD966}
.c-pink  .card-bar{background:linear-gradient(90deg,#D966B0,transparent)} .c-pink  .card-ico{background:#280820} .c-pink  .tag{background:rgba(217,102,176,.14);color:#E88ACA}
.c-teal  .card-bar{background:linear-gradient(90deg,#2EC4C4,transparent)} .c-teal  .card-ico{background:#08252a} .c-teal  .tag{background:rgba(46,196,196,.14);color:#5EDADA}
.c-purple.card-bar{background:linear-gradient(90deg,#8B5CF6,transparent)} .c-purple.card-ico{background:#1a0e2a} .c-purple.tag{background:rgba(139,92,246,.14);color:#B08AFB}
.c-slate .card-bar{background:linear-gradient(90deg,#8890A4,transparent)} .c-slate .card-ico{background:#16181f} .c-slate .tag{background:rgba(136,144,164,.14);color:#AEB5C8}

/* ─ EMPTY ─ */
.empty{grid-column:1/-1;text-align:center;padding:48px 20px;
  font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:1px;line-height:2}
.empty b{display:block;font-size:28px;margin-bottom:10px}

/* ─ FOOTER ─ */
.footer{margin-top:28px;text-align:center;
  font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:1.5px;
  animation:slideUp .5s .4s cubic-bezier(.22,1,.36,1) both}
.fdot{display:inline-block;width:3px;height:3px;border-radius:50%;
  background:var(--muted);margin:0 6px;vertical-align:middle}

/* ─ RIPPLE ─ */
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.05);
  transform:scale(0);animation:rpl .5s linear;pointer-events:none}
@keyframes rpl{to{transform:scale(4);opacity:0}}

/* ─ KEYFRAMES ─ */
@keyframes slideDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp  {from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)}}
@keyframes cardIn   {from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div>
        <div class="logo-tag">bencm0i / smart</div>
        <div class="logo-title">Mes <em>Outils</em></div>
        <div class="logo-sub" id="repoSub">Connexion au dépôt…</div>
      </div>
      <div class="clock-block">
        <div class="clock-time" id="clk">--:--</div>
        <div class="clock-date" id="clkD"></div>
      </div>
    </div>
    <div class="status-bar">
      <div class="dot loading" id="dot"></div>
      <span id="statusTxt">Chargement…</span>
    </div>
  </div>

  <!-- MÉTÉO -->
  <a class="wx-card" href="meteo.html" id="wxCard">
    <div class="wx-bar"></div>
    <div class="wx-body">
      <div class="wx-icon" id="wxIco">🌤</div>
      <div class="wx-main">
        <div class="wx-name">Météo — Valence</div>
        <div class="wx-file">meteo.html</div>
        <div class="wx-data">
          <span class="wx-temp" id="wxT">--°</span>
          <span class="wx-desc" id="wxD">chargement…</span>
        </div>
        <div class="wx-details" id="wxDet"></div>
        <div class="wx-tags"><span class="tag">7 jours</span><span class="tag">Vent</span><span class="tag">Open-Meteo</span></div>
      </div>
    </div>
  </a>

  <!-- SEARCH + LAYOUT -->
  <div class="search-row">
    <div class="search-wrap">
      <span class="search-ico">⌕</span>
      <input class="search-input" id="srch" type="search" placeholder="Rechercher un outil…"
        oninput="doSearch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="search-clear" id="srchClr" onclick="clearSrch()">✕</button>
    </div>
    <button class="layout-btn" id="layBtn" onclick="toggleLayout()" title="Grille / Liste">⊞</button>
  </div>

  <!-- FILTER CHIPS -->
  <div class="filter-row" id="chips">
    <button class="chip active" data-cat="all" onclick="setFilter('all',this)">Tout</button>
  </div>

  <!-- SECTION LABEL -->
  <div class="sec-label">
    <span>Fichiers du dépôt</span>
    <span class="sec-count" id="cnt"></span>
  </div>

  <!-- SKELETON -->
  <div class="skel-grid" id="skel">
    <div class="skel"></div><div class="skel"></div>
    <div class="skel"></div><div class="skel"></div>
    <div class="skel"></div><div class="skel"></div>
  </div>

  <!-- MAIN GRID -->
  <div class="grid" id="grid" style="display:none"></div>

  <!-- FOOTER -->
  <div class="footer" id="ftr" style="display:none">
    <span class="fdot"></span>
    <span id="ftrTxt">-- OUTILS</span>
    <span class="fdot"></span>
    github.com/bencm0i/smart
    <span class="fdot"></span>
  </div>

</div>
<script>
// ════════════════════════════════════════════════════════
// MÉTADONNÉES — enrichissement local des fichiers connus
// ════════════════════════════════════════════════════════
const META = {
  'meteo.html':                   {name:'Météo Valence',          icon:'🌤', cat:'Environnement',  tags:['Météo','7 jours','Vent'],       col:'c-blue'  },
  'nuisances_sonores2.html':      {name:'Nuisances Sonores',      icon:'🔊', cat:'Vie quotidienne', tags:['Journal','Rapport','Bruit'],   col:'c-orange'},
  'nuisances_sonores.html':       {name:'Nuisances Sonores v1',   icon:'🔉', cat:'Vie quotidienne', tags:['Journal'],                    col:'c-orange'},
  'nuisances.html':               {name:'Nuisances (v1)',          icon:'📢', cat:'Vie quotidienne', tags:['Journal','PDF'],              col:'c-orange'},
  'patrimoine_kpi.html':          {name:'Patrimoine KPI',          icon:'📈', cat:'Finances',        tags:['KPI','Graphiques'],           col:'c-blue'  },
  'patrimoine_saisie.html':       {name:'Patrimoine Saisie',       icon:'💳', cat:'Finances',        tags:['Saisie','Comptes'],           col:'c-blue'  },
  'patrimoine_kpi_saisie.html':   {name:'KPI + Saisie',            icon:'🏦', cat:'Finances',        tags:['Dashboard','All-in-one'],     col:'c-teal'  },
  'patrimoine_dashboard.html':    {name:'Dashboard Patrimoine',    icon:'💰', cat:'Finances',        tags:['Wealth','Vue globale'],       col:'c-green' },
  'suivi-sante.html':             {name:'Suivi Santé',             icon:'🩺', cat:'Santé',           tags:['Symptômes','Export'],         col:'c-green' },
  'symptomes.html':               {name:'Suivi Symptômes',         icon:'🫁', cat:'Santé',           tags:['Sinus','Souffle','Ventre'],   col:'c-pink'  },
  'gluten_fodmap_tracker.html':   {name:'Gluten & FODMAP',         icon:'🌿', cat:'Santé',           tags:['Nutrition','IA'],             col:'c-green' },
  'calendrier_viewer_mobile.html':{name:'Calendrier Mobile',       icon:'📅', cat:'Planning',        tags:['Agenda','Mobile'],            col:'c-purple'},
  'calendrier_2026_2027.html':    {name:'Calendrier 2026–27',      icon:'🗓', cat:'Planning',        tags:['2026','2027'],                col:'c-purple'},
  'todo.html':                    {name:'Ma Todo',                 icon:'✅', cat:'Vie quotidienne', tags:['Tâches','Maison','3D'],       col:'c-yellow'},
  'liste_courses_militaire.html': {name:'Opération Courses',       icon:'🪖', cat:'Vie quotidienne', tags:['Courses','Budget','Mission'], col:'c-yellow'},
  'bourse.html':                  {name:'Terminal Bourse',         icon:'📊', cat:'Finances',        tags:['BTC','Or','Indices'],         col:'c-blue'  },
  'bourse_tactical.html':         {name:'Bourse Tactical',         icon:'🎯', cat:'Finances',        tags:['Crypto','Forex','Copy'],      col:'c-orange'},
  'cheque.html':                  {name:'Montant en Lettres',      icon:'🏦', cat:'Finances',        tags:['Chèques','Copie'],            col:'c-green' },
  'affaire_tracker.html':         {name:'Affaire Tracker',         icon:'📁', cat:'Travail',         tags:['Projets','Suivi'],            col:'c-slate' },
  'pointage_heures_par_affaire.html':{name:'Pointage Heures',      icon:'⏱', cat:'Travail',         tags:['Temps','Projets','ISO'],      col:'c-slate' },
  'notebooklm_tracker.html':      {name:'NotebookLM Tracker',      icon:'🎙', cat:'Travail',         tags:['PDF','Podcast','IA'],         col:'c-purple'},
  'velotaf_entretien.html':       {name:'Vélo — Entretien',        icon:'🚲', cat:'Mobilité',        tags:['Vélo','Maintenance'],         col:'c-teal'  },
  'mobilite.html':                {name:'Mobilité',                icon:'🚗', cat:'Mobilité',        tags:['Yaris','Vélo','Odometer'],    col:'c-teal'  },
  'depenses.html':                {name:'Dépenses',                icon:'💸', cat:'Finances',        tags:['Budget','Mensuel'],           col:'c-red'   },
  'launcher.html':                {name:'Launcher v1',             icon:'🚀', cat:'Navigation',      tags:['Hub','Bookmarks'],            col:'c-slate' },
  'launcher_pro.html':            {name:'Launcher Pro',            icon:'⚡', cat:'Navigation',      tags:['Hub','Velotaf','Météo'],      col:'c-yellow'},
  'index.html':                   {name:'Index',                   icon:'🗂', cat:'Navigation',      tags:['Accueil','Hub'],              col:'c-slate' },
};

const WEATHER  = 'meteo.html';
const SKIP     = new Set(['index.html']); // on s'exclut soi-même
const CAT_ORDER= ['Finances','Santé','Vie quotidienne','Planning','Travail','Mobilité','Environnement','Navigation'];
const COLS_CYC = ['c-blue','c-green','c-orange','c-teal','c-yellow','c-pink','c-purple','c-slate','c-red'];

const OWNER = 'bencm0i', REPO = 'smart';
const API_CONTENTS = `https://api.github.com/repos/${OWNER}/${REPO}/contents/`;
const API_COMMITS  = `https://api.github.com/repos/${OWNER}/${REPO}/commits?per_page=100`;

let files=[], commitMap={}, activeFilter='all', listMode=false, searchTerm='';
let colIdx=0;

// ── Clock ──
function tick(){
  const n=new Date();
  document.getElementById('clk').textContent=n.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('clkD').textContent=n.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
}
tick(); setInterval(tick,1000);

// ── Status ──
function setStatus(txt,state='ok'){
  const d=document.getElementById('dot');
  d.className='dot '+state;
  document.getElementById('statusTxt').textContent=txt;
}

// ── Auto-meta ──
function getMeta(fn){
  if(META[fn]) return {...META[fn]};
  const base=fn.replace(/\.html$/,'').replace(/[-_]/g,' ');
  const name=base.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
  return {name, icon:'📄', cat:'Autres', tags:[], col:COLS_CYC[colIdx++%COLS_CYC.length]};
}

// ── GitHub API ──
async function fetchFiles(){
  setStatus('Connexion à GitHub…','loading');
  try{
    const r=await fetch(API_CONTENTS,{headers:{Accept:'application/vnd.github+json'}});
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data=await r.json();
    files=data.filter(f=>f.type==='file'&&f.name.endsWith('.html')&&!SKIP.has(f.name));
    const nb=files.length;
    document.getElementById('repoSub').textContent=`${nb} fichier${nb>1?'s':''} · github.com/${OWNER}/${REPO}`;
    setStatus(`${nb} fichier${nb>1?'s':''} détecté${nb>1?'s':''}`, 'ok');
    return true;
  }catch(e){
    setStatus('GitHub indisponible — liste de secours','error');
    // Fallback: known META files
    files=Object.keys(META).filter(k=>!SKIP.has(k)&&k!==WEATHER).map(n=>({name:n}));
    document.getElementById('repoSub').textContent='Mode hors-ligne — métadonnées locales';
    return false;
  }
}

// ── Commits (enrichissement dates) ──
async function fetchCommits(){
  try{
    let page=1, found=false;
    while(!found){
      const r=await fetch(`${API_COMMITS}&page=${page}`,{headers:{Accept:'application/vnd.github+json'}});
      if(!r.ok) break;
      const commits=await r.json();
      if(!commits.length) break;
      // Use commit date as proxy — we can't get per-file dates without /commits?path= (expensive)
      // Instead: use push date as a global "latest" indicator
      commits.forEach(c=>{
        const date=c.commit.author.date;
        const sha=c.sha;
        // We'll try to fetch per-file info from the commit tree if we have few commits
        if(c.files){
          c.files.forEach(f=>{
            const fn=f.filename.split('/').pop();
            if(!commitMap[fn]) commitMap[fn]=date;
          });
        }
      });
      if(page>=1) break; // one page is enough for a proxy
      page++;
    }
  }catch(e){}
}

// Fetch per-file last commit date using GitHub API path filter
async function fetchFileDate(filename){
  if(commitMap[filename]) return;
  try{
    const r=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/commits?path=${filename}&per_page=1`,
      {headers:{Accept:'application/vnd.github+json'}});
    if(!r.ok) return;
    const data=await r.json();
    if(data.length) commitMap[filename]=data[0].commit.author.date;
  }catch(e){}
}

// ── Age helpers ──
function ageDays(iso){ if(!iso) return null; return Math.floor((Date.now()-new Date(iso))/(864e5)); }
function ageLabel(d){
  if(d===null) return null;
  if(d===0) return 'Auj.';
  if(d===1) return '1j';
  if(d<7) return d+'j';
  if(d<30) return Math.floor(d/7)+'sem';
  if(d<365) return Math.floor(d/30)+'m';
  return Math.floor(d/365)+'an';
}
function ageClass(d){ if(d===null) return ''; if(d<=7) return 'age-fresh'; if(d<=30) return 'age-mid'; return 'age-old'; }

// ── Ripple ──
function ripple(e){
  const el=e.currentTarget;
  const r=el.getBoundingClientRect();
  const x=(e.touches?.[0]?.clientX??e.clientX)-r.left;
  const y=(e.touches?.[0]?.clientY??e.clientY)-r.top;
  const sz=Math.max(r.width,r.height)*1.5;
  const rp=document.createElement('span');
  rp.className='ripple';
  rp.style.cssText=`width:${sz}px;height:${sz}px;left:${x-sz/2}px;top:${y-sz/2}px`;
  el.appendChild(rp);
  setTimeout(()=>rp.remove(),520);
}

// ── Card builder ──
function makeCard(file, delay){
  const fn=file.name;
  const meta=getMeta(fn);
  const url=`https://${OWNER}.github.io/${REPO}/${fn}`;
  const days=ageDays(commitMap[fn]||null);
  const isNew=days!==null&&days<=3;
  const lab=ageLabel(days);
  const ageCls=ageClass(days);

  const a=document.createElement('a');
  a.className=`card ${meta.col}`;
  a.href=url; a.target='_blank'; a.rel='noopener';
  a.dataset.fn=fn; a.dataset.cat=meta.cat;
  a.dataset.q=(meta.name+' '+fn+' '+meta.cat+' '+meta.tags.join(' ')).toLowerCase();
  a.style.animationDelay=delay+'ms';
  a.addEventListener('touchstart',ripple,{passive:true});

  const tags=meta.tags.map(t=>`<span class="tag">${t}</span>`).join('');
  const age=lab?`<span class="tag ${ageCls}">${lab}</span>`:'';

  a.innerHTML=`
    <div class="card-bar"></div>
    ${isNew?'<div class="badge-new">Nouveau</div>':''}
    <div class="card-body">
      <div class="card-ico">${meta.icon}</div>
      <div class="card-info">
        <div class="card-name">${meta.name}</div>
        <div class="card-file">${fn}</div>
        <div class="card-tags">${tags}${age}</div>
      </div>
    </div>`;
  return a;
}

// ── Build category chips ──
function buildChips(){
  const cats=new Set();
  files.forEach(f=>{ if(f.name!==WEATHER) cats.add(getMeta(f.name).cat); });
  const row=document.getElementById('chips');
  row.innerHTML='<button class="chip active" data-cat="all" onclick="setFilter(\'all\',this)">Tout</button>';
  const sorted=[...cats].sort((a,b)=>{
    const ia=CAT_ORDER.indexOf(a),ib=CAT_ORDER.indexOf(b);
    return (ia===-1?99:ia)-(ib===-1?99:ib);
  });
  sorted.forEach(cat=>{
    const b=document.createElement('button');
    b.className='chip'; b.dataset.cat=cat; b.textContent=cat;
    b.onclick=function(){setFilter(cat,this)};
    row.appendChild(b);
  });
}

// ── Render ──
function render(){
  const grid=document.getElementById('grid');
  grid.innerHTML=''; grid.className=listMode?'grid list':'grid';
  let shown=0, delay=0;

  // Sort by CAT_ORDER then name
  const sorted=[...files].filter(f=>f.name!==WEATHER).sort((a,b)=>{
    const ma=getMeta(a.name), mb=getMeta(b.name);
    const ia=CAT_ORDER.indexOf(ma.cat), ib=CAT_ORDER.indexOf(mb.cat);
    const ca=ia===-1?99:ia, cb=ib===-1?99:ib;
    if(ca!==cb) return ca-cb;
    return ma.name.localeCompare(mb.name,'fr');
  });

  sorted.forEach(file=>{
    const meta=getMeta(file.name);
    const catOk=activeFilter==='all'||meta.cat===activeFilter;
    const term=searchTerm.toLowerCase().trim();
    const srchOk=!term||(meta.name+' '+file.name+' '+meta.cat+' '+meta.tags.join(' ')).toLowerCase().includes(term);
    if(!catOk||!srchOk) return;
    grid.appendChild(makeCard(file,delay));
    delay+=25; shown++;
  });

  if(!shown){
    const em=document.createElement('div');
    em.className='empty';
    em.innerHTML='<b>🔍</b>Aucun fichier trouvé<br>Essayez un autre filtre';
    grid.appendChild(em);
  }

  const total=files.filter(f=>f.name!==WEATHER).length;
  document.getElementById('cnt').textContent=shown?`(${shown}/${total})`:'';
  document.getElementById('ftrTxt').textContent=`${total} FICHIER${total>1?'S':''} · ${shown} AFFICHÉ${shown>1?'S':''}`;
}

// ── Weather ──
const WMO_I={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',51:'🌦',53:'🌦',55:'🌧',61:'🌧',63:'🌧',65:'🌧',71:'🌨',75:'❄️',80:'🌦',95:'⛈'};
const WMO_T={0:'Ciel dégagé',1:'Peu nuageux',2:'Partiellement nuageux',3:'Couvert',45:'Brouillard',51:'Bruine légère',53:'Bruine',55:'Bruine dense',61:'Pluie légère',63:'Pluie',65:'Forte pluie',71:'Neige légère',75:'Neige forte',80:'Averses',81:'Averses',95:'Orage',99:'Orage violent'};
const DIR=['N','NE','E','SE','S','SO','O','NO'];

async function loadWeather(){
  const hasWx=files.some(f=>f.name===WEATHER);
  document.getElementById('wxCard').style.display=hasWx?'block':'none';
  if(!hasWx) return;
  try{
    const p=new URLSearchParams({latitude:44.9333,longitude:4.8833,current:'temperature_2m,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m',timezone:'auto',wind_speed_unit:'kmh'});
    const d=await(await fetch('https://api.open-meteo.com/v1/forecast?'+p)).json();
    const c=d.current,code=c.weather_code;
    document.getElementById('wxIco').textContent=WMO_I[code]||'🌡';
    document.getElementById('wxT').textContent=Math.round(c.temperature_2m)+'°';
    document.getElementById('wxD').textContent=WMO_T[code]||'';
    document.getElementById('wxDet').textContent=Math.round(c.wind_speed_10m)+' km/h '+DIR[Math.round(c.wind_direction_10m/45)%8]+' · '+c.relative_humidity_2m+'% hum.';
  }catch(e){document.getElementById('wxD').textContent='indisponible';}
}

// ── Filters / search ──
function setFilter(cat,btn){
  activeFilter=cat;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active'); render();
}
function doSearch(q){
  searchTerm=q;
  document.getElementById('srchClr').classList.toggle('on',q.length>0);
  render();
}
function clearSrch(){
  const i=document.getElementById('srch');
  i.value=''; searchTerm='';
  document.getElementById('srchClr').classList.remove('on');
  i.focus(); render();
}
function toggleLayout(){
  listMode=!listMode;
  document.getElementById('layBtn').textContent=listMode?'⊟':'⊞';
  render();
}

// ── Lazy date enrichment ──
async function enrichDates(){
  // Fetch last commit date for each file sequentially (rate-limit friendly)
  const toEnrich=files.filter(f=>!commitMap[f.name]).slice(0,20); // max 20 calls
  for(const f of toEnrich){
    await fetchFileDate(f.name);
    // Silently re-render once dates are available
  }
  render(); // final re-render with dates
}

// ── INIT ──
async function init(){
  await fetchFiles();
  buildChips();
  loadWeather();

  document.getElementById('skel').style.display='none';
  document.getElementById('grid').style.display='grid';
  document.getElementById('ftr').style.display='block';
  render();

  // Background: enrich with per-file commit dates
  enrichDates();
}

init();
</script>
