<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0C0F">
<title>Smart — Outils</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0A0C0F;
  --surf:    #111318;
  --surf2:   #181B22;
  --border:  rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --text:    #E8EAF0;
  --muted:   #565B6B;
  --muted2:  #8890A4;
  --accent:  #3D7FFF;
  --acc2:    #0d1f40;
  --green:   #2ECC8A;
  --orange:  #FF8C42;
  --red:     #FF4D6A;
  --yellow:  #F5C842;
  --pink:    #D966B0;
  --teal:    #2EC4C4;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Outfit', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(61,127,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(61,127,255,0.025) 1px,transparent 1px);
  background-size:32px 32px}

.wrap{position:relative;z-index:1;padding:0 16px 48px;max-width:520px;margin:0 auto}

/* Header, Status, Weather, Search, etc. */
.header{padding:40px 0 16px;animation:slideDown .5s cubic-bezier(.22,1,.36,1) both}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.logo-tag{font-family:var(--mono);font-size:9px;color:var(--accent);letter-spacing:2.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px;margin-bottom:4px}
.logo-tag::before{content:'';width:14px;height:1px;background:var(--accent)}
.logo-title{font-size:27px;font-weight:800;letter-spacing:-1px;line-height:1}
.logo-title em{font-style:normal;color:var(--accent)}
.logo-sub{font-family:var(--mono);font-size:8.5px;color:var(--muted);letter-spacing:.4px;margin-top:5px}
.clock-block{text-align:right;flex-shrink:0}
.clock-time{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text);letter-spacing:1px;line-height:1}
.clock-date{font-family:var(--mono);font-size:8px;color:var(--muted);margin-top:3px;letter-spacing:.3px}

.status-bar{display:flex;align-items:center;gap:8px;margin-top:14px;font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.8px;animation:slideDown .5s .05s cubic-bezier(.22,1,.36,1) both}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:background .3s,box-shadow .3s}
.dot.ok{background:var(--green);box-shadow:0 0 7px var(--green);animation:blink 2.5s infinite}
.dot.loading{background:var(--yellow);box-shadow:0 0 7px var(--yellow);animation:blink 1s infinite}
.dot.error{background:var(--red);box-shadow:0 0 7px var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

.wx-card{display:none;text-decoration:none;border-radius:14px;background:var(--surf);border:1px solid var(--border);overflow:hidden;margin:14px 0 0;animation:slideUp .5s .08s cubic-bezier(.22,1,.36,1) both;transition:border-color .2s,box-shadow .2s}
.wx-card:active{transform:scale(.97)}
.wx-bar{height:2px;background:linear-gradient(90deg,var(--accent),transparent)}
.wx-body{padding:12px 14px;display:flex;align-items:center;gap:12px}
.wx-icon{font-size:28px;flex-shrink:0}
.wx-main{flex:1;min-width:0}
.wx-name{font-size:12px;font-weight:700;letter-spacing:-.2px;margin-bottom:2px}
.wx-file{font-family:var(--mono);font-size:8px;color:var(--muted)}
.wx-data{display:flex;align-items:baseline;gap:8px;margin-top:4px;flex-wrap:wrap}
.wx-temp{font-family:var(--mono);font-size:22px;font-weight:700;color:#7AABFF;line-height:1}
.wx-desc{font-size:10px;color:var(--muted2);font-style:italic}
.wx-details{font-family:var(--mono);font-size:8.5px;color:var(--muted);margin-top:3px;letter-spacing:.3px}
.wx-tags{display:flex;gap:4px;margin-top:6px}
.wx-tags .tag{background:rgba(61,127,255,.14);color:#7AABFF}

.search-row{display:flex;gap:8px;align-items:center;margin:14px 0 6px;animation:slideUp .5s .10s cubic-bezier(.22,1,.36,1) both}
.search-wrap{position:relative;flex:1}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:13px;color:var(--muted);pointer-events:none}
.search-input{width:100%;background:var(--surf2);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-family:var(--mono);font-size:12px;padding:11px 36px 11px 36px;outline:none;transition:border-color .2s,box-shadow .2s}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(61,127,255,.12)}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.08);border:none;border-radius:6px;color:var(--muted);font-size:10px;width:22px;height:22px;display:none;align-items:center;justify-content:center;cursor:pointer}
.search-clear.on{display:flex}
.layout-btn{background:transparent;border:1px solid var(--border2);border-radius:10px;color:var(--muted2);font-size:15px;width:34px;height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.layout-btn:active{transform:scale(.9)}

.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:12px;scrollbar-width:none;animation:slideUp .5s .12s cubic-bezier(.22,1,.36,1) both}
.filter-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--border2);border-radius:20px;padding:5px 12px;cursor:pointer;transition:all .18s;background:transparent;color:var(--muted2);white-space:nowrap}
.chip.active{background:var(--acc2);border-color:var(--accent);color:var(--text)}
.chip:active{transform:scale(.94)}

.sec-label{font-family:var(--mono);font-size:8.5px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin:6px 0 8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
.sec-count{color:var(--muted);font-size:8px}

.skel-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.skel{height:88px;border-radius:14px;background:linear-gradient(90deg,var(--surf) 25%,var(--surf2) 50%,var(--surf) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;animation:slideUp .5s .14s cubic-bezier(.22,1,.36,1) both}
.grid.list{grid-template-columns:1fr}

.card{position:relative;border-radius:14px;background:var(--surf);border:1px solid var(--border);text-decoration:none;display:block;overflow:hidden;transition:transform .18s cubic-bezier(.34,1.56,.64,1),border-color .18s,box-shadow .18s;animation:cardIn .35s cubic-bezier(.22,1,.36,1) both}
.card:hover{border-color:var(--border2);box-shadow:0 4px 24px rgba(0,0,0,.32)}
.card:active{transform:scale(.95)}
.card-bar{height:2px;width:100%}
.card-body{padding:11px 12px 12px;display:flex;gap:10px;align-items:flex-start}
.card-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-size:12px;font-weight:700;color:var(--text);letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.card-file{font-family:var(--mono);font-size:8px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.card-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-family:var(--mono);font-size:7.5px;letter-spacing:.3px;padding:2px 6px;border-radius:20px;white-space:nowrap}

.grid.list .card-name{font-size:13px}
.grid.list .card-body{align-items:center}

.badge-new{position:absolute;top:-1px;right:10px;font-family:var(--mono);font-size:7px;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:0 0 6px 6px;background:var(--green);color:#001a0e;text-transform:uppercase}

.age-fresh{background:rgba(46,204,138,.15);color:#5EDDA8}
.age-mid{background:rgba(245,200,66,.12);color:#FAD966}
.age-old{background:rgba(255,140,66,.12);color:#FFAA70}

.c-blue .card-bar{background:linear-gradient(90deg,#3D7FFF,transparent)} .c-blue .card-ico{background:#0d1f40} .c-blue .tag{background:rgba(61,127,255,.14);color:#7AABFF}
.c-green .card-bar{background:linear-gradient(90deg,#2ECC8A,transparent)} .c-green .card-ico{background:#0d2a1e} .c-green .tag{background:rgba(46,204,138,.14);color:#5EDDA8}
.c-orange .card-bar{background:linear-gradient(90deg,#FF8C42,transparent)} .c-orange .card-ico{background:#2a1a08} .c-orange .tag{background:rgba(255,140,66,.14);color:#FFAA70}
.c-red .card-bar{background:linear-gradient(90deg,#FF4D6A,transparent)} .c-red .card-ico{background:#2a0a10} .c-red .tag{background:rgba(255,77,106,.14);color:#FF8098}
.c-yellow .card-bar{background:linear-gradient(90deg,#F5C842,transparent)} .c-yellow .card-ico{background:#2a2008} .c-yellow .tag{background:rgba(245,200,66,.14);color:#FAD966}
.c-pink .card-bar{background:linear-gradient(90deg,#D966B0,transparent)} .c-pink .card-ico{background:#280820} .c-pink .tag{background:rgba(217,102,176,.14);color:#E88ACA}
.c-teal .card-bar{background:linear-gradient(90deg,#2EC4C4,transparent)} .c-teal .card-ico{background:#08252a} .c-teal .tag{background:rgba(46,196,196,.14);color:#5EDADA}
.c-purple .card-bar{background:linear-gradient(90deg,#8B5CF6,transparent)} .c-purple .card-ico{background:#1a0e2a} .c-purple .tag{background:rgba(139,92,246,.14);color:#B08AFB}
.c-slate .card-bar{background:linear-gradient(90deg,#8890A4,transparent)} .c-slate .card-ico{background:#16181f} .c-slate .tag{background:rgba(136,144,164,.14);color:#AEB5C8}

.empty{grid-column:1/-1;text-align:center;padding:48px 20px;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:1px;line-height:2}
.empty b{display:block;font-size:28px;margin-bottom:10px}

.footer{margin-top:28px;text-align:center;font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:1.5px;animation:slideUp .5s .4s cubic-bezier(.22,1,.36,1) both}
.fdot{display:inline-block;width:3px;height:3px;border-radius:50%;background:var(--muted);margin:0 6px;vertical-align:middle}

.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.05);transform:scale(0);animation:rpl .5s linear;pointer-events:none}
@keyframes rpl{to{transform:scale(4);opacity:0}}
@keyframes slideDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)}}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-top">
      <div>
        <div class="logo-tag">bencm0i / smart</div>
        <div class="logo-title">Mes <em>Outils</em></div>
        <div class="logo-sub" id="repoSub">Connexion au dépôt…</div>
      </div>
      <div class="clock-block">
        <div class="clock-time" id="clk">--:--</div>
        <div class="clock-date" id="clkD"></div>
      </div>
    </div>
    <div class="status-bar">
      <div class="dot loading" id="dot"></div>
      <span id="statusTxt">Chargement…</span>
    </div>
  </div>

  <!-- MÉTÉO -->
  <a class="wx-card" href="meteo.html" id="wxCard">
    <div class="wx-bar"></div>
    <div class="wx-body">
      <div class="wx-icon" id="wxIco">🌤</div>
      <div class="wx-main">
        <div class="wx-name">Météo — Valence</div>
        <div class="wx-file">meteo.html</div>
        <div class="wx-data">
          <span class="wx-temp" id="wxT">--°</span>
          <span class="wx-desc" id="wxD">chargement…</span>
        </div>
        <div class="wx-details" id="wxDet"></div>
        <div class="wx-tags"><span class="tag">7 jours</span><span class="tag">Vent</span><span class="tag">Open-Meteo</span></div>
      </div>
    </div>
  </a>

  <div class="search-row">
    <div class="search-wrap">
      <span class="search-ico">⌕</span>
      <input class="search-input" id="srch" type="search" placeholder="Rechercher un outil…" oninput="doSearch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="search-clear" id="srchClr" onclick="clearSrch()">✕</button>
    </div>
    <button class="layout-btn" id="layBtn" onclick="toggleLayout()" title="Grille / Liste">⊞</button>
  </div>

  <div class="filter-row" id="chips">
    <button class="chip active" data-cat="all" onclick="setFilter('all',this)">Tout</button>
  </div>

  <div class="sec-label">
    <span>Fichiers du dépôt</span>
    <span class="sec-count" id="cnt"></span>
  </div>

  <div class="skel-grid" id="skel">
    <div class="skel"></div><div class="skel"></div>
    <div class="skel"></div><div class="skel"></div>
    <div class="skel"></div><div class="skel"></div>
  </div>

  <div class="grid" id="grid" style="display:none"></div>

  <div class="footer" id="ftr" style="display:none">
    <span class="fdot"></span>
    <span id="ftrTxt">-- OUTILS</span>
    <span class="fdot"></span>
    github.com/bencm0i/smart
    <span class="fdot"></span>
  </div>

</div>

<script>
// Métadonnées mises à jour avec ta liste exacte
const META = {
  'meteo.html':                    {name:'Météo Valence',           icon:'🌤',  cat:'Environnement',  tags:['Météo','Vent'],                col:'c-blue'   },
  'calendrier_viewer_mobile.html': {name:'Calendrier Mobile',       icon:'📅',  cat:'Planning',       tags:['Agenda','Mobile'],             col:'c-purple' },
  'cheque.html':                   {name:'Montant en Lettres',      icon:'🏦',  cat:'Finances',       tags:['Chèques'],                     col:'c-green'  },
  'gluten_fodmap_tracker.html':    {name:'Gluten & FODMAP',         icon:'🌿',  cat:'Santé',          tags:['Nutrition','IA'],              col:'c-green'  },
  'liste_courses_militaire.html':  {name:'Opération Courses',       icon:'🪖',  cat:'Vie quotidienne',tags:['Courses','Budget'],            col:'c-yellow' },
  'nuisances_sonores2.html':       {name:'Nuisances Sonores',       icon:'🔊',  cat:'Vie quotidienne',tags:['Journal','Bruit'],             col:'c-orange' },
  'patrimoine_kpi.html':           {name:'Patrimoine KPI',          icon:'📈',  cat:'Finances',       tags:['KPI','Graphiques'],            col:'c-blue'   },
  'patrimoine_kpi_saisie.html':    {name:'KPI + Saisie',            icon:'🏦',  cat:'Finances',       tags:['Dashboard','All-in-one'],      col:'c-teal'   },
  'patrimoine_saisie.html':        {name:'Patrimoine Saisie',       icon:'💳',  cat:'Finances',       tags:['Saisie','Comptes'],            col:'c-blue'   },
  'smart_launcher.html':           {name:'Smart Launcher',          icon:'🚀',  cat:'Navigation',     tags:['Hub','Launcher'],              col:'c-slate'  },
  'suivi-sante.html':              {name:'Suivi Santé',             icon:'🩺',  cat:'Santé',          tags:['Suivi','Export'],              col:'c-green'  },
  'symptomes.html':                {name:'Suivi Symptômes',         icon:'🫁',  cat:'Santé',          tags:['Symptômes'],                   col:'c-pink'   },
  'todo.html':                     {name:'Ma Todo',                 icon:'✅',  cat:'Vie quotidienne',tags:['Tâches'],                      col:'c-yellow' }
};

const WEATHER = 'meteo.html';
const SKIP = new Set(['index.html']);

const OWNER = 'bencm0i';
const REPO  = 'smart';
const API_CONTENTS = `https://api.github.com/repos/${OWNER}/${REPO}/contents/`;

let files = [];
let activeFilter = 'all';
let listMode = false;
let searchTerm = '';

// Clock
function tick(){
  const n = new Date();
  document.getElementById('clk').textContent = n.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('clkD').textContent = n.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
}
tick(); setInterval(tick,1000);

function setStatus(txt, state='ok'){
  document.getElementById('dot').className = 'dot ' + state;
  document.getElementById('statusTxt').textContent = txt;
}

function getMeta(fn){
  return META[fn] ? {...META[fn]} : {name: fn.replace('.html','').replace(/[-_]/g,' '), icon:'📄', cat:'Autres', tags:[], col:'c-slate'};
}

async function fetchFiles(){
  setStatus('Connexion à GitHub…','loading');
  try{
    const r = await fetch(API_CONTENTS, {headers:{Accept:'application/vnd.github+json'}});
    if(!r.ok) throw new Error();
    const data = await r.json();
    files = data.filter(f => f.type==='file' && f.name.endsWith('.html') && !SKIP.has(f.name));
    const nb = files.length;
    document.getElementById('repoSub').textContent = `${nb} fichier${nb>1?'s':''} · github.com/${OWNER}/${REPO}`;
    setStatus(`${nb} fichiers détectés`, 'ok');
  }catch(e){
    setStatus('Mode hors-ligne', 'error');
    files = Object.keys(META).filter(k => !SKIP.has(k)).map(n => ({name:n}));
    document.getElementById('repoSub').textContent = 'Métadonnées locales';
  }
}

function buildChips(){
  const cats = new Set(files.map(f => getMeta(f.name).cat).filter(c => c !== 'Autres'));
  const row = document.getElementById('chips');
  row.innerHTML = '<button class="chip active" data-cat="all" onclick="setFilter(\'all\',this)">Tout</button>';
  
  [...cats].sort().forEach(cat => {
    const b = document.createElement('button');
    b.className='chip';
    b.dataset.cat=cat;
    b.textContent=cat;
    b.onclick = () => setFilter(cat, b);
    row.appendChild(b);
  });
}

function makeCard(file){
  const fn = file.name;
  const meta = getMeta(fn);
  const url = `https://${OWNER}.github.io/${REPO}/${fn}`;

  const a = document.createElement('a');
  a.className = `card ${meta.col}`;
  a.href = url; a.target='_blank'; a.rel='noopener';
  a.dataset.fn = fn;
  a.dataset.cat = meta.cat;
  a.dataset.q = (meta.name + ' ' + fn + ' ' + meta.cat + ' ' + meta.tags.join(' ')).toLowerCase();

  const tagsHTML = meta.tags.map(t => `<span class="tag">${t}</span>`).join('');

  a.innerHTML = `
    <div class="card-bar"></div>
    <div class="card-body">
      <div class="card-ico">${meta.icon}</div>
      <div class="card-info">
        <div class="card-name">${meta.name}</div>
        <div class="card-file">${fn}</div>
        <div class="card-tags">${tagsHTML}</div>
      </div>
    </div>`;
  return a;
}

function render(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.className = listMode ? 'grid list' : 'grid';

  let shown = 0;
  const term = searchTerm.toLowerCase().trim();

  const sorted = [...files].filter(f => f.name !== WEATHER).sort((a,b) => {
    const ma = getMeta(a.name), mb = getMeta(b.name);
    if (ma.cat !== mb.cat) return ma.cat.localeCompare(mb.cat, 'fr');
    return ma.name.localeCompare(mb.name, 'fr');
  });

  sorted.forEach(file => {
    const meta = getMeta(file.name);
    const catOk = activeFilter === 'all' || meta.cat === activeFilter;
    const srchOk = !term || (meta.name + ' ' + file.name + ' ' + meta.cat + ' ' + meta.tags.join(' ')).toLowerCase().includes(term);

    if (catOk && srchOk) {
      grid.appendChild(makeCard(file));
      shown++;
    }
  });

  if (shown === 0) {
    const em = document.createElement('div');
    em.className = 'empty';
    em.innerHTML = '<b>🔍</b>Aucun résultat';
    grid.appendChild(em);
  }

  const total = files.filter(f => f.name !== WEATHER).length;
  document.getElementById('cnt').textContent = `(${shown}/${total})`;
  document.getElementById('ftrTxt').textContent = `${total} FICHIERS · ${shown} AFFICHÉS`;
}

async function loadWeather(){
  if (!files.some(f => f.name === WEATHER)) return;
  document.getElementById('wxCard').style.display = 'block';

  try {
    const p = new URLSearchParams({latitude:44.9333,longitude:4.8833,current:'temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m',timezone:'auto',wind_speed_unit:'kmh'});
    const d = await (await fetch('https://api.open-meteo.com/v1/forecast?'+p)).json();
    const c = d.current;
    document.getElementById('wxIco').textContent = {0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',61:'🌧',71:'🌨',95:'⛈'}[c.weather_code] || '🌡';
    document.getElementById('wxT').textContent = Math.round(c.temperature_2m)+'°';
    document.getElementById('wxD').textContent = 'Valence';
    document.getElementById('wxDet').textContent = `${Math.round(c.wind_speed_10m)} km/h · ${c.relative_humidity_2m}% hum.`;
  } catch(e) {
    document.getElementById('wxD').textContent = 'indisponible';
  }
}

function setFilter(cat, btn){
  activeFilter = cat;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function doSearch(q){ searchTerm = q; document.getElementById('srchClr').classList.toggle('on', q.length>0); render(); }
function clearSrch(){ 
  document.getElementById('srch').value = ''; 
  searchTerm = ''; 
  document.getElementById('srchClr').classList.remove('on'); 
  render(); 
}
function toggleLayout(){
  listMode = !listMode;
  document.getElementById('layBtn').textContent = listMode ? '⊟' : '⊞';
  render();
}

async function init(){
  await fetchFiles();
  buildChips();
  await loadWeather();

  document.getElementById('skel').style.display='none';
  document.getElementById('grid').style.display='grid';
  document.getElementById('ftr').style.display='block';
  render();
}

init();
</script>
</body>
</html>
