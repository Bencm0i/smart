<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MU/TH/UR — Motion Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; }

  #app {
    width: 100vw; height: 100dvh;
    background: #020802;
    display: flex; flex-direction: column;
    align-items: center;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    color: #25f55a;
  }

  .scanline {
    position: fixed; inset: 0; pointer-events: none; z-index: 99;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
  }

  #top-bar {
    width: 100%; display: flex; justify-content: space-between;
    padding: 14px 14px 0;
    font-size: 10px; letter-spacing: 2.5px; opacity: 0.5;
    flex-shrink: 0;
  }

  #radar-area {
    flex: 1; width: 100%;
    display: flex; align-items: center; justify-content: center;
    min-height: 0;
  }

  #c { display: block; cursor: crosshair; }

  #bottom {
    width: 100%; flex-shrink: 0;
    padding: 0 14px 18px;
    display: flex; flex-direction: column; gap: 6px;
  }

  #score-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; letter-spacing: 2px;
  }
  #score-val { font-size: 18px; font-weight: 500; color: #25f55a; transition: transform 0.1s; }
  #score-val.bump { transform: scale(1.3); }
  #streak-val { font-size: 11px; opacity: 0.6; letter-spacing: 1.5px; }

  #contact-list { font-size: 11px; letter-spacing: 1.5px; opacity: 0.65; min-height: 36px; }
  .cline {
    display: flex; justify-content: space-between;
    border-bottom: 0.5px solid rgba(37,245,90,0.1); padding: 3px 0;
    animation: fi 0.3s ease;
  }
  .cline.neutralized { color: rgba(37,245,90,0.3); text-decoration: line-through; }
  @keyframes fi { from { opacity:0; } to { opacity:1; } }

  #controls {
    display: flex; align-items: center; gap: 10px;
    font-size: 10px; letter-spacing: 2px; opacity: 0.45;
  }
  #controls input[type=range] {
    flex: 1; height: 3px; appearance: none;
    background: rgba(37,245,90,0.2); border-radius: 2px; outline: none;
  }
  #controls input[type=range]::-webkit-slider-thumb {
    appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: #25f55a;
  }

  #statusline { font-size: 10px; letter-spacing: 2.5px; opacity: 0.35; text-align: center; height: 14px; }
  #hint { font-size: 10px; letter-spacing: 1.5px; opacity: 0.18; text-align: center; }

  #bot-bar {
    display: flex; justify-content: space-between;
    font-size: 10px; letter-spacing: 2px; opacity: 0.35;
  }
</style>
</head>
<body>
<div class="scanline"></div>
<div id="app">
  <div id="top-bar">
    <span>MU/TH/UR 6000</span>
    <span id="clock">--:--:--</span>
    <span>SYS-ONLINE</span>
  </div>

  <div id="radar-area">
    <canvas id="c"></canvas>
  </div>

  <div id="bottom">
    <div id="score-row">
      <span style="opacity:0.45;font-size:10px;letter-spacing:2px;">NEUTRALISÉS</span>
      <span id="score-val">0</span>
      <span id="streak-val"></span>
    </div>
    <div id="contact-list"></div>
    <div id="controls">
      <span>VITESSE</span>
      <input type="range" id="spd" min="1" max="5" step="1" value="2">
      <span id="spdv">2</span>
    </div>
    <div id="statusline">SCANNING...</div>
    <div id="hint">toucher un signal pour le neutraliser</div>
    <div id="bot-bar">
      <span>RANGE: 500M</span>
      <span id="cnt">CONTACTS: 0</span>
      <span>WEYLAND-YUTANI</span>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let CX, CY, R, SIZE;

function resize() {
  const area = document.getElementById('radar-area');
  SIZE = Math.floor(Math.min(area.clientWidth, area.clientHeight)) - 8;
  if (SIZE < 10) SIZE = 10;
  CX = SIZE / 2; CY = SIZE / 2; R = SIZE / 2 - 6;
  canvas.width = SIZE;
  canvas.height = SIZE;
}

const NAMES = ['LV-426','NOSTROMO','PROMETHEUS','COVENANT','SULACO','ZETA II','CASCADIA-9','RIPLEY UNIT','MU-TH-UR','DARWIN STA.','ACHERON','HENDERSON'];
const STATUSES = ['SCANNING...','PROCESSING...','SIGNAL DETECTED','LOCK ON...','TRACKING...','ANOMALY?','ALL CLEAR','DEEP SCAN...','MOVEMENT NOTED','TRIANGULATING...'];

let angle = 0, blips = [], totalContacts = 0;
let spawnTimer = 0, statusTimer = 0, frame = 0, speed = 2;
let score = 0, streak = 0;
let particles = [];

document.getElementById('spd').addEventListener('input', e => {
  speed = parseInt(e.target.value);
  document.getElementById('spdv').textContent = speed;
});

let audioCtx = null;
function makeSound(freq, dur, vol) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = freq;
    o.type = 'sine';
    g.gain.setValueAtTime(vol || 0.05, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (dur || 0.3));
    o.start(); o.stop(audioCtx.currentTime + (dur || 0.3));
  } catch(e) {}
}
function bipContact() { makeSound(800 + Math.random() * 300, 0.28, 0.05); }
function bipNeutral() {
  makeSound(1200, 0.08, 0.08);
  setTimeout(() => makeSound(900, 0.12, 0.06), 80);
}

function spawnBlip() {
  const a = Math.random() * Math.PI * 2;
  const d = Math.random() * (R - 16) + 10;
  const px = CX + Math.cos(a) * d;
  const py = CY + Math.sin(a) * d;
  const name = NAMES[Math.floor(Math.random() * NAMES.length)];
  const life = 320 + Math.random() * 280;
  blips.push({ x: px, y: py, life, maxLife: life, sz: 2.5 + Math.random() * 2, name, active: true, neutralized: false, pulsePhase: Math.random() * Math.PI * 2 });
  totalContacts++;
  document.getElementById('cnt').textContent = 'CONTACTS: ' + totalContacts;
  addLine(name, Math.round(Math.hypot(px - CX, py - CY) * (500 / R)), false);
  bipContact();
}

function addLine(name, dist, neutralized) {
  const cl = document.getElementById('contact-list');
  const d = document.createElement('div');
  d.className = 'cline' + (neutralized ? ' neutralized' : '');
  d.innerHTML = `<span>${name}</span><span>${neutralized ? 'NEUTRALISÉ' : dist + 'M'}</span>`;
  cl.insertBefore(d, cl.firstChild);
  while (cl.children.length > 3) cl.removeChild(cl.lastChild);
}

function spawnParticles(x, y) {
  for (let i = 0; i < 8; i++) {
    const a = (Math.PI * 2 / 8) * i + Math.random() * 0.3;
    particles.push({ x, y, vx: Math.cos(a) * (1.5 + Math.random() * 2), vy: Math.sin(a) * (1.5 + Math.random() * 2), life: 30 + Math.random() * 20 });
  }
}

function tryTap(tx, ty) {
  const rect = canvas.getBoundingClientRect();
  const px = (tx - rect.left) * (SIZE / rect.width);
  const py = (ty - rect.top) * (SIZE / rect.height);
  const HIT_RADIUS = Math.max(18, SIZE * 0.06);

  let hit = null, minDist = Infinity;
  blips.forEach(b => {
    if (!b.active || b.neutralized) return;
    const d = Math.hypot(px - b.x, py - b.y);
    if (d < HIT_RADIUS && d < minDist) { minDist = d; hit = b; }
  });

  if (hit) {
    hit.neutralized = true;
    hit.active = false;
    hit.life = Math.min(hit.life, 60);
    score++;
    streak++;
    spawnParticles(hit.x, hit.y);
    bipNeutral();
    addLine(hit.name, 0, true);
    const sv = document.getElementById('score-val');
    sv.textContent = score;
    sv.classList.add('bump');
    setTimeout(() => sv.classList.remove('bump'), 150);
    const stk = document.getElementById('streak-val');
    stk.textContent = streak > 1 ? 'x' + streak + ' SÉRIE' : '';
  } else {
    streak = 0;
    document.getElementById('streak-val').textContent = '';
  }
}

canvas.addEventListener('click', e => tryTap(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  tryTap(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

document.addEventListener('touchstart', () => {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}, { once: true });

function draw() {
  ctx.clearRect(0, 0, SIZE, SIZE);
  ctx.fillStyle = '#020802';
  ctx.fillRect(0, 0, SIZE, SIZE);

  // cercles portée
  for (let i = 1; i <= 4; i++) {
    ctx.beginPath();
    ctx.arc(CX, CY, R * i / 4, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(37,245,90,0.07)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  // radiales
  for (let a = 0; a < Math.PI * 2; a += Math.PI / 6) {
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.lineTo(CX + Math.cos(a) * R, CY + Math.sin(a) * R);
    ctx.strokeStyle = 'rgba(37,245,90,0.04)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  // bord
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(37,245,90,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(CX, CY, R + 4, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(37,245,90,0.08)';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // sweep
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(CX, CY);
  ctx.arc(CX, CY, R, angle - Math.PI / 3, angle);
  ctx.closePath();
  ctx.fillStyle = 'rgba(37,245,90,0.05)';
  ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(CX, CY);
  ctx.lineTo(CX + Math.cos(angle) * R, CY + Math.sin(angle) * R);
  ctx.strokeStyle = 'rgba(37,245,90,0.75)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();

  // blips
  blips = blips.filter(b => b.life > 0);
  const t = Date.now() / 1000;
  blips.forEach(b => {
    const alpha = b.life / b.maxLife;
    if (b.neutralized) {
      // fondu rapide en blanc
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.sz * 1.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,255,220,${alpha * 0.5})`;
      ctx.fill();
      b.life -= 3;
      return;
    }
    // pulsation des blips actifs
    const pulse = 0.5 + 0.5 * Math.sin(t * 3 + b.pulsePhase);
    const outerR = b.sz + 3 + pulse * 3;
    ctx.beginPath();
    ctx.arc(b.x, b.y, outerR, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(37,245,90,${alpha * 0.12 * pulse})`;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.sz, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(37,245,90,${alpha * 0.9})`;
    ctx.fill();
    b.life -= 0.8;
  });

  // particules
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    const a = p.life / 50;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,255,220,${a})`;
    ctx.fill();
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.92; p.vy *= 0.92;
    p.life--;
  });

  // centre
  ctx.beginPath();
  ctx.arc(CX, CY, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(37,245,90,0.7)';
  ctx.fill();

  // labels portée
  ctx.fillStyle = 'rgba(37,245,90,0.15)';
  ctx.font = `${Math.max(9, Math.round(SIZE * 0.03))}px 'Share Tech Mono', monospace`;
  ['500','375','250','125'].forEach((l, i) => {
    ctx.fillText(l, CX + R * (i + 1) / 4 + 4, CY - 3);
  });
}

function tick() {
  requestAnimationFrame(tick);
  frame++;
  const interval = Math.max(60, Math.round(220 / (speed * 0.8)));
  if (++spawnTimer >= interval) { spawnBlip(); spawnTimer = 0; }
  angle = (angle + 0.003 + speed * 0.0018) % (Math.PI * 2);
  draw();
  if (frame % 30 === 0) {
    document.getElementById('clock').textContent = new Date().toTimeString().slice(0, 8);
  }
  if (++statusTimer > 120) {
    document.getElementById('statusline').textContent = STATUSES[Math.floor(Math.random() * STATUSES.length)];
    statusTimer = 0;
  }
}

window.addEventListener('resize', resize);
requestAnimationFrame(() => requestAnimationFrame(() => { resize(); tick(); }));
</script>
</body>
</html>
