<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DOSSIER MÉDICAL — SUIVI CLINIQUE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  /* Red Cross Medical Theme */
  --bg:      #f8f4f4;
  --surface: #ffffff;
  --surface2:#f0ebeb;
  --border:  #ddd0d0;
  --text:    #1a0808;
  --muted:   #8a7070;

  /* Sinus → medical orange/alert */
  --sinus:     #c0282a;
  --sinus-bg:  #fff0f0;
  --sinus-mid: #f4a0a0;

  /* Breath → steel blue medical */
  --breath:     #1a5f8a;
  --breath-bg:  #eef4fa;
  --breath-mid: #90b8d8;

  /* Belly → deep medical purple */
  --belly:     #7a2060;
  --belly-bg:  #f8eef5;
  --belly-mid: #d090c0;

  /* Stool → clinical brown */
  --stool:     #7a4a2a;
  --stool-bg:  #f8f0ea;
  --stool-mid: #c8a080;

  /* Sleep → deep indigo */
  --sleep:     #3a2070;
  --sleep-bg:  #f0eefa;
  --sleep-mid: #a090d8;

  --danger:  #c0282a;
  --green:   #1a7a3a;

  --shadow: 0 2px 12px rgba(192,40,42,0.08);
  --r:  10px;
  --rs: 6px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

body {
  font-family: 'Barlow Condensed', 'Share Tech Mono', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  padding-bottom: 80px;
  position: relative;
}

/* BACKGROUND CROSS WATERMARK */
body::before {
  content: '✚';
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 55vw;
  color: rgba(192,40,42,0.028);
  pointer-events: none;
  z-index: 0;
  line-height: 1;
}

/* Scanlines subtle */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 4px, rgba(192,40,42,0.012) 4px, rgba(192,40,42,0.012) 5px);
  pointer-events: none;
  z-index: 0;
}

.page, .topbar, .bottom-nav { position: relative; z-index: 1; }

/* ── TOP BAR ── */
.topbar {
  background: #c0282a;
  border-bottom: 3px solid #8a0a0c;
  padding: 0 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
  height: 56px;
  box-shadow: 0 3px 16px rgba(192,40,42,0.35);
}

.topbar::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
}

.topbar-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.14em;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 10px;
}

.topbar-title::before {
  content: '✚';
  font-size: 20px;
  color: #fff;
  text-shadow: 0 0 12px rgba(255,255,255,0.6);
}

.pulse {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #fff;
  animation: pulse 2.2s infinite;
}
@keyframes pulse {
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:.4;transform:scale(1.4);}
}

.save-indicator {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  color: rgba(255,255,255,0.85);
  display: flex;
  align-items: center;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.4s;
  letter-spacing: 0.08em;
}
.save-indicator.show { opacity: 1; }

#topDate {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.75);
  letter-spacing: 0.08em;
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #1a0808;
  border-top: 3px solid #c0282a;
  display: grid;
  grid-template-columns: repeat(4,1fr);
  z-index: 200;
  box-shadow: 0 -2px 16px rgba(192,40,42,0.25);
}

.nav-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 9px 4px 13px;
  cursor: pointer;
  border: none;
  border-right: 1px solid #2a1010;
  background: transparent;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: #6a4040;
  transition: color 0.15s, background 0.15s;
  touch-action: manipulation;
  position: relative;
}
.nav-btn:last-child { border-right: none; }
.nav-btn.active {
  color: #fff;
  background: rgba(192,40,42,0.18);
}
.nav-btn.active::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: #c0282a;
}
.nav-btn .icon { font-size: 21px; line-height: 1; }

/* ── PAGES ── */
.page { display: none; padding: 12px; }
.page.active { display: block; }

/* ── SECTION LABEL ── */
.sec-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: var(--muted);
  margin: 18px 0 9px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sec-label::before { content: '✚'; font-size: 10px; color: #c0282a; }
.sec-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }
.sec-label:first-child { margin-top: 4px; }

/* ── CARD ── */
.card {
  background: var(--surface);
  border-radius: var(--r);
  border: 1px solid var(--border);
  border-top: 3px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 12px;
}
.card-pad { padding: 14px; }

/* ── FORM INPUTS ── */
.dt-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field-group label {
  display: block;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px;
  font-weight: 400;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.16em;
  margin-bottom: 6px;
}

input[type="date"], input[type="time"], select, textarea {
  width: 100%;
  padding: 11px 13px;
  border: 1.5px solid var(--border);
  border-radius: var(--rs);
  background: var(--surface2);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.15s;
}
input:focus, select:focus, textarea:focus {
  border-color: #c0282a;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(192,40,42,0.1);
}
textarea { resize: none; min-height: 76px; line-height: 1.5; }

/* ── SYMPTOM BLOCKS ── */
.symptom-block {
  border-radius: var(--rs);
  padding: 15px;
  margin-bottom: 11px;
  position: relative;
  overflow: hidden;
}

.symptom-block::before {
  content: '✚';
  position: absolute;
  top: 8px; right: 10px;
  font-size: 60px;
  opacity: 0.04;
  line-height: 1;
  pointer-events: none;
}

.symptom-block.sinus   { background: var(--sinus-bg);  border: 1.5px solid var(--sinus-mid);  border-left: 4px solid var(--sinus); }
.symptom-block.breath  { background: var(--breath-bg); border: 1.5px solid var(--breath-mid); border-left: 4px solid var(--breath); }
.symptom-block.belly   { background: var(--belly-bg);  border: 1.5px solid var(--belly-mid);  border-left: 4px solid var(--belly); }
.symptom-block.stool   { background: var(--stool-bg);  border: 1.5px solid var(--stool-mid);  border-left: 4px solid var(--stool); }
.symptom-block.sleep   { background: var(--sleep-bg);  border: 1.5px solid var(--sleep-mid);  border-left: 4px solid var(--sleep); }

.sym-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 13px; }

.sym-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 0.12em;
  display: flex;
  align-items: center;
  gap: 7px;
}
.sym-title.sinus  { color: var(--sinus); }
.sym-title.breath { color: var(--breath); }
.sym-title.belly  { color: var(--belly); }
.sym-title.stool  { color: var(--stool); }
.sym-title.sleep  { color: var(--sleep); }

.sym-emoji { font-size: 18px; }

.score-display {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 34px;
  letter-spacing: 0.04em;
  line-height: 1;
  min-width: 42px;
  text-align: right;
}
.sinus .score-display  { color: var(--sinus); }
.breath .score-display { color: var(--breath); }
.belly .score-display  { color: var(--belly); }

/* ── SLIDER ── */
.slider-wrap { margin-bottom: 13px; }
.slider-labels {
  display: flex;
  justify-content: space-between;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  margin-bottom: 5px;
  letter-spacing: 0.06em;
}
input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 2px; outline: none; cursor: pointer; }
.sinus  input[type="range"] { background: var(--sinus-mid); }
.breath input[type="range"] { background: var(--breath-mid); }
.belly  input[type="range"] { background: var(--belly-mid); }

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 26px; height: 26px;
  border-radius: 4px;
  background: #fff;
  border: 3px solid;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  cursor: pointer;
}
.sinus  input[type="range"]::-webkit-slider-thumb { border-color: var(--sinus); }
.breath input[type="range"]::-webkit-slider-thumb { border-color: var(--breath); }
.belly  input[type="range"]::-webkit-slider-thumb { border-color: var(--belly); }

/* ── CHECKBOXES ── */
.checks-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px;
  font-weight: 400;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.16em;
  margin-bottom: 8px;
}

.checks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.checks-grid.col3 { grid-template-columns: 1fr 1fr 1fr; }

.chk-item {
  display: flex;
  align-items: center;
  gap: 7px;
  background: rgba(255,255,255,0.65);
  border-radius: 4px;
  padding: 9px 8px;
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
  border: 1.5px solid rgba(0,0,0,0.06);
  transition: all 0.15s;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}
.chk-item.checked-sinus { background: #fff0f0; border-color: var(--sinus); color: var(--sinus); }
.chk-item.checked-breath { background: #eef4fa; border-color: var(--breath); color: var(--breath); }
.chk-item.checked-belly { background: #f8eef5; border-color: var(--belly); color: var(--belly); }
.chk-item.checked-stool { background: #f8f0ea; border-color: var(--stool); color: var(--stool); }

.chk-dot {
  width: 16px; height: 16px;
  border-radius: 3px;
  border: 2px solid var(--border);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  transition: all 0.15s;
}
.chk-item.checked-sinus  .chk-dot { background: var(--sinus);  border-color: var(--sinus);  color: #fff; }
.chk-item.checked-breath .chk-dot { background: var(--breath); border-color: var(--breath); color: #fff; }
.chk-item.checked-belly  .chk-dot { background: var(--belly);  border-color: var(--belly);  color: #fff; }
.chk-item.checked-stool  .chk-dot { background: var(--stool);  border-color: var(--stool);  color: #fff; }

.precheck-flag {
  font-size: 9px;
  background: var(--sinus);
  color: #fff;
  padding: 1px 5px;
  border-radius: 2px;
  font-weight: 700;
  margin-left: auto;
  flex-shrink: 0;
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 0.06em;
}

/* ── STOOL SELECTOR ── */
.stool-types { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 12px; }
.stool-type {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 10px 4px 8px;
  background: rgba(255,255,255,0.65);
  border-radius: 6px;
  border: 1.5px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}
.stool-type.selected { background: #fff; border-color: var(--stool); }
.stool-type .st-emoji { font-size: 20px; }
.stool-type .st-num { font-size: 9px; font-weight: 700; color: var(--stool); background: var(--stool-mid); border-radius: 2px; padding: 1px 5px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.06em; }
.stool-type .st-label { font-size: 9px; font-weight: 600; color: var(--muted); text-align: center; line-height: 1.3; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.04em; }
.stool-type.selected .st-label { color: var(--stool); }

.color-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 12px; }
.color-item {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 10px 4px 8px;
  background: rgba(255,255,255,0.65);
  border-radius: 6px;
  border: 1.5px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  touch-action: manipulation;
  user-select: none; -webkit-user-select: none;
}
.color-item.selected { background: #fff; border-color: var(--stool); }
.color-dot { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; }
.color-item .cl-label { font-size: 9px; font-weight: 600; color: var(--muted); text-align: center; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.04em; }
.color-item.selected .cl-label { color: var(--stool); }

/* STOOL absent */
.stool-toggle {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.55);
  border-radius: var(--rs);
  margin-bottom: 12px;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all 0.15s;
  touch-action: manipulation;
  user-select: none; -webkit-user-select: none;
}
.stool-toggle.active { background: #fff; border-color: var(--stool); }
.toggle-box {
  width: 20px; height: 20px;
  border-radius: 4px;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}
.stool-toggle.active .toggle-box { background: var(--stool); border-color: var(--stool); color: #fff; }

/* ── ADD BUTTON ── */
.add-btn {
  width: 100%;
  padding: 16px;
  background: #c0282a;
  color: #fff;
  border: none;
  border-radius: var(--rs);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 0.2em;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: all 0.3s;
  margin-top: 8px;
  touch-action: manipulation;
  box-shadow: 0 4px 14px rgba(192,40,42,0.35);
  position: relative;
  overflow: hidden;
}
.add-btn::before {
  content: '✚';
  font-size: 16px;
  opacity: 0.6;
}
.add-btn:active { transform: scale(0.98); background: #8a0a0c; }

/* Hors plage : résistance orange */
.add-btn.hors-plage {
  background: #3a1a00;
  color: #ff8c00;
  border: 2px solid #ff8c00;
  box-shadow: 0 0 0 0 rgba(255,140,0,0.5);
  animation: resist-pulse 2s infinite;
}
.add-btn.hors-plage::before { content: '⚠'; opacity: 1; }
@keyframes resist-pulse {
  0%   { box-shadow: 0 0 0 0   rgba(255,140,0,0.55); }
  50%  { box-shadow: 0 0 0 8px rgba(255,140,0,0); }
  100% { box-shadow: 0 0 0 0   rgba(255,140,0,0); }
}
@keyframes shake {
  0%,100%{ transform: translateX(0); }
  15%    { transform: translateX(-6px); }
  30%    { transform: translateX(6px); }
  45%    { transform: translateX(-4px); }
  60%    { transform: translateX(4px); }
  75%    { transform: translateX(-2px); }
  90%    { transform: translateX(2px); }
}
.add-btn.shaking { animation: shake 0.55s ease; }

/* ── STATS ── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-card {
  background: var(--surface);
  border-radius: var(--r);
  padding: 14px;
  border: 1px solid var(--border);
  border-top: 3px solid var(--border);
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.stat-card::after {
  content: '✚';
  position: absolute;
  bottom: -8px; right: 4px;
  font-size: 38px;
  opacity: 0.05;
  pointer-events: none;
}

.stat-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--muted);
  margin-bottom: 5px;
}
.stat-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 0.04em;
  line-height: 1;
}
.stat-value.sinus  { color: var(--sinus); }
.stat-value.breath { color: var(--breath); }
.stat-value.belly  { color: var(--belly); }
.stat-sub { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── CHART ── */
.chart-wrap { position: relative; height: 190px; }

/* ── HISTORY ── */
.hist-item {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 10px;
  align-items: start;
}
.hist-item:last-child { border-bottom: none; }
.hist-date {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  font-weight: 600;
  white-space: nowrap;
  line-height: 1.6;
}
.hist-scores { display: flex; gap: 6px; flex-wrap: wrap; }
.hist-badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 3px 8px;
  border-radius: 3px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 0.08em;
}
.hist-badge.sinus  { background: var(--sinus-bg);  color: var(--sinus); }
.hist-badge.breath { background: var(--breath-bg); color: var(--breath); }
.hist-badge.belly  { background: var(--belly-bg);  color: var(--belly); }
.hist-badge.stool  { background: var(--stool-bg);  color: var(--stool); }
.hist-badge.sleep  { background: var(--sleep-bg);  color: var(--sleep); }
.hist-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.tag-pill {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  letter-spacing: 0.06em;
  background: var(--surface2);
  color: var(--muted);
  padding: 2px 7px;
  border-radius: 2px;
  font-weight: 600;
  border-left: 2px solid #c0282a;
}
.del-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--muted); padding: 2px; line-height: 1; opacity: 0.35; touch-action: manipulation; }
.del-btn:active { opacity: 1; color: var(--danger); }

/* ── EXPORT ── */
.export-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 9px; }
.export-btn {
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  padding: 18px 8px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-top: 3px solid #c0282a;
  border-radius: var(--r);
  cursor: pointer;
  font-family: 'Bebas Neue', sans-serif;
  box-shadow: var(--shadow);
  transition: all 0.15s;
  text-align: center;
  touch-action: manipulation;
}
.export-btn:active { transform: scale(0.97); background: var(--surface2); }
.export-icon { font-size: 28px; }
.export-label { font-size: 15px; letter-spacing: 0.12em; color: var(--text); }
.export-sub { font-size: 10px; color: var(--muted); font-family: 'Share Tech Mono', monospace; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1a0808;
  border: 1px solid #c0282a;
  border-top: 2px solid #c0282a;
  color: #fff;
  padding: 10px 22px;
  border-radius: 3px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 0.14em;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s ease;
  z-index: 999;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(192,40,42,0.3);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── EMPTY ── */
.empty { text-align: center; padding: 36px 20px; color: var(--muted); }
.empty .ei { font-size: 38px; margin-bottom: 10px; }
.empty p { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; letter-spacing: 0.08em; }

/* ── IMPORT ── */
.import-zone {
  border: 2px dashed #c0282a;
  border-radius: var(--r);
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  background: #fff8f8;
}
.import-zone:active { background: #fff0f0; }
#fileInput { display: none; }

/* ── STOOL SECTION ── */
.stool-detail { display: none; }
.stool-detail.visible { display: block; }
