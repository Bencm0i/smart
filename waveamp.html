<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAVEAMP</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230a0804'/><circle cx='16' cy='16' r='9' fill='none' stroke='%23e07800' stroke-width='2'/><circle cx='16' cy='16' r='5' fill='none' stroke='%23ffaa00' stroke-width='1.5'/><circle cx='16' cy='16' r='2' fill='%23ffd060'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --am:#ffbb33;--am2:#ffd878;--am3:#e08000;--am4:#ff9900;
  --amg:rgba(255,170,0,0.22);
  --bg:#06060a;--panel:#0d0b08;--border:#4a2c0a;--border2:#6b3d14;
  --wood-dark:#110c04;--wood-mid:#1e1208;
  --wave-color:var(--am3);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:var(--bg);font-family:'Share Tech Mono',monospace;color:var(--am);overflow:hidden;}

/* ── ROOT LAYOUT plein écran ── */
.waveamp-root{
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  grid-template-rows:auto 1fr auto;
  width:100vw;height:100dvh;
  gap:0;
  background:
    radial-gradient(ellipse at 50% 10%,#1a0e04 0%,transparent 55%),
    radial-gradient(ellipse at 80% 80%,#120c02 0%,transparent 50%),
    #06060a;
}

/* ── TEXTURE GRILLE PERFORÉE (fond global) ── */
.waveamp-root::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(circle, rgba(255,150,30,0.13) 1px, transparent 1px);
  background-size:14px 14px;
}

/* ── HEADER ── */
.header{
  grid-column:1/-1;
  display:flex;align-items:center;justify-content:center;
  padding:18px 32px 10px;
  border-bottom:1px solid var(--border);
  position:relative;z-index:1;
  gap:24px;
}
.header::before{
  content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;
  background:linear-gradient(to right,transparent,var(--am3) 40%,var(--am3) 60%,transparent);
}
.app-title{
  font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;
  letter-spacing:12px;color:var(--am2);
  text-shadow:0 0 30px rgba(255,180,0,0.5),0 0 60px rgba(255,100,0,0.2);
}
.app-sub{font-size:8px;letter-spacing:5px;color:var(--border2);align-self:flex-end;padding-bottom:5px;}
.header-led{
  display:flex;gap:8px;margin-left:auto;
}
.led{width:8px;height:8px;border-radius:50%;background:#1a1005;border:1px solid #3a2008;transition:all .3s;}
.led.on{background:var(--am);box-shadow:0 0 8px var(--am),0 0 16px var(--am3);}
.led.red{background:#1a0505;border-color:#3a1005;}
.led.red.on{background:#ff3300;box-shadow:0 0 8px #ff3300;}

/* ── COLONNE GAUCHE : VU + infos ── */
.col-left{
  grid-column:1;grid-row:2;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px 16px;
  border-right:1px solid var(--border);
  position:relative;z-index:1;
  gap:20px;
}

/* VU vertical */
.vu-vertical{
  display:flex;gap:4px;align-items:flex-end;
  height:180px;
}
.vu-col{
  display:flex;flex-direction:column-reverse;gap:2px;height:100%;
  align-items:center;
}
.vu-seg{
  width:12px;height:6px;border-radius:1px;
  background:#1a1005;border:1px solid #2a1808;
  transition:background .07s,box-shadow .07s;
}
.vu-seg.lit-lo{background:#c47800;border-color:#e09000;box-shadow:0 0 4px rgba(196,120,0,0.5);}
.vu-seg.lit-mid{background:#e8a000;border-color:#ffc000;box-shadow:0 0 4px rgba(232,160,0,0.6);}
.vu-seg.lit-hi{background:#ff4400;border-color:#ff6600;box-shadow:0 0 5px rgba(255,68,0,0.7);}

.vu-label{font-size:7px;letter-spacing:3px;color:var(--border2);text-align:center;}

/* Info bloc gauche */
.info-bloc{
  width:100%;border:1px solid var(--border);border-radius:6px;
  background:linear-gradient(145deg,#0d0b08,#100d06);
  padding:10px 12px;
  position:relative;overflow:hidden;
}
.info-bloc::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(255,120,0,0.07) 1px,transparent 1px);
  background-size:8px 8px;pointer-events:none;
}
.info-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.info-key{font-size:7px;letter-spacing:2px;color:var(--border2);}
.info-val{font-size:8px;color:var(--am2);}

/* Oscilloscope mini */
.osc-mini{
  width:100%;height:40px;
  border:1px solid var(--border);border-radius:4px;
  background:#040302;overflow:hidden;position:relative;
}
.osc-mini canvas{width:100%;height:100%;}

/* ── COLONNE CENTRE : Cassette + HP + Transport ── */
.col-center{
  grid-column:2;grid-row:2;
  display:flex;flex-direction:column;
  align-items:center;justify-content:space-between;
  padding:16px 24px;
  position:relative;z-index:1;
}

/* Cassette */
.cassette-section{
  display:flex;flex-direction:column;align-items:center;
  width:100%;
}
.now-playing-label{font-size:7px;letter-spacing:3px;color:var(--border2);margin-bottom:4px;}
.now-playing-title{
  font-size:11px;letter-spacing:1px;color:var(--am2);text-align:center;
  max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:12px;min-height:16px;
  text-shadow:0 0 10px rgba(255,200,0,0.4);
}

.cassette-wrap{position:relative;width:240px;height:138px;}
.cassette-body{
  width:240px;height:138px;
  background:linear-gradient(160deg,#1e1508 0%,#110d06 50%,#1a1208 100%);
  border:2px solid var(--border2);border-radius:10px;position:relative;
  box-shadow:0 6px 24px rgba(0,0,0,0.8),inset 0 1px 0 rgba(255,180,80,0.1),0 0 0 1px #2a1808;
}
.cassette-body::before{
  content:'';position:absolute;inset:0;border-radius:8px;pointer-events:none;
  background-image:radial-gradient(circle,rgba(255,120,0,0.06) 1px,transparent 1px);
  background-size:6px 6px;
}
.cassette-window{
  position:absolute;top:18px;left:50%;transform:translateX(-50%);
  width:140px;height:55px;background:#020202;
  border:1px solid #2a1808;border-radius:5px;overflow:hidden;
  box-shadow:inset 0 2px 10px rgba(0,0,0,0.95);
}
.tape-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,#1a0a04 0%,#040202 100%);}
.reel{position:absolute;top:50%;transform:translateY(-50%);width:38px;height:38px;border-radius:50%;}
.reel-left{left:8px;}.reel-right{right:8px;}
.reel-outer{
  width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#3a2010,#0e0804);
  border:1px solid #5a3014;position:relative;
}
.reel.spinning .reel-outer{animation:reel-spin 1.2s linear infinite;}
.reel-spoke{
  position:absolute;top:50%;left:50%;width:2px;height:14px;
  background:linear-gradient(to bottom,#7a4a22,#2a1208);
  transform-origin:50% 100%;border-radius:1px;
}
.reel-spoke:nth-child(1){transform:translate(-50%,-100%) rotate(0deg);}
.reel-spoke:nth-child(2){transform:translate(-50%,-100%) rotate(60deg);}
.reel-spoke:nth-child(3){transform:translate(-50%,-100%) rotate(120deg);}
.reel-spoke:nth-child(4){transform:translate(-50%,-100%) rotate(180deg);}
.reel-spoke:nth-child(5){transform:translate(-50%,-100%) rotate(240deg);}
.reel-spoke:nth-child(6){transform:translate(-50%,-100%) rotate(300deg);}
.reel-hub{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:10px;height:10px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#aa6030,#2a1208);border:1px solid #7a4a22;
}
.tape-path{
  position:absolute;bottom:5px;left:18px;right:18px;height:4px;
  background:linear-gradient(to bottom,#2a1808,#1a0e06);border-radius:2px;
}
@keyframes reel-spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

.cassette-label{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  width:165px;height:30px;
  background:linear-gradient(135deg,#1e1208,#140e06);
  border:1px solid var(--border2);border-radius:3px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
}
.label-top{font-size:8px;letter-spacing:4px;color:var(--am3);font-family:'Orbitron',sans-serif;font-weight:700;}
.label-bot{font-size:5px;letter-spacing:2px;color:#4a2810;}
.cassette-hole{position:absolute;width:7px;height:7px;border-radius:50%;background:#020202;border:1px solid #2a1808;}
.cassette-hole.tl{top:7px;left:7px;}.cassette-hole.tr{top:7px;right:7px;}
.cassette-hole.bl{bottom:7px;left:7px;}.cassette-hole.br{bottom:7px;right:7px;}

/* ── HAUT-PARLEUR SVG ── */
.speaker-section{
  display:flex;align-items:center;justify-content:center;
  flex:1;width:100%;
  position:relative;
}
.spk-svg-wrap{
  position:relative;width:230px;height:230px;
  display:flex;align-items:center;justify-content:center;
  transition:filter .3s;
}
.spk-svg-wrap.playing{
  filter:drop-shadow(0 0 18px rgba(255,140,0,0.35)) drop-shadow(0 0 40px rgba(255,80,0,0.15));
}
#spkSvg{width:230px;height:230px;}

/* Cône SVG animation */
#spkCone{transform-origin:115px 115px;transition:transform .1s;}
.spk-svg-wrap.playing #spkCone{animation:var(--cone-anim,membrane-pulse) var(--cone-dur,.15s) ease-in-out infinite alternate;}
@keyframes membrane-pulse{from{transform:scale(1);}to{transform:scale(1.022);}}
@keyframes membrane-deep{from{transform:scale(1);}to{transform:scale(1.038);}}
@keyframes membrane-tremble{
  0%{transform:scale(1) rotate(0deg);}25%{transform:scale(1.016) rotate(0.4deg);}
  50%{transform:scale(1.024) rotate(0deg);}75%{transform:scale(1.01) rotate(-0.4deg);}100%{transform:scale(1);}
}
@keyframes membrane-thump{
  0%,100%{transform:scale(1);}10%{transform:scale(1.034);}30%{transform:scale(0.993);}60%{transform:scale(1.014);}
}
@keyframes membrane-flutter{
  0%,100%{transform:scale(1);}20%{transform:scale(1.026);}40%{transform:scale(1.006);}60%{transform:scale(1.021);}80%{transform:scale(0.996);}
}

/* ── ONDES SONORES ── */
.sound-waves{position:absolute;inset:0;pointer-events:none;overflow:visible;display:flex;align-items:center;justify-content:center;}
.wave-ring{
  position:absolute;border-radius:50%;
  opacity:0;top:50%;left:50%;transform:translate(-50%,-50%);
}

/* === PRESET CLASSIC === */
.preset-classic .wave-ring{border:1.5px solid rgba(224,128,0,0.8);}
.preset-classic.playing .wave-ring:nth-child(1){animation:wave-expand 2s ease-out infinite;}
.preset-classic.playing .wave-ring:nth-child(2){animation:wave-expand 2s ease-out .65s infinite;}
.preset-classic.playing .wave-ring:nth-child(3){animation:wave-expand 2s ease-out 1.3s infinite;}
.preset-classic.playing .wave-ring:nth-child(4){animation:wave-expand 2s ease-out 1.0s infinite;}
.preset-classic.playing .wave-ring:nth-child(5){display:none;}
.preset-classic.playing .wave-ring:nth-child(6){display:none;}
@keyframes wave-expand{
  0%{width:90px;height:90px;opacity:.75;}100%{width:520px;height:520px;opacity:0;}
}

/* === PRESET PULSE === */
.preset-pulse .wave-ring{border:2px solid rgba(255,170,0,0.9);}
.preset-pulse.playing .wave-ring:nth-child(1){animation:wave-pulse 1.1s ease-out infinite;}
.preset-pulse.playing .wave-ring:nth-child(2){animation:wave-pulse 1.1s ease-out .18s infinite;}
.preset-pulse.playing .wave-ring:nth-child(3){animation:wave-pulse 1.1s ease-out .36s infinite;}
.preset-pulse.playing .wave-ring:nth-child(4){animation:wave-pulse 1.1s ease-out .55s infinite;}
.preset-pulse.playing .wave-ring:nth-child(5){animation:wave-pulse 1.1s ease-out .73s infinite;}
.preset-pulse.playing .wave-ring:nth-child(6){animation:wave-pulse 1.1s ease-out .91s infinite;}
@keyframes wave-pulse{
  0%{width:70px;height:70px;opacity:.85;border-width:2px;}100%{width:400px;height:400px;opacity:0;border-width:0.5px;}
}

/* === PRESET DEEP BASS === */
.preset-deep .wave-ring{border:2.5px solid rgba(255,80,0,0.8);}
.preset-deep.playing .wave-ring:nth-child(1){animation:wave-deep 3.5s cubic-bezier(.1,.6,.4,1) infinite;}
.preset-deep.playing .wave-ring:nth-child(2){animation:wave-deep 3.5s cubic-bezier(.1,.6,.4,1) 1.16s infinite;}
.preset-deep.playing .wave-ring:nth-child(3){animation:wave-deep 3.5s cubic-bezier(.1,.6,.4,1) 2.33s infinite;}
.preset-deep.playing .wave-ring:nth-child(4){display:none;}
.preset-deep.playing .wave-ring:nth-child(5){display:none;}
.preset-deep.playing .wave-ring:nth-child(6){display:none;}
@keyframes wave-deep{
  0%{width:110px;height:110px;opacity:.7;border-width:3px;}40%{opacity:.4;}100%{width:600px;height:600px;opacity:0;border-width:1px;}
}

/* === PRESET SHARP === */
.preset-sharp .wave-ring{border:1.5px solid rgba(255,216,120,0.9);border-radius:8px !important;}
.preset-sharp.playing .wave-ring:nth-child(1){animation:wave-sharp 1.6s ease-out infinite;}
.preset-sharp.playing .wave-ring:nth-child(2){animation:wave-sharp 1.6s ease-out .53s infinite;transform:translate(-50%,-50%) rotate(22deg) !important;}
.preset-sharp.playing .wave-ring:nth-child(3){animation:wave-sharp 1.6s ease-out 1.06s infinite;}
.preset-sharp.playing .wave-ring:nth-child(4){animation:wave-sharp 1.6s ease-out 1.3s infinite;transform:translate(-50%,-50%) rotate(22deg) !important;}
.preset-sharp.playing .wave-ring:nth-child(5){display:none;}
.preset-sharp.playing .wave-ring:nth-child(6){display:none;}
@keyframes wave-sharp{
  0%{width:80px;height:80px;opacity:.75;border-width:2px;}100%{width:460px;height:460px;opacity:0;border-width:0.5px;}
}

/* === PRESET ECHO === */
.preset-echo .wave-ring{border:1.5px solid rgba(224,128,0,0.85);}
.preset-echo.playing .wave-ring:nth-child(1){animation:wave-echo 2.4s ease-in-out infinite;}
.preset-echo.playing .wave-ring:nth-child(2){animation:wave-echo2 2.4s ease-in-out .3s infinite;}
.preset-echo.playing .wave-ring:nth-child(3){animation:wave-echo 2.4s ease-in-out .8s infinite;}
.preset-echo.playing .wave-ring:nth-child(4){animation:wave-echo2 2.4s ease-in-out 1.1s infinite;}
.preset-echo.playing .wave-ring:nth-child(5){animation:wave-echo 2.4s ease-in-out 1.6s infinite;}
.preset-echo.playing .wave-ring:nth-child(6){animation:wave-echo2 2.4s ease-in-out 1.9s infinite;}
@keyframes wave-echo{
  0%{width:90px;height:90px;opacity:.7;}50%{width:240px;height:240px;opacity:.22;}65%{width:260px;height:260px;opacity:.3;}100%{width:490px;height:490px;opacity:0;}
}
@keyframes wave-echo2{
  0%{width:90px;height:90px;opacity:.45;}50%{width:220px;height:220px;opacity:.11;}65%{width:235px;height:235px;opacity:.18;}100%{width:440px;height:440px;opacity:0;}
}

/* === PRESET RETRO === */
.preset-retro .wave-ring{border:2px dashed rgba(255,140,0,0.8);}
.preset-retro.playing .wave-ring:nth-child(1){animation:wave-retro 1.8s steps(8) infinite;}
.preset-retro.playing .wave-ring:nth-child(2){animation:wave-retro 1.8s steps(8) .6s infinite;}
.preset-retro.playing .wave-ring:nth-child(3){animation:wave-retro 1.8s steps(8) 1.2s infinite;}
.preset-retro.playing .wave-ring:nth-child(4){display:none;}
.preset-retro.playing .wave-ring:nth-child(5){display:none;}
.preset-retro.playing .wave-ring:nth-child(6){display:none;}
@keyframes wave-retro{
  0%{width:70px;height:70px;opacity:.85;}100%{width:420px;height:420px;opacity:0;}
}

/* ── TRANSPORT ── */
.transport-bar{display:flex;gap:10px;align-items:center;justify-content:center;margin-top:14px;}
.t-btn{
  width:36px;height:36px;
  background:linear-gradient(145deg,#1e1408,#120e06);
  border:1px solid var(--border2);border-radius:50%;color:var(--am3);font-size:12px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
  box-shadow:0 2px 8px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,180,80,0.07);
}
.t-btn:hover{color:var(--am2);border-color:var(--am);box-shadow:0 0 14px var(--amg);}
.t-btn.play-btn{width:48px;height:48px;font-size:16px;background:linear-gradient(145deg,#2e1c08,#1e1206);border-color:var(--am3);color:var(--am);}
.t-btn.play-btn.active{background:linear-gradient(145deg,#3e2408,#2a1606);color:var(--am2);box-shadow:0 0 18px var(--amg),inset 0 1px 0 rgba(255,200,0,0.12);}
.t-btn.stop-btn{color:#6a4020;}.t-btn.stop-btn:hover{color:#ff6644;}

/* ── STATUS ── */
.status-row{display:flex;gap:8px;align-items:center;margin-top:10px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:#1a1005;border:1px solid #333;transition:all .3s;}
.status-dot.on{background:var(--am);box-shadow:0 0 8px var(--am),0 0 16px var(--am3);animation:dot-pulse 1.5s ease-in-out infinite;}
@keyframes dot-pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.status-txt{font-size:8px;letter-spacing:2px;color:#4a3018;transition:color .3s;}
.status-txt.on{color:var(--am);}

/* ── COLONNE DROITE : Presets + Equalizer ── */
.col-right{
  grid-column:3;grid-row:2;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px 16px;
  border-left:1px solid var(--border);
  position:relative;z-index:1;
  gap:16px;
}

/* Presets */
.presets-bloc{
  width:100%;border:1px solid var(--border);border-radius:8px;
  background:linear-gradient(145deg,#0d0b08,#100d06);
  padding:12px;position:relative;overflow:hidden;
}
.presets-bloc::before{
  content:'';position:absolute;inset:0;border-radius:8px;pointer-events:none;
  background-image:radial-gradient(circle,rgba(255,120,0,0.06) 1px,transparent 1px);
  background-size:8px 8px;
}
.preset-label{font-size:7px;letter-spacing:3px;color:var(--border2);text-align:center;margin-bottom:10px;}
.presets-row{display:flex;flex-direction:column;gap:6px;}
.preset-btn{
  font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:2px;
  padding:7px 12px;border-radius:4px;cursor:pointer;
  background:linear-gradient(145deg,#160e06,#0e0a04);
  border:1px solid var(--border);color:#7a4a1e;
  transition:all .18s;position:relative;overflow:hidden;
  text-align:left;width:100%;
}
/* Indicateur d'onde mini sur les presets */
.preset-btn::after{
  content:'';position:absolute;right:8px;top:50%;transform:translateY(-50%);
  width:24px;height:14px;
  background:transparent;
  border-radius:2px;
}
.preset-btn[data-preset="classic"]::after{background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 14'><path d='M0,7 Q6,2 12,7 Q18,12 24,7' fill='none' stroke='rgba(160,80,0,0.5)' stroke-width='1.5'/></svg>") no-repeat center/contain;}
.preset-btn[data-preset="pulse"]::after{background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 14'><path d='M0,7 L4,7 L5,2 L7,12 L9,4 L11,10 L13,7 L24,7' fill='none' stroke='rgba(160,80,0,0.5)' stroke-width='1.5'/></svg>") no-repeat center/contain;}
.preset-btn[data-preset="deep"]::after{background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 14'><path d='M0,7 Q12,-1 24,7' fill='none' stroke='rgba(160,80,0,0.5)' stroke-width='2'/></svg>") no-repeat center/contain;}
.preset-btn[data-preset="sharp"]::after{background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 14'><path d='M0,7 L6,7 L8,1 L10,13 L12,1 L14,13 L16,7 L24,7' fill='none' stroke='rgba(160,80,0,0.5)' stroke-width='1.5'/></svg>") no-repeat center/contain;}
.preset-btn[data-preset="echo"]::after{background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 14'><path d='M0,7 Q4,3 8,7 Q12,11 16,7 Q20,3 24,7' fill='none' stroke='rgba(160,80,0,0.5)' stroke-width='1.5'/></svg>") no-repeat center/contain;}
.preset-btn[data-preset="retro"]::after{background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 14'><path d='M0,7 L3,7 L3,2 L7,2 L7,12 L11,12 L11,2 L15,2 L15,7 L24,7' fill='none' stroke='rgba(160,80,0,0.5)' stroke-width='1.5'/></svg>") no-repeat center/contain;}

.preset-btn:hover{color:var(--am3);border-color:var(--am3);box-shadow:0 0 10px rgba(224,128,0,0.2);}
.preset-btn.active{
  color:var(--am2);border-color:var(--am2);
  background:linear-gradient(145deg,#2e1c08,#1e1206);
  box-shadow:0 0 14px rgba(255,200,0,0.3);
}
.preset-btn.active::after{filter:brightness(2);}

/* Equalizer faders */
.eq-bloc{
  width:100%;border:1px solid var(--border);border-radius:8px;
  background:linear-gradient(145deg,#0d0b08,#100d06);
  padding:12px;position:relative;overflow:hidden;
}
.eq-bloc::before{
  content:'';position:absolute;inset:0;border-radius:8px;pointer-events:none;
  background-image:radial-gradient(circle,rgba(255,120,0,0.05) 1px,transparent 1px);
  background-size:8px 8px;
}
.eq-label{font-size:7px;letter-spacing:3px;color:var(--border2);text-align:center;margin-bottom:10px;}
.eq-faders{display:flex;gap:8px;align-items:flex-end;justify-content:center;height:80px;}
.eq-fader-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
.eq-track{width:6px;height:60px;background:#0e0a06;border:1px solid var(--border);border-radius:3px;position:relative;cursor:pointer;}
.eq-thumb{
  position:absolute;bottom:0;left:-3px;width:12px;height:8px;
  background:linear-gradient(to bottom,var(--am3),var(--am));
  border-radius:2px;border:1px solid var(--am2);box-shadow:0 0 6px rgba(255,150,0,0.4);
  transition:bottom .1s;
}
.eq-freq{font-size:6px;color:var(--border2);letter-spacing:1px;}

/* ── FOOTER ── */
.footer{
  grid-column:1/-1;
  display:flex;align-items:center;justify-content:center;
  padding:10px 32px 14px;
  border-top:1px solid var(--border);
  position:relative;z-index:1;
  gap:16px;
}
.footer::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(to right,transparent,var(--am3) 40%,var(--am3) 60%,transparent);
}

/* VU-mètre horizontal footer */
.vu-row{
  display:flex;gap:3px;align-items:flex-end;height:22px;flex:1;max-width:500px;
}
.vu-bar{
  flex:1;border-radius:2px 2px 0 0;background:#1a1005;
  border:1px solid #2a1808;transition:height .07s ease;
}

.footer-info{font-size:7px;letter-spacing:2px;color:var(--border2);}

/* ── Séparateurs internes ── */
.deco-line{
  width:100%;height:1px;
  background:linear-gradient(to right,transparent,var(--border2) 30%,var(--border2) 70%,transparent);
  margin:10px 0;
}
</style>
</head>
<body>
<div class="waveamp-root">

  <!-- HEADER -->
  <div class="header">
    <div class="app-sub">ÉDITION BOIS · CHROME IV</div>
    <div class="app-title">WAVEAMP</div>
    <div class="header-led">
      <div class="led" id="ledPower"></div>
      <div class="led red" id="ledClip"></div>
    </div>
  </div>

  <!-- COLONNE GAUCHE -->
  <div class="col-left">
    <div class="vu-label">LEVEL</div>
    <div class="vu-vertical" id="vuVertical">
      <!-- segments générés par JS -->
    </div>

    <div class="info-bloc">
      <div class="info-row"><span class="info-key">PRESET</span><span class="info-val" id="infoPreset">CLASSIC</span></div>
      <div class="info-row"><span class="info-key">MODE</span><span class="info-val" id="infoMode">ANALOG</span></div>
      <div class="info-row"><span class="info-key">PISTE</span><span class="info-val" id="infoPiste">—</span></div>
      <div class="info-row"><span class="info-key">TEMPO</span><span class="info-val" id="infoTempo">120 BPM</span></div>
    </div>

    <div style="width:100%">
      <div class="vu-label" style="margin-bottom:6px;">OSCILLOSCOPE</div>
      <div class="osc-mini"><canvas id="oscCanvas"></canvas></div>
    </div>
  </div>

  <!-- COLONNE CENTRE -->
  <div class="col-center">

    <div class="cassette-section">
      <div class="now-playing-label">NOW PLAYING</div>
      <div class="now-playing-title" id="nowTitle">—</div>

      <div class="cassette-wrap">
        <div class="cassette-body">
          <div class="cassette-hole tl"></div><div class="cassette-hole tr"></div>
          <div class="cassette-hole bl"></div><div class="cassette-hole br"></div>
          <div class="cassette-window">
            <div class="tape-bg"></div>
            <div class="reel reel-left" id="reelLeft">
              <div class="reel-outer">
                <div class="reel-spoke"></div><div class="reel-spoke"></div><div class="reel-spoke"></div>
                <div class="reel-spoke"></div><div class="reel-spoke"></div><div class="reel-spoke"></div>
                <div class="reel-hub"></div>
              </div>
            </div>
            <div class="reel reel-right" id="reelRight">
              <div class="reel-outer">
                <div class="reel-spoke"></div><div class="reel-spoke"></div><div class="reel-spoke"></div>
                <div class="reel-spoke"></div><div class="reel-spoke"></div><div class="reel-spoke"></div>
                <div class="reel-hub"></div>
              </div>
            </div>
            <div class="tape-path"></div>
          </div>
          <div class="cassette-label">
            <div class="label-top">WAVEAMP</div>
            <div class="label-bot">ÉDITION BOIS · CHROME IV</div>
          </div>
        </div>
      </div>

      <div class="transport-bar">
        <button class="t-btn" id="btnRew" title="Retour">⏮</button>
        <button class="t-btn stop-btn" id="btnStop" title="Stop">■</button>
        <button class="t-btn play-btn" id="btnPlay" title="Lecture / Pause">▶</button>
        <button class="t-btn" id="btnFwd" title="Avance">⏭</button>
      </div>

      <div class="status-row">
        <div class="status-dot" id="statusDot"></div>
        <div class="status-txt" id="statusTxt">EN ATTENTE</div>
      </div>
    </div>

    <div class="deco-line"></div>

    <!-- HAUT-PARLEUR SVG style M-Audio BX5 -->
    <div class="speaker-section">
      <div class="spk-svg-wrap preset-classic" id="spkCabinet">
        <div class="sound-waves">
          <div class="wave-ring"></div>
          <div class="wave-ring"></div>
          <div class="wave-ring"></div>
          <div class="wave-ring"></div>
          <div class="wave-ring"></div>
          <div class="wave-ring"></div>
        </div>
        <svg id="spkSvg" viewBox="0 0 230 230" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <!-- Grille diamantée perforée -->
            <pattern id="gridDiamond" x="0" y="0" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45 115 115)">
              <rect width="7" height="7" fill="#1a1a1a"/>
              <circle cx="3.5" cy="3.5" r="2" fill="#101010"/>
            </pattern>
            <!-- Clip cercle pour la grille -->
            <clipPath id="coneClip">
              <circle cx="115" cy="115" r="80"/>
            </clipPath>
            <clipPath id="outerClip">
              <circle cx="115" cy="115" r="110"/>
            </clipPath>
            <!-- Radial pour le surround -->
            <radialGradient id="surroundGrad" cx="50%" cy="40%" r="50%">
              <stop offset="0%" stop-color="#3a3a3a"/>
              <stop offset="60%" stop-color="#1a1a1a"/>
              <stop offset="100%" stop-color="#0a0a0a"/>
            </radialGradient>
            <!-- Radial cône argenté -->
            <radialGradient id="coneGrad" cx="42%" cy="36%" r="58%">
              <stop offset="0%" stop-color="#c8c8c8"/>
              <stop offset="30%" stop-color="#a0a0a0"/>
              <stop offset="65%" stop-color="#686868"/>
              <stop offset="100%" stop-color="#2a2a2a"/>
            </radialGradient>
            <!-- Dust cap -->
            <radialGradient id="dustGrad" cx="38%" cy="32%" r="60%">
              <stop offset="0%" stop-color="#1e1e1e"/>
              <stop offset="70%" stop-color="#0a0a0a"/>
              <stop offset="100%" stop-color="#050505"/>
            </radialGradient>
            <!-- Outer ring gradient -->
            <radialGradient id="outerRingGrad" cx="45%" cy="38%" r="55%">
              <stop offset="0%" stop-color="#4a4a4a"/>
              <stop offset="40%" stop-color="#252525"/>
              <stop offset="100%" stop-color="#0d0d0d"/>
            </radialGradient>
          </defs>

          <!-- Anneau extérieur (boîtier) -->
          <circle cx="115" cy="115" r="110" fill="url(#outerRingGrad)" stroke="#555" stroke-width="1.5"/>
          <!-- Reflet haut-gauche boîtier -->
          <ellipse cx="80" cy="68" rx="30" ry="14" fill="rgba(255,255,255,0.04)" transform="rotate(-30 80 68)"/>

          <!-- Surround caoutchouc (anneau ondulé) -->
          <circle cx="115" cy="115" r="98" fill="url(#surroundGrad)" stroke="#333" stroke-width="0.5"/>
          <circle cx="115" cy="115" r="92" fill="none" stroke="#252525" stroke-width="3"/>
          <circle cx="115" cy="115" r="87" fill="none" stroke="#1a1a1a" stroke-width="2"/>
          <circle cx="115" cy="115" r="83" fill="#111" stroke="#2a2a2a" stroke-width="1"/>

          <!-- Zone grille diamantée (entre surround et cône) -->
          <circle cx="115" cy="115" r="80" fill="url(#gridDiamond)" clip-path="url(#coneClip)"/>
          <!-- Ombre portée sur la grille depuis le surround -->
          <circle cx="115" cy="115" r="80" fill="none" stroke="rgba(0,0,0,0.6)" stroke-width="8"/>

          <!-- Groupe cône (animé) -->
          <g id="spkCone">
            <!-- Cône principal argenté -->
            <circle cx="115" cy="115" r="70" fill="url(#coneGrad)"/>
            <!-- Stries concentriques du cône -->
            <circle cx="115" cy="115" r="65" fill="none" stroke="rgba(80,80,80,0.4)" stroke-width="0.8"/>
            <circle cx="115" cy="115" r="58" fill="none" stroke="rgba(70,70,70,0.35)" stroke-width="0.7"/>
            <circle cx="115" cy="115" r="50" fill="none" stroke="rgba(60,60,60,0.3)" stroke-width="0.6"/>
            <circle cx="115" cy="115" r="42" fill="none" stroke="rgba(50,50,50,0.28)" stroke-width="0.6"/>
            <circle cx="115" cy="115" r="34" fill="none" stroke="rgba(40,40,40,0.25)" stroke-width="0.5"/>
            <!-- Reflet cône haut gauche -->
            <ellipse cx="95" cy="90" rx="18" ry="10" fill="rgba(255,255,255,0.12)" transform="rotate(-25 95 90)"/>
            <!-- Dust cap (centre) -->
            <circle cx="115" cy="115" r="22" fill="url(#dustGrad)" stroke="#333" stroke-width="1"/>
            <!-- Reflet dust cap -->
            <ellipse cx="109" cy="108" rx="6" ry="4" fill="rgba(255,255,255,0.08)" transform="rotate(-20 109 108)"/>
            <!-- Vis centrale -->
            <circle cx="115" cy="115" r="4" fill="#0a0a0a" stroke="#444" stroke-width="0.8"/>
            <circle cx="115" cy="115" r="1.5" fill="#555"/>
          </g>

          <!-- Vis de fixation (4 coins, hors animation) -->
          <circle cx="35" cy="35" r="5" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
          <line x1="33" y1="35" x2="37" y2="35" stroke="#555" stroke-width="0.8"/>
          <line x1="35" y1="33" x2="35" y2="37" stroke="#555" stroke-width="0.8"/>
          <circle cx="195" cy="35" r="5" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
          <line x1="193" y1="35" x2="197" y2="35" stroke="#555" stroke-width="0.8"/>
          <line x1="195" y1="33" x2="195" y2="37" stroke="#555" stroke-width="0.8"/>
          <circle cx="35" cy="195" r="5" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
          <line x1="33" y1="195" x2="37" y2="195" stroke="#555" stroke-width="0.8"/>
          <line x1="35" y1="193" x2="35" y2="197" stroke="#555" stroke-width="0.8"/>
          <circle cx="195" cy="195" r="5" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
          <line x1="193" y1="195" x2="197" y2="195" stroke="#555" stroke-width="0.8"/>
          <line x1="195" y1="193" x2="195" y2="197" stroke="#555" stroke-width="0.8"/>

          <!-- Halo ambré quand playing (masqué par défaut) -->
          <circle id="spkGlow" cx="115" cy="115" r="110" fill="none" stroke="rgba(224,120,0,0)" stroke-width="3"/>
        </svg>
      </div>
    </div>

  </div>

  <!-- COLONNE DROITE -->
  <div class="col-right">

    <div class="presets-bloc">
      <div class="preset-label">PRESET ONDES</div>
      <div class="presets-row">
        <button class="preset-btn active" data-preset="classic" data-cone-anim="membrane-pulse" data-cone-dur="0.15s">CLASSIC</button>
        <button class="preset-btn" data-preset="pulse" data-cone-anim="membrane-flutter" data-cone-dur="0.22s">PULSE</button>
        <button class="preset-btn" data-preset="deep" data-cone-anim="membrane-deep" data-cone-dur="0.35s">DEEP BASS</button>
        <button class="preset-btn" data-preset="sharp" data-cone-anim="membrane-tremble" data-cone-dur="0.12s">SHARP</button>
        <button class="preset-btn" data-preset="echo" data-cone-anim="membrane-pulse" data-cone-dur="0.28s">ECHO</button>
        <button class="preset-btn" data-preset="retro" data-cone-anim="membrane-thump" data-cone-dur="0.4s">RÉTRO</button>
      </div>
    </div>

    <div class="eq-bloc">
      <div class="eq-label">ÉGALISEUR</div>
      <div class="eq-faders" id="eqFaders">
        <!-- généré par JS -->
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-info" id="footerTime">00:00</div>
    <div class="vu-row" id="vuRow"></div>
    <div class="footer-info" id="footerBit">44.1kHz · 16bit</div>
  </div>

</div>

<script>
/* ── REFS ── */
const spk       = document.getElementById('spkCabinet');
const reelL     = document.getElementById('reelLeft');
const reelR     = document.getElementById('reelRight');
const statusDot = document.getElementById('statusDot');
const statusTxt = document.getElementById('statusTxt');
const nowTitle  = document.getElementById('nowTitle');
const btnPlay   = document.getElementById('btnPlay');
const ledPower  = document.getElementById('ledPower');
const ledClip   = document.getElementById('ledClip');
const infoPreset= document.getElementById('infoPreset');
const infoPiste = document.getElementById('infoPiste');

let isPlaying = false;
let vuTimer   = null;
let oscTimer  = null;
let timeTimer = null;
let seconds   = 0;
let currentConeAnim = 'membrane-pulse';
let currentConeDur  = '0.15s';

const tracks = ['CASSETTE A // FACE 1','CHROME IV · PISTE 3','BANDE ORIGINALE','SESSION ANALOGIQUE','ENREGISTREMENT LIVE'];
let trackIdx = 0;

/* ── VU-MÈTRE HORIZONTAL (footer) ── */
const vuRow = document.getElementById('vuRow');
for(let i=0;i<20;i++){const b=document.createElement('div');b.className='vu-bar';b.style.height='4px';vuRow.appendChild(b);}
const vuBars = vuRow.querySelectorAll('.vu-bar');
let barsState = Array.from({length:20},()=>4);

function animateVu(){
  vuBars.forEach((bar,i)=>{
    const target = isPlaying ? Math.floor(Math.random()*18)+2 : 4;
    barsState[i]+=(target-barsState[i])*0.25;
    const h=Math.round(barsState[i]);
    bar.style.height=h+'px';
    if(!isPlaying){bar.style.background='#1a1005';bar.style.borderColor='#2a1808';}
    else{
      const pct=h/20;
      const r=Math.round(100+155*pct),g=Math.round(60-40*pct);
      bar.style.background=`rgb(${r},${g},0)`;
      bar.style.borderColor=`rgb(${Math.min(255,r+40)},${g},0)`;
    }
  });
}

/* ── VU-MÈTRE VERTICAL GAUCHE ── */
const vuVert = document.getElementById('vuVertical');
const N_COLS=2, N_SEGS=16;
const vuCols=[];
for(let c=0;c<N_COLS;c++){
  const col=document.createElement('div');col.className='vu-col';
  const segs=[];
  for(let s=0;s<N_SEGS;s++){const seg=document.createElement('div');seg.className='vu-seg';col.appendChild(seg);segs.push(seg);}
  vuVert.appendChild(col);vuCols.push(segs);
}
let vuLevels=[0,0];

function animateVuVert(){
  for(let c=0;c<N_COLS;c++){
    const target=isPlaying?Math.floor(Math.random()*N_SEGS)+1:0;
    vuLevels[c]+=(target-vuLevels[c])*0.3;
    const lvl=Math.round(vuLevels[c]);
    vuCols[c].forEach((seg,i)=>{
      seg.className='vu-seg';
      if(i<lvl){
        if(i>=N_SEGS-3) seg.classList.add('lit-hi');
        else if(i>=N_SEGS-7) seg.classList.add('lit-mid');
        else seg.classList.add('lit-lo');
        if(i>=N_SEGS-1) ledClip.classList.add('on');
      }
    });
    if(lvl<N_SEGS-1) ledClip.classList.remove('on');
  }
}

/* ── OSCILLOSCOPE ── */
const oscCanvas=document.getElementById('oscCanvas');
const ctx=oscCanvas.getContext('2d');
let oscPhase=0;

function drawOsc(){
  const W=oscCanvas.offsetWidth||120,H=oscCanvas.offsetHeight||40;
  oscCanvas.width=W;oscCanvas.height=H;
  ctx.clearRect(0,0,W,H);
  if(!isPlaying){
    ctx.strokeStyle='rgba(100,60,0,0.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
    return;
  }
  ctx.strokeStyle='rgba(224,130,0,0.9)';ctx.lineWidth=1.5;
  ctx.shadowBlur=4;ctx.shadowColor='rgba(255,150,0,0.5)';
  ctx.beginPath();
  for(let x=0;x<W;x++){
    const t=x/W;
    const y=H/2+Math.sin(t*Math.PI*8+oscPhase)*12+Math.sin(t*Math.PI*3+oscPhase*1.3)*6;
    x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
  ctx.shadowBlur=0;
  oscPhase+=0.18;
}

/* ── CHRONO ── */
function fmtTime(s){const m=Math.floor(s/60);return String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function tickTime(){seconds++;document.getElementById('footerTime').textContent=fmtTime(seconds);}

/* ── EQ FADERS ── */
const eqFreqs=['80','250','1K','3K','8K','16K'];
const eqVals=[55,60,70,65,50,45];
const eqContainer=document.getElementById('eqFaders');
eqFreqs.forEach((f,i)=>{
  const wrap=document.createElement('div');wrap.className='eq-fader-wrap';
  const track=document.createElement('div');track.className='eq-track';
  const thumb=document.createElement('div');thumb.className='eq-thumb';
  thumb.style.bottom=eqVals[i]+'%';
  track.appendChild(thumb);
  track.addEventListener('click',e=>{
    const rect=track.getBoundingClientRect();
    const pct=Math.max(0,Math.min(1,1-(e.clientY-rect.top)/rect.height));
    thumb.style.bottom=(pct*100)+'%';
  });
  const lbl=document.createElement('div');lbl.className='eq-freq';lbl.textContent=f;
  wrap.appendChild(track);wrap.appendChild(lbl);eqContainer.appendChild(wrap);
});

/* ── LECTURE / PAUSE ── */
function startAllTimers(){
  if(!vuTimer) vuTimer=setInterval(()=>{animateVu();animateVuVert();drawOsc();},60);
  if(!timeTimer) timeTimer=setInterval(tickTime,1000);
}
function stopAllTimers(){clearInterval(vuTimer);vuTimer=null;clearInterval(timeTimer);timeTimer=null;barsState.fill(4);animateVu();}

function setPlaying(v){
  isPlaying=v;
  const glow=document.getElementById('spkGlow');
  if(v){
    spk.classList.add('playing');
    spk.style.setProperty('--cone-anim',currentConeAnim);
    spk.style.setProperty('--cone-dur',currentConeDur);
    if(glow) glow.setAttribute('stroke','rgba(224,120,0,0.5)');
    reelL.classList.add('spinning');reelR.classList.add('spinning');
    statusDot.classList.add('on');statusTxt.classList.add('on');
    statusTxt.textContent='EN LECTURE';
    btnPlay.classList.add('active');btnPlay.textContent='⏸';
    ledPower.classList.add('on');
    const t=tracks[trackIdx%tracks.length];
    nowTitle.textContent=t;infoPiste.textContent=t.substring(0,8)+'…';
    startAllTimers();
  }else{
    spk.classList.remove('playing');
    if(glow) glow.setAttribute('stroke','rgba(224,120,0,0)');
    reelL.classList.remove('spinning');reelR.classList.remove('spinning');
    statusDot.classList.remove('on');statusTxt.classList.remove('on');
    statusTxt.textContent='EN PAUSE';
    btnPlay.classList.remove('active');btnPlay.textContent='▶';
    ledClip.classList.remove('on');
    stopAllTimers();drawOsc();
  }
}

btnPlay.addEventListener('click',()=>setPlaying(!isPlaying));
document.getElementById('btnStop').addEventListener('click',()=>{
  setPlaying(false);nowTitle.textContent='—';statusTxt.textContent='EN ATTENTE';
  ledPower.classList.remove('on');seconds=0;document.getElementById('footerTime').textContent='00:00';
  infoPiste.textContent='—';
});
document.getElementById('btnRew').addEventListener('click',()=>{
  trackIdx=Math.max(0,trackIdx-1);
  if(isPlaying){const t=tracks[trackIdx%tracks.length];nowTitle.textContent=t;infoPiste.textContent=t.substring(0,8)+'…';}
});
document.getElementById('btnFwd').addEventListener('click',()=>{
  trackIdx++;
  if(isPlaying){const t=tracks[trackIdx%tracks.length];nowTitle.textContent=t;infoPiste.textContent=t.substring(0,8)+'…';}
});

/* ── PRESETS ── */
document.querySelectorAll('.preset-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const preset=btn.dataset.preset;
    currentConeAnim=btn.dataset.coneAnim;
    currentConeDur=btn.dataset.coneDur;
    spk.classList.remove('preset-classic','preset-pulse','preset-deep','preset-sharp','preset-echo','preset-retro');
    spk.classList.add('preset-'+preset);
    if(isPlaying){
      spk.style.setProperty('--cone-anim',currentConeAnim);
      spk.style.setProperty('--cone-dur',currentConeDur);
      const cone=document.getElementById('spkCone');
      if(cone){cone.style.animation='none';cone.offsetHeight;cone.style.animation='';}
    }
    document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    infoPreset.textContent=preset.toUpperCase();
  });
});

/* init */
drawOsc();
</script>
