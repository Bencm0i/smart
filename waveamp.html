<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAVEAMP</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --wood-dark:#1a0f07;--wood-mid:#3d1f0a;--wood-light:#6b3a1a;--wood-grain:#8b4a22;
  --wood-shine:#c4783a;--veneer:#4a2410;--am:#ffaa00;--am2:#ffd060;--am3:#e07800;
  --amg:rgba(255,180,0,0.18);--bg:#080808;--panel:#0e0e0e;--divider:#1e1208;
  --wave-color: var(--am3);
  --wave-opacity: 0.55;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:var(--bg);font-family:'Share Tech Mono',monospace;color:var(--am);overflow:hidden;}

.waveamp-root{
  display:flex;flex-direction:column;width:100vw;height:100dvh;
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 30%,#1a0f07 0%,#080808 60%);
}

/* ── TITRE ── */
.app-title{
  font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;
  letter-spacing:8px;color:var(--am3);margin-bottom:4px;
  text-shadow:0 0 20px rgba(255,140,0,0.4);
}
.app-sub{font-size:7px;letter-spacing:5px;color:#3a2010;margin-bottom:28px;}

/* ── BOITIER PRINCIPAL ── */
.cabinet{
  width:360px;
  background:linear-gradient(160deg,#141008 0%,#0a0804 50%,#120e06 100%);
  border:2px solid #3a2010;border-radius:16px;
  box-shadow:0 8px 40px rgba(0,0,0,0.9),inset 0 1px 0 rgba(255,180,80,0.06),0 0 0 1px #2a1808;
  padding:20px 20px 22px;
  position:relative;
}
.cabinet::before{
  content:'';position:absolute;inset:0;border-radius:14px;pointer-events:none;
  background:repeating-linear-gradient(
    87deg,transparent 0px,transparent 3px,
    rgba(255,120,0,0.012) 3px,rgba(255,120,0,0.012) 4px
  );
}

/* ── CASSETTE ── */
.cassette-section{
  display:flex;flex-direction:column;align-items:center;
  padding-bottom:14px;border-bottom:1px solid #1e1208;
  margin-bottom:14px;
}

.now-playing-label{font-size:7px;letter-spacing:3px;color:#444;margin-bottom:4px;}
.now-playing-title{
  font-size:10px;letter-spacing:1px;color:var(--am2);text-align:center;
  max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:14px;min-height:14px;
}

.cassette-wrap{position:relative;width:220px;height:130px;}
.cassette-body{
  width:220px;height:130px;
  background:linear-gradient(160deg,#1c1008 0%,#0e0804 50%,#181008 100%);
  border:2px solid #3a2010;border-radius:10px;position:relative;
  box-shadow:0 4px 20px rgba(0,0,0,0.8),inset 0 1px 0 rgba(255,180,80,0.08),0 0 0 1px #2a1808;
}
.cassette-window{
  position:absolute;top:18px;left:50%;transform:translateX(-50%);
  width:130px;height:52px;background:#030303;
  border:1px solid #2a1808;border-radius:5px;overflow:hidden;
  box-shadow:inset 0 2px 8px rgba(0,0,0,0.9);
}
.tape-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,#1a0a04 0%,#060302 100%);}
.reel{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;}
.reel-left{left:8px;}.reel-right{right:8px;}
.reel-outer{
  width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#3a2010,#0e0804);
  border:1px solid #4a2810;position:relative;
}
.reel.spinning .reel-outer{animation:reel-spin 1.2s linear infinite;}
.reel-spoke{
  position:absolute;top:50%;left:50%;width:2px;height:13px;
  background:linear-gradient(to bottom,#6b3a1a,#2a1208);
  transform-origin:50% 100%;border-radius:1px;
}
.reel-spoke:nth-child(1){transform:translate(-50%,-100%) rotate(0deg);}
.reel-spoke:nth-child(2){transform:translate(-50%,-100%) rotate(60deg);}
.reel-spoke:nth-child(3){transform:translate(-50%,-100%) rotate(120deg);}
.reel-spoke:nth-child(4){transform:translate(-50%,-100%) rotate(180deg);}
.reel-spoke:nth-child(5){transform:translate(-50%,-100%) rotate(240deg);}
.reel-spoke:nth-child(6){transform:translate(-50%,-100%) rotate(300deg);}
.reel-hub{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:10px;height:10px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#8b4a22,#2a1208);border:1px solid #6b3a1a;
}
.tape-path{
  position:absolute;bottom:5px;left:18px;right:18px;height:4px;
  background:linear-gradient(to bottom,#2a1808,#1a0e06);border-radius:2px;
}
@keyframes reel-spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

.cassette-label{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  width:155px;height:28px;
  background:linear-gradient(135deg,#1a0e08,#120a04);
  border:1px solid #3a2010;border-radius:3px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
}
.label-top{font-size:7px;letter-spacing:4px;color:var(--am3);font-family:'Orbitron',sans-serif;font-weight:700;}
.label-bot{font-size:5px;letter-spacing:2px;color:#442200;}
.cassette-hole{position:absolute;width:7px;height:7px;border-radius:50%;background:#030303;border:1px solid #2a1808;}
.cassette-hole.tl{top:7px;left:7px;}.cassette-hole.tr{top:7px;right:7px;}
.cassette-hole.bl{bottom:7px;left:7px;}.cassette-hole.br{bottom:7px;right:7px;}

/* ── TRANSPORT ── */
.transport-bar{display:flex;gap:8px;align-items:center;margin-top:14px;}
.t-btn{
  width:32px;height:32px;
  background:linear-gradient(145deg,#1c1008,#0e0804);
  border:1px solid #3a2010;border-radius:50%;color:var(--am3);font-size:11px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
  box-shadow:0 2px 6px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,180,80,0.05);
}
.t-btn:hover{color:var(--am2);border-color:var(--am3);box-shadow:0 0 10px var(--amg);}
.t-btn.play-btn{width:42px;height:42px;font-size:14px;background:linear-gradient(145deg,#2a1808,#1a0e04);border-color:var(--am3);color:var(--am);}
.t-btn.play-btn.active{background:linear-gradient(145deg,#3a2008,#2a1404);color:var(--am2);box-shadow:0 0 14px var(--amg),inset 0 1px 0 rgba(255,200,0,0.1);}
.t-btn.stop-btn{color:#664422;}.t-btn.stop-btn:hover{color:#ff6644;}

/* ── STATUS ── */
.status-row{display:flex;gap:6px;align-items:center;margin-top:10px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:#222;border:1px solid #333;transition:all .3s;}
.status-dot.on{background:var(--am);box-shadow:0 0 6px var(--am);animation:dot-pulse 1.5s ease-in-out infinite;}
@keyframes dot-pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.status-txt{font-size:7px;letter-spacing:2px;color:#333;transition:color .3s;}
.status-txt.on{color:var(--am3);}

/* ── PRESETS BARRE ── */
.presets-row{
  display:flex;gap:5px;align-items:center;justify-content:center;
  margin:10px 0 6px;flex-wrap:wrap;
}
.preset-label{font-size:6px;letter-spacing:3px;color:#3a2010;width:100%;text-align:center;margin-bottom:4px;}
.preset-btn{
  font-family:'Orbitron',sans-serif;font-size:6px;letter-spacing:1px;
  padding:4px 8px;border-radius:3px;cursor:pointer;
  background:linear-gradient(145deg,#150d05,#0e0804);
  border:1px solid #3a2010;color:#664422;
  transition:all .18s;white-space:nowrap;
}
.preset-btn:hover{color:var(--am3);border-color:var(--am3);box-shadow:0 0 8px rgba(224,120,0,0.2);}
.preset-btn.active{
  color:var(--am2);border-color:var(--am2);
  background:linear-gradient(145deg,#2a1808,#1a0e04);
  box-shadow:0 0 10px rgba(255,200,0,0.25);
}

/* ── HAUT-PARLEUR (plus grand) ── */
.speaker-section{
  display:flex;align-items:center;justify-content:center;
  position:relative;padding:8px 0 2px;
}
.spk-cabinet{
  position:relative;width:230px;aspect-ratio:1;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#4a2810 0%,#2a1608 30%,#1a0e06 55%,#0e0804 80%,#080604 100%);
  border:2px solid #3a2010;
  box-shadow:inset 0 0 30px rgba(0,0,0,0.8);
  display:flex;align-items:center;justify-content:center;
  transition:box-shadow .3s;
}
.spk-cone{
  position:relative;width:75%;aspect-ratio:1;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#4a2810 0%,#2a1608 30%,#1a0e06 55%,#0e0804 80%,#080604 100%);
  border:2px solid #3a2010;
  box-shadow:inset 0 0 20px rgba(0,0,0,0.8);
  display:flex;align-items:center;justify-content:center;
}
.spk-cone::before{
  content:'';position:absolute;inset:12%;border-radius:50%;
  border:1px solid rgba(139,74,34,0.4);
  box-shadow:inset 0 0 12px rgba(0,0,0,0.6),0 0 0 8px rgba(74,36,16,0.2),0 0 0 16px rgba(58,32,16,0.1);
}
.spk-cone::after{content:'';position:absolute;inset:28%;border-radius:50%;border:1px solid rgba(107,58,26,0.3);}
/* Anneaux de cône supplémentaires */
.spk-ring1{position:absolute;inset:42%;border-radius:50%;border:1px solid rgba(90,50,20,0.25);}
.spk-ring2{position:absolute;inset:58%;border-radius:50%;border:1px solid rgba(80,44,18,0.2);}
.spk-dust{
  width:22%;aspect-ratio:1;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#6b3a1a,#1a0e06);
  border:1px solid #4a2810;box-shadow:0 2px 6px rgba(0,0,0,0.6);
  position:relative;z-index:1;
}
.spk-surround{
  position:absolute;inset:-4px;border-radius:50%;
  border:4px solid transparent;
  background:linear-gradient(#c4783a,#8b4a22,#4a2410,#8b4a22,#c4783a) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out;mask-composite:exclude;pointer-events:none;
}

/* ── ANIMATIONS MEMBRANE ── */
.spk-cabinet.playing .spk-cone{animation:var(--cone-anim, membrane-pulse) var(--cone-dur, 0.15s) ease-in-out infinite alternate;}

@keyframes membrane-pulse{from{transform:scale(1);}to{transform:scale(1.018);}}
@keyframes membrane-deep{from{transform:scale(1);}to{transform:scale(1.032);}}
@keyframes membrane-tremble{
  0%{transform:scale(1) rotate(0deg);}
  25%{transform:scale(1.012) rotate(0.3deg);}
  50%{transform:scale(1.02) rotate(0deg);}
  75%{transform:scale(1.008) rotate(-0.3deg);}
  100%{transform:scale(1) rotate(0deg);}
}
@keyframes membrane-thump{
  0%,100%{transform:scale(1);}
  10%{transform:scale(1.028);}
  30%{transform:scale(0.995);}
  60%{transform:scale(1.01);}
}
@keyframes membrane-flutter{
  0%,100%{transform:scale(1);}
  20%{transform:scale(1.022);}
  40%{transform:scale(1.004);}
  60%{transform:scale(1.018);}
  80%{transform:scale(0.998);}
}

.spk-cabinet.playing{
  box-shadow:0 0 0 6px #1a0f07,0 0 0 8px #3d1f0a,
             0 0 40px rgba(255,140,0,0.15),0 0 80px rgba(255,100,0,0.07);
}

/* ── ONDES SONORES ── */
.sound-waves{position:absolute;inset:0;pointer-events:none;border-radius:50%;overflow:visible;}
.wave-ring{
  position:absolute;border-radius:50%;
  opacity:0;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.4);
}

/* === PRESET : CLASSIC (cercles ambrés) === */
.preset-classic .wave-ring{border:1px solid var(--am3);}
.preset-classic.playing .wave-ring:nth-child(1){animation:wave-expand 2s ease-out infinite;}
.preset-classic.playing .wave-ring:nth-child(2){animation:wave-expand 2s ease-out .65s infinite;}
.preset-classic.playing .wave-ring:nth-child(3){animation:wave-expand 2s ease-out 1.3s infinite;}
.preset-classic.playing .wave-ring:nth-child(4){animation:wave-expand 2s ease-out 1.0s infinite;}
.preset-classic.playing .wave-ring:nth-child(5){display:none;}
.preset-classic.playing .wave-ring:nth-child(6){display:none;}
@keyframes wave-expand{
  0%{width:80px;height:80px;opacity:.55;}
  100%{width:400px;height:400px;opacity:0;}
}

/* === PRESET : PULSE (ondulations rapides denses) === */
.preset-pulse .wave-ring{border:2px solid var(--am);}
.preset-pulse.playing .wave-ring:nth-child(1){animation:wave-pulse 1.1s ease-out infinite;}
.preset-pulse.playing .wave-ring:nth-child(2){animation:wave-pulse 1.1s ease-out .18s infinite;}
.preset-pulse.playing .wave-ring:nth-child(3){animation:wave-pulse 1.1s ease-out .36s infinite;}
.preset-pulse.playing .wave-ring:nth-child(4){animation:wave-pulse 1.1s ease-out .55s infinite;}
.preset-pulse.playing .wave-ring:nth-child(5){animation:wave-pulse 1.1s ease-out .73s infinite;}
.preset-pulse.playing .wave-ring:nth-child(6){animation:wave-pulse 1.1s ease-out .91s infinite;}
@keyframes wave-pulse{
  0%{width:60px;height:60px;opacity:.7;border-width:2px;}
  100%{width:320px;height:320px;opacity:0;border-width:0.5px;}
}

/* === PRESET : DEEP BASS (lentes grandes ondes) === */
.preset-deep .wave-ring{border:1px solid var(--am3);border-color:rgba(255,80,0,0.7);}
.preset-deep.playing .wave-ring:nth-child(1){animation:wave-deep 3.5s cubic-bezier(.1,.6,.4,1) infinite;}
.preset-deep.playing .wave-ring:nth-child(2){animation:wave-deep 3.5s cubic-bezier(.1,.6,.4,1) 1.16s infinite;}
.preset-deep.playing .wave-ring:nth-child(3){animation:wave-deep 3.5s cubic-bezier(.1,.6,.4,1) 2.33s infinite;}
.preset-deep.playing .wave-ring:nth-child(4){display:none;}
.preset-deep.playing .wave-ring:nth-child(5){display:none;}
.preset-deep.playing .wave-ring:nth-child(6){display:none;}
@keyframes wave-deep{
  0%{width:100px;height:100px;opacity:.6;border-width:3px;}
  40%{opacity:.4;}
  100%{width:500px;height:500px;opacity:0;border-width:1px;}
}

/* === PRESET : SHARP (carrés arrondis / losanges) === */
.preset-sharp .wave-ring{border:1px solid var(--am2);border-radius:8px !important;}
.preset-sharp.playing .wave-ring:nth-child(1){animation:wave-sharp 1.6s ease-out infinite;}
.preset-sharp.playing .wave-ring:nth-child(2){animation:wave-sharp 1.6s ease-out .53s infinite;transform:translate(-50%,-50%) rotate(22deg) !important;}
.preset-sharp.playing .wave-ring:nth-child(3){animation:wave-sharp 1.6s ease-out 1.06s infinite;}
.preset-sharp.playing .wave-ring:nth-child(4){animation:wave-sharp 1.6s ease-out 1.3s infinite;transform:translate(-50%,-50%) rotate(22deg) !important;}
.preset-sharp.playing .wave-ring:nth-child(5){display:none;}
.preset-sharp.playing .wave-ring:nth-child(6){display:none;}
@keyframes wave-sharp{
  0%{width:70px;height:70px;opacity:.6;border-width:2px;}
  100%{width:380px;height:380px;opacity:0;border-width:0.5px;}
}

/* === PRESET : ECHO (double rebond) === */
.preset-echo .wave-ring{border:1px solid var(--am3);}
.preset-echo.playing .wave-ring:nth-child(1){animation:wave-echo 2.4s ease-in-out infinite;}
.preset-echo.playing .wave-ring:nth-child(2){animation:wave-echo2 2.4s ease-in-out .3s infinite;}
.preset-echo.playing .wave-ring:nth-child(3){animation:wave-echo 2.4s ease-in-out .8s infinite;}
.preset-echo.playing .wave-ring:nth-child(4){animation:wave-echo2 2.4s ease-in-out 1.1s infinite;}
.preset-echo.playing .wave-ring:nth-child(5){animation:wave-echo 2.4s ease-in-out 1.6s infinite;}
.preset-echo.playing .wave-ring:nth-child(6){animation:wave-echo2 2.4s ease-in-out 1.9s infinite;}
@keyframes wave-echo{
  0%{width:80px;height:80px;opacity:.55;}
  50%{width:220px;height:220px;opacity:.15;}
  65%{width:240px;height:240px;opacity:.2;}
  100%{width:420px;height:420px;opacity:0;}
}
@keyframes wave-echo2{
  0%{width:80px;height:80px;opacity:.35;}
  50%{width:200px;height:200px;opacity:.08;}
  65%{width:215px;height:215px;opacity:.12;}
  100%{width:380px;height:380px;opacity:0;}
}

/* === PRESET : RETRO (scanlines effet rétro) === */
.preset-retro .wave-ring{
  border:2px dashed rgba(255,140,0,0.6);
}
.preset-retro.playing .wave-ring:nth-child(1){animation:wave-retro 1.8s steps(8) infinite;}
.preset-retro.playing .wave-ring:nth-child(2){animation:wave-retro 1.8s steps(8) .6s infinite;}
.preset-retro.playing .wave-ring:nth-child(3){animation:wave-retro 1.8s steps(8) 1.2s infinite;}
.preset-retro.playing .wave-ring:nth-child(4){display:none;}
.preset-retro.playing .wave-ring:nth-child(5){display:none;}
.preset-retro.playing .wave-ring:nth-child(6){display:none;}
@keyframes wave-retro{
  0%{width:60px;height:60px;opacity:.7;}
  100%{width:350px;height:350px;opacity:0;}
}

/* VU-mètre décoratif */
.vu-row{
  display:flex;gap:3px;align-items:flex-end;height:24px;
  margin-top:12px;
}
.vu-bar{
  flex:1;border-radius:2px 2px 0 0;background:#1a0e06;
  border:1px solid #2a1808;transition:height .08s ease;
}

/* Séparateur décoratif */
.deco-line{
  width:100%;height:1px;
  background:linear-gradient(to right,transparent,#3a2010 30%,#3a2010 70%,transparent);
  margin:12px 0;
}
</style>
</head>
<body>
<div class="waveamp-root">

  <div class="app-title">WAVEAMP</div>
  <div class="app-sub">ÉDITION BOIS · CHROME IV</div>

  <div class="cabinet">

    <!-- CASSETTE -->
    <div class="cassette-section">
      <div class="now-playing-label">NOW PLAYING</div>
      <div class="now-playing-title" id="nowTitle">—</div>

      <div class="cassette-wrap">
        <div class="cassette-body">
          <div class="cassette-hole tl"></div><div class="cassette-hole tr"></div>
          <div class="cassette-hole bl"></div><div class="cassette-hole br"></div>
          <div class="cassette-window">
            <div class="tape-bg"></div>
            <div class="reel reel-left" id="reelLeft">
              <div class="reel-outer">
                <div class="reel-spoke"></div><div class="reel-spoke"></div><div class="reel-spoke"></div>
                <div class="reel-spoke"></div><div class="reel-spoke"></div><div class="reel-spoke"></div>
                <div class="reel-hub"></div>
              </div>
            </div>
            <div class="reel reel-right" id="reelRight">
              <div class="reel-outer">
                <div class="reel-spoke"></div><div class="reel-spoke"></div><div class="reel-spoke"></div>
                <div class="reel-spoke"></div><div class="reel-spoke"></div><div class="reel-spoke"></div>
                <div class="reel-hub"></div>
              </div>
            </div>
            <div class="tape-path"></div>
          </div>
          <div class="cassette-label">
            <div class="label-top">WAVEAMP</div>
            <div class="label-bot">ÉDITION BOIS · CHROME IV</div>
          </div>
        </div>
      </div>

      <div class="transport-bar">
        <button class="t-btn" id="btnRew" title="Retour">⏮</button>
        <button class="t-btn stop-btn" id="btnStop" title="Stop">■</button>
        <button class="t-btn play-btn" id="btnPlay" title="Lecture / Pause">▶</button>
        <button class="t-btn" id="btnFwd" title="Avance">⏭</button>
      </div>

      <div class="status-row">
        <div class="status-dot" id="statusDot"></div>
        <div class="status-txt" id="statusTxt">EN ATTENTE</div>
      </div>
    </div>

    <div class="deco-line"></div>

    <!-- HAUT-PARLEUR -->
    <div class="speaker-section">
      <div class="spk-cabinet preset-classic" id="spkCabinet">
        <div class="sound-waves">
          <div class="wave-ring"></div>
          <div class="wave-ring"></div>
          <div class="wave-ring"></div>
          <div class="wave-ring"></div>
          <div class="wave-ring"></div>
          <div class="wave-ring"></div>
        </div>
        <div class="spk-cone">
          <div class="spk-ring1"></div>
          <div class="spk-ring2"></div>
          <div class="spk-dust"></div>
        </div>
        <div class="spk-surround"></div>
      </div>
    </div>

    <!-- PRESETS -->
    <div class="presets-row">
      <div class="preset-label">PRESET ONDES</div>
      <button class="preset-btn active" data-preset="classic" data-cone-anim="membrane-pulse" data-cone-dur="0.15s">CLASSIC</button>
      <button class="preset-btn" data-preset="pulse" data-cone-anim="membrane-flutter" data-cone-dur="0.22s">PULSE</button>
      <button class="preset-btn" data-preset="deep" data-cone-anim="membrane-deep" data-cone-dur="0.35s">DEEP BASS</button>
      <button class="preset-btn" data-preset="sharp" data-cone-anim="membrane-tremble" data-cone-dur="0.12s">SHARP</button>
      <button class="preset-btn" data-preset="echo" data-cone-anim="membrane-pulse" data-cone-dur="0.28s">ECHO</button>
      <button class="preset-btn" data-preset="retro" data-cone-anim="membrane-thump" data-cone-dur="0.4s">RÉTRO</button>
    </div>

    <!-- VU-mètre -->
    <div class="vu-row" id="vuRow">
      <div class="vu-bar" style="height:4px"></div>
      <div class="vu-bar" style="height:4px"></div>
      <div class="vu-bar" style="height:4px"></div>
      <div class="vu-bar" style="height:4px"></div>
      <div class="vu-bar" style="height:4px"></div>
      <div class="vu-bar" style="height:4px"></div>
      <div class="vu-bar" style="height:4px"></div>
      <div class="vu-bar" style="height:4px"></div>
      <div class="vu-bar" style="height:4px"></div>
      <div class="vu-bar" style="height:4px"></div>
      <div class="vu-bar" style="height:4px"></div>
      <div class="vu-bar" style="height:4px"></div>
      <div class="vu-bar" style="height:4px"></div>
      <div class="vu-bar" style="height:4px"></div>
      <div class="vu-bar" style="height:4px"></div>
      <div class="vu-bar" style="height:4px"></div>
    </div>

  </div>
</div>

<script>
const spk       = document.getElementById('spkCabinet');
const reelL     = document.getElementById('reelLeft');
const reelR     = document.getElementById('reelRight');
const statusDot = document.getElementById('statusDot');
const statusTxt = document.getElementById('statusTxt');
const nowTitle  = document.getElementById('nowTitle');
const btnPlay   = document.getElementById('btnPlay');
const vuBars    = document.querySelectorAll('.vu-bar');

let isPlaying = false;
let vuTimer   = null;
let barsState = Array.from({length: vuBars.length}, () => 4);
let currentPreset = 'classic';
let currentConeAnim = 'membrane-pulse';
let currentConeDur  = '0.15s';

const tracks = [
  'CASSETTE A // FACE 1',
  'CHROME IV · PISTE 3',
  'BANDE ORIGINALE',
  'SESSION ANALOGIQUE',
  'ENREGISTREMENT LIVE',
];
let trackIdx = 0;

/* ── VU-MÈTRE ── */
function animateVu() {
  vuBars.forEach((bar, i) => {
    const target = isPlaying ? Math.floor(Math.random() * 22) + 2 : 4;
    barsState[i] += (target - barsState[i]) * 0.25;
    const h = Math.round(barsState[i]);
    bar.style.height = h + 'px';
    if (!isPlaying) {
      bar.style.background = '#1a0e06';
      bar.style.borderColor = '#2a1808';
    } else {
      const pct = h / 24;
      const r = Math.round(80 + 175 * pct);
      const g = Math.round(50 - 30 * pct);
      bar.style.background = `rgb(${r},${g},0)`;
      bar.style.borderColor = `rgb(${Math.min(255,r+40)},${g},0)`;
    }
  });
}

function startVu()  { if (!vuTimer) vuTimer = setInterval(animateVu, 60); }
function stopVu()   { clearInterval(vuTimer); vuTimer = null; barsState.fill(4); animateVu(); }

/* ── LECTURE / PAUSE ── */
function setPlaying(v) {
  isPlaying = v;
  if (v) {
    spk.classList.add('playing');
    spk.style.setProperty('--cone-anim', currentConeAnim);
    spk.style.setProperty('--cone-dur',  currentConeDur);
    reelL.classList.add('spinning');
    reelR.classList.add('spinning');
    statusDot.classList.add('on');
    statusTxt.classList.add('on');
    statusTxt.textContent = 'EN LECTURE';
    btnPlay.classList.add('active');
    btnPlay.textContent = '⏸';
    nowTitle.textContent = tracks[trackIdx % tracks.length];
    startVu();
  } else {
    spk.classList.remove('playing');
    reelL.classList.remove('spinning');
    reelR.classList.remove('spinning');
    statusDot.classList.remove('on');
    statusTxt.classList.remove('on');
    statusTxt.textContent = 'EN PAUSE';
    btnPlay.classList.remove('active');
    btnPlay.textContent = '▶';
    stopVu();
  }
}

btnPlay.addEventListener('click', () => setPlaying(!isPlaying));

document.getElementById('btnStop').addEventListener('click', () => {
  setPlaying(false);
  nowTitle.textContent = '—';
  statusTxt.textContent = 'EN ATTENTE';
});

document.getElementById('btnRew').addEventListener('click', () => {
  trackIdx = Math.max(0, trackIdx - 1);
  if (isPlaying) nowTitle.textContent = tracks[trackIdx % tracks.length];
});

document.getElementById('btnFwd').addEventListener('click', () => {
  trackIdx++;
  if (isPlaying) nowTitle.textContent = tracks[trackIdx % tracks.length];
});

/* ── PRESETS ── */
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const preset = btn.dataset.preset;
    currentConeAnim = btn.dataset.coneAnim;
    currentConeDur  = btn.dataset.coneDur;

    // Swap preset class
    spk.classList.remove('preset-classic','preset-pulse','preset-deep','preset-sharp','preset-echo','preset-retro');
    spk.classList.add('preset-' + preset);
    currentPreset = preset;

    // Update CSS vars si en lecture
    if (isPlaying) {
      spk.style.setProperty('--cone-anim', currentConeAnim);
      spk.style.setProperty('--cone-dur',  currentConeDur);
      // Restart cone animation
      const cone = spk.querySelector('.spk-cone');
      cone.style.animation = 'none';
      cone.offsetHeight;
      cone.style.animation = '';
    }

    // Bouton actif
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});
</script>
</body>
</html>
