<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Buffer</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f2ec;
      --ink: #1a1814;
      --mid: #8a857c;
      --line: #ddd9d0;
      --acc: #d63a2a;
      --acc2: #1a1814;
      --ok: #2a7a4a;
      --font-ui: 'Barlow Condensed', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%; background: var(--bg); color: var(--ink);
      font-family: var(--font-ui); -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    #app {
      max-width: 480px; margin: 0 auto;
      height: 100dvh; display: flex; flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 14px 18px 10px;
      border-bottom: 2px solid var(--ink);
      flex-shrink: 0;
    }
    .app-name {
      font-size: 28px; font-weight: 900; letter-spacing: 2px;
      text-transform: uppercase;
    }
    .meta {
      font-family: var(--font-mono); font-size: 11px;
      color: var(--mid); display: flex; gap: 12px; align-items: center;
    }
    .unsaved-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--acc); display: none;
    }
    .unsaved-dot.visible { display: block; }

    /* ── Textarea ── */
    .buffer-wrap {
      flex: 1; display: flex; flex-direction: column;
      min-height: 0; position: relative;
    }
    #buf {
      flex: 1; width: 100%; padding: 18px 18px;
      background: transparent; border: none; outline: none; resize: none;
      font-family: var(--font-mono); font-size: 16px; line-height: 1.65;
      color: var(--ink); caret-color: var(--acc);
    }
    #buf::placeholder { color: var(--line); }
    #buf::-webkit-scrollbar { width: 3px; }
    #buf::-webkit-scrollbar-thumb { background: var(--line); }

    /* ── Action buttons ── */
    .actions {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0; border-top: 2px solid var(--ink);
      flex-shrink: 0;
    }
    .btn {
      font-family: var(--font-ui); font-size: 22px; font-weight: 900;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 20px 12px; border: none; cursor: pointer;
      background: var(--bg); color: var(--ink);
      transition: background 0.1s, color 0.1s;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      position: relative;
    }
    .btn:not(:last-child) { border-right: 1px solid var(--line); }
    .btn + .btn { border-top: none; }
    .btn-sub { font-size: 10px; font-weight: 500; color: var(--mid); letter-spacing: 0.5px; font-family: var(--font-mono); }
    .btn:active { background: var(--ink); color: var(--bg); }
    .btn:active .btn-sub { color: var(--line); }
    .btn.copy { }
    .btn.paste { border-left: 1px solid var(--line); }
    .btn.push { border-top: 2px solid var(--ink); }
    .btn.clear { border-top: 2px solid var(--ink); border-left: 1px solid var(--line); }
    .btn.push:active { background: var(--ok); color: #fff; }
    .btn.clear:active { background: var(--acc); color: #fff; }

    /* ── History ── */
    .history-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px 6px;
      border-top: 2px solid var(--ink);
      flex-shrink: 0;
    }
    .hist-label {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--mid);
    }
    .hist-clear-btn {
      font-family: var(--font-ui); font-size: 11px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      background: none; border: none; color: var(--mid); cursor: pointer;
      padding: 2px 4px;
    }
    .hist-clear-btn:active { color: var(--acc); }

    .history-list {
      overflow-y: auto; flex-shrink: 0;
      max-height: 180px;
      border-top: 1px solid var(--line);
    }
    .hist-item {
      display: flex; align-items: stretch;
      border-bottom: 1px solid var(--line);
    }
    .hist-restore {
      flex: 1; text-align: left; background: none; border: none;
      padding: 11px 18px; cursor: pointer;
      font-family: var(--font-mono); font-size: 12px; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: flex; flex-direction: column; gap: 2px; align-items: flex-start;
    }
    .hist-restore:active { background: var(--ink); color: var(--bg); }
    .hist-text { overflow: hidden; text-overflow: ellipsis; max-width: 100%; white-space: nowrap; }
    .hist-time { font-size: 10px; color: var(--mid); }
    .hist-restore:active .hist-time { color: var(--line); }
    .hist-del {
      background: none; border: none; border-left: 1px solid var(--line);
      padding: 0 16px; cursor: pointer; color: var(--mid); font-size: 16px;
      flex-shrink: 0;
    }
    .hist-del:active { background: var(--acc); color: #fff; }

    .hist-empty {
      padding: 14px 18px; font-size: 12px; color: var(--line);
      font-family: var(--font-mono);
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 16px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--ink); color: var(--bg);
      font-family: var(--font-ui); font-size: 15px; font-weight: 700;
      letter-spacing: 1px; padding: 10px 22px; border-radius: 2px;
      opacity: 0; transition: opacity 0.18s, transform 0.18s;
      z-index: 99; pointer-events: none; white-space: nowrap;
      text-transform: uppercase;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div id="app">

  <div class="topbar">
    <div class="app-name">Buffer</div>
    <div class="meta">
      <span id="char-count">0c</span>
      <div class="unsaved-dot" id="dot"></div>
    </div>
  </div>

  <div class="buffer-wrap">
    <textarea id="buf" placeholder="Colle ou tape ici…" autocomplete="off" autocorrect="on" spellcheck="true"></textarea>
  </div>

  <div class="actions">
    <button class="btn copy" onclick="doCopy()">
      COPIER
      <span class="btn-sub">tout le buffer</span>
    </button>
    <button class="btn paste" onclick="doPaste()">
      COLLER
      <span class="btn-sub">remplace le buffer</span>
    </button>
    <button class="btn push" onclick="doPush()">
      PUSH →
      <span class="btn-sub">archive &amp; vide</span>
    </button>
    <button class="btn clear" onclick="doClear()">
      VIDER
      <span class="btn-sub">efface tout</span>
    </button>
  </div>

  <div class="history-header">
    <span class="hist-label">Historique</span>
    <button class="hist-clear-btn" onclick="clearHistory()">tout effacer</button>
  </div>
  <div class="history-list" id="hist-list"></div>

</div>

<div class="toast" id="toast"></div>

<script>
  const BUF_KEY  = 'buf_v1';
  const HIST_KEY = 'buf_hist_v1';

  const ta   = document.getElementById('buf');
  const dot  = document.getElementById('dot');
  const cc   = document.getElementById('char-count');

  let history = [];
  let saved   = '';
  let saveTimer;

  // ── Init ──
  (function init() {
    const stored = localStorage.getItem(BUF_KEY) || '';
    ta.value = stored;
    saved = stored;
    try { history = JSON.parse(localStorage.getItem(HIST_KEY)) || []; } catch { history = []; }
    updateMeta();
    renderHistory();
    ta.focus();
  })();

  // ── Auto-save ──
  ta.addEventListener('input', () => {
    updateMeta();
    dot.classList.add('visible');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(persist, 600);
  });

  function persist() {
    localStorage.setItem(BUF_KEY, ta.value);
    saved = ta.value;
    dot.classList.remove('visible');
  }

  function updateMeta() {
    const n = ta.value.length;
    cc.textContent = n > 999 ? (n/1000).toFixed(1)+'k' : n+'c';
  }

  // ── Actions ──
  async function doCopy() {
    const txt = ta.value;
    if (!txt.trim()) { toast('Buffer vide'); return; }
    try {
      await navigator.clipboard.writeText(txt);
      toast('✓ COPIÉ');
    } catch { toast('⚠ Refusé'); }
  }

  async function doPaste() {
    try {
      const txt = await navigator.clipboard.readText();
      if (!txt) { toast('Presse-papiers vide'); return; }
      ta.value = txt;
      ta.dispatchEvent(new Event('input'));
      persist();
      ta.focus();
      toast('✓ COLLÉ');
    } catch { toast('⚠ Refusé'); }
  }

  function doPush() {
    const txt = ta.value.trim();
    if (!txt) { toast('Buffer vide'); return; }
    pushToHistory(txt);
    ta.value = '';
    ta.dispatchEvent(new Event('input'));
    persist();
    ta.focus();
    toast('→ ARCHIVÉ');
  }

  function doClear() {
    if (!ta.value) return;
    ta.value = '';
    ta.dispatchEvent(new Event('input'));
    persist();
    ta.focus();
  }

  // ── History ──
  function pushToHistory(txt) {
    history.unshift({ txt, ts: Date.now() });
    if (history.length > 20) history = history.slice(0, 20);
    localStorage.setItem(HIST_KEY, JSON.stringify(history));
    renderHistory();
  }

  function restoreFromHistory(idx) {
    const item = history[idx];
    if (!item) return;
    if (ta.value.trim()) pushToHistory(ta.value.trim());
    ta.value = item.txt;
    ta.dispatchEvent(new Event('input'));
    persist();
    ta.focus();
    toast('← RESTAURÉ');
  }

  function deleteHistItem(idx) {
    history.splice(idx, 1);
    localStorage.setItem(HIST_KEY, JSON.stringify(history));
    renderHistory();
  }

  function clearHistory() {
    if (!history.length) return;
    history = [];
    localStorage.removeItem(HIST_KEY);
    renderHistory();
  }

  function fmtTime(ts) {
    const d = new Date(ts);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    if (sameDay) return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' }) + ' ' +
           d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  }

  function renderHistory() {
    const el = document.getElementById('hist-list');
    if (!history.length) {
      el.innerHTML = '<div class="hist-empty">— vide —</div>';
      return;
    }
    el.innerHTML = '';
    history.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'hist-item';
      row.innerHTML = `
        <button class="hist-restore" onclick="restoreFromHistory(${i})">
          <span class="hist-text">${esc(item.txt)}</span>
          <span class="hist-time">${fmtTime(item.ts)} · ${item.txt.length}c</span>
        </button>
        <button class="hist-del" onclick="deleteHistItem(${i})">✕</button>
      `;
      el.appendChild(row);
    });
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').slice(0, 60);
  }

  // ── Toast ──
  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
  }
</script>
</body>
</html>
