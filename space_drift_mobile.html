
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
#wrap{position:relative;width:100%;height:580px;overflow:hidden;border-radius:12px;background:#000;touch-action:none;}
canvas{display:block;width:100%;height:100%;}
#hud{position:absolute;top:12px;right:12px;font-family:monospace;font-size:9px;color:rgba(255,255,255,0.2);letter-spacing:1px;text-align:right;line-height:2;}
#label{position:absolute;top:12px;left:14px;font-family:monospace;font-size:9px;color:rgba(255,255,255,0.15);letter-spacing:3px;}
#sound-btn{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:5px 14px;font-family:monospace;font-size:10px;color:rgba(255,255,255,0.4);cursor:pointer;letter-spacing:2px;}
#joystick-zone{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:130px;height:130px;}
#jbase{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.03);}
#jthumb{position:absolute;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);left:43px;top:43px;transition:background .1s;}
#thrust-btn{position:absolute;bottom:40px;right:24px;width:56px;height:56px;border-radius:50%;background:rgba(100,160,255,0.1);border:1px solid rgba(100,160,255,0.3);display:flex;align-items:center;justify-content:center;font-size:20px;color:rgba(100,160,255,0.6);}
</style>
<div id="wrap">
<canvas id="c"></canvas>
<div id="label">DRIFT</div>
<div id="hud" id="hud"></div>
<button id="sound-btn">♪ SON</button>
<div id="joystick-zone">
  <div id="jbase"></div>
  <div id="jthumb"></div>
</div>
<div id="thrust-btn">▲</div>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('wrap');
const hud=document.getElementById('hud');
const jthumb=document.getElementById('jthumb');
const thrustBtn=document.getElementById('thrust-btn');
const soundBtn=document.getElementById('sound-btn');
let W,H;
function resize(){W=canvas.width=wrap.clientWidth;H=canvas.height=wrap.clientHeight;}
resize();
window.addEventListener('resize',resize);

let audioCtx=null,musicOn=false,nodes=[];
function startAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  musicOn=true;
  soundBtn.textContent='♪ ON';
  soundBtn.style.color='rgba(100,180,255,0.7)';
  playChipMusic();
}
function stopAudio(){
  if(!audioCtx)return;
  nodes.forEach(n=>{try{n.stop();}catch(e){}});
  nodes=[];
  musicOn=false;
  soundBtn.textContent='♪ SON';
  soundBtn.style.color='rgba(255,255,255,0.4)';
}
soundBtn.addEventListener('click',()=>{ musicOn?stopAudio():startAudio(); });

function makeOsc(type,freq,vol,detune=0){
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.type=type;
  o.frequency.value=freq;
  o.detune.value=detune;
  g.gain.value=vol;
  o.connect(g);g.connect(audioCtx.destination);
  o.start();
  nodes.push(o);
  return{osc:o,gain:g};
}

function playChipMusic(){
  if(!audioCtx||!musicOn)return;
  const scale=[110,130.8,146.8,164.8,196,220,261.6,293.7];
  const chords=[
    [0,2,4],[5,0,2],[3,5,0],[2,4,6]
  ];
  let ci=0,ni=0,step=0;
  const BPM=52;
  const beat=60/BPM;

  const bass=makeOsc('square',55,0.04);
  const pad1=makeOsc('triangle',110,0.025,+5);
  const pad2=makeOsc('triangle',110,0.025,-5);

  function playNote(){
    if(!musicOn)return;
    const chord=chords[ci];
    const note=scale[chord[ni%chord.length]];
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.type='square';
    o.frequency.value=note*2;
    g.gain.setValueAtTime(0,audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.035,audioCtx.currentTime+0.01);
    g.gain.linearRampToValueAtTime(0.015,audioCtx.currentTime+beat*0.3);
    g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+beat*0.9);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+beat);

    bass.osc.frequency.setTargetAtTime(scale[chord[0]]*0.5,audioCtx.currentTime,0.1);
    pad1.osc.frequency.setTargetAtTime(scale[chord[1%chord.length]],audioCtx.currentTime,0.3);
    pad2.osc.frequency.setTargetAtTime(scale[chord[2%chord.length]],audioCtx.currentTime,0.3);

    ni++;
    step++;
    if(step%4===0){ni=0;ci=(ci+1)%chords.length;}
    setTimeout(playNote,beat*1000);
  }
  playNote();
}

const ship={x:0,y:0,vx:0,vy:0,angle:-Math.PI/2,av:0};
let jx=0,jy=0,thrusting=false;
const JR=65,JT=22;

const joystickZone=document.getElementById('joystick-zone');
let jActive=false,jId=null,jOrigin={x:0,y:0};

function jPos(touch){
  const r=joystickZone.getBoundingClientRect();
  return{x:touch.clientX-r.left-JR,y:touch.clientY-r.top-JR};
}
joystickZone.addEventListener('touchstart',e=>{
  e.preventDefault();
  jActive=true;jId=e.touches[0].identifier;
  const p=jPos(e.touches[0]);
  const d=Math.sqrt(p.x*p.x+p.y*p.y);
  const f=Math.min(d,JT)/Math.max(d,1);
  jx=p.x*f/JT;jy=p.y*f/JT;
  jthumb.style.left=(JR+p.x*f-22)+'px';
  jthumb.style.top=(JR+p.y*f-22)+'px';
},{passive:false});
joystickZone.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(let i=0;i<e.touches.length;i++){
    if(e.touches[i].identifier===jId){
      const p=jPos(e.touches[i]);
      const d=Math.sqrt(p.x*p.x+p.y*p.y);
      const f=Math.min(d,JT)/Math.max(d,1);
      jx=p.x*f/JT;jy=p.y*f/JT;
      jthumb.style.left=(JR+p.x*f-22)+'px';
      jthumb.style.top=(JR+p.y*f-22)+'px';
    }
  }
},{passive:false});
joystickZone.addEventListener('touchend',e=>{
  e.preventDefault();
  jActive=false;jx=0;jy=0;
  jthumb.style.left='43px';jthumb.style.top='43px';
},{passive:false});

thrustBtn.addEventListener('touchstart',e=>{e.preventDefault();thrusting=true;},{passive:false});
thrustBtn.addEventListener('touchend',e=>{e.preventDefault();thrusting=false;},{passive:false});
thrustBtn.addEventListener('mousedown',()=>thrusting=true);
thrustBtn.addEventListener('mouseup',()=>thrusting=false);

const STARS=[];
for(let i=0;i<250;i++){
  STARS.push({x:(Math.random()-0.5)*9000,y:(Math.random()-0.5)*9000,r:Math.random()*1.5+0.2,tw:Math.random()*Math.PI*2,ts:0.005+Math.random()*0.018,col:Math.random()<0.07?`hsl(${200+Math.random()*60},80%,80%)`:Math.random()<0.05?`hsl(${30+Math.random()*20},70%,85%)`:'#fff'});
}
const NEBS=[];
for(let i=0;i<7;i++){
  NEBS.push({x:(Math.random()-0.5)*7000,y:(Math.random()-0.5)*7000,rx:200+Math.random()*320,ry:130+Math.random()*220,hue:Math.floor(Math.random()*4)*40+170,alpha:0.025+Math.random()*0.035});
}
const ASTS=[];
for(let i=0;i<30;i++){
  const pts=[],n=7+Math.floor(Math.random()*5);
  for(let j=0;j<n;j++) pts.push({a:j/n*Math.PI*2,r:16+Math.random()*18});
  ASTS.push({x:(Math.random()-0.5)*6000,y:(Math.random()-0.5)*6000,pts,rot:Math.random()*Math.PI*2,rs:(Math.random()-0.5)*0.003,sz:0.7+Math.random()*0.9});
}
const PLANETS=[
  {x:900,y:-700,r:60,hue:210,ring:true},
  {x:-1400,y:800,r:40,hue:35,ring:false},
  {x:2400,y:500,r:30,hue:165,ring:false},
  {x:-3000,y:-1600,r:75,hue:275,ring:true},
];

function drawShip(cx,cy,ang,thrusting){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(ang);
  ctx.beginPath();ctx.moveTo(16,0);ctx.lineTo(-11,9);ctx.lineTo(-7,0);ctx.lineTo(-11,-9);ctx.closePath();
  ctx.fillStyle='rgba(200,220,255,0.92)';ctx.fill();
  ctx.strokeStyle='rgba(150,180,255,0.4)';ctx.lineWidth=0.5;ctx.stroke();
  ctx.beginPath();ctx.moveTo(-5,0);ctx.lineTo(-13,6);ctx.lineTo(-10,0);ctx.lineTo(-13,-6);ctx.closePath();
  ctx.fillStyle='rgba(150,180,220,0.65)';ctx.fill();
  if(thrusting){
    ctx.beginPath();ctx.moveTo(-7,0);ctx.lineTo(-15+Math.random()*4,5);ctx.lineTo(-20+Math.random()*7,0);ctx.lineTo(-15+Math.random()*4,-5);ctx.closePath();
    ctx.fillStyle='rgba(80,160,255,0.65)';ctx.fill();
  }
  ctx.restore();
}

let camX=0,camY=0,camVx=0,camVy=0;

function frame(){
  requestAnimationFrame(frame);
  resize();
  const DRAG=0.986,TURN=0.003,THRUST=0.045;

  if(jActive&&(Math.abs(jx)>0.1||Math.abs(jy)>0.1)){
    const targetAngle=Math.atan2(jy,jx);
    let da=targetAngle-ship.angle;
    while(da>Math.PI)da-=Math.PI*2;
    while(da<-Math.PI)da+=Math.PI*2;
    ship.av+=da*TURN;
  }
  if(thrusting){
    ship.vx+=Math.cos(ship.angle)*THRUST;
    ship.vy+=Math.sin(ship.angle)*THRUST;
  }
  ship.av*=0.90;ship.angle+=ship.av;
  ship.vx*=DRAG;ship.vy*=DRAG;
  const spd=Math.sqrt(ship.vx*ship.vx+ship.vy*ship.vy);
  if(spd>3){const f=3/spd;ship.vx*=f;ship.vy*=f;}
  ship.x+=ship.vx;ship.y+=ship.vy;
  camVx+=(ship.x-camX)*0.04;camVy+=(ship.y-camY)*0.04;
  camVx*=0.82;camVy*=0.82;
  camX+=camVx;camY+=camVy;

  ctx.fillStyle='#030608';ctx.fillRect(0,0,W,H);
  const ox=W/2-camX,oy=H/2-camY;

  NEBS.forEach(n=>{
    const gx=n.x+ox,gy=n.y+oy;
    if(gx<-n.rx*2||gx>W+n.rx*2||gy<-n.ry*2||gy>H+n.ry*2)return;
    ctx.save();ctx.globalAlpha=n.alpha;
    const g=ctx.createRadialGradient(gx,gy,0,gx,gy,n.rx);
    g.addColorStop(0,`hsl(${n.hue},65%,55%)`);g.addColorStop(1,'transparent');
    ctx.scale(1,n.ry/n.rx);ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(gx,gy*(n.rx/n.ry),n.rx,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  STARS.forEach(s=>{
    s.tw+=s.ts;
    const sx=s.x+ox,sy=s.y+oy;
    if(sx<-5||sx>W+5||sy<-5||sy>H+5)return;
    ctx.globalAlpha=0.3+0.7*Math.abs(Math.sin(s.tw));
    ctx.fillStyle=s.col;ctx.beginPath();ctx.arc(sx,sy,s.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  PLANETS.forEach(p=>{
    const px=p.x+ox,py=p.y+oy;
    if(px<-200||px>W+200||py<-200||py>H+200)return;
    ctx.save();
    const g=ctx.createRadialGradient(px-p.r*0.3,py-p.r*0.3,p.r*0.1,px,py,p.r);
    g.addColorStop(0,`hsl(${p.hue},50%,55%)`);g.addColorStop(1,`hsl(${p.hue},40%,18%)`);
    ctx.beginPath();ctx.arc(px,py,p.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    if(p.ring){
      ctx.save();ctx.translate(px,py);ctx.scale(1,0.25);
      ctx.beginPath();ctx.arc(0,0,p.r*1.85,0,Math.PI*2);
      ctx.strokeStyle=`hsla(${p.hue},40%,65%,0.3)`;ctx.lineWidth=p.r*0.32;ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  });

  ASTS.forEach(a=>{
    a.rot+=a.rs;
    const ax=a.x+ox,ay=a.y+oy;
    if(ax<-80||ax>W+80||ay<-80||ay>H+80)return;
    ctx.save();ctx.translate(ax,ay);ctx.rotate(a.rot);ctx.scale(a.sz,a.sz);
    ctx.beginPath();
    a.pts.forEach((p,i)=>{const px=Math.cos(p.a)*p.r,py=Math.sin(p.a)*p.r;i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);});
    ctx.closePath();ctx.fillStyle='rgba(85,80,75,0.88)';ctx.strokeStyle='rgba(125,115,105,0.35)';ctx.lineWidth=1;ctx.fill();ctx.stroke();
    ctx.restore();
  });

  drawShip(W/2,H/2,ship.angle,thrusting);
  hud.textContent=`${spd.toFixed(1)} u/s`;
}
frame();
</script>
