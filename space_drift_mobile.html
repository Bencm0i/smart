
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
body{background:#000;}
#wrap{position:relative;width:100%;background:#000;touch-action:none;}
canvas{display:block;width:100%;height:100%;}
#hud{position:absolute;top:10px;right:12px;font-family:monospace;font-size:9px;color:rgba(255,255,255,0.18);letter-spacing:1px;line-height:2;pointer-events:none;}
#lbl{position:absolute;top:10px;left:12px;font-family:monospace;font-size:9px;color:rgba(255,255,255,0.12);letter-spacing:3px;pointer-events:none;}
#snd{position:absolute;top:8px;left:50%;transform:translateX(-50%);padding:5px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:20px;font-family:monospace;font-size:10px;color:rgba(255,255,255,0.35);cursor:pointer;letter-spacing:2px;}
#jzone{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);}
#jbase{width:120px;height:120px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.02);}
#jstick{position:absolute;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);top:36px;left:36px;}
</style>
<div id="wrap">
<canvas id="c"></canvas>
<div id="lbl">DRIFT</div>
<div id="hud" id="hud"></div>
<button id="snd">♪ SON</button>
<div id="jzone">
  <div id="jbase"></div>
  <div id="jstick"></div>
</div>
</div>
<script>
const wrap=document.getElementById('wrap');
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const hud=document.getElementById('hud');
const sndBtn=document.getElementById('snd');
const jzone=document.getElementById('jzone');
const jstick=document.getElementById('jstick');

function setSize(){
  const h=Math.max(window.innerHeight,window.screen.height,500);
  wrap.style.height=h+'px';
  canvas.width=wrap.clientWidth;
  canvas.height=h;
}
setSize();
window.addEventListener('resize',setSize);

let jx=0,jy=0,jActive=false,jTouchId=null;
const JRAD=60,SRAD=24;

function getJCenter(){
  const r=jzone.getBoundingClientRect();
  return{x:r.left+60,y:r.top+60};
}

jzone.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  jTouchId=t.identifier;
  jActive=true;
  updateJ(t);
},{passive:false});

document.addEventListener('touchmove',e=>{
  for(let i=0;i<e.changedTouches.length;i++){
    if(e.changedTouches[i].identifier===jTouchId){
      e.preventDefault();
      updateJ(e.changedTouches[i]);
    }
  }
},{passive:false});

document.addEventListener('touchend',e=>{
  for(let i=0;i<e.changedTouches.length;i++){
    if(e.changedTouches[i].identifier===jTouchId){
      jActive=false;jx=0;jy=0;jTouchId=null;
      jstick.style.left='36px';jstick.style.top='36px';
    }
  }
});

function updateJ(touch){
  const c=getJCenter();
  let dx=touch.clientX-c.x;
  let dy=touch.clientY-c.y;
  const d=Math.sqrt(dx*dx+dy*dy);
  if(d>JRAD){dx=dx/d*JRAD;dy=dy/d*JRAD;}
  jx=dx/JRAD;jy=dy/JRAD;
  jstick.style.left=(60+dx-SRAD)+'px';
  jstick.style.top=(60+dy-SRAD)+'px';
}

let audioCtx=null,musicOn=false,oscNodes=[];
sndBtn.addEventListener('click',()=>{
  if(!musicOn){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    musicOn=true;
    sndBtn.textContent='♪ ON';
    sndBtn.style.color='rgba(100,180,255,0.7)';
    startMusic();
  } else {
    oscNodes.forEach(n=>{try{n.stop();}catch(e){}});
    oscNodes=[];
    musicOn=false;
    sndBtn.textContent='♪ SON';
    sndBtn.style.color='rgba(255,255,255,0.35)';
  }
});

function mkOsc(type,freq,vol){
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.value=vol;
  o.connect(g);g.connect(audioCtx.destination);
  o.start();oscNodes.push(o);
  return{o,g};
}

function startMusic(){
  if(!audioCtx)return;
  const bass=mkOsc('square',55,0.04);
  const pad=mkOsc('triangle',110,0.02);
  const pad2=mkOsc('triangle',165,0.015);
  const scale=[110,130.8,146.8,164.8,196,220,261.6,293.7];
  const chords=[[0,2,4],[5,0,2],[3,5,0],[2,4,6]];
  let ci=0,ni=0,step=0;
  const beat=60/52*1000;
  function tick(){
    if(!musicOn)return;
    const ch=chords[ci];
    const freq=scale[ch[ni%ch.length]]*2;
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.type='square';o.frequency.value=freq;
    const now=audioCtx.currentTime;
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(0.032,now+0.01);
    g.gain.linearRampToValueAtTime(0.012,now+beat/1000*0.3);
    g.gain.linearRampToValueAtTime(0,now+beat/1000*0.85);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(now+beat/1000);
    bass.o.frequency.setTargetAtTime(scale[ch[0]]*0.5,now,0.1);
    pad.o.frequency.setTargetAtTime(scale[ch[1%ch.length]],now,0.4);
    pad2.o.frequency.setTargetAtTime(scale[ch[2%ch.length]],now,0.5);
    ni++;step++;
    if(step%4===0){ni=0;ci=(ci+1)%chords.length;}
    setTimeout(tick,beat);
  }
  tick();
}

const ship={x:0,y:0,vx:0,vy:0,angle:-Math.PI/2,av:0};
let camX=0,camY=0,camVx=0,camVy=0;

const STARS=[];
for(let i=0;i<280;i++) STARS.push({x:(Math.random()-.5)*10000,y:(Math.random()-.5)*10000,r:Math.random()*1.6+.2,tw:Math.random()*6.28,ts:.004+Math.random()*.018,col:Math.random()<.07?`hsl(${200+Math.random()*60},80%,80%)`:Math.random()<.05?`hsl(${20+Math.random()*30},70%,85%)`:'#fff'});
const NEBS=[];
for(let i=0;i<8;i++) NEBS.push({x:(Math.random()-.5)*8000,y:(Math.random()-.5)*8000,rx:200+Math.random()*350,ry:130+Math.random()*250,hue:150+Math.floor(Math.random()*5)*40,a:.02+Math.random()*.035});
const ASTS=[];
for(let i=0;i<32;i++){const pts=[],n=7+Math.floor(Math.random()*5);for(let j=0;j<n;j++)pts.push({a:j/n*6.28,r:14+Math.random()*20});ASTS.push({x:(Math.random()-.5)*7000,y:(Math.random()-.5)*7000,pts,rot:Math.random()*6.28,rs:(Math.random()-.5)*.003,sz:.7+Math.random()*.9});}
const PLANETS=[{x:900,y:-700,r:60,h:210,ring:true},{x:-1500,y:900,r:42,h:35,ring:false},{x:2500,y:600,r:32,h:160,ring:false},{x:-3200,y:-1500,r:78,h:275,ring:true}];

function drawShip(cx,cy,ang,thr){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(ang);
  ctx.beginPath();ctx.moveTo(16,0);ctx.lineTo(-11,9);ctx.lineTo(-7,0);ctx.lineTo(-11,-9);ctx.closePath();
  ctx.fillStyle='rgba(200,220,255,.92)';ctx.fill();
  ctx.strokeStyle='rgba(150,180,255,.4)';ctx.lineWidth=.5;ctx.stroke();
  ctx.beginPath();ctx.moveTo(-5,0);ctx.lineTo(-13,6);ctx.lineTo(-10,0);ctx.lineTo(-13,-6);ctx.closePath();
  ctx.fillStyle='rgba(150,180,220,.6)';ctx.fill();
  if(thr){
    ctx.beginPath();ctx.moveTo(-7,0);ctx.lineTo(-15+Math.random()*4,5);ctx.lineTo(-21+Math.random()*7,0);ctx.lineTo(-15+Math.random()*4,-5);ctx.closePath();
    ctx.fillStyle='rgba(80,160,255,.7)';ctx.fill();
  }
  ctx.restore();
}

function frame(){
  requestAnimationFrame(frame);
  const W=canvas.width,H=canvas.height;
  const DRAG=.987,THRUST=.05;

  const deadzone=.15;
  const mag=Math.sqrt(jx*jx+jy*jy);
  const thrusting=jActive&&mag>deadzone;

  if(jActive&&mag>deadzone){
    const targetAngle=Math.atan2(jy,jx);
    let da=targetAngle-ship.angle;
    while(da>Math.PI)da-=Math.PI*2;
    while(da<-Math.PI)da+=Math.PI*2;
    ship.av+=da*.004;
    if(mag>.4){
      ship.vx+=Math.cos(ship.angle)*THRUST*Math.min(mag,1);
      ship.vy+=Math.sin(ship.angle)*THRUST*Math.min(mag,1);
    }
  }

  ship.av*=.88;ship.angle+=ship.av;
  ship.vx*=DRAG;ship.vy*=DRAG;
  const spd=Math.sqrt(ship.vx*ship.vx+ship.vy*ship.vy);
  if(spd>3.5){const f=3.5/spd;ship.vx*=f;ship.vy*=f;}
  ship.x+=ship.vx;ship.y+=ship.vy;
  camVx+=(ship.x-camX)*.04;camVy+=(ship.y-camY)*.04;
  camVx*=.82;camVy*=.82;camX+=camVx;camY+=camVy;

  ctx.fillStyle='#030507';ctx.fillRect(0,0,W,H);
  const ox=W/2-camX,oy=H/2-camY;

  NEBS.forEach(n=>{
    const gx=n.x+ox,gy=n.y+oy;
    if(gx<-n.rx*2||gx>W+n.rx*2||gy<-n.ry*2||gy>H+n.ry*2)return;
    ctx.save();ctx.globalAlpha=n.a;
    const g=ctx.createRadialGradient(gx,gy,0,gx,gy,n.rx);
    g.addColorStop(0,`hsl(${n.hue},60%,50%)`);g.addColorStop(1,'transparent');
    ctx.scale(1,n.ry/n.rx);ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(gx,gy*(n.rx/n.ry),n.rx,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  STARS.forEach(s=>{
    s.tw+=s.ts;
    const sx=s.x+ox,sy=s.y+oy;
    if(sx<-4||sx>W+4||sy<-4||sy>H+4)return;
    ctx.globalAlpha=.25+.75*Math.abs(Math.sin(s.tw));
    ctx.fillStyle=s.col;ctx.beginPath();ctx.arc(sx,sy,s.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  PLANETS.forEach(p=>{
    const px=p.x+ox,py=p.y+oy;
    if(px<-200||px>W+200||py<-200||py>H+200)return;
    ctx.save();
    const g=ctx.createRadialGradient(px-p.r*.3,py-p.r*.3,p.r*.1,px,py,p.r);
    g.addColorStop(0,`hsl(${p.h},50%,55%)`);g.addColorStop(1,`hsl(${p.h},40%,18%)`);
    ctx.beginPath();ctx.arc(px,py,p.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    if(p.ring){ctx.save();ctx.translate(px,py);ctx.scale(1,.25);ctx.beginPath();ctx.arc(0,0,p.r*1.85,0,Math.PI*2);ctx.strokeStyle=`hsla(${p.h},40%,65%,.3)`;ctx.lineWidth=p.r*.32;ctx.stroke();ctx.restore();}
    ctx.restore();
  });

  ASTS.forEach(a=>{
    a.rot+=a.rs;
    const ax=a.x+ox,ay=a.y+oy;
    if(ax<-80||ax>W+80||ay<-80||ay>H+80)return;
    ctx.save();ctx.translate(ax,ay);ctx.rotate(a.rot);ctx.scale(a.sz,a.sz);
    ctx.beginPath();a.pts.forEach((p,i)=>{const px=Math.cos(p.a)*p.r,py=Math.sin(p.a)*p.r;i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);});
    ctx.closePath();ctx.fillStyle='rgba(82,77,72,.88)';ctx.strokeStyle='rgba(120,110,100,.35)';ctx.lineWidth=1;ctx.fill();ctx.stroke();
    ctx.restore();
  });

  drawShip(W/2,H/2,ship.angle,thrusting);
  hud.textContent=spd.toFixed(1)+' u/s';
}
frame();
</script>
