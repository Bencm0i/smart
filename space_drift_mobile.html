
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;}
#w{position:relative;width:100%;background:#000;touch-action:none;}
canvas{display:block;width:100%;height:100%;}
#overlay{position:absolute;bottom:0;left:0;right:0;padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px;pointer-events:none;}
#planet-info{font-family:monospace;font-size:11px;color:rgba(255,200,80,.85);letter-spacing:2px;text-align:center;min-height:16px;}
#progress-bar{width:80%;max-width:300px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;}
#progress-fill{height:100%;background:rgba(255,200,80,.5);border-radius:2px;width:0%;transition:width .5s;}
#time-left{font-family:monospace;font-size:9px;color:rgba(255,255,255,.15);letter-spacing:2px;}
#snd{position:absolute;top:10px;left:50%;transform:translateX(-50%);padding:5px 16px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);border-radius:20px;font-family:monospace;font-size:10px;color:rgba(255,255,255,.3);cursor:pointer;letter-spacing:2px;pointer-events:all;}
#compass{position:absolute;top:10px;right:14px;font-family:monospace;font-size:9px;color:rgba(255,255,255,.2);line-height:2;text-align:right;}
#speed-info{position:absolute;top:10px;left:14px;font-family:monospace;font-size:9px;color:rgba(255,255,255,.15);letter-spacing:1px;line-height:2;}
</style>
<div id="w">
<canvas id="c"></canvas>
<div id="snd">♪ SON</div>
<div id="speed-info" id="speed-info"></div>
<div id="compass" id="compass"></div>
<div id="overlay">
  <div id="planet-info"></div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="time-left"></div>
</div>
</div>
<script>
const wrap=document.getElementById('w');
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const sndBtn=document.getElementById('snd');
const planetInfo=document.getElementById('planet-info');
const progressFill=document.getElementById('progress-fill');
const timeLeftEl=document.getElementById('time-left');
const compassEl=document.getElementById('compass');
const speedInfoEl=document.getElementById('speed-info');

function setSize(){
  const h=Math.max(window.innerHeight,560);
  wrap.style.height=h+'px';
  canvas.width=wrap.clientWidth;
  canvas.height=wrap.clientHeight;
}
setSize();
window.addEventListener('resize',setSize);

// Distances réelles en UA, normalisées pour le voyage
const PLANETS_DATA=[
  {name:'TERRE',    au:1,    r:8,  color:'#4a9eff', glow:'#2060c0', hasRing:false, desc:'DÉPART · TERRE'},
  {name:'MARS',     au:1.52, r:6,  color:'#e05020', glow:'#802010', hasRing:false, desc:'MARS · 228M KM'},
  {name:'JUPITER',  au:5.2,  r:22, color:'#c8a060', glow:'#806030', hasRing:false, desc:'JUPITER · 778M KM', bands:true},
  {name:'SATURNE',  au:9.58, r:18, color:'#d4b870', glow:'#907040', hasRing:true,  desc:'SATURNE · 1.4B KM'},
  {name:'URANUS',   au:19.2, r:12, color:'#7ad0d8', glow:'#408890', hasRing:true,  desc:'URANUS · 2.9B KM'},
  {name:'NEPTUNE',  au:30.1, r:11, color:'#3050e0', glow:'#2030a0', hasRing:false, desc:'NEPTUNE · 4.5B KM'},
];

// Soleil au début du voyage
const SUN_AU=-2;
// Neptune à 30 UA → voyage de ~32 UA
const TOTAL_AU=32.5;
const VOYAGE_DURATION=20*60*1000; // 20 minutes en ms

// Conversion UA → position monde
// On voyage vers le haut (y décroît)
// 1 AU = px dépend de la hauteur d'écran
function auToWorld(au){
  return au * 2000; // 1 AU = 2000px
}

// Position du vaisseau en UA au fil du temps
// Progression non linéaire : accélération douce au début, décélération à l'arrivée
let startTime=Date.now();
function getProgress(){
  const elapsed=Date.now()-startTime;
  const t=Math.min(elapsed/VOYAGE_DURATION,1);
  // Easing : début lent, milieu rapide, fin lente
  const eased = t<0.1 ? t*t*50 : t>0.9 ? 1-(1-t)*(1-t)*50 : 0.05+0.9*(t-0.1)/0.8;
  return Math.min(eased,1);
}

function getShipAU(){
  return 1 + getProgress()*29.1; // Terre(1) → Neptune(30.1)
}

// Étoiles
const STARS=[];
for(let i=0;i<350;i++){
  STARS.push({
    x:(Math.random()-.5)*3000,
    y:(Math.random()-.5)*80000,
    r:Math.random()*1.4+.15,
    tw:Math.random()*6.28,
    ts:.003+Math.random()*.015,
    col:Math.random()<.06?`hsl(${200+Math.random()*60},70%,80%)`:Math.random()<.04?`hsl(${20+Math.random()*30},60%,85%)`:'#fff',
    bright:.3+Math.random()*.7
  });
}

// Nébuleuses lointaines
const NEBS=[];
for(let i=0;i<5;i++){
  NEBS.push({
    x:(Math.random()-.5)*2400,
    y:-5000-Math.random()*60000,
    rx:300+Math.random()*400,
    ry:200+Math.random()*300,
    hue:150+Math.floor(Math.random()*5)*40,
    a:.015+Math.random()*.025
  });
}

// Audio
let audioCtx=null,musicOn=false,oscNodes=[];
sndBtn.addEventListener('click',()=>{
  if(!musicOn){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    musicOn=true;
    sndBtn.textContent='♪ ON';
    sndBtn.style.color='rgba(100,180,255,.7)';
    startMusic();
  } else {
    oscNodes.forEach(n=>{try{n.stop();}catch(e){}});
    oscNodes=[];musicOn=false;
    sndBtn.textContent='♪ SON';
    sndBtn.style.color='rgba(255,255,255,.3)';
  }
});

function mkO(type,freq,vol){
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.value=vol;
  o.connect(g);g.connect(audioCtx.destination);o.start();oscNodes.push(o);return{o,g};
}
function startMusic(){
  if(!audioCtx)return;
  const bass=mkO('triangle',55,.03);
  const pad1=mkO('triangle',82.4,.018);
  const pad2=mkO('sine',110,.015);
  const scale=[82.4,92.5,110,123.5,138.6,164.8,185,220];
  const chords=[[0,2,4],[5,0,2],[3,5,0],[1,3,5]];
  let ci=0,ni=0,step=0;
  function tick(){
    if(!musicOn)return;
    const ch=chords[ci];
    const f=scale[ch[ni%ch.length]]*2;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='square';o.frequency.value=f;
    const now=audioCtx.currentTime;
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(.025,now+.012);
    g.gain.linearRampToValueAtTime(.008,now+1);
    g.gain.linearRampToValueAtTime(0,now+1.8);
    o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(now+2);
    bass.o.frequency.setTargetAtTime(scale[ch[0]]*.5,now,.15);
    pad1.o.frequency.setTargetAtTime(scale[ch[1%ch.length]],now,.5);
    pad2.o.frequency.setTargetAtTime(scale[ch[2%ch.length]]*.75,now,.6);
    ni++;step++;if(step%4===0){ni=0;ci=(ci+1)%chords.length;}
    setTimeout(tick,1800);
  }
  tick();
}

function drawPlanet(px,py,p,screenW){
  ctx.save();
  // Glow
  const grd=ctx.createRadialGradient(px,py,0,px,py,p.r*3);
  grd.addColorStop(0,p.glow+'55');grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;ctx.beginPath();ctx.arc(px,py,p.r*3,0,Math.PI*2);ctx.fill();
  // Corps
  const bg=ctx.createRadialGradient(px-p.r*.3,py-p.r*.35,p.r*.05,px,py,p.r);
  bg.addColorStop(0,lighten(p.color,.4));bg.addColorStop(.6,p.color);bg.addColorStop(1,darken(p.color,.5));
  ctx.beginPath();ctx.arc(px,py,p.r,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();
  // Bandes Jupiter
  if(p.bands){
    for(let b=0;b<5;b++){
      const by=py-p.r+b*(p.r*2/5)+p.r*.1;
      const bh=p.r*.15;
      const bw=Math.sqrt(Math.max(0,p.r*p.r-(by-py)*(by-py)));
      if(bw>0){ctx.beginPath();ctx.ellipse(px,by,bw,bh,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.12)';ctx.fill();}
    }
  }
  // Anneaux
  if(p.hasRing){
    ctx.save();ctx.translate(px,py);ctx.scale(1,.28);
    ctx.beginPath();ctx.arc(0,0,p.r*2.1,0,Math.PI*2);
    ctx.strokeStyle=p.color+'60';ctx.lineWidth=p.r*.38;ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,p.r*1.65,0,Math.PI*2);
    ctx.strokeStyle=p.color+'30';ctx.lineWidth=p.r*.15;ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}

function lighten(hex,f){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+f*255|0)},${Math.min(255,g+f*255|0)},${Math.min(255,b+f*255|0)})`;
}
function darken(hex,f){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${r*f|0},${g*f|0},${b*f|0})`;
}

function drawSun(ox,oy,shipAU){
  const sunWorldY=-auToWorld(SUN_AU+2);
  const sunScreenX=ox;
  const sunScreenY=oy+sunWorldY;
  if(sunScreenY>canvas.height*2||sunScreenY<-canvas.height)return;
  // Halo solaire
  const g=ctx.createRadialGradient(sunScreenX,sunScreenY,0,sunScreenX,sunScreenY,200);
  g.addColorStop(0,'rgba(255,240,180,.8)');
  g.addColorStop(.3,'rgba(255,180,50,.3)');
  g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(sunScreenX,sunScreenY,200,0,Math.PI*2);ctx.fill();
  // Corps
  const s=ctx.createRadialGradient(sunScreenX,sunScreenY,0,sunScreenX,sunScreenY,60);
  s.addColorStop(0,'#fffde0');s.addColorStop(.5,'#ffcc00');s.addColorStop(1,'#ff8800');
  ctx.beginPath();ctx.arc(sunScreenX,sunScreenY,60,0,Math.PI*2);ctx.fillStyle=s;ctx.fill();
}

function drawShip(cx,cy){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(-Math.PI/2);
  ctx.beginPath();ctx.moveTo(14,0);ctx.lineTo(-9,7);ctx.lineTo(-6,0);ctx.lineTo(-9,-7);ctx.closePath();
  ctx.fillStyle='rgba(210,225,255,.93)';ctx.fill();
  ctx.strokeStyle='rgba(150,180,255,.4)';ctx.lineWidth=.5;ctx.stroke();
  // Réacteur
  ctx.beginPath();ctx.moveTo(-6,0);ctx.lineTo(-14+Math.random()*3,4);ctx.lineTo(-18+Math.random()*5,0);ctx.lineTo(-14+Math.random()*3,-4);ctx.closePath();
  ctx.fillStyle='rgba(80,160,255,.6)';ctx.fill();
  ctx.restore();
}

function drawDirectionIndicator(planet,planetWorldY,shipWorldY,W,H){
  const dy=planetWorldY-shipWorldY;
  const dist=Math.abs(dy);
  const distAU=(dist/2000).toFixed(1);
  if(dist<800)return; // assez proche, pas besoin
  const isAbove=dy<0;
  const x=W/2+(planet.name.length%2===0?-60:60);
  const y=isAbove?55:H-55;
  ctx.save();
  ctx.globalAlpha=.55;
  // Triangle indicateur
  ctx.beginPath();
  if(isAbove){ctx.moveTo(x,y-8);ctx.lineTo(x-6,y+2);ctx.lineTo(x+6,y+2);}
  else{ctx.moveTo(x,y+8);ctx.lineTo(x-6,y-2);ctx.lineTo(x+6,y-2);}
  ctx.fillStyle=planet.color;ctx.fill();
  ctx.font='7px monospace';ctx.fillStyle=planet.color;ctx.textAlign='center';
  ctx.fillText(planet.name,x,isAbove?y+14:y-5);
  ctx.fillStyle='rgba(255,255,255,.3)';
  ctx.fillText(distAU+' UA',x,isAbove?y+23:y-14);
  ctx.restore();
}

let lastShipAU=1;
let lastT=Date.now();

function frame(){
  requestAnimationFrame(frame);
  const W=canvas.width,H=canvas.height;
  const progress=getProgress();
  const shipAU=getShipAU();

  // Vitesse instantanée
  const now=Date.now();
  const dt=(now-lastT)/1000;
  const speedAUh=((shipAU-lastShipAU)/dt*3600).toFixed(0);
  lastShipAU=shipAU;lastT=now;

  // Fond
  ctx.fillStyle='#020406';ctx.fillRect(0,0,W,H);

  // Le vaisseau est toujours au centre écran
  // La caméra suit en Y
  const shipWorldY=-auToWorld(shipAU);
  const camY=shipWorldY;
  const ox=W/2;
  const oy=H/2-camY;

  // Nébuleuses
  NEBS.forEach(n=>{
    const sx=n.x+ox,sy=n.y+oy;
    if(sy<-n.ry*2||sy>H+n.ry*2)return;
    ctx.save();ctx.globalAlpha=n.a;
    const g=ctx.createRadialGradient(sx,sy,0,sx,sy,n.rx);
    g.addColorStop(0,`hsl(${n.hue},55%,45%)`);g.addColorStop(1,'transparent');
    ctx.scale(1,n.ry/n.rx);ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(sx,sy*(n.rx/n.ry),n.rx,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  // Étoiles
  STARS.forEach(s=>{
    s.tw+=s.ts;
    const sx=((s.x+ox)%W+W)%W;
    const sy=s.y+oy;
    if(sy<-4||sy>H+4)return;
    ctx.globalAlpha=(s.bright*.5+.5*Math.abs(Math.sin(s.tw)))*s.bright;
    ctx.fillStyle=s.col;ctx.beginPath();ctx.arc(sx,sy,s.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // Soleil
  drawSun(ox,oy,shipAU);

  // Planètes
  let nearestPlanet='';
  let nearestDist=Infinity;
  PLANETS_DATA.forEach((p,i)=>{
    const pWorldY=-auToWorld(p.au);
    const px=ox+(i%2===0?-30:30);
    const py=pWorldY+oy;
    if(py>H+150||py<-150){}
    else drawPlanet(px,py,p,W);
    // Indicateur directionnel
    drawDirectionIndicator(p,pWorldY,shipWorldY,W,H);
    // Planète la plus proche
    const d=Math.abs(p.au-shipAU);
    if(d<nearestDist){nearestDist=d;nearestPlanet=p;}
  });

  // Vaisseau
  drawShip(W/2,H/2);

  // HUD
  progressFill.style.width=(progress*100)+'%';
  const elapsed=Date.now()-startTime;
  const remaining=Math.max(0,VOYAGE_DURATION-elapsed);
  const rm=Math.floor(remaining/60000);
  const rs=Math.floor((remaining%60000)/1000);
  timeLeftEl.textContent=`NEPTUNE DANS ${rm}m ${rs<10?'0':''}${rs}s`;

  if(nearestDist<1.5){
    planetInfo.textContent=nearestPlanet.desc;
  } else {
    planetInfo.textContent=`${shipAU.toFixed(2)} UA DU SOLEIL`;
  }

  speedInfoEl.innerHTML=`${shipAU.toFixed(1)} UA<br>${(shipAU*149.6|0)} M KM`;

  if(progress>=1){
    planetInfo.textContent='ORBITE NEPTUNE · ARRIVÉE';
    timeLeftEl.textContent='FIN DU VOYAGE';
  }
}
frame();
</script>
