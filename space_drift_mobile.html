
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;}
#w{position:relative;width:100%;background:#000;}
canvas{display:block;width:100%;height:100%;}
#msg{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);width:85%;font-family:monospace;font-size:13px;color:rgba(255,220,120,.8);letter-spacing:2px;text-align:center;pointer-events:none;opacity:0;transition:opacity 2s;line-height:2;text-shadow:0 0 20px rgba(255,200,80,.4);}
#bot{position:absolute;bottom:0;left:0;right:0;padding:18px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;pointer-events:none;}
#pinfo{font-family:monospace;font-size:11px;color:rgba(255,200,80,.65);letter-spacing:2px;text-align:center;min-height:16px;}
#pbar{width:70%;max-width:260px;height:1px;background:rgba(255,255,255,.07);}
#pfill{height:100%;background:rgba(255,200,80,.45);width:0%;transition:width 1s;}
#tleft{font-family:monospace;font-size:9px;color:rgba(255,255,255,.13);letter-spacing:2px;}
#snd{position:absolute;top:12px;left:50%;transform:translateX(-50%);padding:7px 20px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.12);border-radius:24px;font-family:monospace;font-size:11px;color:rgba(255,255,255,.35);cursor:pointer;letter-spacing:2px;}
#dist{position:absolute;top:14px;left:14px;font-family:monospace;font-size:9px;color:rgba(255,255,255,.13);letter-spacing:1px;line-height:2;}
</style>
<div id="w">
<canvas id="c"></canvas>
<div id="msg"></div>
<div id="snd">♪ SON</div>
<div id="dist" id="dist"></div>
<div id="bot">
  <div id="pinfo"></div>
  <div id="pbar"><div id="pfill"></div></div>
  <div id="tleft"></div>
</div>
</div>
<script>
const wrap=document.getElementById('w');
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const msgEl=document.getElementById('msg');
const pinfo=document.getElementById('pinfo');
const pfill=document.getElementById('pfill');
const tleft=document.getElementById('tleft');
const sndBtn=document.getElementById('snd');
const distEl=document.getElementById('dist');

function setSize(){
  const h=Math.max(window.innerHeight,600);
  wrap.style.height=h+'px';
  canvas.width=wrap.clientWidth;
  canvas.height=wrap.clientHeight;
}
setSize();
window.addEventListener('resize',setSize);

const VOYAGE_MS=20*60*1000;
const startTime=Date.now();
function getProgress(){
  const t=Math.min((Date.now()-startTime)/VOYAGE_MS,1);
  if(t<0.05)return t*t*4;
  if(t>0.95)return 1-(1-t)*(1-t)*4;
  return 0.01+(t-0.05)*0.98/0.9;
}
function getShipAU(){return 1+getProgress()*29.1;}

const PL=[
  {name:'TERRE',   au:1,    r:28, col:'#4a9eff',glow:'#1a50a0',ring:false,bands:false,desc:'DÉPART · BONNE NUIT'},
  {name:'MARS',    au:1.52, r:20, col:'#e05020',glow:'#701808',ring:false,bands:false,desc:'MARS · DÉSERT ROUGE'},
  {name:'JUPITER', au:5.2,  r:62, col:'#c8a060',glow:'#705828',ring:false,bands:true, desc:'JUPITER · GÉANTE GAZEUSE'},
  {name:'SATURNE', au:9.58, r:52, col:'#d4b870',glow:'#907040',ring:true, bands:false,desc:'SATURNE · ANNEAUX DE GLACE'},
  {name:'URANUS',  au:19.2, r:36, col:'#7ad0d8',glow:'#308890',ring:true, bands:false,desc:'URANUS · PLANÈTE DE GLACE'},
  {name:'NEPTUNE', au:30.1, r:34, col:'#3050e0',glow:'#1828a0',ring:false,bands:false,desc:'NEPTUNE · DESTINATION'},
];

const MSGS=[
  {au:1.05, t:'PILOTE AUTOMATIQUE\nENGAGÉ'},
  {au:1.3,  t:'TOUT VA BIEN\nBONNE NUIT'},
  {au:1.52, t:'APPROCHE DE MARS\n-63°C DEHORS'},
  {au:2.7,  t:'CEINTURE D\'ASTÉROÏDES\nNAVIGATION AUTO'},
  {au:3.8,  t:'VOUS DORMEZ\nPEUT-ÊTRE DÉJÀ...'},
  {au:5.0,  t:'APPROCHE DE JUPITER\nATTACHEZ VOS CEINTURES'},
  {au:5.2,  t:'JUPITER EN VUE\n1300 TERRES DEDANS'},
  {au:8.0,  t:'CAP MAINTENU\nLES ÉTOILES VEILLENT'},
  {au:9.3,  t:'APPROCHE DE SATURNE\nSES ANNEAUX BRILLENT'},
  {au:13.0, t:'ESPACE PROFOND\nTOUT EST CALME'},
  {au:18.9, t:'APPROCHE D\'URANUS\nFROID ET BLEU'},
  {au:24.0, t:'BIENTÔT NEPTUNE\nENCORE QUELQUES MINUTES'},
  {au:29.5, t:'APPROCHE FINALE\nNEPTUNE EN VUE'},
  {au:30.0, t:'ARRIVÉE À NEPTUNE\nBEAU VOYAGE'},
];
const shown=new Set();

function showMsg(text){
  msgEl.style.opacity='0';
  setTimeout(()=>{
    msgEl.innerHTML=text.replace('\n','<br>');
    msgEl.style.opacity='1';
    setTimeout(()=>{msgEl.style.opacity='0';},4000);
  },500);
}

// Étoiles
const STARS=[];
for(let i=0;i<300;i++) STARS.push({
  x:(Math.random()-.5)*3600,y:(Math.random()-.5)*95000,
  r:Math.random()*1.8+.2,tw:Math.random()*6.28,ts:.002+Math.random()*.01,
  col:Math.random()<.06?`hsl(${200+Math.random()*60},70%,80%)`:Math.random()<.04?`hsl(${20+Math.random()*30},60%,85%)`:'#fff',
  br:.25+Math.random()*.75
});

// Nébuleuses
const NEBS=[];
for(let i=0;i<7;i++) NEBS.push({
  x:(Math.random()-.5)*3000,y:-4000-Math.random()*75000,
  rx:280+Math.random()*450,ry:180+Math.random()*320,
  hue:150+Math.floor(Math.random()*5)*40,a:.018+Math.random()*.028
});

// Astéroïdes
const ASTS=[];
for(let i=0;i<35;i++){
  const pts=[],n=6+Math.floor(Math.random()*4);
  for(let j=0;j<n;j++) pts.push({a:j/n*6.28,r:10+Math.random()*18});
  const belt=i<22;
  ASTS.push({
    x:(Math.random()-.5)*(belt?1600:3200),
    y:belt?-(2.7*2200)+(Math.random()-.5)*700:-(Math.random()*55000+5000),
    pts,rot:Math.random()*6.28,rs:(Math.random()-.5)*.0025,sz:.6+Math.random()*.8
  });
}

// Audio vent spatial
let audioCtx=null,musicOn=false,nodes=[];
sndBtn.addEventListener('click',()=>{
  if(!musicOn){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    musicOn=true;sndBtn.textContent='♪ ON';sndBtn.style.color='rgba(100,200,255,.7)';
    startWind();
  } else {
    nodes.forEach(n=>{try{n.stop&&n.stop();n.disconnect&&n.disconnect();}catch(e){}});
    nodes=[];musicOn=false;sndBtn.textContent='♪ SON';sndBtn.style.color='rgba(255,255,255,.35)';
  }
});

function startWind(){
  const ac=audioCtx;

  // Reverb long
  const revLen=ac.sampleRate*4;
  const revBuf=ac.createBuffer(2,revLen,ac.sampleRate);
  for(let ch=0;ch<2;ch++){const d=revBuf.getChannelData(ch);for(let i=0;i<revLen;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/revLen,1.8)*0.6;}
  const rev=ac.createConvolver();rev.buffer=revBuf;
  const revGain=ac.createGain();revGain.gain.value=.7;
  rev.connect(revGain);revGain.connect(ac.destination);
  nodes.push(revGain);

  // Vent : bruit filtré
  function makeWind(freq,q,vol,lfoRate,lfoDepth){
    const bufLen=ac.sampleRate*3;
    const buf=ac.createBuffer(1,bufLen,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<bufLen;i++) d[i]=Math.random()*2-1;
    const src=ac.createBufferSource();src.buffer=buf;src.loop=true;
    const filt=ac.createBiquadFilter();filt.type='bandpass';filt.frequency.value=freq;filt.Q.value=q;
    const gain=ac.createGain();gain.gain.value=vol;
    // LFO sur le gain
    const lfo=ac.createOscillator();lfo.frequency.value=lfoRate;
    const lfoG=ac.createGain();lfoG.gain.value=lfoDepth;
    lfo.connect(lfoG);lfoG.connect(gain.gain);
    src.connect(filt);filt.connect(gain);gain.connect(rev);gain.connect(ac.destination);
    src.start();lfo.start();
    nodes.push(src);nodes.push(lfo);
    return{src,filt,gain,lfo,lfoG};
  }

  // Couches de vent
  makeWind(180,1.2,.06,.07,.04);   // vent grave profond
  makeWind(380,2.0,.04,.11,.025);  // sifflement moyen
  makeWind(720,3.5,.025,.17,.015); // aigu léger
  makeWind(95, .8,.05,.04,.03);    // souffle très grave

  // Drones spatiaux : notes qui respirent
  function drone(freq,vol,rate){
    const o=ac.createOscillator();o.type='sine';o.frequency.value=freq;
    const g=ac.createGain();g.gain.value=0;
    const lfo=ac.createOscillator();lfo.frequency.value=rate;
    const lg=ac.createGain();lg.gain.value=vol;
    lfo.connect(lg);lg.connect(g.gain);
    o.connect(g);g.connect(rev);g.connect(ac.destination);
    o.start();lfo.start();
    nodes.push(o);nodes.push(lfo);
  }
  drone(55,.032,.05);
  drone(82.4,.022,.07);
  drone(110,.018,.04);
  drone(146.8,.012,.06);
  drone(220,.008,.09);
}

function lighten(hex,f){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.min(255,r+f*255|0)},${Math.min(255,g+f*255|0)},${Math.min(255,b+f*255|0)})`;}
function darken(hex,f){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${r*f|0},${g*f|0},${b*f|0})`;}

function drawPlanet(px,py,p){
  ctx.save();
  const gr=ctx.createRadialGradient(px,py,0,px,py,p.r*4);
  gr.addColorStop(0,p.glow+'50');gr.addColorStop(1,'transparent');
  ctx.fillStyle=gr;ctx.beginPath();ctx.arc(px,py,p.r*4,0,Math.PI*2);ctx.fill();
  if(p.ring){
    ctx.save();ctx.translate(px,py);ctx.scale(1,.28);
    ctx.beginPath();ctx.arc(0,0,p.r*2.1,0,Math.PI*2);
    ctx.strokeStyle=p.col+'50';ctx.lineWidth=p.r*.42;ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,p.r*1.6,0,Math.PI*2);
    ctx.strokeStyle=p.col+'28';ctx.lineWidth=p.r*.18;ctx.stroke();
    ctx.restore();
  }
  const bg=ctx.createRadialGradient(px-p.r*.3,py-p.r*.35,p.r*.04,px,py,p.r);
  bg.addColorStop(0,lighten(p.col,.38));bg.addColorStop(.55,p.col);bg.addColorStop(1,darken(p.col,.4));
  ctx.beginPath();ctx.arc(px,py,p.r,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();
  if(p.bands){for(let b=0;b<5;b++){const by=py-p.r+b*(p.r*2/5)+p.r*.1;const bw=Math.sqrt(Math.max(0,p.r*p.r-(by-py)*(by-py)));if(bw>0){ctx.beginPath();ctx.ellipse(px,by,bw,p.r*.12,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.14)';ctx.fill();}}}
  ctx.restore();
}

function drawDir(p,pWY,shipWY,W,H,idx){
  const dy=pWY-shipWY;
  if(Math.abs(dy)<1200)return;
  const isAbove=dy<0;
  const slots=[.18,.34,.5,.66,.82];
  const x=W*slots[idx%slots.length];
  const y=isAbove?52:H-52;
  ctx.save();ctx.globalAlpha=.5;
  ctx.beginPath();
  if(isAbove){ctx.moveTo(x,y-9);ctx.lineTo(x-7,y+3);ctx.lineTo(x+7,y+3);}
  else{ctx.moveTo(x,y+9);ctx.lineTo(x-7,y-3);ctx.lineTo(x+7,y-3);}
  ctx.fillStyle=p.col;ctx.fill();
  ctx.font='bold 9px monospace';ctx.fillStyle=p.col;ctx.textAlign='center';
  ctx.fillText(p.name,x,isAbove?y+17:y-5);
  ctx.font='8px monospace';ctx.fillStyle='rgba(255,255,255,.28)';
  ctx.fillText((Math.abs(dy/2200).toFixed(1))+' UA',x,isAbove?y+27:y-15);
  ctx.restore();
}

function drawSun(ox,oy){
  const sy=2*2200+oy;
  if(sy<-400||sy>canvas.height+400)return;
  const g=ctx.createRadialGradient(ox,sy,0,ox,sy,260);
  g.addColorStop(0,'rgba(255,245,180,.9)');g.addColorStop(.2,'rgba(255,180,50,.4)');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(ox,sy,260,0,Math.PI*2);ctx.fill();
  const s=ctx.createRadialGradient(ox,sy,0,ox,sy,72);
  s.addColorStop(0,'#fffde0');s.addColorStop(.5,'#ffcc00');s.addColorStop(1,'#ff8800');
  ctx.beginPath();ctx.arc(ox,sy,72,0,Math.PI*2);ctx.fillStyle=s;ctx.fill();
}

function drawShip(cx,cy){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(-Math.PI/2);
  ctx.beginPath();ctx.moveTo(18,0);ctx.lineTo(-12,10);ctx.lineTo(-8,0);ctx.lineTo(-12,-10);ctx.closePath();
  ctx.fillStyle='rgba(210,225,255,.93)';ctx.fill();
  ctx.strokeStyle='rgba(150,180,255,.4)';ctx.lineWidth=.5;ctx.stroke();
  ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(-17+Math.random()*4,5);ctx.lineTo(-23+Math.random()*6,0);ctx.lineTo(-17+Math.random()*4,-5);ctx.closePath();
  ctx.fillStyle='rgba(80,160,255,.6)';ctx.fill();
  ctx.restore();
}

let lastCheck=0;
function frame(){
  requestAnimationFrame(frame);
  const W=canvas.width,H=canvas.height;
  const progress=getProgress();
  const shipAU=getShipAU();
  const shipWY=-(shipAU*2200);
  const oy=H/2-shipWY;
  const ox=W/2;

  ctx.fillStyle='#020405';ctx.fillRect(0,0,W,H);

  NEBS.forEach(n=>{
    const sx=n.x+ox,sy=n.y+oy;
    if(sy<-n.ry*2||sy>H+n.ry*2)return;
    ctx.save();ctx.globalAlpha=n.a;
    const g=ctx.createRadialGradient(sx,sy,0,sx,sy,n.rx);
    g.addColorStop(0,`hsl(${n.hue},55%,40%)`);g.addColorStop(1,'transparent');
    ctx.scale(1,n.ry/n.rx);ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(sx,sy*(n.rx/n.ry),n.rx,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  STARS.forEach(s=>{
    s.tw+=s.ts;
    const sx=((s.x+ox%W+W*2))%W;
    const sy=s.y+oy;
    if(sy<-4||sy>H+4)return;
    ctx.globalAlpha=s.br*(.35+.65*Math.abs(Math.sin(s.tw)));
    ctx.fillStyle=s.col;ctx.beginPath();ctx.arc(sx,sy,s.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  drawSun(ox,oy);

  ASTS.forEach(a=>{
    a.rot+=a.rs;
    const ax=a.x+ox,ay=a.y+oy;
    if(ax<-80||ax>W+80||ay<-80||ay>H+80)return;
    ctx.save();ctx.translate(ax,ay);ctx.rotate(a.rot);ctx.scale(a.sz,a.sz);
    ctx.beginPath();a.pts.forEach((p,i)=>{const px=Math.cos(p.a)*p.r,py=Math.sin(p.a)*p.r;i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);});
    ctx.closePath();ctx.fillStyle='rgba(80,75,70,.88)';ctx.strokeStyle='rgba(115,105,95,.3)';ctx.lineWidth=1;ctx.fill();ctx.stroke();
    ctx.restore();
  });

  let nearP=null,nearD=Infinity;
  PL.forEach((p,i)=>{
    const pWY=-(p.au*2200);
    const off=(i%2===0?-55:55);
    const px=ox+off,py=pWY+oy;
    if(py>-p.r*5&&py<H+p.r*5) drawPlanet(px,py,p);
    drawDir(p,pWY,shipWY,W,H,i);
    const d=Math.abs(p.au-shipAU);
    if(d<nearD){nearD=d;nearP=p;}
  });

  drawShip(W/2,H/2);

  const now=Date.now();
  if(now-lastCheck>2500){
    lastCheck=now;
    for(const m of MSGS){
      if(!shown.has(m.au)&&shipAU>=m.au&&shipAU<m.au+.5){
        shown.add(m.au);showMsg(m.t);break;
      }
    }
  }

  pfill.style.width=(progress*100)+'%';
  const rem=Math.max(0,VOYAGE_MS-(now-startTime));
  const rm=Math.floor(rem/60000),rs=Math.floor((rem%60000)/1000);
  tleft.textContent=progress>=1?'ARRIVÉE · NEPTUNE':`NEPTUNE DANS ${rm}m ${rs<10?'0':''}${rs}s`;
  pinfo.textContent=nearD<2?(nearP?nearP.desc:''):shipAU.toFixed(1)+' UA DU SOLEIL';
  distEl.textContent=(shipAU*149.6|0)+' M KM';
}
frame();
</script>
