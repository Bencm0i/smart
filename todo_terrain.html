<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>OPÉRATIONS // TODO</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --sand: #c8b89a;
  --sand-light: #e8dcc8;
  --sand-dark: #8a7560;
  --canvas: #f0e8d8;
  --olive: #5a5e3a;
  --olive-light: #7a7e5a;
  --orange: #d4621a;
  --orange-light: #e8844a;
  --orange-pale: #f0c8a0;
  --ink: #2a2418;
  --ink-mid: #4a3e2c;
  --muted: #9a8e7c;
  --bg: #e8dfc8;
  --card: #f4edd8;
  --border: #b8a88a;
  --green-ok: #6a8c4a;
  --red-alert: #c0392b;
  --pinned-bg: #fff8e8;
  --someday-bg: #eee8d8;
  --shadow: 0 2px 8px rgba(42,36,24,0.18);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  color: var(--ink);
  min-height: 100dvh;
  padding-bottom: calc(80px + env(safe-area-inset-bottom));
  overflow-x: hidden;
}

/* HEADER */
.header {
  background: var(--olive);
  color: var(--sand-light);
  padding: 14px 16px 10px;
  padding-top: calc(14px + env(safe-area-inset-top));
  position: sticky; top: 0; z-index: 100;
  border-bottom: 3px solid var(--orange);
}
.header-top { display:flex; align-items:center; justify-content:space-between; }
.header-title {
  font-family: 'Oswald', sans-serif;
  font-size: 20px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--orange-light);
}
.header-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; color: var(--sand);
  letter-spacing: 2px; margin-top: 2px;
}
.btn-add-header {
  background: var(--orange);
  border: none; border-radius: 6px;
  color: #fff; font-size: 22px;
  width: 36px; height: 36px;
  display: flex; align-items:center; justify-content:center;
  cursor: pointer; font-family: 'Oswald', sans-serif;
  transition: background .2s;
}
.btn-add-header:active { background: var(--orange-light); }

/* BUDGET STRIP */
.budget-strip {
  background: var(--ink);
  padding: 8px 16px;
  display: flex; gap: 8px; overflow-x: auto;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
.budget-strip::-webkit-scrollbar { display:none; }
.budget-chip {
  flex-shrink: 0;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(200,184,154,0.25);
  border-radius: 4px;
  padding: 4px 10px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--sand);
  display: flex; flex-direction: column; align-items:center; gap:1px;
  cursor: pointer;
  transition: background .15s;
}
.budget-chip.active { background: var(--orange); border-color: var(--orange); color: #fff; }
.budget-chip .chip-cat { font-size: 9px; text-transform: uppercase; letter-spacing:1px; opacity:.7; }
.budget-chip .chip-budget { font-size: 12px; font-weight: 500; color: var(--orange-light); }
.budget-chip.active .chip-budget { color: #fff; }
.budget-chip .chip-spent { font-size: 9px; }
.budget-chip .chip-left { font-size: 9px; color: var(--green-ok); }

/* FILTER TABS */
.filter-bar {
  display: flex; gap: 0;
  background: var(--sand-dark);
  overflow-x: auto; scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-tab {
  flex: 1; min-width: 70px;
  padding: 8px 4px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; text-align: center;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--sand-light);
  border: none; background: transparent;
  cursor: pointer; transition: background .15s;
  border-bottom: 2px solid transparent;
}
.filter-tab.active {
  color: var(--orange-light);
  border-bottom-color: var(--orange);
  background: rgba(212,98,26,0.12);
}

/* SECTION LABELS */
.section-label {
  font-family: 'Oswald', sans-serif;
  font-size: 11px; letter-spacing:3px; text-transform: uppercase;
  color: var(--muted);
  padding: 12px 16px 4px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::after {
  content:''; flex:1; height:1px; background: var(--border);
}

/* TODO ITEM */
.todo-list { padding: 0 12px; }

.todo-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 8px;
  position: relative;
  overflow: hidden;
  transition: transform .15s, opacity .2s;
  touch-action: pan-y;
  border-left: 3px solid var(--sand-dark);
}
.todo-item.pinned { border-left-color: var(--orange); background: var(--pinned-bg); }
.todo-item.someday { border-left-color: var(--muted); background: var(--someday-bg); opacity: .85; }
.todo-item.done { opacity: .5; }
.todo-item.done .item-title { text-decoration: line-through; color: var(--muted); }

/* swipe delete reveal */
.todo-item .delete-bg {
  position: absolute; right: 0; top: 0; bottom: 0;
  width: 80px; background: var(--red-alert);
  display: flex; align-items:center; justify-content:center;
  color: #fff; font-size: 20px; z-index: 0;
  border-radius: 0 6px 6px 0;
}
.todo-item .item-content {
  position: relative; z-index: 1;
  background: inherit;
  padding: 10px 12px;
  display: flex; align-items: flex-start; gap: 10px;
  transition: transform .2s;
}
.todo-item.swiped .item-content { transform: translateX(-80px); }

/* checkbox */
.check-btn {
  width: 22px; height: 22px; min-width: 22px;
  border-radius: 4px; border: 2px solid var(--sand-dark);
  background: transparent; cursor: pointer;
  display: flex; align-items:center; justify-content:center;
  margin-top: 1px; transition: all .15s;
}
.check-btn.checked { background: var(--green-ok); border-color: var(--green-ok); }
.check-btn svg { display:none; }
.check-btn.checked svg { display: block; }

.item-body { flex: 1; min-width: 0; }
.item-title {
  font-family: 'DM Mono', monospace;
  font-size: 14px; color: var(--ink);
  word-break: break-word; line-height: 1.3;
}
.item-meta {
  display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-top: 4px;
}
.item-cat {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; text-transform: uppercase; letter-spacing: 1px;
  padding: 1px 6px; border-radius: 3px;
  background: var(--olive); color: var(--sand-light);
}
.item-budget-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; color: var(--orange);
}
.item-note {
  font-size: 11px; color: var(--muted); margin-top: 3px;
  font-style: italic;
}

/* item actions */
.item-actions {
  display: flex; flex-direction:column; gap: 4px; align-items:center;
}
.act-btn {
  background: none; border: none; cursor: pointer;
  font-size: 14px; padding: 2px; opacity: .5;
  transition: opacity .15s;
}
.act-btn:active { opacity: 1; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(42,36,24,0.7);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--canvas);
  border-radius: 16px 16px 0 0;
  border-top: 3px solid var(--orange);
  width: 100%; max-height: 90dvh;
  overflow-y: auto; padding: 20px 16px;
  padding-bottom: calc(20px + env(safe-area-inset-bottom));
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.25,.8,.25,1);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-title {
  font-family: 'Oswald', sans-serif;
  font-size: 16px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 3px;
  color: var(--olive); margin-bottom: 16px;
}

/* FORM */
.form-group { margin-bottom: 14px; }
.form-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
  color: var(--muted); margin-bottom: 4px; display:block;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  font-family: 'DM Mono', monospace;
  font-size: 14px; color: var(--ink);
  outline: none;
  transition: border-color .15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--orange);
}
.form-textarea { resize: vertical; min-height: 60px; }

.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }

/* toggle buttons for type */
.type-toggles { display: flex; gap: 8px; }
.type-btn {
  flex: 1; padding: 8px;
  background: var(--sand-light); border: 2px solid var(--border);
  border-radius: 6px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--ink-mid); cursor: pointer;
  transition: all .15s;
}
.type-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }

/* Modal buttons */
.modal-actions { display:flex; gap:10px; margin-top: 18px; }
.btn-save {
  flex: 1; padding: 12px;
  background: var(--olive); color: var(--sand-light);
  border: none; border-radius: 6px;
  font-family: 'Oswald', sans-serif;
  font-size: 14px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; cursor: pointer;
  transition: background .15s;
}
.btn-save:active { background: var(--orange); }
.btn-cancel {
  padding: 12px 18px;
  background: transparent; border: 1.5px solid var(--border);
  border-radius: 6px; color: var(--muted);
  font-family: 'Oswald', sans-serif; font-size: 13px; cursor: pointer;
}

/* UNDO TOAST */
.undo-toast {
  position: fixed; bottom: calc(88px + env(safe-area-inset-bottom));
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: var(--sand-light);
  padding: 10px 20px; border-radius: 8px;
  font-family: 'Share Tech Mono', monospace; font-size: 12px;
  display: flex; gap: 16px; align-items:center;
  opacity: 0; pointer-events:none;
  transition: all .25s; z-index: 300;
  white-space: nowrap;
  border-left: 3px solid var(--orange);
}
.undo-toast.show { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
.undo-btn {
  color: var(--orange-light); font-weight: bold; cursor: pointer;
  text-decoration: underline; background: none; border: none;
  font-family: inherit; font-size: inherit;
}

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--olive);
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  display: flex; justify-content:space-around;
  border-top: 2px solid var(--orange); z-index: 100;
}
.nav-btn {
  display: flex; flex-direction: column; align-items:center; gap: 2px;
  background: none; border: none; cursor: pointer;
  color: var(--sand); font-family: 'Share Tech Mono', monospace;
  font-size: 9px; text-transform: uppercase; letter-spacing: 1px;
  padding: 4px 16px;
  transition: color .15s;
}
.nav-btn .nav-icon { font-size: 18px; }
.nav-btn.active { color: var(--orange-light); }

/* BUDGET EDIT */
.budget-settings {
  padding: 12px;
}
.budget-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px;
}
.budget-row label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; text-transform:uppercase; letter-spacing:1px;
  color: var(--muted); width: 80px; flex-shrink:0;
}
.budget-input {
  flex: 1; background: #fff; border: 1.5px solid var(--border);
  border-radius: 4px; padding: 7px 10px;
  font-family: 'DM Mono', monospace; font-size: 13px;
  color: var(--ink); outline: none;
}
.budget-input:focus { border-color: var(--orange); }

/* progress bar */
.budget-progress {
  height: 4px; background: var(--sand); border-radius: 2px; margin-top: 2px; overflow: hidden;
}
.budget-progress-fill {
  height: 100%; background: var(--orange); border-radius: 2px;
  transition: width .4s;
}
.budget-progress-fill.over { background: var(--red-alert); }

/* empty state */
.empty-state {
  text-align:center; padding: 40px 20px;
  font-family: 'Share Tech Mono', monospace;
  color: var(--muted); font-size: 12px; letter-spacing: 1px;
}
.empty-icon { font-size: 36px; margin-bottom: 10px; }

/* view toggle */
.view-section { display: none; }
.view-section.active { display: block; }

/* cat color dots */
.cat-dot { width:6px; height:6px; border-radius:50%; display:inline-block; margin-right:3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">⬛ OPÉRATIONS</div>
      <div class="header-sub">JOURNAL DE TERRAIN // TODO</div>
    </div>
    <button class="btn-add-header" id="btnAdd">+</button>
  </div>
</div>

<div class="budget-strip" id="budgetStrip"></div>

<div class="filter-bar" id="filterBar">
  <button class="filter-tab active" data-filter="all">Tout</button>
  <button class="filter-tab" data-filter="normal">Standard</button>
  <button class="filter-tab" data-filter="pinned">⚑ Épinglés</button>
  <button class="filter-tab" data-filter="someday">Un jour</button>
  <button class="filter-tab" data-filter="done">✓ Faits</button>
</div>

<div id="mainView" class="view-section active">
  <div id="listContainer"></div>
</div>

<div id="budgetView" class="view-section">
  <div class="budget-settings" id="budgetSettings"></div>
</div>

<!-- MODAL AJOUT/EDIT -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Nouvelle mission</div>
    <div class="form-group">
      <label class="form-label">Titre</label>
      <input class="form-input" id="fTitle" placeholder="Intitulé de la tâche…" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Note (optionnel)</label>
      <textarea class="form-textarea" id="fNote" placeholder="Détails, contexte…" rows="2"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Catégorie</label>
        <select class="form-select" id="fCat">
          <option value="maison">🏠 Maison</option>
          <option value="admin">📋 Admin</option>
          <option value="brico">🔧 Brico</option>
          <option value="sante">❤️ Santé</option>
          <option value="divers">📦 Divers</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Budget (€)</label>
        <input class="form-input" id="fBudget" type="number" min="0" step="0.01" placeholder="0.00">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Type</label>
      <div class="type-toggles">
        <button class="type-btn active" data-type="normal">Standard</button>
        <button class="type-btn" data-type="pinned">⚑ Épinglé</button>
        <button class="type-btn" data-type="someday">Un jour</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancel">Annuler</button>
      <button class="btn-save" id="btnSave">VALIDER</button>
    </div>
  </div>
</div>

<!-- UNDO TOAST -->
<div class="undo-toast" id="undoToast">
  <span id="undoMsg">Tâche supprimée</span>
  <button class="undo-btn" id="undoBtnEl">ANNULER</button>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="navTodo" onclick="switchView('main')">
    <span class="nav-icon">📋</span>
    <span>Missions</span>
  </button>
  <button class="nav-btn" id="navBudget" onclick="switchView('budget')">
    <span class="nav-icon">💰</span>
    <span>Budget</span>
  </button>
  <button class="nav-btn" onclick="exportJSON()">
    <span class="nav-icon">💾</span>
    <span>Export</span>
  </button>
  <button class="nav-btn" onclick="importJSON()">
    <span class="nav-icon">📂</span>
    <span>Import</span>
  </button>
</div>

<input type="file" id="importInput" accept=".json" style="display:none">

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const CATS = {
  maison: { label:'Maison', emoji:'🏠', color:'#7a6e5a' },
  admin:  { label:'Admin',  emoji:'📋', color:'#4a6a7a' },
  brico:  { label:'Brico',  emoji:'🔧', color:'#6a5a3a' },
  sante:  { label:'Santé',  emoji:'❤️', color:'#7a4a4a' },
  divers: { label:'Divers', emoji:'📦', color:'#5a6a4a' },
};

let todos = [];
let budgets = { maison:0, admin:0, brico:0, sante:0, divers:0 };
let activeFilter = 'all';
let editingId = null;
let lastDeleted = null;
let undoTimer = null;
let currentView = 'main';

function load() {
  try {
    const t = localStorage.getItem('todo_terrain_tasks');
    if (t) todos = JSON.parse(t);
    const b = localStorage.getItem('todo_terrain_budgets');
    if (b) budgets = { ...budgets, ...JSON.parse(b) };
  } catch(e) {}
}
function save() {
  localStorage.setItem('todo_terrain_tasks', JSON.stringify(todos));
  localStorage.setItem('todo_terrain_budgets', JSON.stringify(budgets));
}
function genId() { return 'tid_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

// ─── RENDER ─────────────────────────────────────────────────────────────────
function spentByCat(cat) {
  return todos.filter(t=>t.cat===cat && !t.done && t.budget>0).reduce((s,t)=>s+t.budget,0);
}

function renderBudgetStrip() {
  const strip = document.getElementById('budgetStrip');
  const allSpent = Object.values(budgets).reduce((s,v)=>s+v,0); // not used
  strip.innerHTML = '';
  // Global chip
  const totalBudget = Object.values(budgets).reduce((s,v)=>s+parseFloat(v||0),0);
  const totalSpent = Object.keys(CATS).reduce((s,k)=>s+spentByCat(k),0);
  const globalChip = document.createElement('div');
  globalChip.className = 'budget-chip active';
  globalChip.innerHTML = `<span class="chip-cat">TOTAL</span><span class="chip-budget">${totalBudget.toFixed(0)}€</span><span class="chip-spent">${totalSpent.toFixed(0)}€ dépensé</span><span class="chip-left">${Math.max(0,totalBudget-totalSpent).toFixed(0)}€ restant</span>`;
  strip.appendChild(globalChip);

  Object.entries(CATS).forEach(([key, c]) => {
    const budget = parseFloat(budgets[key]||0);
    const spent = spentByCat(key);
    const chip = document.createElement('div');
    chip.className = 'budget-chip';
    chip.innerHTML = `<span class="chip-cat">${c.emoji} ${c.label}</span><span class="chip-budget">${budget.toFixed(0)}€</span><span class="chip-spent">${spent.toFixed(0)}€</span><span class="chip-left" style="color:${spent>budget&&budget>0?'var(--red-alert)':'var(--green-ok)'}">${(budget-spent).toFixed(0)}€</span>`;
    chip.onclick = () => {
      activeFilter = 'all';
      document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
      document.querySelector('.filter-tab[data-filter="all"]').classList.add('active');
      switchView('main');
      setTimeout(()=>{
        const first = document.querySelector(`.todo-item[data-cat="${key}"]`);
        if(first) first.scrollIntoView({behavior:'smooth',block:'center'});
      },100);
    };
    strip.appendChild(chip);
  });
}

function filteredTodos() {
  let items = [...todos];
  if (activeFilter === 'pinned') items = items.filter(t=>t.type==='pinned');
  else if (activeFilter === 'normal') items = items.filter(t=>t.type==='normal');
  else if (activeFilter === 'someday') items = items.filter(t=>t.type==='someday');
  else if (activeFilter === 'done') items = items.filter(t=>t.done);
  else items = items.filter(t=>!t.done); // 'all' hides done
  // Sort: pinned first, then someday last
  items.sort((a,b)=>{
    const order = {pinned:0, normal:1, someday:2};
    return (order[a.type]||1)-(order[b.type]||1);
  });
  return items;
}

function renderList() {
  const container = document.getElementById('listContainer');
  const items = filteredTodos();
  container.innerHTML = '';

  if (!items.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div>Aucune mission en cours</div></div>`;
    return;
  }

  let lastSection = null;
  items.forEach(todo => {
    const section = todo.done ? 'done' : todo.type;
    if (section !== lastSection) {
      lastSection = section;
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = section==='pinned'?'⚑ ÉPINGLÉS' : section==='someday'?'◌ UN JOUR' : section==='done'?'✓ TERMINÉS' : '● MISSIONS';
      container.appendChild(lbl);
    }
    container.appendChild(buildItem(todo));
  });
}

function buildItem(todo) {
  const el = document.createElement('div');
  el.className = `todo-item ${todo.type||'normal'} ${todo.done?'done':''}`;
  el.dataset.id = todo.id;
  el.dataset.cat = todo.cat;

  const cat = CATS[todo.cat] || CATS.divers;
  el.innerHTML = `
    <div class="delete-bg">🗑️</div>
    <div class="item-content">
      <button class="check-btn ${todo.done?'checked':''}" onclick="toggleDone('${todo.id}')">
        <svg width="12" height="10" viewBox="0 0 12 10"><path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="item-body">
        <div class="item-title">${escHtml(todo.title)}</div>
        <div class="item-meta">
          <span class="item-cat" style="background:${cat.color}">${cat.emoji} ${cat.label}</span>
          ${todo.budget>0?`<span class="item-budget-tag">💶 ${parseFloat(todo.budget).toFixed(2)}€</span>`:''}
        </div>
        ${todo.note?`<div class="item-note">${escHtml(todo.note)}</div>`:''}
      </div>
      <div class="item-actions">
        <button class="act-btn" onclick="editItem('${todo.id}')" title="Éditer">✏️</button>
        <button class="act-btn" onclick="togglePin('${todo.id}')" title="Épingler">${todo.type==='pinned'?'📌':'📍'}</button>
        <button class="act-btn" onclick="toggleSomeday('${todo.id}')" title="Un jour">${todo.type==='someday'?'🌙':'🕐'}</button>
      </div>
    </div>`;

  // Swipe to delete
  setupSwipe(el, todo.id);
  return el;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── SWIPE DELETE ────────────────────────────────────────────────────────────
function setupSwipe(el, id) {
  let startX = 0, dx = 0, swiping = false;
  const content = el.querySelector('.item-content');

  el.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    dx = 0; swiping = false;
  }, { passive: true });

  el.addEventListener('touchmove', e => {
    dx = e.touches[0].clientX - startX;
    if (Math.abs(dx) > 8) swiping = true;
    if (swiping && dx < 0) {
      content.style.transform = `translateX(${Math.max(dx, -80)}px)`;
    }
  }, { passive: true });

  el.addEventListener('touchend', () => {
    if (dx < -60) {
      el.classList.add('swiped');
      content.style.transform = '';
      setTimeout(() => deleteItem(id), 300);
    } else {
      content.style.transform = '';
    }
  });
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function toggleDone(id) {
  const t = todos.find(x=>x.id===id);
  if (t) { t.done = !t.done; save(); renderAll(); }
}
function togglePin(id) {
  const t = todos.find(x=>x.id===id);
  if (!t) return;
  t.type = t.type==='pinned' ? 'normal' : 'pinned';
  save(); renderAll();
}
function toggleSomeday(id) {
  const t = todos.find(x=>x.id===id);
  if (!t) return;
  t.type = t.type==='someday' ? 'normal' : 'someday';
  save(); renderAll();
}
function deleteItem(id) {
  const idx = todos.findIndex(x=>x.id===id);
  if (idx<0) return;
  lastDeleted = { item: todos[idx], idx };
  todos.splice(idx,1);
  save(); renderAll();
  showUndo(`"${lastDeleted.item.title.slice(0,20)}…" supprimée`);
}
function showUndo(msg) {
  const toast = document.getElementById('undoToast');
  document.getElementById('undoMsg').textContent = msg;
  toast.classList.add('show');
  clearTimeout(undoTimer);
  undoTimer = setTimeout(()=>toast.classList.remove('show'), 4000);
}
document.getElementById('undoBtnEl').onclick = () => {
  if (lastDeleted) {
    todos.splice(lastDeleted.idx, 0, lastDeleted.item);
    lastDeleted = null;
    save(); renderAll();
  }
  document.getElementById('undoToast').classList.remove('show');
};

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(id=null) {
  editingId = id;
  const modal = document.getElementById('modalOverlay');
  document.getElementById('modalTitle').textContent = id ? 'Modifier mission' : 'Nouvelle mission';
  if (id) {
    const t = todos.find(x=>x.id===id);
    document.getElementById('fTitle').value = t.title;
    document.getElementById('fNote').value = t.note||'';
    document.getElementById('fCat').value = t.cat;
    document.getElementById('fBudget').value = t.budget||'';
    setTypeBtn(t.type||'normal');
  } else {
    document.getElementById('fTitle').value = '';
    document.getElementById('fNote').value = '';
    document.getElementById('fCat').value = 'maison';
    document.getElementById('fBudget').value = '';
    setTypeBtn('normal');
  }
  modal.classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(),300);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function setTypeBtn(type) {
  document.querySelectorAll('.type-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.type===type);
  });
}
document.querySelectorAll('.type-btn').forEach(b=>b.onclick=()=>setTypeBtn(b.dataset.type));
document.getElementById('btnAdd').onclick = () => openModal();
document.getElementById('btnCancel').onclick = closeModal;
document.getElementById('modalOverlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('modalOverlay')) closeModal();
});

function editItem(id) { openModal(id); }

document.getElementById('btnSave').onclick = () => {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { document.getElementById('fTitle').style.borderColor='var(--red-alert)'; return; }
  document.getElementById('fTitle').style.borderColor='';
  const activeType = document.querySelector('.type-btn.active')?.dataset.type || 'normal';
  const budget = parseFloat(document.getElementById('fBudget').value) || 0;

  if (editingId) {
    const t = todos.find(x=>x.id===editingId);
    t.title = title;
    t.note = document.getElementById('fNote').value.trim();
    t.cat = document.getElementById('fCat').value;
    t.type = activeType;
    t.budget = budget;
  } else {
    todos.unshift({
      id: genId(),
      title,
      note: document.getElementById('fNote').value.trim(),
      cat: document.getElementById('fCat').value,
      type: activeType,
      budget,
      done: false,
      created: Date.now()
    });
  }
  save(); closeModal(); renderAll();
};

// ─── FILTERS ─────────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderList();
  };
});

// ─── VIEWS ───────────────────────────────────────────────────────────────────
function switchView(view) {
  currentView = view;
  document.getElementById('mainView').classList.toggle('active', view==='main');
  document.getElementById('budgetView').classList.toggle('active', view==='budget');
  document.getElementById('navTodo').classList.toggle('active', view==='main');
  document.getElementById('navBudget').classList.toggle('active', view==='budget');
  if (view==='budget') renderBudgetSettings();
}

function renderBudgetSettings() {
  const container = document.getElementById('budgetSettings');
  container.innerHTML = `<div class="section-label">BUDGET PAR CATÉGORIE</div>`;
  Object.entries(CATS).forEach(([key, c]) => {
    const spent = spentByCat(key);
    const budget = parseFloat(budgets[key]||0);
    const pct = budget>0 ? Math.min(100,(spent/budget)*100) : 0;
    const row = document.createElement('div');
    row.innerHTML = `
      <div class="budget-row">
        <label>${c.emoji} ${c.label}</label>
        <input class="budget-input" type="number" min="0" step="10" value="${budget||''}" placeholder="0" data-cat="${key}">
      </div>
      <div class="budget-progress" style="margin:-6px 0 10px 90px">
        <div class="budget-progress-fill ${spent>budget&&budget>0?'over':''}" style="width:${pct}%"></div>
      </div>`;
    container.appendChild(row);
  });
  container.querySelectorAll('.budget-input').forEach(inp => {
    inp.addEventListener('input', () => {
      budgets[inp.dataset.cat] = parseFloat(inp.value)||0;
      save(); renderBudgetStrip();
    });
  });
}

// ─── EXPORT / IMPORT ─────────────────────────────────────────────────────────
function exportJSON() {
  const data = { todos, budgets, exported: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `todo_terrain_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function importJSON() {
  document.getElementById('importInput').click();
}
document.getElementById('importInput').onchange = e => {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.todos) todos = data.todos;
      if (data.budgets) budgets = { ...budgets, ...data.budgets };
      save(); renderAll();
      showUndo('Import réussi ✓');
    } catch { showUndo('Erreur import JSON'); }
  };
  reader.readAsText(file);
  e.target.value = '';
};

// ─── FULL RENDER ─────────────────────────────────────────────────────────────
function renderAll() {
  renderBudgetStrip();
  renderList();
}

load();
renderAll();
</script>
