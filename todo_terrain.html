<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GESTION TERRAIN // AVENTECH</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='10' fill='%235a5e3a'/><text y='48' x='8' font-size='44'>📋</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --sand: #c8b89a;
  --sand-light: #e8dcc8;
  --sand-dark: #8a7560;
  --canvas: #f0e8d8;
  --olive: #5a5e3a;
  --olive-light: #7a7e5a;
  --orange: #d4621a;
  --orange-light: #e8844a;
  --orange-pale: #f0c8a0;
  --ink: #2a2418;
  --ink-mid: #4a3e2c;
  --muted: #9a8e7c;
  --bg: #e8dfc8;
  --card: #f4edd8;
  --border: #b8a88a;
  --green-ok: #6a8c4a;
  --red-alert: #c0392b;
  --pinned-bg: #fff8e8;
  --someday-bg: #eee8d8;
  --shadow: 0 2px 8px rgba(42,36,24,0.18);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  color: var(--ink);
  min-height: 100dvh;
  padding-bottom: calc(80px + env(safe-area-inset-bottom));
  overflow-x: hidden;
}

/* HEADER */
.header {
  background: var(--olive);
  color: var(--sand-light);
  padding: 14px 16px 10px;
  padding-top: calc(14px + env(safe-area-inset-top));
  position: sticky; top: 0; z-index: 100;
  border-bottom: 3px solid var(--orange);
}
.header-top { display:flex; align-items:center; justify-content:space-between; }
.header-title {
  font-family: 'Oswald', sans-serif;
  font-size: 20px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--orange-light);
}
.header-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; color: var(--sand);
  letter-spacing: 2px; margin-top: 2px;
}
.btn-add-header {
  background: var(--orange);
  border: none; border-radius: 6px;
  color: #fff; font-size: 22px;
  width: 36px; height: 36px;
  display: flex; align-items:center; justify-content:center;
  cursor: pointer; font-family: 'Oswald', sans-serif;
  transition: background .2s;
}
.btn-add-header:active { background: var(--orange-light); }

/* FILTER TABS */
.filter-bar {
  display: flex; gap: 0;
  background: var(--sand-dark);
  overflow-x: auto; scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-tab {
  flex: 1; min-width: 70px;
  padding: 8px 4px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; text-align: center;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--sand-light);
  border: none; background: transparent;
  cursor: pointer; transition: background .15s;
  border-bottom: 2px solid transparent;
}
.filter-tab.active {
  color: var(--orange-light);
  border-bottom-color: var(--orange);
  background: rgba(212,98,26,0.12);
}

/* SECTION LABELS */
.section-label {
  font-family: 'Oswald', sans-serif;
  font-size: 11px; letter-spacing:3px; text-transform: uppercase;
  color: var(--muted);
  padding: 12px 16px 4px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::after {
  content:''; flex:1; height:1px; background: var(--border);
}

/* TODO ITEM */
.todo-list { padding: 0 12px; }

.todo-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 8px;
  position: relative;
  overflow: hidden;
  transition: transform .15s, opacity .2s;
  touch-action: pan-y;
  border-left: 3px solid var(--sand-dark);
}
.todo-item.pinned {
  border-left-color: var(--red-alert);
  border-left-width: 5px;
  background: var(--pinned-bg);
  box-shadow: 0 2px 10px rgba(192,57,43,0.18);
}
.todo-item.pinned .item-title { color: var(--red-alert); font-weight: 500; }
.todo-item.pinned .check-btn { border-color: var(--red-alert); }
.todo-item.someday { border-left-color: var(--muted); background: var(--someday-bg); opacity: .85; }
.todo-item.done { opacity: .5; }
.todo-item.done .item-title { text-decoration: line-through; color: var(--muted); }

/* swipe delete reveal */
.todo-item .delete-bg {
  position: absolute; right: 0; top: 0; bottom: 0;
  width: 80px; background: var(--red-alert);
  display: flex; align-items:center; justify-content:center;
  color: #fff; font-size: 20px; z-index: 0;
  border-radius: 0 6px 6px 0;
}
.todo-item .item-content {
  position: relative; z-index: 1;
  background: inherit;
  padding: 10px 12px;
  display: flex; align-items: flex-start; gap: 10px;
  transition: transform .2s;
}
.todo-item.swiped .item-content { transform: translateX(-80px); }

/* checkbox */
.check-btn {
  width: 22px; height: 22px; min-width: 22px;
  border-radius: 4px; border: 2px solid var(--sand-dark);
  background: transparent; cursor: pointer;
  display: flex; align-items:center; justify-content:center;
  margin-top: 1px; transition: all .15s;
}
.check-btn.checked { background: var(--green-ok); border-color: var(--green-ok); }
.check-btn svg { display:none; }
.check-btn.checked svg { display: block; }

.item-body { flex: 1; min-width: 0; }
.item-title {
  font-family: 'DM Mono', monospace;
  font-size: 14px; color: var(--ink);
  word-break: break-word; line-height: 1.3;
}
.item-meta {
  display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-top: 4px;
}
.item-cat {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; text-transform: uppercase; letter-spacing: 1px;
  padding: 1px 6px; border-radius: 3px;
  background: var(--olive); color: var(--sand-light);
}
.item-budget-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px; font-weight: 500; color: var(--orange);
}
.item-note {
  font-size: 11px; color: var(--muted); margin-top: 3px;
  font-style: italic;
}

/* item actions */
.item-actions {
  display: flex; flex-direction:column; gap: 4px; align-items:center;
}
.act-btn {
  background: none; border: none; cursor: pointer;
  font-size: 14px; padding: 2px; opacity: .5;
  transition: opacity .15s;
}
.act-btn:active { opacity: 1; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(42,36,24,0.7);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--canvas);
  border-radius: 16px 16px 0 0;
  border-top: 3px solid var(--orange);
  width: 100%; max-height: 90dvh;
  overflow-y: auto; padding: 20px 16px;
  padding-bottom: calc(20px + env(safe-area-inset-bottom));
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.25,.8,.25,1);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-title {
  font-family: 'Oswald', sans-serif;
  font-size: 16px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 3px;
  color: var(--olive); margin-bottom: 16px;
}

/* FORM */
.form-group { margin-bottom: 14px; }
.form-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
  color: var(--muted); margin-bottom: 4px; display:block;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  font-family: 'DM Mono', monospace;
  font-size: 14px; color: var(--ink);
  outline: none;
  transition: border-color .15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--orange);
}
.form-textarea { resize: vertical; min-height: 60px; }

.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }

/* toggle buttons for type */
.type-toggles { display: flex; gap: 8px; }
.type-btn {
  flex: 1; padding: 8px;
  background: var(--sand-light); border: 2px solid var(--border);
  border-radius: 6px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--ink-mid); cursor: pointer;
  transition: all .15s;
}
.type-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }

/* Modal buttons */
.modal-actions { display:flex; gap:10px; margin-top: 18px; }
.btn-save {
  flex: 1; padding: 12px;
  background: var(--olive); color: var(--sand-light);
  border: none; border-radius: 6px;
  font-family: 'Oswald', sans-serif;
  font-size: 14px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; cursor: pointer;
  transition: background .15s;
}
.btn-save:active { background: var(--orange); }
.btn-cancel {
  padding: 12px 18px;
  background: transparent; border: 1.5px solid var(--border);
  border-radius: 6px; color: var(--muted);
  font-family: 'Oswald', sans-serif; font-size: 13px; cursor: pointer;
}

/* UNDO TOAST */
.undo-toast {
  position: fixed; bottom: calc(88px + env(safe-area-inset-bottom));
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: var(--sand-light);
  padding: 10px 20px; border-radius: 8px;
  font-family: 'Share Tech Mono', monospace; font-size: 12px;
  display: flex; gap: 16px; align-items:center;
  opacity: 0; pointer-events:none;
  transition: all .25s; z-index: 300;
  white-space: nowrap;
  border-left: 3px solid var(--orange);
}
.undo-toast.show { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
.undo-btn {
  color: var(--orange-light); font-weight: bold; cursor: pointer;
  text-decoration: underline; background: none; border: none;
  font-family: inherit; font-size: inherit;
}

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--olive);
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
  display: flex; justify-content:space-around;
  border-top: 2px solid var(--orange); z-index: 100;
}
.nav-btn {
  display: flex; flex-direction: column; align-items:center; gap: 2px;
  background: none; border: none; cursor: pointer;
  color: var(--sand); font-family: 'Share Tech Mono', monospace;
  font-size: 9px; text-transform: uppercase; letter-spacing: 1px;
  padding: 4px 16px;
  transition: color .15s;
}
.nav-btn .nav-icon { font-size: 18px; }
.nav-btn.active { color: var(--orange-light); }

/* BUDGET EDIT */
.budget-settings {
  padding: 12px;
}
.budget-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px;
}
.budget-row label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; text-transform:uppercase; letter-spacing:1px;
  color: var(--muted); width: 80px; flex-shrink:0;
}
.budget-input {
  flex: 1; background: #fff; border: 1.5px solid var(--border);
  border-radius: 4px; padding: 7px 10px;
  font-family: 'DM Mono', monospace; font-size: 13px;
  color: var(--ink); outline: none;
}
.budget-input:focus { border-color: var(--orange); }

/* progress bar */
.budget-progress {
  height: 4px; background: var(--sand); border-radius: 2px; margin-top: 2px; overflow: hidden;
}
.budget-progress-fill {
  height: 100%; background: var(--orange); border-radius: 2px;
  transition: width .4s;
}
.budget-progress-fill.over { background: var(--red-alert); }

/* empty state */
.empty-state {
  text-align:center; padding: 40px 20px;
  font-family: 'Share Tech Mono', monospace;
  color: var(--muted); font-size: 12px; letter-spacing: 1px;
}
.empty-icon { font-size: 36px; margin-bottom: 10px; }

/* view toggle */
.view-section { display: none; }
.view-section.active { display: block; }

/* cat color dots */
.cat-dot { width:6px; height:6px; border-radius:50%; display:inline-block; margin-right:3px; }

/* CAT FILTER BAR */
.cat-filter-bar {
  background: var(--canvas);
  display: flex; gap: 6px; padding: 7px 10px;
  overflow-x: auto; scrollbar-width: none;
  border-bottom: 1px solid var(--border);
}
.cat-filter-bar::-webkit-scrollbar { display: none; }
.cat-pill {
  flex-shrink: 0;
  padding: 4px 10px; border-radius: 20px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
  border: 1.5px solid var(--border);
  background: transparent; color: var(--ink-mid);
  cursor: pointer; transition: all .15s;
  white-space: nowrap;
}
.cat-pill.active {
  color: #fff; border-color: transparent;
}
.cat-pill[data-cat="all"].active { background: var(--olive); }
.cat-pill[data-cat="maison"].active { background: #7a6e5a; }
.cat-pill[data-cat="admin"].active  { background: #4a6a7a; }
.cat-pill[data-cat="brico"].active  { background: #6a5a3a; }
.cat-pill[data-cat="sante"].active  { background: #7a4a4a; }
.cat-pill[data-cat="vehicule"].active    { background: #3a5a7a; }
.cat-pill[data-cat="habillement"].active { background: #6a4a7a; }
.cat-pill[data-cat="divers"].active { background: #5a6a4a; }

/* KPI STRIP */
.kpi-strip {
  background: var(--ink-mid);
  display: flex; gap: 0;
  border-bottom: 2px solid var(--sand-dark);
}
.kpi-card {
  flex: 1;
  padding: 8px 6px 7px;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  border-right: 1px solid rgba(200,184,154,0.15);
  position: relative;
}
.kpi-card:last-child { border-right: none; }
.kpi-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--sand); opacity: .65;
}
.kpi-value {
  font-family: 'Oswald', sans-serif;
  font-size: 24px; font-weight: 700;
  color: var(--orange-light); line-height: 1;
}
.kpi-value.green { color: #8ec46a; }
.kpi-value.red { color: #e05a4a; }
.kpi-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px; color: var(--muted);
}

/* ANALYSE VIEW */
.analyse-wrap { padding: 12px; }
.analyse-section-title {
  font-family: 'Oswald', sans-serif;
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 3px;
  color: var(--muted);
  padding: 14px 0 6px;
  display: flex; align-items: center; gap: 8px;
}
.analyse-section-title::after { content:''; flex:1; height:1px; background: var(--border); }

/* donut wrapper */
.donut-wrap {
  display: flex; align-items: center; gap: 16px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px;
  margin-bottom: 12px;
}
.donut-legend { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.legend-row {
  display: flex; align-items: center; gap: 7px;
  font-family: 'Share Tech Mono', monospace; font-size: 10px;
  color: var(--ink-mid);
}
.legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.legend-val { margin-left: auto; color: var(--orange); font-weight: 500; }

/* bar chart cards */
.cat-analyse-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; margin-bottom: 10px;
  border-left: 3px solid var(--sand-dark);
}
.cat-analyse-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.cat-analyse-name {
  font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1px; color: var(--ink);
}
.cat-analyse-stats {
  display: flex; gap: 10px; margin-bottom: 8px;
}
.cat-stat {
  flex: 1; text-align: center;
  background: var(--bg); border-radius: 4px; padding: 5px 4px;
}
.cat-stat-val {
  font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700;
  color: var(--orange-light);
}
.cat-stat-lbl {
  font-family: 'Share Tech Mono', monospace; font-size: 8px;
  text-transform: uppercase; color: var(--muted); letter-spacing: 1px;
}
.cat-bar-outer {
  height: 8px; background: var(--sand); border-radius: 4px; overflow: hidden;
}
.cat-bar-fill {
  height: 100%; border-radius: 4px; transition: width .5s cubic-bezier(.4,0,.2,1);
}
.cat-bar-label {
  display: flex; justify-content: space-between;
  font-family: 'Share Tech Mono', monospace; font-size: 9px;
  color: var(--muted); margin-top: 3px;
}

/* ── DARK THEME ──────────────────────────────────────────────────────────── */
body.dark {
  --sand: #8a9aaa;
  --sand-light: #c8d4e0;
  --sand-dark: #4a5a6a;
  --canvas: #1a2030;
  --olive: #1e2a1e;
  --olive-light: #2a3a2a;
  --orange: #e07030;
  --orange-light: #f08840;
  --orange-pale: #3a2010;
  --ink: #d8e0e8;
  --ink-mid: #a0b0c0;
  --muted: #6a7a8a;
  --bg: #141820;
  --card: #1e2530;
  --border: #2a3545;
  --green-ok: #5a9a3a;
  --red-alert: #d04030;
  --pinned-bg: #251a10;
  --someday-bg: #1a2025;
  --shadow: 0 2px 8px rgba(0,0,0,0.5);
}
body.dark .form-input,
body.dark .form-select,
body.dark .form-textarea,
body.dark .budget-input { background: #1a2030; color: var(--ink); border-color: var(--border); }
body.dark .modal { background: #1a2030; }

/* ── DARK TOGGLE BTN ─────────────────────────────────────────────────────── */
.btn-dark-toggle {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px;
  color: var(--sand-light);
  font-size: 16px;
  width: 32px; height: 32px;
  display: flex; align-items:center; justify-content:center;
  cursor: pointer; transition: background .2s;
  margin-right: 6px;
}
.btn-dark-toggle:active { background: rgba(255,255,255,0.2); }

/* ── TEXT LIST VIEW ──────────────────────────────────────────────────────── */
.text-view-wrap {
  padding: 6px 10px 10px;
  font-family: 'Share Tech Mono', monospace;
}
.tv-group { margin-bottom: 8px; }
.tv-group-title {
  font-family: 'Oswald', sans-serif;
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--muted); margin: 6px 0 3px;
  display: flex; align-items:center; gap: 6px;
}
.tv-group-title::after { content:''; flex:1; height:1px; background:var(--border); }
.tv-row {
  display: flex; align-items: baseline; gap: 5px;
  padding: 2px 4px; border-radius: 3px;
  line-height: 1.4;
  transition: background .1s;
}
.tv-row:hover { background: rgba(200,184,154,0.07); }
.tv-row.done-row { opacity:.45; }
.tv-row.done-row .tv-title { text-decoration: line-through; }
.tv-bullet {
  font-size: 9px; flex-shrink: 0; margin-top: 1px;
}
.tv-title { font-size: 12px; color: var(--ink); flex: 1; min-width: 0; }
.tv-cat {
  font-size: 9px; color: var(--muted); flex-shrink:0;
  background: var(--olive); border-radius: 2px; padding: 0 4px;
}
.tv-budget { font-size: 10px; color: var(--orange); flex-shrink:0; }
.tv-note {
  font-size: 10px; color: var(--muted); flex-shrink:0;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  max-width: 90px; font-style: italic;
}
.tv-stats {
  display:flex; gap:12px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 5px; padding: 6px 10px; margin-bottom: 8px;
  font-size: 10px; color: var(--muted);
}
.tv-stats strong { color: var(--orange-light); font-family: 'Oswald',sans-serif; font-size: 13px; }
.tv-empty { color: var(--muted); font-size: 11px; text-align:center; padding: 24px; }

/* taux completion */
.completion-ring-wrap {
  display: flex; align-items: center; justify-content: center; gap: 20px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px; margin-bottom: 10px;
}
.ring-stats { display: flex; flex-direction: column; gap: 8px; }
.ring-stat-row {
  font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--ink-mid);
  display: flex; align-items: center; gap: 8px;
}
.ring-stat-num {
  font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700;
  color: var(--orange-light);
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">⬛ OPÉRATIONS</div>
      <div class="header-sub">JOURNAL DE TERRAIN // TODO</div>
    </div>
    <div style="display:flex;align-items:center;gap:4px">
      <button class="btn-dark-toggle" id="btnDark" title="Thème sombre">🌙</button>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const CATS = {
  maison: { label:'Maison', emoji:'🏠', color:'#7a6e5a' },
  admin:  { label:'Admin',  emoji:'📋', color:'#4a6a7a' },
  brico:  { label:'Brico',  emoji:'🔧', color:'#6a5a3a' },
  sante:  { label:'Santé',      emoji:'❤️', color:'#7a4a4a' },
  vehicule:    { label:'Véhicule',   emoji:'🚗', color:'#3a5a7a' },
  habillement: { label:'Habillement',emoji:'👕', color:'#6a4a7a' },
  divers: { label:'Divers',     emoji:'📦', color:'#5a6a4a' },
};

let todos = [];
let budgets = { maison:0, admin:0, brico:0, sante:0, vehicule:0, habillement:0, divers:0 };
let depensesMens = 0;
let activeFilter = 'all';
let activeCat = 'all';
let editingId = null;
let lastDeleted = null;
let undoTimer = null;
let currentView = 'main';

function load() {
  try {
    const t = localStorage.getItem('todo_terrain_tasks');
    if (t) todos = JSON.parse(t);
    const b = localStorage.getItem('todo_terrain_budgets');
    if (b) budgets = { ...budgets, ...JSON.parse(b) };
    const d = localStorage.getItem('todo_terrain_depenses_mens');
    if (d) depensesMens = parseFloat(d)||0;
  } catch(e) {}
}
function save() {
  localStorage.setItem('todo_terrain_tasks', JSON.stringify(todos));
  localStorage.setItem('todo_terrain_budgets', JSON.stringify(budgets));
  localStorage.setItem('todo_terrain_depenses_mens', depensesMens);
}
function genId() { return 'tid_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

// ─── KPI STRIP ───────────────────────────────────────────────────────────────
function renderKPI() {
  const total = todos.length;
  const done = todos.filter(t=>t.done).length;
  const active = total - done;
  const pct = total > 0 ? Math.round((done/total)*100) : 0;

  const totalBudget = Object.values(budgets).reduce((s,v)=>s+parseFloat(v||0),0);
  const totalSpent = todos.filter(t=>t.budget>0).reduce((s,t)=>s+t.budget,0);
  const over = totalBudget > 0 && totalSpent > totalBudget;

  document.getElementById('kpiCout').textContent = totalSpent >= 1000
    ? (totalSpent/1000).toFixed(1)+'k€' : totalSpent.toFixed(0)+'€';
  document.getElementById('kpiCout').className = 'kpi-value' + (over?' red':'');
  document.getElementById('kpiCoutSub').textContent = totalBudget>0
    ? `/ ${totalBudget.toFixed(0)}€ alloué` : 'sans plafond';

  document.getElementById('kpiTotal').textContent = active;
  document.getElementById('kpiTotalSub').textContent = `${done} terminée${done>1?'s':''}`;

  document.getElementById('kpiFait').textContent = done;
  document.getElementById('kpiFaitSub').textContent = `${pct}% taux`;
}
function spentByCat(cat) {
  return todos.filter(t=>t.cat===cat && !t.done && t.budget>0).reduce((s,t)=>s+t.budget,0);
}

function filteredTodos() {
  let items = [...todos];
  if (activeFilter === 'pinned') items = items.filter(t=>t.type==='pinned');
  else if (activeFilter === 'normal') items = items.filter(t=>t.type==='normal');
  else if (activeFilter === 'someday') items = items.filter(t=>t.type==='someday');
  else if (activeFilter === 'done') items = items.filter(t=>t.done);
  else items = items.filter(t=>!t.done);
  if (activeCat !== 'all') items = items.filter(t=>t.cat===activeCat);
  items.sort((a,b)=>{
    const order = {pinned:0, normal:1, someday:2};
    const oa = a.type==='pinned' ? 0 : (order[a.type]||1);
    const ob = b.type==='pinned' ? 0 : (order[b.type]||1);
    return oa - ob;
  });
  return items;
}

function renderList() {
  const container = document.getElementById('listContainer');
  const items = filteredTodos();
  container.innerHTML = '';

  if (!items.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div>Aucune mission en cours</div></div>`;
    return;
  }

  let lastSection = null;
  items.forEach(todo => {
    const section = todo.done ? 'done' : todo.type;
    if (section !== lastSection) {
      lastSection = section;
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = section==='pinned'?'🔴 ÉPINGLÉS — PRIORITÉ' : section==='someday'?'◌ UN JOUR' : section==='done'?'✓ TERMINÉS' : '● MISSIONS';
      container.appendChild(lbl);
    }
    container.appendChild(buildItem(todo));
  });
}

function buildItem(todo) {
  const el = document.createElement('div');
  el.className = `todo-item ${todo.type||'normal'} ${todo.done?'done':''}`;
  el.dataset.id = todo.id;
  el.dataset.cat = todo.cat;

  const cat = CATS[todo.cat] || CATS.divers;
  el.innerHTML = `
    <div class="delete-bg">🗑️</div>
    <div class="item-content">
      <button class="check-btn ${todo.done?'checked':''}" onclick="toggleDone('${todo.id}')">
        <svg width="12" height="10" viewBox="0 0 12 10"><path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="item-body">
        <div class="item-title">${escHtml(todo.title)}</div>
        <div class="item-meta">
          <span class="item-cat" style="background:${cat.color}">${cat.emoji} ${cat.label}</span>
          ${todo.budget>0?`<span class="item-budget-tag">💶 ${parseFloat(todo.budget).toFixed(2)}€</span>`:''}
        </div>
        ${todo.note?`<div class="item-note">${escHtml(todo.note)}</div>`:''}
      </div>
      <div class="item-actions">
        <button class="act-btn" onclick="editItem('${todo.id}')" title="Éditer">✏️</button>
        <button class="act-btn" onclick="togglePin('${todo.id}')" title="Épingler">${todo.type==='pinned'?'📌':'📍'}</button>
        <button class="act-btn" onclick="toggleSomeday('${todo.id}')" title="Un jour">${todo.type==='someday'?'🌙':'🕐'}</button>
      </div>
    </div>`;

  // Swipe to delete
  setupSwipe(el, todo.id);
  return el;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── SWIPE DELETE ────────────────────────────────────────────────────────────
function setupSwipe(el, id) {
  let startX = 0, dx = 0, swiping = false;
  const content = el.querySelector('.item-content');

  el.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    dx = 0; swiping = false;
  }, { passive: true });

  el.addEventListener('touchmove', e => {
    dx = e.touches[0].clientX - startX;
    if (Math.abs(dx) > 8) swiping = true;
    if (swiping && dx < 0) {
      content.style.transform = `translateX(${Math.max(dx, -80)}px)`;
    }
  }, { passive: true });

  el.addEventListener('touchend', () => {
    if (dx < -60) {
      el.classList.add('swiped');
      content.style.transform = '';
      setTimeout(() => deleteItem(id), 300);
    } else {
      content.style.transform = '';
    }
  });
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function toggleDone(id) {
  const t = todos.find(x=>x.id===id);
  if (t) { t.done = !t.done; save(); renderAll(); }
}
function togglePin(id) {
  const t = todos.find(x=>x.id===id);
  if (!t) return;
  t.type = t.type==='pinned' ? 'normal' : 'pinned';
  save(); renderAll();
}
function toggleSomeday(id) {
  const t = todos.find(x=>x.id===id);
  if (!t) return;
  t.type = t.type==='someday' ? 'normal' : 'someday';
  save(); renderAll();
}
function deleteItem(id) {
  const idx = todos.findIndex(x=>x.id===id);
  if (idx<0) return;
  lastDeleted = { item: todos[idx], idx };
  todos.splice(idx,1);
  save(); renderAll();
  showUndo(`"${lastDeleted.item.title.slice(0,20)}…" supprimée`);
}
function showUndo(msg) {
  const toast = document.getElementById('undoToast');
  document.getElementById('undoMsg').textContent = msg;
  toast.classList.add('show');
  clearTimeout(undoTimer);
  undoTimer = setTimeout(()=>toast.classList.remove('show'), 4000);
}
document.getElementById('undoBtnEl').onclick = () => {
  if (lastDeleted) {
    todos.splice(lastDeleted.idx, 0, lastDeleted.item);
    lastDeleted = null;
    save(); renderAll();
  }
  document.getElementById('undoToast').classList.remove('show');
};

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(id=null) {
  editingId = id;
  const modal = document.getElementById('modalOverlay');
  document.getElementById('modalTitle').textContent = id ? 'Modifier mission' : 'Nouvelle mission';
  if (id) {
    const t = todos.find(x=>x.id===id);
    document.getElementById('fTitle').value = t.title;
    document.getElementById('fNote').value = t.note||'';
    document.getElementById('fCat').value = t.cat;
    document.getElementById('fBudget').value = t.budget||'';
    setTypeBtn(t.type||'normal');
  } else {
    document.getElementById('fTitle').value = '';
    document.getElementById('fNote').value = '';
    document.getElementById('fCat').value = 'maison';
    document.getElementById('fBudget').value = '';
    setTypeBtn('normal');
  }
  modal.classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(),300);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function setTypeBtn(type) {
  document.querySelectorAll('.type-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.type===type);
  });
}
document.querySelectorAll('.type-btn').forEach(b=>b.onclick=()=>setTypeBtn(b.dataset.type));
document.getElementById('btnAdd').onclick = () => openModal();
document.getElementById('btnCancel').onclick = closeModal;
document.getElementById('modalOverlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('modalOverlay')) closeModal();
});

function editItem(id) { openModal(id); }

document.getElementById('btnSave').onclick = () => {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { document.getElementById('fTitle').style.borderColor='var(--red-alert)'; return; }
  document.getElementById('fTitle').style.borderColor='';
  const activeType = document.querySelector('.type-btn.active')?.dataset.type || 'normal';
  const budget = parseFloat(document.getElementById('fBudget').value) || 0;

  if (editingId) {
    const t = todos.find(x=>x.id===editingId);
    t.title = title;
    t.note = document.getElementById('fNote').value.trim();
    t.cat = document.getElementById('fCat').value;
    t.type = activeType;
    t.budget = budget;
  } else {
    todos.unshift({
      id: genId(),
      title,
      note: document.getElementById('fNote').value.trim(),
      cat: document.getElementById('fCat').value,
      type: activeType,
      budget,
      done: false,
      created: Date.now()
    });
  }
  save(); closeModal(); renderAll();
};

// ─── FILTERS ─────────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderList();
  };
});

document.querySelectorAll('.cat-pill').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.cat-pill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    renderList();
  };
});

// ─── VIEWS ───────────────────────────────────────────────────────────────────
function switchView(view) {
  currentView = view;
  document.getElementById('mainView').classList.toggle('active', view==='main');
  document.getElementById('budgetView').classList.toggle('active', view==='budget');
  document.getElementById('analyseView').classList.toggle('active', view==='analyse');
  document.getElementById('textView').classList.toggle('active', view==='text');
  document.getElementById('dataView').classList.toggle('active', view==='data');
  document.getElementById('navTodo').classList.toggle('active', view==='main');
  document.getElementById('navBudget').classList.toggle('active', view==='budget');
  document.getElementById('navAnalyse').classList.toggle('active', view==='analyse');
  document.getElementById('navText').classList.toggle('active', view==='text');
  document.getElementById('navData').classList.toggle('active', view==='data');
  if (view==='budget') renderBudgetSettings();
  if (view==='analyse') renderAnalyse();
  if (view==='text') renderText();
}

// ─── TEXT LIST VIEW ───────────────────────────────────────────────────────────
function renderText() {
  const c = document.getElementById('textContainer');
  c.innerHTML = '';

  const active = todos.filter(t=>!t.done);
  const done = todos.filter(t=>t.done);
  const pinned = active.filter(t=>t.type==='pinned');
  const normal = active.filter(t=>t.type==='normal');
  const someday = active.filter(t=>t.type==='someday');

  const totalBudget = active.filter(t=>t.budget>0).reduce((s,t)=>s+t.budget,0);

  // Stats bar
  c.insertAdjacentHTML('beforeend', `<div class="tv-stats">
    <span><strong>${active.length}</strong> actives</span>
    <span><strong>${pinned.length}</strong> épinglées</span>
    <span><strong>${done.length}</strong> faites</span>
    ${totalBudget>0?`<span><strong>${totalBudget.toFixed(0)}€</strong> alloués</span>`:''}
  </div>`);

  if (!active.length && !done.length) {
    c.insertAdjacentHTML('beforeend','<div class="tv-empty">📭 Aucune tâche</div>');
    return;
  }

  const groups = [
    { key:'pinned', label:'⚑ Épinglés', items: pinned, bullet:'🔴' },
    { key:'normal', label:'● Missions', items: normal, bullet:'·' },
    { key:'someday', label:'◌ Un jour', items: someday, bullet:'○' },
    { key:'done',   label:'✓ Terminés', items: done,   bullet:'✓' },
  ];

  groups.forEach(g => {
    if (!g.items.length) return;
    const wrap = document.createElement('div');
    wrap.className = 'tv-group';
    wrap.innerHTML = `<div class="tv-group-title">${g.label}</div>`;
    g.items.forEach(t => {
      const cat = CATS[t.cat]||CATS.divers;
      const row = document.createElement('div');
      row.className = 'tv-row' + (t.done?' done-row':'');
      row.innerHTML =
        `<span class="tv-bullet">${g.bullet}</span>`+
        `<span class="tv-title">${escHtml(t.title)}</span>`+
        `<span class="tv-cat">${cat.emoji}</span>`+
        (t.budget>0?`<span class="tv-budget">${t.budget.toFixed(0)}€</span>`:'')+
        (t.note?`<span class="tv-note">${escHtml(t.note)}</span>`:'');
      wrap.appendChild(row);
    });
    c.appendChild(wrap);
  });
}

// ─── DARK MODE ────────────────────────────────────────────────────────────────
(function() {
  const dark = localStorage.getItem('todo_dark') === '1';
  if (dark) document.body.classList.add('dark');
  document.getElementById('btnDark').textContent = dark ? '☀️' : '🌙';
})();
document.getElementById('btnDark').onclick = () => {
  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('todo_dark', isDark ? '1' : '0');
  document.getElementById('btnDark').textContent = isDark ? '☀️' : '🌙';
};

function calcEpargne() {
  const precaution = depensesMens * 6;
  const projets = Object.values(budgets).reduce((s,v)=>s+parseFloat(v||0), 0);
  return { precaution, projets, total: precaution + projets };
}

function renderBudgetSettings() {
  const container = document.getElementById('budgetSettings');
  const { precaution, projets, total } = calcEpargne();

  container.innerHTML = `
    <div style="margin:16px 12px 8px;background:var(--card);border:2px solid var(--orange);border-radius:10px;padding:14px 16px;">
      <div style="font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--orange);margin-bottom:12px">
        📊 Épargne disponible à avoir
      </div>

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <label style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;min-width:90px">Dépenses/mois</label>
        <input id="depensesMensInput" type="number" min="0" step="50" value="${depensesMens||''}" placeholder="ex: 2000"
          style="flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:6px;padding:6px 10px;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--ink);outline:none;-webkit-appearance:none">
        <span style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted)">€</span>
      </div>

      <div style="border-top:1px solid var(--border);padding-top:10px;display:flex;flex-direction:column;gap:6px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted)">🛡️ Précaution <span style="color:var(--ink-mid)">(×6 mois)</span></span>
          <span data-epargne="precaution" style="font-family:'Oswald',monospace;font-size:14px;font-weight:600;color:var(--ink-mid)">${precaution.toLocaleString('fr-FR')} €</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted)">🗂️ Projets <span style="color:var(--ink-mid)">(budgets alloués)</span></span>
          <span data-epargne="projets" style="font-family:'Oswald',monospace;font-size:14px;font-weight:600;color:var(--ink-mid)">${projets.toLocaleString('fr-FR')} €</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:8px;margin-top:2px">
          <span style="font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--orange)">TOTAL À GARDER</span>
          <span data-epargne="total" style="font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:var(--orange)">${total.toLocaleString('fr-FR')} €</span>
        </div>
      </div>
    </div>

    <div class="section-label" style="margin-top:4px">BUDGET PAR CATÉGORIE</div>`;

  Object.entries(CATS).forEach(([key, c]) => {
    const spent = spentByCat(key);
    const budget = parseFloat(budgets[key]||0);
    const pct = budget>0 ? Math.min(100,(spent/budget)*100) : 0;
    const row = document.createElement('div');
    row.innerHTML = `
      <div class="budget-row">
        <label>${c.emoji} ${c.label}</label>
        <input class="budget-input" type="number" min="0" step="10" value="${budget||''}" placeholder="0" data-cat="${key}">
      </div>
      <div class="budget-progress" style="margin:-6px 0 10px 90px">
        <div class="budget-progress-fill ${spent>budget&&budget>0?'over':''}" style="width:${pct}%"></div>
      </div>`;
    container.appendChild(row);
  });

  // Dépenses mensuelle input
  container.querySelector('#depensesMensInput').addEventListener('input', e => {
    depensesMens = parseFloat(e.target.value)||0;
    save();
    const { precaution, projets, total } = calcEpargne();
    container.querySelector('[data-epargne="precaution"]').textContent = precaution.toLocaleString('fr-FR') + ' €';
    container.querySelector('[data-epargne="projets"]').textContent   = projets.toLocaleString('fr-FR') + ' €';
    container.querySelector('[data-epargne="total"]').textContent     = total.toLocaleString('fr-FR') + ' €';
  });

  container.querySelectorAll('.budget-input').forEach(inp => {
    inp.addEventListener('input', () => {
      budgets[inp.dataset.cat] = parseFloat(inp.value)||0;
      save(); renderBudgetStrip();
      const { projets, total } = calcEpargne();
      container.querySelector('[data-epargne="projets"]').textContent = projets.toLocaleString('fr-FR') + ' €';
      container.querySelector('[data-epargne="total"]').textContent   = total.toLocaleString('fr-FR') + ' €';
    });
  });
}

// ─── ANALYSE VIEW ─────────────────────────────────────────────────────────────
const CAT_COLORS = {
  maison:'#c8783a', admin:'#4a8a9a', brico:'#8a6a2a', sante:'#b04a4a',
  vehicule:'#3a6a9a', habillement:'#8a4a9a', divers:'#6a8a4a'
};

function renderAnalyse() {
  const c = document.getElementById('analyseContainer');
  c.innerHTML = '';

  const total = todos.length;
  const done = todos.filter(t=>t.done).length;
  const active = total - done;
  const pct = total>0 ? Math.round((done/total)*100) : 0;

  // ── Section 1 : Taux de complétion ──
  c.insertAdjacentHTML('beforeend','<div class="analyse-section-title">Complétion</div>');
  const ringWrap = document.createElement('div');
  ringWrap.className = 'completion-ring-wrap';
  const svgSize = 100;
  const r = 38; const cx = 50; const cy = 50;
  const circ = 2*Math.PI*r;
  const dash = circ * (pct/100);
  ringWrap.innerHTML = `
    <svg width="${svgSize}" height="${svgSize}" viewBox="0 0 100 100">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--sand)" stroke-width="10"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--orange)" stroke-width="10"
        stroke-dasharray="${dash} ${circ}" stroke-linecap="round"
        transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dasharray .6s"/>
      <text x="50" y="54" text-anchor="middle" font-family="Oswald,sans-serif" font-size="20" fill="var(--orange-light)" font-weight="700">${pct}%</text>
    </svg>
    <div class="ring-stats">
      <div class="ring-stat-row"><span class="ring-stat-num">${total}</span> total</div>
      <div class="ring-stat-row"><span class="ring-stat-num" style="color:#8ec46a">${done}</span> terminées</div>
      <div class="ring-stat-row"><span class="ring-stat-num" style="color:var(--orange-light)">${active}</span> en cours</div>
    </div>`;
  c.appendChild(ringWrap);

  // ── Section 2 : Répartition budget (donut SVG) ──
  c.insertAdjacentHTML('beforeend','<div class="analyse-section-title">Répartition Budget</div>');
  const totalBudget = Object.values(budgets).reduce((s,v)=>s+parseFloat(v||0),0);
  if (totalBudget > 0) {
    const donutWrap = document.createElement('div');
    donutWrap.className = 'donut-wrap';
    // build donut
    let offset = 0;
    const segments = Object.entries(CATS).map(([key]) => {
      const v = parseFloat(budgets[key]||0);
      const pctV = totalBudget>0 ? v/totalBudget : 0;
      return { key, v, pctV };
    }).filter(s=>s.v>0);

    const donutR = 32; const donutCx = 45; const donutCy = 45;
    const donutCirc = 2*Math.PI*donutR;
    let svgPaths = segments.map(s => {
      const dash = donutCirc * s.pctV;
      const gap = donutCirc - dash;
      const off = offset;
      offset += dash;
      return `<circle cx="${donutCx}" cy="${donutCy}" r="${donutR}" fill="none" stroke="${CAT_COLORS[s.key]}" stroke-width="14"
        stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-off}"
        transform="rotate(-90 ${donutCx} ${donutCy})"/>`;
    }).join('');

    let legendHTML = segments.map(s =>
      `<div class="legend-row"><span class="legend-dot" style="background:${CAT_COLORS[s.key]}"></span>${CATS[s.key].emoji} ${CATS[s.key].label}<span class="legend-val">${s.v.toFixed(0)}€</span></div>`
    ).join('');

    donutWrap.innerHTML = `
      <svg width="90" height="90" viewBox="0 0 90 90" style="flex-shrink:0">
        <circle cx="${donutCx}" cy="${donutCy}" r="${donutR}" fill="none" stroke="var(--sand)" stroke-width="14"/>
        ${svgPaths}
        <text x="${donutCx}" y="${donutCy+5}" text-anchor="middle" font-family="Oswald" font-size="11" fill="var(--orange-light)" font-weight="700">${totalBudget.toFixed(0)}€</text>
      </svg>
      <div class="donut-legend">${legendHTML}</div>`;
    c.appendChild(donutWrap);
  } else {
    c.insertAdjacentHTML('beforeend','<div class="empty-state" style="padding:20px"><div>Aucun budget défini</div></div>');
  }

  // ── Section 3 : Détail par catégorie ──
  c.insertAdjacentHTML('beforeend','<div class="analyse-section-title">Détail par catégorie</div>');
  Object.entries(CATS).forEach(([key, cat]) => {
    const catTodos = todos.filter(t=>t.cat===key);
    const catDone = catTodos.filter(t=>t.done).length;
    const catTotal = catTodos.length;
    const catSpent = catTodos.reduce((s,t)=>s+t.budget,0);
    const catBudget = parseFloat(budgets[key]||0);
    const pctBudget = catBudget>0 ? Math.min(100,(catSpent/catBudget)*100) : 0;
    const pctDone = catTotal>0 ? Math.round((catDone/catTotal)*100) : 0;
    const over = catBudget>0 && catSpent>catBudget;

    const card = document.createElement('div');
    card.className = 'cat-analyse-card';
    card.style.borderLeftColor = CAT_COLORS[key];
    card.innerHTML = `
      <div class="cat-analyse-header">
        <span class="cat-analyse-name">${cat.emoji} ${cat.label}</span>
        <span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:${over?'var(--red-alert)':'var(--muted)'}">
          ${catSpent.toFixed(0)}€ / ${catBudget>0?catBudget.toFixed(0)+'€':'—'}
        </span>
      </div>
      <div class="cat-analyse-stats">
        <div class="cat-stat">
          <div class="cat-stat-val">${catTotal}</div>
          <div class="cat-stat-lbl">tâches</div>
        </div>
        <div class="cat-stat">
          <div class="cat-stat-val" style="color:#8ec46a">${catDone}</div>
          <div class="cat-stat-lbl">faites</div>
        </div>
        <div class="cat-stat">
          <div class="cat-stat-val">${pctDone}%</div>
          <div class="cat-stat-lbl">complétion</div>
        </div>
        <div class="cat-stat">
          <div class="cat-stat-val" style="color:${over?'var(--red-alert)':'var(--orange-light)'}">${catSpent.toFixed(0)}€</div>
          <div class="cat-stat-lbl">alloué</div>
        </div>
      </div>
      ${catBudget>0?`
      <div class="cat-bar-outer">
        <div class="cat-bar-fill" style="width:${pctBudget}%;background:${over?'var(--red-alert)':CAT_COLORS[key]}"></div>
      </div>
      <div class="cat-bar-label">
        <span>0€</span><span>${over?'⚠ DÉPASSÉ':pctBudget.toFixed(0)+'%'}</span><span>${catBudget.toFixed(0)}€</span>
      </div>`:''}`;
    c.appendChild(card);
  });

  // ── Section 4 : Top coûts ──
  const topTodos = [...todos].filter(t=>t.budget>0).sort((a,b)=>b.budget-a.budget).slice(0,5);
  if (topTodos.length) {
    c.insertAdjacentHTML('beforeend','<div class="analyse-section-title">Top coûts</div>');
    topTodos.forEach((t,i) => {
      const cat = CATS[t.cat]||CATS.divers;
      c.insertAdjacentHTML('beforeend',`
        <div style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:9px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;border-left:3px solid ${CAT_COLORS[t.cat]||'#888'}">
          <span style="font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--muted);width:18px">${'①②③④⑤'[i]}</span>
          <div style="flex:1;min-width:0">
            <div style="font-family:'DM Mono',monospace;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;${t.done?'text-decoration:line-through;color:var(--muted)':''}">${escHtml(t.title)}</div>
            <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted)">${cat.emoji} ${cat.label}</div>
          </div>
          <span style="font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:var(--orange)">${t.budget.toFixed(0)}€</span>
        </div>`);
    });
  }
}

// ─── EXPORT / IMPORT ─────────────────────────────────────────────────────────
function exportJSON() {
  const data = { todos, budgets, exported: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `todo_terrain_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function importJSON() {
  document.getElementById('importInput').click();
}
document.getElementById('importInput').onchange = e => {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.todos) todos = data.todos;
      if (data.budgets) budgets = { ...budgets, ...data.budgets };
      save(); renderAll();
      showUndo('Import réussi ✓');
    } catch { showUndo('Erreur import JSON'); }
  };
  reader.readAsText(file);
  e.target.value = '';
};

// ─── FULL RENDER ─────────────────────────────────────────────────────────────
function renderAll() {
  renderKPI();
  renderList();
}

load();
renderAll();
</script>
