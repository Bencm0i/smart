<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SCAN COUNT</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;600;800&display=swap');

  :root {
    --bg: #0d0d0d;
    --panel: #141414;
    --border: #2a2a2a;
    --accent: #e8ff00;
    --accent2: #ff4444;
    --confirm: #00ff88;
    --text: #e0e0e0;
    --muted: #555;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow Condensed', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
  }

  #total-block { text-align: right; cursor: default; }

  #total-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  #total-display {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: bold;
    color: var(--accent);
    line-height: 1;
    transition: color 0.3s;
  }

  #total-display.near-max { color: #ff8800; }
  #total-display.at-max { color: var(--confirm); }

  #max-bar-wrap {
    height: 4px;
    background: var(--border);
    margin-top: 3px;
    border-radius: 2px;
    overflow: hidden;
  }

  #max-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease, background 0.3s;
  }

  /* TABS */
  #tabs {
    display: flex;
    background: var(--panel);
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 57px;
    z-index: 99;
  }

  .tab-btn {
    flex: 1;
    padding: 11px 8px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: color 0.2s, border-color 0.2s;
  }

  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab-pane { display: none; flex-direction: column; flex: 1; }
  .tab-pane.active { display: flex; }

  /* SUCCESS OVERLAY */
  #success-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 500;
    background: rgba(0, 255, 136, 0.08);
    pointer-events: none;
    border: 4px solid var(--confirm);
    animation: success-border 1s ease infinite alternate;
  }

  @keyframes success-border {
    from { border-color: var(--confirm); box-shadow: inset 0 0 30px rgba(0,255,136,0.1); }
    to   { border-color: transparent;   box-shadow: inset 0 0 0px rgba(0,255,136,0); }
  }

  #success-banner {
    display: none;
    background: var(--confirm);
    color: #000;
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 3px;
    text-align: center;
    padding: 10px;
    font-weight: bold;
    animation: banner-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes banner-pop {
    from { transform: scaleY(0); opacity: 0; }
    to   { transform: scaleY(1); opacity: 1; }
  }

  /* SCANNER */
  #scanner-viewport {
    position: relative;
    width: 100%;
    height: 200px;
    overflow: hidden;
    background: #000;
  }

  #scanner-viewport video,
  #scanner-viewport canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100% !important;
    height: 100% !important;
    object-fit: cover;
  }

  #scanner-viewport canvas.drawingBuffer { display: none; }

  #scan-line {
    position: absolute;
    left: 10%; width: 80%; height: 2px;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent), 0 0 20px var(--accent);
    z-index: 10;
    display: none;
    animation: scanline 2s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes scanline {
    0%, 100% { top: 20%; }
    50%       { top: 80%; }
  }

  .bracket { position: absolute; width: 24px; height: 24px; z-index: 11; pointer-events: none; }
  .bracket.tl { top: 12px; left: 10%; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
  .bracket.tr { top: 12px; right: 10%; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }
  .bracket.bl { bottom: 12px; left: 10%; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }
  .bracket.br { bottom: 12px; right: 10%; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

  #scanner-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    height: 100%;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 2px;
  }

  /* PENDING BAR */
  #pending-bar {
    display: none;
    flex-direction: column;
    background: #1a1a00;
    border-bottom: 2px solid var(--accent);
  }

  #pending-bar.duplicate {
    background: #100800;
    border-bottom-color: #ff8800;
  }

  #pending-bar.duplicate #pending-code-val { color: #ff8800; }
  #pending-bar.duplicate #pending-timer-bar { background: #ff8800; }

  #pending-main {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
  }

  #pending-info { flex: 1; min-width: 0; }

  #pending-code-val {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--accent);
    word-break: break-all;
    display: block;
  }

  #pending-count-info {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* duplicate badge */
  #duplicate-badge {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 6px 16px 8px;
    background: rgba(255,136,0,0.08);
    border-top: 1px solid #3a2000;
  }

  #duplicate-badge .dup-icon {
    font-size: 14px;
    flex-shrink: 0;
  }

  #duplicate-badge .dup-text {
    font-family: var(--mono);
    font-size: 10px;
    color: #ff8800;
    letter-spacing: 1px;
    line-height: 1.4;
    flex: 1;
  }

  #duplicate-badge .dup-sessions {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    display: block;
    margin-top: 1px;
  }

  /* auto-timer progress */
  #pending-timer-wrap {
    height: 3px;
    background: rgba(255,255,255,0.06);
  }

  #pending-timer-bar {
    height: 100%;
    width: 100%;
    background: var(--confirm);
    transform-origin: left;
    transition: none;
  }

  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 600;
    padding: 13px 16px;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* CONTROLS */
  #controls {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    justify-content: flex-start;
  }

  .btn {
    padding: 14px 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    min-width: 120px;
  }

  .btn:active { opacity: 0.8; }

  .btn-primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 800;
  }

  .btn-primary.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #fff;
  }

  .btn-danger { color: var(--accent2); border-color: #2a1111; }

  /* MAX CONFIG */
  #max-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }

  #max-row label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  #max-input {
    width: 80px;
    background: #0a0a0a;
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 16px;
    padding: 4px 8px;
    text-align: center;
    outline: none;
  }

  #max-input:focus { border-color: var(--accent); }
  #max-input:disabled { opacity: 0.3; }

  #max-toggle {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 4px 8px;
    cursor: pointer;
    letter-spacing: 1px;
  }

  #max-toggle.on { color: var(--accent); border-color: var(--accent); }

  /* MANUAL ROW */
  #manual-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    justify-content: flex-start;
  }

  #manual-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-left: auto;
  }

  #manual-btns { display: flex; gap: 8px; }

  #manual-dec, #manual-inc {
    width: 56px;
    height: 56px;
    font-size: 28px;
    font-weight: bold;
    border: 1px solid var(--border);
    background: #0a0a0a;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
  }

  #manual-inc { color: var(--confirm); border-color: var(--confirm); }
  #manual-dec { color: var(--accent2); border-color: #2a1111; }
  #manual-inc:active { background: #001a0e; }
  #manual-dec:active { background: #1a0000; }

  #manual-lock {
    font-size: 20px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 44px;
    height: 44px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }

  #manual-lock.locked {
    color: #ff8800;
    border-color: #ff8800;
    background: #1a0e00;
  }

  /* COOLDOWN BAR */
  #cooldown-bar-wrap { height: 2px; background: var(--border); }
  #cooldown-bar { height: 100%; width: 0%; background: var(--accent); }

  /* PRODUCT LIST */
  #product-list { flex: 1; overflow-y: auto; }

  .product-item {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }

  .product-item.new-item {
    animation: slideIn 0.2s ease forwards;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .product-item.bump {
    animation: bump 0.4s ease forwards;
  }

  @keyframes bump {
    0%   { background: #1a1a00; }
    100% { background: transparent; }
  }

  .product-barcode {
    flex: 1;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    word-break: break-all;
  }

  .product-barcode small {
    display: block;
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .product-count {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: bold;
    color: var(--accent);
    min-width: 48px;
    text-align: right;
    line-height: 1;
  }

  .btn-minus {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 38px;
    height: 38px;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-minus:active { background: #1a0000; color: var(--accent2); }

  .empty-state {
    padding: 48px 24px;
    text-align: center;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 2px;
    line-height: 2;
  }

  #product-list::-webkit-scrollbar { width: 3px; }
  #product-list::-webkit-scrollbar-thumb { background: var(--border); }

  /* SCAN FLASH */
  #flash {
    position: fixed;
    inset: 0;
    background: var(--confirm);
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.05s;
  }

  /* ── DATABASE TAB ── */
  #db-pane {
    flex: 1;
    display: none;
    flex-direction: column;
  }
  #db-pane.active { display: flex; }

  #db-toolbar {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    align-items: center;
    flex-wrap: wrap;
  }

  #db-toolbar-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    flex: 1;
    white-space: nowrap;
  }

  .btn-db {
    padding: 10px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
  }

  .btn-db:active { opacity: 0.8; }
  .btn-db-accent { color: var(--accent); border-color: var(--accent); }
  .btn-db-danger { color: var(--accent2); border-color: #2a1111; }

  #db-list { flex: 1; overflow-y: auto; }
  #db-list::-webkit-scrollbar { width: 3px; }
  #db-list::-webkit-scrollbar-thumb { background: var(--border); }

  .db-session {
    border-bottom: 2px solid var(--border);
  }

  .db-session-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: #111;
    cursor: pointer;
    user-select: none;
  }

  .db-session-header:active { background: #1a1a00; }

  .db-session-date {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 1px;
    flex: 1;
  }

  .db-session-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-align: right;
  }

  .db-session-chevron {
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.2s;
  }

  .db-session.open .db-session-chevron { transform: rotate(90deg); }

  .db-session-body { display: none; }
  .db-session.open .db-session-body { display: block; }

  .db-entry {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }

  .db-entry-left {
    flex: 1;
    min-width: 0;
  }

  .db-entry-code {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    word-break: break-all;
  }

  .db-entry-label-wrap {
    margin-top: 4px;
  }

  .db-entry-label {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    width: 100%;
    padding: 2px 0;
    outline: none;
    transition: border-color 0.2s;
  }

  .db-entry-label:focus {
    border-bottom-color: var(--accent);
    color: var(--accent);
  }

  .db-entry-label::placeholder { color: var(--muted); font-style: italic; }

  .db-entry-count {
    font-family: var(--mono);
    font-size: 24px;
    font-weight: bold;
    color: var(--accent);
    min-width: 40px;
    text-align: right;
    flex-shrink: 0;
  }

  .db-empty {
    padding: 48px 24px;
    text-align: center;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 2px;
    line-height: 2;
  }

  /* save btn in db-session */
  #db-save-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    justify-content: flex-end;
  }

  #db-save-btn button {
    padding: 12px 20px;
    background: var(--confirm);
    color: #000;
    border: none;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
  }

  #db-save-btn button:active { opacity: 0.8; }

  #db-save-btn span {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div id="flash"></div>
<div id="success-overlay"></div>

<header>
  <h1>⬛ Scan Count</h1>
  <div id="total-block">
    <div id="total-label">TOTAL / <span id="max-label">∞</span></div>
    <div id="total-display">0</div>
    <div id="max-bar-wrap"><div id="max-bar"></div></div>
  </div>
</header>

<!-- TABS -->
<div id="tabs">
  <button class="tab-btn active" onclick="switchTab('scan')">📷 SCANNER</button>
  <button class="tab-btn" onclick="switchTab('db')" id="tab-db-btn">🗄 BASE DE DONNÉES</button>
</div>

<!-- ══ ONGLET SCANNER ══ -->
<div class="tab-pane active" id="scan-pane">

  <div id="success-banner">✔ COMMANDE COMPLÈTE</div>

  <div id="scanner-viewport">
    <div id="scanner-placeholder">
      <div style="font-size:36px;opacity:0.4">📷</div>
      <div>APPUYER SUR DÉMARRER</div>
    </div>
    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>
    <div id="scan-line"></div>
  </div>

  <div id="cooldown-bar-wrap"><div id="cooldown-bar"></div></div>

  <div id="pending-bar">
    <div id="pending-main">
      <div id="pending-info">
        <span id="pending-code-val">—</span>
        <span id="pending-count-info"></span>
      </div>
      <button class="btn-cancel" onclick="cancelPending()">✕</button>
    </div>
    <div id="duplicate-badge">
      <span class="dup-icon">⚠</span>
      <div class="dup-text">
        PRODUIT DÉJÀ PRÉSENT EN SESSION
        <span class="dup-sessions" id="dup-sessions-info"></span>
      </div>
    </div>
    <div id="pending-timer-wrap"><div id="pending-timer-bar"></div></div>
  </div>

  <div id="controls">
    <button class="btn btn-primary" id="toggle-btn" onclick="toggleScanner()">DÉMARRER</button>
    <button class="btn btn-danger" onclick="confirmReset()">RESET</button>
  </div>

  <div id="manual-row">
    <button id="manual-lock" onclick="toggleManualLock()">🔓</button>
    <div id="manual-btns" style="display:none">
      <button id="manual-dec" onclick="manualDecrement()">−</button>
      <button id="manual-inc" onclick="manualIncrement()">+</button>
    </div>
    <span id="manual-label">SAISIE MANUELLE</span>
  </div>

  <div id="max-row">
    <label>QTÉ COMMANDÉE :</label>
    <input type="number" id="max-input" placeholder="—" inputmode="numeric" min="1" oninput="onMaxInput(this.value)" disabled>
    <button id="max-toggle" onclick="toggleMax()">OFF</button>
  </div>

  <!-- Save to DB bar -->
  <div id="db-save-btn">
    <span>ENREGISTRER LA SESSION →</span>
    <button onclick="saveSessionToDB()">💾 SAUVEGARDER</button>
  </div>

  <div id="product-list">
    <div class="empty-state" id="empty-state">AUCUN PRODUIT SCANNÉ<br>— — —</div>
  </div>

</div><!-- /scan-pane -->

<!-- ══ ONGLET BASE DE DONNÉES ══ -->
<div class="tab-pane" id="db-pane">
  <div id="db-toolbar">
    <span id="db-toolbar-title">SESSIONS SAUVEGARDÉES</span>
    <button class="btn-db btn-db-danger" onclick="clearAllDB()">TOUT EFFACER</button>
  </div>
  <div id="db-list">
    <div class="db-empty" id="db-empty">AUCUNE SESSION SAUVEGARDÉE<br>— — —</div>
  </div>
</div>

<script>
  const COOLDOWN_MS = 2000;
  const PENDING_MS  = 1000;   // auto-confirm delay

  let scanning = false;
  let cooldownActive = false;
  let cooldownTimer = null;
  let cooldownRAF = null;
  let data = {};
  let maxEnabled = false;
  let maxValue = 0;
  let pendingCode = null;
  let pendingTimer = null;
  let pendingRAF   = null;

  let manualLocked = false;
  const MANUAL_CODE = '__MANUAL__';

  // ── TABS ──────────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'scan') || (i === 1 && tab === 'db'));
    });
    document.getElementById('scan-pane').classList.toggle('active', tab === 'scan');
    document.getElementById('db-pane').classList.toggle('active', tab === 'db');
    if (tab === 'db') renderDB();
  }

  function toggleManualLock() {
    manualLocked = !manualLocked;
    const btn  = document.getElementById('manual-lock');
    const btns = document.getElementById('manual-btns');
    btn.textContent = manualLocked ? '🔒' : '🔓';
    btn.className   = manualLocked ? 'locked' : '';
    btns.style.display = manualLocked ? 'flex' : 'none';
  }

  function manualIncrement() {
    if (isMaxReached()) return;
    if (!data[MANUAL_CODE]) data[MANUAL_CODE] = {
      count: 0,
      first: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })
    };
    data[MANUAL_CODE].count++;
    saveData();
    doFlash();
    renderItem(MANUAL_CODE, data[MANUAL_CODE].count === 1);
    updateTotal();
  }

  function manualDecrement() {
    decrement(MANUAL_CODE);
  }

  // ── PERSISTENCE ───────────────────────────────────────────
  function loadData() {
    try { data = JSON.parse(localStorage.getItem('scan_data') || '{}'); } catch { data = {}; }
    try {
      const cfg = JSON.parse(localStorage.getItem('scan_config') || '{}');
      maxEnabled = cfg.maxEnabled || false;
      maxValue   = cfg.maxValue   || 0;
    } catch {}
    applyMaxUI();
    renderAll();
  }

  function saveData()   { localStorage.setItem('scan_data',   JSON.stringify(data)); }
  function saveConfig() { localStorage.setItem('scan_config', JSON.stringify({ maxEnabled, maxValue })); }

  function onMaxInput(val) {
    maxValue = parseInt(val) || 0;
    saveConfig();
    updateTotal();
  }

  function toggleMax() {
    maxEnabled = !maxEnabled;
    applyMaxUI();
    saveConfig();
  }

  function applyMaxUI() {
    const btn = document.getElementById('max-toggle');
    const inp = document.getElementById('max-input');
    btn.textContent = maxEnabled ? 'ON' : 'OFF';
    btn.className   = maxEnabled ? 'on' : '';
    inp.disabled    = !maxEnabled;
    if (maxEnabled && maxValue) inp.value = maxValue;
    updateTotal();
  }

  // ── TOTAL ─────────────────────────────────────────────────
  function getTotal() {
    return Object.values(data).reduce((s, v) => s + v.count, 0);
  }

  function isMaxReached() {
    return maxEnabled && maxValue > 0 && getTotal() >= maxValue;
  }

  function updateTotal() {
    const total = getTotal();
    const disp    = document.getElementById('total-display');
    const bar     = document.getElementById('max-bar');
    const overlay = document.getElementById('success-overlay');
    const banner  = document.getElementById('success-banner');
    const label   = document.getElementById('max-label');

    disp.textContent = total;

    if (maxEnabled && maxValue > 0) {
      const pct = Math.min(100, (total / maxValue) * 100);
      label.textContent = maxValue;
      bar.style.width = pct + '%';

      if (total >= maxValue) {
        bar.style.background = 'var(--confirm)';
        disp.className = 'at-max';
        if (overlay.style.display !== 'block') {
          overlay.style.display = 'block';
          banner.style.display  = 'block';
        }
      } else if (pct >= 80) {
        bar.style.background = '#ff8800';
        disp.className = 'near-max';
        overlay.style.display = 'none';
        banner.style.display  = 'none';
      } else {
        bar.style.background = 'var(--accent)';
        disp.className = '';
        overlay.style.display = 'none';
        banner.style.display  = 'none';
      }
    } else {
      label.textContent = '∞';
      bar.style.width   = '0%';
      disp.className    = '';
      overlay.style.display = 'none';
      banner.style.display  = 'none';
    }
  }

  // ── PENDING + AUTO-TIMER ──────────────────────────────────
  function showPending(code) {
    pendingCode = code;
    const existing    = data[code] ? data[code].count : 0;
    const isDuplicate = existing > 0;

    document.getElementById('pending-code-val').textContent = code;
    document.getElementById('pending-count-info').textContent =
      existing > 0 ? `Déjà ×${existing} → sera ×${existing + 1}` : 'Nouveau produit';

    const badge = document.getElementById('duplicate-badge');
    const bar   = document.getElementById('pending-bar');

    if (isDuplicate) {
      badge.style.display = 'flex';
      // also check how many past sessions contain this code
      const db = getDB();
      const sessionsWithCode = db.filter(s => s.items.some(i => i.code === code));
      const info = document.getElementById('dup-sessions-info');
      info.textContent = sessionsWithCode.length > 0
        ? `Présent dans ${sessionsWithCode.length} session(s) sauvegardée(s)`
        : 'Pas encore dans la base de données';
      bar.className = 'duplicate';
    } else {
      badge.style.display = 'none';
      bar.className = '';
    }

    bar.style.display = 'flex';
    startPendingTimer();
  }

  function startPendingTimer() {
    clearTimeout(pendingTimer);
    if (pendingRAF) cancelAnimationFrame(pendingRAF);

    const bar   = document.getElementById('pending-timer-bar');
    const start = performance.now();

    function tick(now) {
      const elapsed = now - start;
      const pct     = Math.max(0, 100 - (elapsed / PENDING_MS) * 100);
      bar.style.width = pct + '%';
      if (elapsed < PENDING_MS) {
        pendingRAF = requestAnimationFrame(tick);
      } else {
        bar.style.width = '0%';
        confirmPending();
      }
    }

    bar.style.width = '100%';
    pendingRAF = requestAnimationFrame(tick);
    pendingTimer = setTimeout(confirmPending, PENDING_MS);
  }

  function confirmPending() {
    if (!pendingCode) return;
    clearTimeout(pendingTimer);
    if (pendingRAF) { cancelAnimationFrame(pendingRAF); pendingRAF = null; }
    if (isMaxReached()) { cancelPending(); return; }
    addCode(pendingCode);
    pendingCode = null;
    document.getElementById('pending-bar').style.display  = 'none';
    document.getElementById('duplicate-badge').style.display = 'none';
    startCooldown();
  }

  function cancelPending() {
    clearTimeout(pendingTimer);
    if (pendingRAF) { cancelAnimationFrame(pendingRAF); pendingRAF = null; }
    pendingCode = null;
    document.getElementById('pending-bar').style.display  = 'none';
    document.getElementById('duplicate-badge').style.display = 'none';
    startCooldown();
  }

  // ── COOLDOWN ──────────────────────────────────────────────
  function startCooldown() {
    cooldownActive = true;
    clearTimeout(cooldownTimer);
    if (cooldownRAF) cancelAnimationFrame(cooldownRAF);

    const bar   = document.getElementById('cooldown-bar');
    const start = performance.now();

    function tick(now) {
      const elapsed = now - start;
      const pct     = Math.max(0, 100 - (elapsed / COOLDOWN_MS) * 100);
      bar.style.width = pct + '%';
      if (elapsed < COOLDOWN_MS) {
        cooldownRAF = requestAnimationFrame(tick);
      } else {
        bar.style.width  = '0%';
        cooldownActive   = false;
      }
    }

    bar.style.width = '100%';
    cooldownRAF     = requestAnimationFrame(tick);
    cooldownTimer   = setTimeout(() => { cooldownActive = false; }, COOLDOWN_MS);
  }

  // ── ADD CODE ──────────────────────────────────────────────
  function addCode(code) {
    if (!code || code.length < 3) return;
    const isNew = !data[code];
    if (isNew) data[code] = {
      count: 0,
      first: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }),
      label: ''
    };
    data[code].count++;
    saveData();
    doFlash();
    renderItem(code, isNew);
    updateTotal();
  }

  function doFlash() {
    const el = document.getElementById('flash');
    el.style.opacity = '0.12';
    setTimeout(() => { el.style.opacity = '0'; }, 100);
  }

  // ── SCAN DETECTION ────────────────────────────────────────
  function onCodeDetected(code) {
    if (cooldownActive)      return;
    if (pendingCode !== null) return;
    if (isMaxReached())      return;
    cooldownActive = true;
    showPending(code);
  }

  // ── RENDER (onglet scanner) ───────────────────────────────
  function renderItem(code, isNew) {
    const list = document.getElementById('product-list');
    document.getElementById('empty-state')?.remove();

    const label    = code === '__MANUAL__' ? '— SAISIE MANUELLE —' : code;
    const subLabel = code === '__MANUAL__' ? 'Incrémenté manuellement' : `Premier scan : ${data[code].first}`;
    const savedLbl = data[code].label || '';

    let item = document.getElementById('item-' + code);
    if (!item) {
      item = document.createElement('div');
      item.className = 'product-item new-item';
      item.id = 'item-' + code;
      item.innerHTML = `
        <button class="btn-minus" onclick="decrement('${code}')">−</button>
        <div class="product-barcode">
          ${label}
          <small>${subLabel}</small>
        </div>
        <div class="product-count" id="count-${code}">${data[code].count}</div>
      `;
      list.prepend(item);
    } else {
      document.getElementById('count-' + code).textContent = data[code].count;
      item.classList.remove('bump', 'new-item');
      void item.offsetWidth;
      item.classList.add('bump');
    }
  }

  function renderAll() {
    const list = document.getElementById('product-list');
    list.innerHTML = '';
    const keys = Object.keys(data);
    if (keys.length === 0) {
      list.innerHTML = '<div class="empty-state" id="empty-state">AUCUN PRODUIT SCANNÉ<br>— — —</div>';
    } else {
      keys.forEach(code => {
        const label    = code === '__MANUAL__' ? '— SAISIE MANUELLE —' : code;
        const subLabel = code === '__MANUAL__' ? 'Incrémenté manuellement' : `Premier scan : ${data[code].first}`;
        const item = document.createElement('div');
        item.className = 'product-item';
        item.id = 'item-' + code;
        item.innerHTML = `
          <button class="btn-minus" onclick="decrement('${code}')">−</button>
          <div class="product-barcode">
            ${label}
            <small>${subLabel}</small>
          </div>
          <div class="product-count" id="count-${code}">${data[code].count}</div>
        `;
        list.appendChild(item);
      });
    }
    updateTotal();
  }

  function decrement(code) {
    if (!data[code]) return;
    data[code].count--;
    if (data[code].count <= 0) {
      delete data[code];
      document.getElementById('item-' + code)?.remove();
      if (Object.keys(data).length === 0)
        document.getElementById('product-list').innerHTML =
          '<div class="empty-state" id="empty-state">AUCUN PRODUIT SCANNÉ<br>— — —</div>';
    } else {
      document.getElementById('count-' + code).textContent = data[code].count;
    }
    saveData();
    updateTotal();
  }

  function confirmReset() {
    if (Object.keys(data).length === 0) return;
    if (confirm('Remettre tous les compteurs à zéro ?')) {
      data = {};
      saveData();
      renderAll();
      cancelPending();
    }
  }

  // ── SCANNER ───────────────────────────────────────────────
  function toggleScanner() { scanning ? stopScanner() : startScanner(); }

  function startScanner() {
    document.getElementById('scanner-placeholder').style.display = 'none';
    document.getElementById('scan-line').style.display = 'block';

    Quagga.init({
      inputStream: {
        name: 'Live',
        type: 'LiveStream',
        target: document.getElementById('scanner-viewport'),
        constraints: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'environment' }
      },
      decoder: {
        readers: ['ean_reader', 'ean_8_reader', 'code_128_reader', 'code_39_reader', 'upc_reader', 'upc_e_reader']
      },
      locate: true,
      frequency: 8
    }, err => {
      if (err) {
        alert('Impossible d\'accéder à la caméra : ' + err.message);
        document.getElementById('scanner-placeholder').style.display = 'flex';
        document.getElementById('scan-line').style.display = 'none';
        return;
      }
      Quagga.start();
      scanning = true;
      const btn = document.getElementById('toggle-btn');
      btn.textContent = 'STOPPER';
      btn.classList.add('active');
    });

    Quagga.onDetected(result => {
      const code = result?.codeResult?.code;
      if (code) onCodeDetected(code);
    });
  }

  function stopScanner() {
    Quagga.stop();
    scanning = false;
    const btn = document.getElementById('toggle-btn');
    btn.textContent = 'DÉMARRER';
    btn.classList.remove('active');
    document.getElementById('scan-line').style.display = 'none';
    document.getElementById('scanner-placeholder').style.display = 'flex';
    document.getElementById('scanner-viewport').querySelectorAll('video, canvas').forEach(el => el.remove());
  }

  // ── BASE DE DONNÉES ───────────────────────────────────────
  function getDB() {
    try { return JSON.parse(localStorage.getItem('scan_db') || '[]'); } catch { return []; }
  }

  function saveDB(db) {
    localStorage.setItem('scan_db', JSON.stringify(db));
  }

  function saveSessionToDB() {
    const keys = Object.keys(data);
    if (keys.length === 0) {
      alert('Aucun produit à sauvegarder.');
      return;
    }
    const db = getDB();
    const session = {
      id: Date.now(),
      date: new Date().toLocaleDateString('fr-FR', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' }),
      time: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }),
      total: getTotal(),
      items: Object.entries(data).map(([code, v]) => ({
        code,
        count: v.count,
        first: v.first,
        label: v.label || ''
      }))
    };
    db.unshift(session);
    saveDB(db);
    // badge update
    document.getElementById('tab-db-btn').textContent = `🗄 BASE DE DONNÉES (${db.length})`;
    alert(`Session sauvegardée — ${session.total} articles.`);
  }

  function renderDB() {
    const db = getDB();
    const list = document.getElementById('db-list');
    const empty = document.getElementById('db-empty');

    // badge
    document.getElementById('tab-db-btn').textContent = db.length
      ? `🗄 BASE DE DONNÉES (${db.length})`
      : '🗄 BASE DE DONNÉES';

    if (db.length === 0) {
      list.innerHTML = '<div class="db-empty" id="db-empty">AUCUNE SESSION SAUVEGARDÉE<br>— — —</div>';
      return;
    }

    list.innerHTML = '';
    db.forEach((session, si) => {
      const div = document.createElement('div');
      div.className = 'db-session';
      div.id = 'session-' + session.id;

      const itemsHTML = session.items.map((item, ii) => `
        <div class="db-entry">
          <div class="db-entry-left">
            <div class="db-entry-code">${item.code === '__MANUAL__' ? '— SAISIE MANUELLE —' : item.code}</div>
            <div class="db-entry-label-wrap">
              <input class="db-entry-label"
                type="text"
                placeholder="Ajouter une description..."
                value="${escHtml(item.label || '')}"
                onchange="updateDBLabel(${session.id}, ${ii}, this.value)"
                onclick="event.stopPropagation()"
              >
            </div>
          </div>
          <div class="db-entry-count">×${item.count}</div>
        </div>
      `).join('');

      div.innerHTML = `
        <div class="db-session-header" onclick="toggleSession(${session.id})">
          <div>
            <div class="db-session-date">📅 ${session.date} ${session.time}</div>
          </div>
          <div class="db-session-meta">${session.items.length} réf. — ${session.total} art.</div>
          <span class="db-session-chevron">▶</span>
        </div>
        <div class="db-session-body">
          ${itemsHTML}
          <div style="padding:8px 16px; display:flex; gap:8px; justify-content:flex-end; background:#111; border-top:1px solid var(--border)">
            <button class="btn-db btn-db-danger" onclick="deleteSession(${session.id})">🗑 SUPPRIMER</button>
          </div>
        </div>
      `;

      list.appendChild(div);
    });
  }

  function toggleSession(id) {
    const el = document.getElementById('session-' + id);
    el.classList.toggle('open');
  }

  function updateDBLabel(sessionId, itemIndex, value) {
    const db = getDB();
    const s = db.find(s => s.id === sessionId);
    if (s && s.items[itemIndex] !== undefined) {
      s.items[itemIndex].label = value;
      saveDB(db);
    }
  }

  function deleteSession(id) {
    if (!confirm('Supprimer cette session ?')) return;
    let db = getDB();
    db = db.filter(s => s.id !== id);
    saveDB(db);
    renderDB();
  }

  function clearAllDB() {
    if (!confirm('Effacer toute la base de données ?')) return;
    localStorage.removeItem('scan_db');
    renderDB();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadData();
</script>
</body>
</html>
