<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SCAN COUNT</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;600;800&display=swap');

  :root {
    --bg: #0d0d0d;
    --panel: #141414;
    --border: #2a2a2a;
    --accent: #e8ff00;
    --accent2: #ff4444;
    --text: #e0e0e0;
    --muted: #555;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow Condensed', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
  }

  #total-badge {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
  }

  #total-badge span {
    color: var(--text);
    font-size: 16px;
  }

  /* SCANNER SECTION */
  #scanner-section {
    position: relative;
    background: #000;
  }

  #scanner-viewport {
    position: relative;
    width: 100%;
    height: 220px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #scanner-viewport video,
  #scanner-viewport canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100% !important;
    height: 100% !important;
    object-fit: cover;
  }

  #scanner-viewport canvas.drawingBuffer { display: none; }

  /* Scan line overlay */
  #scan-line {
    position: absolute;
    left: 10%;
    width: 80%;
    height: 2px;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent), 0 0 20px var(--accent);
    z-index: 10;
    animation: scanline 2s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes scanline {
    0%, 100% { top: 20%; }
    50% { top: 80%; }
  }

  /* Corner brackets */
  .bracket {
    position: absolute;
    width: 24px;
    height: 24px;
    z-index: 11;
    pointer-events: none;
  }
  .bracket.tl { top: 12px; left: 10%; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
  .bracket.tr { top: 12px; right: 10%; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }
  .bracket.bl { bottom: 12px; left: 10%; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }
  .bracket.br { bottom: 12px; right: 10%; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

  #scanner-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    height: 100%;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 2px;
  }

  .cam-icon {
    font-size: 36px;
    opacity: 0.4;
  }

  /* Controls */
  #controls {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }

  .btn {
    flex: 1;
    padding: 10px 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 800;
  }

  .btn-primary.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #fff;
  }

  .btn-danger {
    color: var(--accent2);
    border-color: #2a1111;
  }

  /* Feedback flash */
  #flash {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--accent);
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.05s;
  }

  #last-scan {
    padding: 8px 16px;
    background: #111;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    min-height: 32px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #last-scan .code { color: var(--accent); font-size: 13px; }
  #last-scan .new-tag {
    background: var(--accent);
    color: #000;
    font-size: 9px;
    padding: 1px 5px;
    font-weight: bold;
    letter-spacing: 1px;
  }

  /* Product list */
  #product-list {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  .product-item {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .product-item.bump {
    animation: bump 0.3s ease;
  }

  @keyframes bump {
    0% { background: #1a1a00; }
    100% { background: transparent; }
  }

  .product-barcode {
    flex: 1;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    word-break: break-all;
  }

  .product-barcode small {
    display: block;
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .product-count {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: bold;
    color: var(--accent);
    min-width: 48px;
    text-align: right;
    line-height: 1;
  }

  .btn-minus {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 28px;
    height: 28px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-minus:active { background: #1a0000; color: var(--accent2); }

  .empty-state {
    padding: 48px 24px;
    text-align: center;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 2px;
    line-height: 2;
  }

  /* Manual input */
  #manual-row {
    display: flex;
    gap: 0;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }

  #manual-input {
    flex: 1;
    background: #0a0a0a;
    border: 1px solid var(--border);
    border-right: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 8px 12px;
    outline: none;
  }

  #manual-input:focus { border-color: var(--accent); }
  #manual-input::placeholder { color: var(--muted); font-size: 11px; }

  #manual-btn {
    background: var(--border);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 8px 14px;
    cursor: pointer;
    text-transform: uppercase;
  }

  #manual-btn:active { background: var(--accent); color: #000; }

  /* Scrollbar */
  #product-list::-webkit-scrollbar { width: 3px; }
  #product-list::-webkit-scrollbar-track { background: var(--bg); }
  #product-list::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<div id="flash"></div>

<header>
  <h1>⬛ Scan Count</h1>
  <div id="total-badge">TOTAL <span id="total-count">0</span></div>
</header>

<div id="scanner-section">
  <div id="scanner-viewport">
    <div id="scanner-placeholder">
      <div class="cam-icon">📷</div>
      <div>APPUYER SUR DÉMARRER</div>
    </div>
    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>
    <div id="scan-line" style="display:none"></div>
  </div>
</div>

<div id="controls">
  <button class="btn btn-primary" id="toggle-btn" onclick="toggleScanner()">DÉMARRER</button>
  <button class="btn btn-danger" onclick="confirmReset()">RESET</button>
</div>

<div id="manual-row">
  <input type="text" id="manual-input" placeholder="Code-barres manuel..." inputmode="numeric">
  <button id="manual-btn" onclick="manualAdd()">+ ADD</button>
</div>

<div id="last-scan">— en attente de scan —</div>

<div id="product-list">
  <div class="empty-state" id="empty-state">AUCUN PRODUIT SCANNÉ<br>— — —</div>
</div>

<script>
  let scanning = false;
  let cooldown = false;
  let data = {};

  // Load from localStorage
  function loadData() {
    try {
      const saved = localStorage.getItem('scan_count_data');
      if (saved) data = JSON.parse(saved);
    } catch(e) { data = {}; }
    renderAll();
  }

  function saveData() {
    localStorage.setItem('scan_count_data', JSON.stringify(data));
  }

  function addCode(code) {
    if (!code || code.length < 3) return;
    const isNew = !data[code];
    if (isNew) data[code] = { count: 0, first: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}) };
    data[code].count++;
    data[code].last = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    saveData();
    flash();
    updateLastScan(code, isNew);
    renderItem(code, isNew);
    updateTotal();
  }

  function flash() {
    const el = document.getElementById('flash');
    el.style.opacity = '0.15';
    setTimeout(() => { el.style.opacity = '0'; }, 120);
  }

  function updateLastScan(code, isNew) {
    const el = document.getElementById('last-scan');
    el.innerHTML = `SCAN <span class="code">${code}</span> → ×${data[code].count} ${isNew ? '<span class="new-tag">NOUVEAU</span>' : ''}`;
  }

  function renderItem(code, isNew) {
    const list = document.getElementById('product-list');
    document.getElementById('empty-state')?.remove();

    let item = document.getElementById('item-' + code);
    if (!item) {
      item = document.createElement('div');
      item.className = 'product-item';
      item.id = 'item-' + code;
      item.innerHTML = `
        <button class="btn-minus" onclick="decrement('${code}')">−</button>
        <div class="product-barcode">
          ${code}
          <small>Premier scan : ${data[code].first}</small>
        </div>
        <div class="product-count" id="count-${code}">${data[code].count}</div>
      `;
      list.prepend(item);
    } else {
      document.getElementById('count-' + code).textContent = data[code].count;
      item.classList.remove('bump');
      void item.offsetWidth;
      item.classList.add('bump');
    }
  }

  function renderAll() {
    const list = document.getElementById('product-list');
    list.innerHTML = '';
    const keys = Object.keys(data);
    if (keys.length === 0) {
      list.innerHTML = '<div class="empty-state" id="empty-state">AUCUN PRODUIT SCANNÉ<br>— — —</div>';
    } else {
      keys.forEach(code => renderItem(code, false));
    }
    updateTotal();
  }

  function updateTotal() {
    const total = Object.values(data).reduce((s, v) => s + v.count, 0);
    document.getElementById('total-count').textContent = total;
  }

  function decrement(code) {
    if (!data[code]) return;
    data[code].count--;
    if (data[code].count <= 0) {
      delete data[code];
      const item = document.getElementById('item-' + code);
      if (item) item.remove();
      if (Object.keys(data).length === 0) {
        document.getElementById('product-list').innerHTML = '<div class="empty-state" id="empty-state">AUCUN PRODUIT SCANNÉ<br>— — —</div>';
      }
    } else {
      document.getElementById('count-' + code).textContent = data[code].count;
    }
    saveData();
    updateTotal();
  }

  function confirmReset() {
    if (Object.keys(data).length === 0) return;
    if (confirm('Remettre tous les compteurs à zéro ?')) {
      data = {};
      saveData();
      renderAll();
      document.getElementById('last-scan').innerHTML = '— en attente de scan —';
    }
  }

  function manualAdd() {
    const input = document.getElementById('manual-input');
    const code = input.value.trim();
    if (code) {
      addCode(code);
      input.value = '';
    }
  }

  document.getElementById('manual-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') manualAdd();
  });

  function toggleScanner() {
    if (scanning) stopScanner();
    else startScanner();
  }

  function startScanner() {
    const btn = document.getElementById('toggle-btn');
    const placeholder = document.getElementById('scanner-placeholder');
    placeholder.style.display = 'none';
    document.getElementById('scan-line').style.display = 'block';

    Quagga.init({
      inputStream: {
        name: 'Live',
        type: 'LiveStream',
        target: document.getElementById('scanner-viewport'),
        constraints: {
          width: { ideal: 1280 },
          height: { ideal: 720 },
          facingMode: 'environment'
        }
      },
      decoder: {
        readers: ['ean_reader', 'ean_8_reader', 'code_128_reader', 'code_39_reader', 'upc_reader', 'upc_e_reader']
      },
      locate: true,
      frequency: 10
    }, err => {
      if (err) {
        alert('Impossible d\'accéder à la caméra : ' + err.message);
        placeholder.style.display = 'flex';
        document.getElementById('scan-line').style.display = 'none';
        return;
      }
      Quagga.start();
      scanning = true;
      btn.textContent = 'STOPPER';
      btn.classList.add('active');
    });

    Quagga.onDetected(result => {
      if (cooldown) return;
      const code = result.codeResult.code;
      if (!code) return;
      cooldown = true;
      addCode(code);
      setTimeout(() => { cooldown = false; }, 1500);
    });
  }

  function stopScanner() {
    Quagga.stop();
    scanning = false;
    const btn = document.getElementById('toggle-btn');
    btn.textContent = 'DÉMARRER';
    btn.classList.remove('active');
    document.getElementById('scan-line').style.display = 'none';
    const placeholder = document.getElementById('scanner-placeholder');
    placeholder.style.display = 'flex';
    // clear video
    const viewport = document.getElementById('scanner-viewport');
    viewport.querySelectorAll('video, canvas').forEach(el => el.remove());
  }

  loadData();
</script>
</body>
</html>
