<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiFi Studio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='10' fill='%23231f1a'/><circle cx='32' cy='36' r='14' fill='%23c8a26a' opacity='.3'/><circle cx='32' cy='36' r='9' fill='%23c8a26a' opacity='.5'/><circle cx='32' cy='36' r='5' fill='%23c8a26a'/><circle cx='32' cy='17' r='5' fill='%23c8a26a' opacity='.7'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}

/* ══ THÈMES FUSIONNÉS ══
   défaut = acier (platine)  |  warm = bois chaud (enceinte)  |  night = nuit (commun)
*/
body{
  --wood-d:#1a0f06;--wood-m:#2a1a0a;--wood-l:#3d2410;--wood-h:#5c3d1e;
  --gold:#c8a26a;--bg:#0d1117;
  --panel-bg:rgba(10,14,20,.92);--panel-border:rgba(0,180,255,.15);
  --muted:#3a4a5a;--led:#00ffcc;
  --neon1:#00d4ff;--neon2:#0088ff;--neon3:rgba(0,180,255,.18);
  --pb-border:rgba(0,180,255,.2);--pb-col:#4a6a8a;--text:#8ab0c8;
  background:var(--bg);font-family:'DM Mono',monospace;
  display:flex;flex-direction:column;
  transition:background .6s,color .6s;
}
body.warm{
  --wood-d:#3d2410;--wood-m:#5c3d1e;--wood-l:#8b5e3c;--wood-h:#a06b40;
  --gold:#c8a26a;--bg:#0c0806;
  --panel-bg:rgba(8,5,2,.92);--panel-border:rgba(200,140,60,.18);
  --muted:#5a4030;--led:#ffdd44;
  --neon1:#ffaa00;--neon2:#ff7700;--neon3:rgba(255,140,0,.15);
  --pb-border:rgba(200,140,60,.25);--pb-col:#8a6a3a;--text:#c8a26a;
}
body.night{
  --wood-d:#0a0818;--wood-m:#12102a;--wood-l:#1e1c3a;--wood-h:#2e2c50;
  --gold:#8866cc;--bg:#030206;
  --panel-bg:rgba(4,2,10,.95);--panel-border:rgba(140,60,255,.2);
  --muted:#2a1a4a;--led:#dd88ff;
  --neon1:#aa44ff;--neon2:#6622cc;--neon3:rgba(140,40,255,.15);
  --pb-border:rgba(140,60,255,.25);--pb-col:#6644aa;--text:#9966dd;
}

canvas#waves{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}

/* ══ CABINET ══ */
.cabinet{
  position:relative;z-index:2;flex:1;width:100%;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  transition:background .7s;
}

/* Cabinet vinyle (acier/nuit) */
.cabinet.mode-vinyl{
  background:
    repeating-linear-gradient(0deg,rgba(255,255,255,.04) 0,rgba(255,255,255,.04) 1px,transparent 1px,transparent 4px),
    linear-gradient(170deg,var(--wood-h) 0%,var(--wood-l) 8%,var(--wood-d) 18%,var(--wood-m) 30%,var(--wood-d) 45%,var(--wood-l) 60%,var(--wood-d) 75%,var(--wood-m) 88%,var(--wood-h) 100%);
  box-shadow:inset 0 3px 12px rgba(0,0,0,.6),inset 0 -3px 12px rgba(0,0,0,.4);
}

/* Cabinet enceinte (bois chaud) */
.cabinet.mode-hp{
  background:
    repeating-linear-gradient(90deg,rgba(0,0,0,.12) 0,rgba(0,0,0,.12) 1.5px,transparent 1.5px,transparent 5px),
    repeating-linear-gradient(180deg,rgba(255,255,255,.018) 0,rgba(255,255,255,.018) 1px,transparent 1px,transparent 38px),
    linear-gradient(168deg,var(--wood-h) 0%,var(--wood-l) 12%,var(--wood-m) 34%,var(--wood-d) 56%,var(--wood-m) 76%,var(--wood-l) 100%);
  box-shadow:inset 4px 0 10px rgba(255,255,255,.06),inset -4px 0 10px rgba(0,0,0,.5);
}

.cabinet::before{
  content:'';position:absolute;inset:-3px;z-index:0;pointer-events:none;border-radius:4px;
  box-shadow:
    0 0 18px 3px var(--neon1),
    0 0 40px 8px var(--neon2),
    0 0 80px 15px var(--neon3),
    inset 0 0 30px var(--neon3);
  animation:neonPulse 2.6s ease-in-out infinite;
  transition:box-shadow .7s;
}
@keyframes neonPulse{0%,100%{opacity:.8}50%{opacity:1}}
.cabinet::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 50%,rgba(0,0,0,.2) 100%)
}

/* ── Zones SVG ── */
.vinyl-zone,.hp-zone{
  position:relative;z-index:5;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .35s;
}
.vinyl-wrap{
  height:min(88vh,640px);width:auto;aspect-ratio:420/700;
}
.hp-zone{display:none}

/* ══ PANEL BAS ══ */
.panel{
  position:relative;z-index:10;width:100%;
  background:var(--panel-bg);
  border-top:1px solid var(--panel-border);
  padding:.7vh 1rem 1.1vh;
  display:flex;flex-direction:column;align-items:center;gap:.5vh;
  transition:background .6s,border-color .6s;
}

/* ── ONGLETS ── */
.tabs{display:flex;gap:0;border:1px solid var(--panel-border);border-radius:20px;overflow:hidden;transition:border-color .5s}
.tab{
  padding:.3rem 1.2rem;border:none;background:transparent;
  color:var(--muted);font-family:'DM Mono',monospace;
  font-size:clamp(.54rem,1.3vw,.68rem);letter-spacing:.18em;text-transform:uppercase;
  cursor:pointer;transition:all .22s;
}
.tab.active{background:var(--neon1);color:#050a0f}
.tab:hover:not(.active){color:var(--neon1)}

/* VU-mètre */
.vu-wrap{display:flex;gap:2px;height:14px;width:min(94%,600px);align-items:flex-end}
.vs{flex:1;border-radius:1px 1px 0 0;background:var(--neon1);opacity:.08;transition:opacity .055s,background .6s}
.vs.on{opacity:1}
.vs:nth-child(n+14){background:#d4856a}
.vs:nth-child(n+16){background:#d44040}

/* Status */
.status{display:flex;align-items:center;gap:8px;
  font-size:clamp(.5rem,1.2vw,.65rem);letter-spacing:.2em;text-transform:uppercase;color:var(--muted);transition:color .6s}
.ledDot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Horloge */
.clock{
  font-family:'DM Mono',monospace;font-size:clamp(1.2rem,3.8vw,2.2rem);
  font-weight:300;letter-spacing:.2em;color:var(--neon1);order:-1;
  text-shadow:0 0 14px var(--neon1),0 0 30px var(--neon2);
  transition:color .6s,text-shadow .6s;
}

/* ── Presets (platine) ── */
.presets{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center}
.pb{
  padding:.28rem .7rem;border:1px solid var(--pb-border);border-radius:20px;
  background:transparent;color:var(--pb-col);
  font-family:'DM Mono',monospace;font-size:clamp(.52rem,1.1vw,.65rem);
  letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .22s;
}
.pb:hover{border-color:var(--neon1);color:var(--neon1)}
.pb.active{background:var(--neon1);border-color:var(--neon1);color:#050a0f}

/* ── Sliders (enceinte) ── */
.sliders{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:.4rem 1rem;width:min(96%,640px);
}
.sl-row{display:flex;flex-direction:column;gap:.2rem;align-items:stretch}
.sl-label{font-size:clamp(.46rem,1vw,.58rem);letter-spacing:.18em;text-transform:uppercase;color:var(--muted);text-align:center;transition:color .4s}
.sl-val{font-size:clamp(.5rem,1vw,.6rem);letter-spacing:.1em;color:var(--gold);text-align:center;transition:color .4s}
input[type=range]{
  -webkit-appearance:none;appearance:none;
  width:100%;height:3px;border-radius:2px;
  background:linear-gradient(to right,var(--gold) 0%,var(--gold) var(--pct,50%),rgba(200,162,106,.18) var(--pct,50%),rgba(200,162,106,.18) 100%);
  outline:none;cursor:pointer;transition:background .1s;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#e8d090,#c8a26a 50%,#8a6030);
  box-shadow:0 0 6px rgba(200,162,106,.7),0 1px 3px rgba(0,0,0,.8);cursor:pointer;
}
input[type=range]::-moz-range-thumb{
  width:13px;height:13px;border-radius:50%;border:none;
  background:radial-gradient(circle at 35% 30%,#e8d090,#c8a26a 50%,#8a6030);
  box-shadow:0 0 6px rgba(200,162,106,.7);cursor:pointer;
}

/* Boutons power/theme enceinte */
.btn-row{display:flex;gap:.5rem;align-items:center;justify-content:center}
.ctrl-btn{
  padding:.28rem .7rem;border:1px solid var(--panel-border);border-radius:16px;
  background:transparent;color:var(--muted);
  font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;
  cursor:pointer;transition:all .2s;
}
.ctrl-btn:hover{border-color:var(--neon1);color:var(--neon1)}
.ctrl-btn.on{background:var(--neon1);border-color:var(--neon1);color:#050a0f}

/* Switch thème (platine) */
.theme-switch{
  display:flex;align-items:center;gap:0;
  border:1px solid var(--panel-border);border-radius:20px;overflow:hidden;
  transition:border-color .5s;
}
.ts-btn{
  padding:.28rem .6rem;border:none;background:transparent;color:var(--muted);
  font-family:'DM Mono',monospace;font-size:clamp(.5rem,1vw,.6rem);
  letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .22s;white-space:nowrap;
}
.ts-btn.active{background:var(--neon1);color:#050a0f;border-radius:18px}
.ts-btn:hover:not(.active){color:var(--neon1)}

.brand{font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(.55rem,1.2vw,.68rem);color:rgba(200,162,106,.25);letter-spacing:.06em}

/* Sections panel qui s'alternent */
#panelVinyl,#panelHP{transition:opacity .25s}
#panelHP{display:none}
</style>
</head>
<body>

<canvas id="waves"></canvas>

<!-- ══════════════════════════════════
     CABINET
══════════════════════════════════ -->
<div class="cabinet mode-vinyl" id="cabinet">

  <!-- ── PLATINE VINYLE ── -->
  <div class="vinyl-zone" id="vinylZone">
    <div class="vinyl-wrap">
      <svg id="vinyl-svg-wrap" viewBox="0 0 420 700" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;overflow:visible">
        <defs>
          <linearGradient id="woodBg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stop-color="#2a1a0a"/><stop offset="35%"  stop-color="#1a0f06"/>
            <stop offset="70%"  stop-color="#2e1c0c"/><stop offset="100%" stop-color="#1a0f06"/>
          </linearGradient>
          <linearGradient id="plateauGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#1c2030"/><stop offset="20%"  stop-color="#2a3040"/>
            <stop offset="50%"  stop-color="#3a4255"/><stop offset="80%"  stop-color="#2a3040"/>
            <stop offset="100%" stop-color="#1c2030"/>
          </linearGradient>
          <radialGradient id="plateauRadial" cx="42%" cy="38%" r="60%">
            <stop offset="0%"   stop-color="rgba(255,255,255,.12)"/>
            <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
          </radialGradient>
          <pattern id="brushH" x="0" y="0" width="1" height="3" patternUnits="userSpaceOnUse">
            <rect width="420" height="1" fill="rgba(255,255,255,.05)"/>
          </pattern>
          <radialGradient id="discGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#1a1a1a"/><stop offset="60%"  stop-color="#0e0e0e"/>
            <stop offset="85%"  stop-color="#181818"/><stop offset="100%" stop-color="#0a0a0a"/>
          </radialGradient>
          <radialGradient id="discShine" cx="35%" cy="30%" r="65%">
            <stop offset="0%"   stop-color="rgba(255,255,255,.07)"/>
            <stop offset="50%"  stop-color="rgba(180,200,255,.03)"/>
            <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
          </radialGradient>
          <radialGradient id="labelGrad" cx="40%" cy="36%" r="65%">
            <stop offset="0%"   stop-color="#1c2840"/><stop offset="70%"  stop-color="#141e30"/>
            <stop offset="100%" stop-color="#0c1420"/>
          </radialGradient>
          <linearGradient id="armChrome2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#555"/><stop offset="30%"  stop-color="#c0c0c0"/>
            <stop offset="55%"  stop-color="#e8e8e8"/><stop offset="80%"  stop-color="#aaa"/>
            <stop offset="100%" stop-color="#444"/>
          </linearGradient>
          <linearGradient id="headGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#444"/><stop offset="40%"  stop-color="#bbb"/>
            <stop offset="100%" stop-color="#333"/>
          </linearGradient>
          <filter id="neonGlow">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="softGlow">
            <feGaussianBlur stdDeviation="2.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <rect x="0" y="0" width="420" height="700" rx="22" fill="url(#woodBg)"/>
        <g opacity=".18" fill="none">
          <path d="M0 120 Q60 115 120 125 Q180 135 240 120 Q300 105 360 118 Q390 124 420 118" stroke="#6a4520" stroke-width="8"/>
          <path d="M0 200 Q80 190 160 205 Q240 220 320 198 Q380 188 420 200" stroke="#5a3818" stroke-width="5"/>
          <path d="M0 340 Q100 330 200 348 Q300 362 420 340" stroke="#6a4520" stroke-width="6"/>
          <path d="M0 500 Q70 488 140 505 Q210 522 280 500 Q350 478 420 498" stroke="#5a3818" stroke-width="4"/>
          <path d="M0 600 Q90 588 180 605 Q270 620 360 598 Q395 590 420 600" stroke="#6a4520" stroke-width="5"/>
        </g>

        <rect x="20" y="18" width="380" height="664" rx="14" fill="url(#plateauGrad)"/>
        <rect x="20" y="18" width="380" height="664" rx="14" fill="url(#brushH)"/>
        <rect x="20" y="18" width="380" height="664" rx="14" fill="url(#plateauRadial)"/>
        <rect x="20" y="18" width="380" height="664" rx="14" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="1.5"/>
        <rect x="22" y="20" width="376" height="660" rx="13" fill="none" stroke="rgba(0,0,0,.25)" stroke-width="1"/>

        <!-- Néon autour disque -->
        <circle cx="210" cy="285" r="178" fill="none" stroke="#00d4ff" stroke-width="3.5"
          filter="url(#neonGlow)" opacity=".65" id="neonRing1">
          <animate attributeName="opacity" values=".45;.85;.45" dur="2.6s" repeatCount="indefinite"/>
        </circle>
        <circle cx="210" cy="285" r="182" fill="none" stroke="#0088ff" stroke-width="1"
          filter="url(#neonGlow)" opacity=".35" id="neonRing2">
          <animate attributeName="opacity" values=".2;.5;.2" dur="2.6s" repeatCount="indefinite" begin=".3s"/>
        </circle>
        <circle cx="210" cy="285" r="190" fill="#161c28" opacity=".55"/>
        <circle cx="210" cy="285" r="188" fill="#1a2035" opacity=".35"/>

        <!-- Disque vinyle -->
        <g id="vinyl-disc" style="transform-origin:210px 285px">
          <circle cx="210" cy="285" r="182" fill="url(#discGrad)"/>
          <g fill="none" stroke-linecap="round">
            <circle cx="210" cy="285" r="175" stroke="rgba(60,60,60,.6)"  stroke-width="1.2"/>
            <circle cx="210" cy="285" r="168" stroke="rgba(40,40,40,.8)"  stroke-width=".8"/>
            <circle cx="210" cy="285" r="160" stroke="rgba(55,55,55,.6)"  stroke-width="1.2"/>
            <circle cx="210" cy="285" r="152" stroke="rgba(35,35,35,.8)"  stroke-width=".8"/>
            <circle cx="210" cy="285" r="144" stroke="rgba(55,55,55,.55)" stroke-width="1.2"/>
            <circle cx="210" cy="285" r="136" stroke="rgba(35,35,35,.7)"  stroke-width=".8"/>
            <circle cx="210" cy="285" r="128" stroke="rgba(52,52,52,.5)"  stroke-width="1.2"/>
            <circle cx="210" cy="285" r="120" stroke="rgba(35,35,35,.7)"  stroke-width=".8"/>
            <circle cx="210" cy="285" r="112" stroke="rgba(50,50,50,.45)" stroke-width="1"/>
            <circle cx="210" cy="285" r="104" stroke="rgba(35,35,35,.6)"  stroke-width=".7"/>
            <circle cx="210" cy="285" r="171" stroke="rgba(70,70,70,.25)" stroke-width=".4"/>
            <circle cx="210" cy="285" r="164" stroke="rgba(70,70,70,.25)" stroke-width=".4"/>
            <circle cx="210" cy="285" r="156" stroke="rgba(70,70,70,.25)" stroke-width=".4"/>
            <circle cx="210" cy="285" r="148" stroke="rgba(70,70,70,.25)" stroke-width=".4"/>
            <circle cx="210" cy="285" r="140" stroke="rgba(70,70,70,.25)" stroke-width=".4"/>
            <circle cx="210" cy="285" r="132" stroke="rgba(70,70,70,.25)" stroke-width=".4"/>
            <circle cx="210" cy="285" r="124" stroke="rgba(70,70,70,.25)" stroke-width=".4"/>
            <circle cx="210" cy="285" r="116" stroke="rgba(70,70,70,.25)" stroke-width=".4"/>
          </g>
          <circle cx="210" cy="285" r="182" fill="url(#discShine)"/>
          <ellipse cx="148" cy="228" rx="85" ry="34" fill="none"
            stroke="rgba(180,220,255,.06)" stroke-width="20" transform="rotate(-40,148,228)"/>
          <circle cx="210" cy="285" r="58" fill="url(#labelGrad)"/>
          <circle cx="210" cy="285" r="55" fill="none" stroke="rgba(0,180,255,.25)" stroke-width="1"/>
          <circle cx="210" cy="285" r="48" fill="none" stroke="rgba(0,180,255,.12)" stroke-width=".7"/>
          <text x="210" y="271" text-anchor="middle" font-family="'Playfair Display',serif"
            font-style="italic" font-size="9.5" fill="rgba(0,200,255,.7)" letter-spacing=".5">HiFi Studio</text>
          <text x="210" y="285" text-anchor="middle" font-family="'DM Mono',monospace"
            font-size="6" fill="rgba(0,180,255,.5)" letter-spacing="2">45 RPM</text>
          <text x="210" y="297" text-anchor="middle" font-family="'DM Mono',monospace"
            font-size="5.5" fill="rgba(0,160,255,.4)" letter-spacing="1.5">STEREO</text>
          <circle cx="210" cy="285" r="7" fill="#0a0f18" stroke="rgba(0,180,255,.3)" stroke-width="1"/>
          <circle cx="210" cy="285" r="5" fill="#050a12"/>
        </g>

        <!-- Bras de lecture -->
        <g id="tonearm-g" style="transform-origin:340px 530px;transform:rotate(-28deg)">
          <ellipse cx="340" cy="545" rx="20" ry="7" fill="rgba(0,0,0,.35)"/>
          <circle cx="340" cy="530" r="22" fill="#1a2030" stroke="#4a5a70" stroke-width="2"/>
          <circle cx="340" cy="530" r="15" fill="#252f40" stroke="#7a8aa0" stroke-width="1"/>
          <circle cx="340" cy="530" r="7"  fill="#4a5a70" stroke="#9aa8bc" stroke-width="1"/>
          <circle cx="340" cy="530" r="2.5" fill="#c0d0e0"/>
          <rect x="347" y="517" width="44" height="26" rx="9" fill="#1e2838" stroke="#5a6880" stroke-width="1.5"/>
          <rect x="349" y="519" width="16" height="22" rx="5" fill="#2a3848"/>
          <line x1="350" y1="530" x2="389" y2="530" stroke="#4a5870" stroke-width="1" stroke-dasharray="3,2"/>
          <line x1="332" y1="538" x2="202" y2="367" stroke="url(#armChrome2)" stroke-width="11" stroke-linecap="round"/>
          <line x1="330" y1="535" x2="200" y2="364" stroke="rgba(255,255,255,.38)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="335" y1="542" x2="205" y2="371" stroke="rgba(0,0,0,.22)" stroke-width="2" stroke-linecap="round"/>
          <path d="M202 367 Q188 353 178 340" stroke="url(#armChrome2)" stroke-width="10" fill="none" stroke-linecap="round"/>
          <path d="M200 364 Q186 350 176 337" stroke="rgba(255,255,255,.32)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <line x1="178" y1="340" x2="165" y2="325" stroke="url(#armChrome2)" stroke-width="8" stroke-linecap="round"/>
          <line x1="176" y1="337" x2="163" y2="322" stroke="rgba(255,255,255,.28)" stroke-width="2" stroke-linecap="round"/>
          <g transform="rotate(-35,162,318)">
            <rect x="142" y="310" width="40" height="16" rx="4" fill="url(#headGrad)" stroke="#8899aa" stroke-width="1"/>
            <rect x="144" y="312" width="14" height="8" rx="2" fill="rgba(180,220,255,.25)"/>
            <rect x="177" y="313" width="7" height="12" rx="2" fill="#1a2230" stroke="#3a4a60" stroke-width=".5"/>
          </g>
          <line x1="158" y1="326" x2="155" y2="339" stroke="#c8d8e8" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="155" cy="341" r="4.5" fill="#00d4ff" filter="url(#softGlow)" id="stylusGem"/>
          <circle cx="155" cy="341" r="2"   fill="#fff" opacity=".85"/>

  rock:     {pump:.10, speed:1.55,vu:.82,wAmp:1.0, wCol:[[220,80,50],[255,140,60]],  wFreq:2,   wLines:5, label:'Rock — Puissance maximale',  rpm:'45'},
  classique:{pump:.025,speed:.45, vu:.32,wAmp:.55, wCol:[[160,200,140]],              wFreq:.8,  wLines:2, label:'Classique — Détail & air',   rpm:'33⅓'},
  bass:     {pump:.16, speed:1.9, vu:.90,wAmp:1.0, wCol:[[140,80,220],[180,120,255]],wFreq:.5,  wLines:6, label:'Bass Boost — Subwoofer max', rpm:'45'},
  synth:    {pump:.06, speed:2.4, vu:.70,wAmp:.95, wCol:[[0,220,200],[80,255,220],[140,180,255]],wFreq:4,wLines:5,label:'Synth Wave — Électronique', rpm:'45'},
  off:      {pump:0,   speed:0,   vu:0,  wAmp:0,   wCol:[[200,162,106]],              wFreq:1,   wLines:1, label:'Système éteint',             rpm:'—'}
};

/* cfg courant : mix platine + sliders */
let cfgVinyl={...P.hifi};
let cfgHP={speed:1.0,pump:.045,vu:.55,wAmp:.85,wFreq:1,wLines:3,wCol:[[200,162,106]]};
let activeTab='vinyl'; // 'vinyl' | 'hp'
let on=true;
let t=0,vuPh=0,lastTs=0;

/* Refs SVG platine */
const vinylDisc =document.getElementById('vinyl-disc');
const tonearmG  =document.getElementById('tonearm-g');
const rpmTxt    =document.getElementById('rpmTxt');
/* Refs SVG enceinte */
const wfConeEl  =document.getElementById('wfConeEl');
const wfDustEl  =document.getElementById('wfDustEl');
const wfRides   =document.getElementById('wfRides');
const twAnim    =document.getElementById('twAnim');
/* Communs */
const led   =document.getElementById('led');
const stxt  =document.getElementById('stxt');
const segs  =[...document.querySelectorAll('.vs')];
const cabinet=document.getElementById('cabinet');

let vinylAngle=0;
const ARM_START=-28,ARM_END=8,ARM_REST=-55;
let armProgress=0;
const ARM_DURATION=90;
let armAngleCurrent=ARM_START;

/* ══ ONGLETS ══ */
function switchTab(tab){
  activeTab=tab;
  document.getElementById('tabVinyl').classList.toggle('active',tab==='vinyl');
  document.getElementById('tabHP').classList.toggle('active',tab==='hp');

  const vz=document.getElementById('vinylZone');
  const hz=document.getElementById('hpZone');
  const pv=document.getElementById('panelVinyl');
  const ph=document.getElementById('panelHP');

  if(tab==='vinyl'){
    vz.style.display='';hz.style.display='none';
    pv.style.display='';ph.style.display='none';
    cabinet.classList.remove('mode-hp');cabinet.classList.add('mode-vinyl');
    // couleur horloge/vu selon thème acier par défaut
    resize();
  } else {
    vz.style.display='none';hz.style.display='flex';
    pv.style.display='none';ph.style.display='flex';
    cabinet.classList.remove('mode-vinyl');cabinet.classList.add('mode-hp');
    resize();
  }
  setLed();
}

/* ══ PLATINE : sliders ══ */
function updateVinylSlider(el){
  const pct=((el.value-el.min)/(el.max-el.min)*100).toFixed(1)+'%';
  el.style.setProperty('--pct',pct);
  document.getElementById(el.id+'Val').textContent=el.value;
  applyVinylSliders();
}
function applyVinylSliders(){
  const spd=+document.getElementById('slVinylSpeed').value/100;
  const wav=+document.getElementById('slVinylWave').value/100;
  cfgVinyl.speed=0.1+spd*2.8;
  cfgVinyl.wAmp =wav;
  cfgVinyl.wLines=Math.round(1+wav*5);
}
document.querySelectorAll('#vinylSliders input[type=range]').forEach(el=>{
  const pct=((el.value-el.min)/(el.max-el.min)*100).toFixed(1)+'%';
  el.style.setProperty('--pct',pct);
});

/* ══ PLATINE : presets ══ */
function setP(btn){
  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  cfgVinyl={...P[btn.dataset.p]};
  on=(btn.dataset.p!=='off');
  stxt.textContent=cfgVinyl.label;
  rpmTxt.textContent=cfgVinyl.rpm;
  if(!on) waves=[];
  /* Resync sliders vitesse/amplitude sur le preset */
  const spdNorm=Math.max(0,Math.min(1,(cfgVinyl.speed-0.1)/2.8));
  const wavNorm=Math.max(0,Math.min(1,cfgVinyl.wAmp));
  const spdEl=document.getElementById('slVinylSpeed');
  const wavEl=document.getElementById('slVinylWave');
  spdEl.value=Math.round(spdNorm*100);
  wavEl.value=Math.round(wavNorm*100);
  document.getElementById('slVinylSpeedVal').textContent=spdEl.value;
  document.getElementById('slVinylWaveVal').textContent=wavEl.value;
  spdEl.style.setProperty('--pct',spdEl.value+'%');
  wavEl.style.setProperty('--pct',wavEl.value+'%');
  setLed();
}

/* ══ PLATINE : thèmes ══ */
function setTheme(btn){
  document.querySelectorAll('.ts-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const th=btn.dataset.theme;
  document.body.className=th;
  updateNeonColors(th);
}
function updateNeonColors(th){
  const colors={'':['#00d4ff','#0088ff'],warm:['#ffaa00','#ff7700'],night:['#aa44ff','#6622cc']};
  const [c1,c2]=colors[th]||colors[''];
  const pot=document.getElementById('potMark');
  if(pot) pot.setAttribute('stroke',c1);
  const stylus=document.getElementById('stylusGem');
  if(stylus) stylus.setAttribute('fill',c1);
  document.querySelectorAll('#vinyl-svg-wrap rect[fill="#00d4ff"]').forEach(el=>el.setAttribute('fill',c1));
}

/* ══ ENCEINTE : sliders ══ */
function updateSlider(el){
  const pct=((el.value-el.min)/(el.max-el.min)*100).toFixed(1)+'%';
  el.style.setProperty('--pct',pct);
  document.getElementById(el.id+'Val').textContent=el.value;
  applySliders();
}
document.querySelectorAll('input[type=range]').forEach(el=>{
  const pct=((el.value-el.min)/(el.max-el.min)*100).toFixed(1)+'%';
  el.style.setProperty('--pct',pct);
});
function applySliders(){
  const spd =+document.getElementById('slHPSpeed').value/100;
  const amp  =+document.getElementById('slHPAmp').value/100;
  cfgHP.speed =0.2+spd*5.0;
  cfgHP.pump  =amp*0.44;
  cfgHP.wAmp  =Math.min(2,amp*2);
  cfgHP.vu    =0.3+amp*0.6;
  cfgHP.wFreq =0.5+spd*4;
  cfgHP.wLines=Math.round(2+amp*5);
  stxt.textContent=`Vitesse ${Math.round(spd*100)} · Amplitude ${Math.round(amp*100)}`;
}
applySliders();

function togglePower(){
  on=!on;
  const btn=document.getElementById('pwrBtn');
  btn.classList.toggle('on',on);
  if(!on){waves=[];segs.forEach(s=>s.classList.remove('on'));}
  stxt.textContent=on?'Système actif':'Système éteint';
  setLed();
}

function setLed(){
  led.style.cssText=on
    ?'width:6px;height:6px;border-radius:50%;background:var(--led);box-shadow:0 0 10px var(--led)'
    :'width:6px;height:6px;border-radius:50%;background:#222;box-shadow:none';
}
setLed();

/* ══ WAVES ══ */
const canvas=document.getElementById('waves');
const ctx=canvas.getContext('2d');
let waves=[];
let wCX=0,wCY=0,wR=0;

function resize(){
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  if(activeTab==='vinyl'){
    const vz=document.querySelector('.vinyl-wrap');
    if(vz){
      const r=vz.getBoundingClientRect();
      const sX=r.width/420,sY=r.height/700;
      wCX=r.left+210*sX;wCY=r.top+285*sY;wR=182*sX*.6;
    }
  } else {
    const sv=document.getElementById('spk-svg');
    if(sv){
      const r=sv.getBoundingClientRect();
      const sX=r.width/460,sY=r.height/700;
      wCX=r.left+230*sX;wCY=r.top+452*sY;wR=122*sX*.65;
    }
  }
}
window.addEventListener('resize',resize);
setTimeout(resize,150);

let wTimer=0;
function spawnWave(){
  const cfg=activeTab==='vinyl'?cfgVinyl:cfgHP;
  const cols=cfg.wCol;
  const col=cols[Math.floor(Math.random()*cols.length)];
  const n=cfg.wLines||3;
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      if(!on)return;
      waves.push({
        r:wR*.45+Math.random()*wR*.3,
        maxR:Math.max(canvas.width,canvas.height)*1.4,
        alpha:1,col,
        freq:cfg.wFreq,phase:Math.random()*Math.PI*2,
        wobbleAmp:5+Math.random()*9,lw:1+Math.random()*1.5
      });
    },i*28);
  }
}

function drawWaves(dt){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const cfg=activeTab==='vinyl'?cfgVinyl:cfgHP;
  if(!on||cfg.wAmp===0){waves=[];return}
  const expandSpeed=190+cfg.speed*155;
  waves=waves.filter(w=>{
    w.r+=expandSpeed*dt;
    w.alpha=Math.pow(Math.max(0,1-(w.r/(w.maxR*.55))),1.4);
    return w.alpha>.003&&w.r<w.maxR;
  });
  if(waves.length>0){
    const tw=waves[0];
    const grad=ctx.createRadialGradient(wCX,wCY,wR*.3,wCX,wCY,wR*2.5);
    const [r,g,b]=tw.col;
    grad.addColorStop(0,`rgba(${r},${g},${b},${(cfg.wAmp*.17*tw.alpha).toFixed(3)})`);
    grad.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(wCX,wCY,wR*2.5,0,Math.PI*2);ctx.fill();
  }
  for(const w of waves){
    const [r,g,b]=w.col;
    const pts=96;
    ctx.beginPath();
    for(let i=0;i<=pts;i++){
      const a=(i/pts)*Math.PI*2;
      const wb=w.wobbleAmp*Math.sin(a*w.freq*3+t*cfg.speed*5+w.phase)*(1-w.r/w.maxR);
      const wb2=w.wobbleAmp*.4*Math.sin(a*w.freq*7-t*cfg.speed*3+w.phase)*(1-w.r/w.maxR);
      const rad=w.r+wb+wb2;
      const x=wCX+Math.cos(a)*rad,y=wCY+Math.sin(a)*rad;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle=`rgba(${r},${g},${b},${(w.alpha*cfg.wAmp).toFixed(3)})`;
    ctx.lineWidth=w.lw;ctx.stroke();
    if(w.alpha>.25){
      ctx.beginPath();
      for(let i=0;i<=pts;i++){
        const a=(i/pts)*Math.PI*2;
        const wb=w.wobbleAmp*.6*Math.sin(a*w.freq*3+t*cfg.speed*5+w.phase+.4)*(1-w.r/w.maxR);
        const rad=w.r+wb+w.lw*3;
        const x=wCX+Math.cos(a)*rad,y=wCY+Math.sin(a)*rad;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.closePath();
      ctx.strokeStyle=`rgba(${r},${g},${b},${(w.alpha*cfg.wAmp*.33).toFixed(3)})`;
      ctx.lineWidth=w.lw*.6;ctx.stroke();
    }
    if(w.r<wR*2.2){
      ctx.beginPath();ctx.arc(wCX,wCY,w.r,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${r},${g},${b},${(w.alpha*cfg.wAmp*.11).toFixed(3)})`;
      ctx.lineWidth=w.r*.11;ctx.stroke();
    }
  }
}

/* ══ LOOP ══ */
function loop(ts){
  const dt=Math.min((ts-lastTs)/1000,.05);lastTs=ts;
  const cfg=activeTab==='vinyl'?cfgVinyl:cfgHP;
  if(on&&cfg.speed>0){
    t+=dt;vuPh+=dt*cfg.speed*5;

    if(activeTab==='vinyl'){
      /* Disque */
      const rpm=33.33+(cfg.speed-1)*22;
      vinylAngle=(vinylAngle+rpm/60*360*dt)%360;
      vinylDisc.style.transform=`rotate(${vinylAngle.toFixed(2)}deg)`;
      vinylDisc.style.transformOrigin='210px 285px';
      /* Bras */
      armProgress+=dt/ARM_DURATION;
      if(armProgress>=1)armProgress=0;
      const armTarget=ARM_START+(ARM_END-ARM_START)*armProgress;
      armAngleCurrent+=(armTarget-armAngleCurrent)*Math.min(1,dt*2);
      tonearmG.style.transform=`rotate(${armAngleCurrent.toFixed(3)}deg)`;
      tonearmG.style.transformOrigin='340px 530px';
    } else {
      /* Membrane enceinte */
      const raw=Math.sin(t*cfg.speed*Math.PI*2);
      const pump=cfg.pump;
      if(wfConeEl){
        const sc=1-pump*Math.max(0,raw)*.22;
        const dy=452*(1-sc);
        wfConeEl.setAttribute('transform',`translate(0,${dy.toFixed(2)}) scale(1,${sc.toFixed(4)})`);
      }
      if(wfRides){
        const sc=1-pump*Math.max(0,raw)*.18;
        const dy=452*(1-sc);
        wfRides.setAttribute('transform',`translate(0,${dy.toFixed(2)}) scale(1,${sc.toFixed(4)})`);
      }
      if(wfDustEl){
        const dy=(pump*8*Math.max(0,raw)).toFixed(2);
        wfDustEl.setAttribute('transform',`translate(0,${dy})`);
      }
      if(twAnim) twAnim.setAttribute('dur',(1.0/Math.max(.3,cfg.speed)).toFixed(2)+'s');
    }

    const lvl=Math.min(1,Math.max(0,cfg.vu+Math.sin(vuPh)*.13+Math.sin(vuPh*2.4)*.06));
    segs.forEach((s,i)=>s.classList.toggle('on',i<Math.round(lvl*segs.length)));
    wTimer+=dt;
    const wi=1/(cfg.speed*.9+.25);
    if(wTimer>=wi){wTimer=0;spawnWave();}
  } else {
    if(activeTab==='vinyl'){
      armAngleCurrent+=(ARM_REST-armAngleCurrent)*Math.min(1,dt*1.2);
      tonearmG.style.transform=`rotate(${armAngleCurrent.toFixed(3)}deg)`;
      tonearmG.style.transformOrigin='340px 530px';
    } else {
      if(wfConeEl) wfConeEl.removeAttribute('transform');
      if(wfRides)  wfRides.removeAttribute('transform');
      if(wfDustEl) wfDustEl.removeAttribute('transform');
      if(twAnim)   twAnim.setAttribute('dur','3s');
    }
    segs.forEach(s=>s.classList.remove('on'));
  }
  drawWaves(dt);
  requestAnimationFrame(loop);
}

/* ══ HORLOGE ══ */
const clockEl=document.getElementById('clock');
function updateClock(){
  const n=new Date();
  clockEl.textContent=[n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
}
updateClock();setInterval(updateClock,1000);

/* Init */
switchTab('vinyl');
requestAnimationFrame(loop);
</script>
