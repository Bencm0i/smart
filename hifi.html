<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiFi Studio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='10' fill='%23231f1a'/><circle cx='32' cy='36' r='14' fill='%23c8a26a' opacity='.3'/><circle cx='32' cy='36' r='9' fill='%23c8a26a' opacity='.5'/><circle cx='32' cy='36' r='5' fill='%23c8a26a'/><circle cx='32' cy='17' r='5' fill='%23c8a26a' opacity='.7'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}

body{
  --wood-d:#3d2410;--wood-m:#5c3d1e;--wood-l:#8b5e3c;--wood-h:#a06b40;
  --gold:#c8a26a;--bg:#0c0a08;--panel-bg:rgba(8,6,4,.88);--panel-border:rgba(200,162,106,.1);
  --muted:#5a4a3a;--led:#4aff6a;
  --pb-border:rgba(200,162,106,.18);--pb-col:#5a4a3a;
  background:var(--bg);font-family:'DM Mono',monospace;
  display:flex;flex-direction:column;
  transition:background .5s;
}
body.dark{
  --wood-d:#120a04;--wood-m:#1e1008;--wood-l:#2e1a0a;--wood-h:#3a2010;
  --gold:#8a6030;--bg:#030201;--panel-bg:rgba(2,1,0,.95);--panel-border:rgba(120,80,30,.15);
  --muted:#2a1a0a;--led:#00ff88;
  --pb-border:rgba(120,80,30,.2);--pb-col:#3a2a1a;
}

canvas#waves{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}

.cabinet{
  position:relative;z-index:2;flex:1;width:100%;
  background:
    repeating-linear-gradient(90deg,rgba(0,0,0,.14) 0,rgba(0,0,0,.14) 1.5px,transparent 1.5px,transparent 6px),
    repeating-linear-gradient(180deg,rgba(255,255,255,.02) 0,rgba(255,255,255,.02) 1px,transparent 1px,transparent 40px),
    linear-gradient(165deg,var(--wood-h) 0%,var(--wood-l) 10%,var(--wood-m) 35%,var(--wood-d) 58%,var(--wood-m) 78%,var(--wood-l) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;
  overflow:hidden;
  box-shadow:inset 4px 0 8px rgba(255,255,255,.05),inset -4px 0 8px rgba(0,0,0,.5);
  transition:background .6s;
}
.cabinet::after{content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(110deg,rgba(255,255,255,.07) 0%,transparent 35%,rgba(0,0,0,.22) 100%)}

.tweeter-zone{width:min(22vw,160px);aspect-ratio:1;position:relative;z-index:5}
.tw-body{width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle at 36% 32%,#3a3a3a,#141414 60%,#050505);
  box-shadow:0 4px 20px rgba(0,0,0,.9),0 0 0 3px rgba(255,255,255,.04),inset 0 2px 4px rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:center;position:relative}
.tw-r1{position:absolute;inset:6%;border-radius:50%;border:1.5px solid rgba(200,162,106,.18)}
.tw-r2{position:absolute;inset:18%;border-radius:50%;border:1px solid rgba(255,255,255,.06)}
.tw-r3{position:absolute;inset:32%;border-radius:50%;border:1px solid rgba(255,255,255,.04)}
.tw-dome{width:30%;height:30%;border-radius:50%;
  background:radial-gradient(circle at 36% 32%,#5c5c5c,#1a1a1a);
  box-shadow:inset 0 2px 6px rgba(0,0,0,.8)}

.woofer-zone{width:min(78vw,580px);aspect-ratio:1;position:relative;z-index:5}
.wf-frame{width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle at 38% 34%,#282828,#101010 50%,#030303);
  box-shadow:0 8px 40px rgba(0,0,0,.95),0 0 0 4px rgba(255,255,255,.03),0 0 0 8px rgba(0,0,0,.4),inset 0 4px 8px rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:center;position:relative}
.wf-surround{position:absolute;inset:4%;border-radius:50%;border:6px solid rgba(255,255,255,.05)}
.wf-surround2{position:absolute;inset:6.5%;border-radius:50%;border:2px solid rgba(200,162,106,.08)}
.wf-cone{position:absolute;width:78%;height:78%;border-radius:50%;
  background:radial-gradient(circle at 40% 37%,#4a4a4a,#252525 30%,#111 65%,#080808);
  will-change:transform;transform-origin:50% 50%;
  display:flex;align-items:center;justify-content:center}
.cr{position:absolute;border-radius:50%;border:1.5px solid rgba(255,255,255,.055)}
.cr1{inset:10%}.cr2{inset:22%}.cr3{inset:36%}.cr4{inset:50%}.cr5{inset:64%}
.wf-spider{position:absolute;width:28%;height:28%;border-radius:50%;
  background:radial-gradient(circle,#333,#1a1a1a 60%,#0d0d0d);border:1px solid rgba(255,255,255,.05)}
/* wf-cap défini plus haut avec néon jaune */

.port{width:28%;height:min(2.2%,12px);border-radius:20px;
  background:#030201;box-shadow:inset 0 4px 8px rgba(0,0,0,1);position:relative;z-index:5}

.panel{
  position:relative;z-index:10;width:100%;
  background:var(--panel-bg);
  border-top:1px solid var(--panel-border);
  padding:1vh 1rem 1.5vh;
  display:flex;flex-direction:column;align-items:center;gap:.8vh;
  transition:background .6s;
}
.vu-wrap{display:flex;gap:2px;height:18px;width:min(94%,700px);align-items:flex-end}
.vs{flex:1;border-radius:1px 1px 0 0;background:#c8a26a;opacity:.08;transition:opacity .055s}
.vs.on{opacity:1}
.vs:nth-child(n+14){background:#d4856a}
.vs:nth-child(n+16){background:#d44040}

.status{display:flex;align-items:center;gap:8px;
  font-size:clamp(.52rem,1.3vw,.68rem);letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.led{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.presets{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center}
.pb{padding:.3rem .75rem;border:1px solid var(--pb-border);border-radius:20px;
  background:transparent;color:var(--pb-col);
  font-family:'DM Mono',monospace;font-size:clamp(.55rem,1.2vw,.68rem);
  letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.pb:hover{border-color:var(--gold);color:var(--gold)}
.pb.active{background:var(--gold);border-color:var(--gold);color:#0c0a08}

.brand{font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(.6rem,1.5vw,.75rem);color:rgba(200,162,106,.28);letter-spacing:.06em}

/* ══ HORLOGE ══ */
.clock{
  font-family:'DM Mono',monospace;font-size:clamp(1.4rem,4.5vw,2.6rem);
  font-weight:300;letter-spacing:.2em;
  color:#fff;
  text-shadow:0 0 14px rgba(255,255,255,.9),0 0 30px rgba(255,255,255,.5),0 0 60px rgba(200,162,106,.6);
  opacity:.95;line-height:1;order:-1;
}

/* ══ NÉONS ENCEINTE ══ */
.cabinet{
  /* les néons seront gérés via box-shadow animé sur ::before */
}
.cabinet::before{
  content:'';position:absolute;inset:-3px;z-index:1;pointer-events:none;
  border-radius:4px;
  box-shadow:
    0 0 12px 2px rgba(0,220,255,.55),
    0 0 30px 6px rgba(0,150,255,.35),
    0 0 60px 10px rgba(0,80,220,.18),
    inset 0 0 20px rgba(0,180,255,.08);
  animation:neonPulse 2.4s ease-in-out infinite;
}
@keyframes neonPulse{
  0%,100%{
    box-shadow:
      0 0 12px 2px rgba(0,220,255,.55),
      0 0 30px 6px rgba(0,150,255,.35),
      0 0 60px 10px rgba(0,80,220,.18),
      inset 0 0 20px rgba(0,180,255,.08);
  }
  50%{
    box-shadow:
      0 0 20px 4px rgba(0,240,255,.85),
      0 0 50px 12px rgba(0,180,255,.55),
      0 0 100px 20px rgba(0,100,255,.28),
      0 0 8px 1px rgba(180,0,255,.4),
      inset 0 0 30px rgba(0,220,255,.12);
  }
}

/* ══ CENTRE HP JAUNE ══ */
.wf-cap{width:10%;height:10%;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#ffff00,#ffcc00 40%,#ff8800 80%,#cc5500);
  box-shadow:
    0 0 10px 3px rgba(255,255,0,.9),
    0 0 25px 8px rgba(255,200,0,.7),
    0 0 50px 15px rgba(255,150,0,.45),
    0 0 4px 1px rgba(255,255,100,1) inset;
  position:relative;z-index:3;
  animation:capGlow 1.6s ease-in-out infinite alternate;
}
@keyframes capGlow{
  from{box-shadow:0 0 10px 3px rgba(255,255,0,.9),0 0 25px 8px rgba(255,200,0,.7),0 0 50px 15px rgba(255,150,0,.45)}
  to  {box-shadow:0 0 18px 6px rgba(255,255,50,1),0 0 40px 14px rgba(255,220,0,.9),0 0 80px 25px rgba(255,160,0,.6)}
}

/* theme toggle */
.theme-btn{
  position:fixed;top:10px;right:10px;z-index:100;
  padding:.35rem .8rem;
  border:1px solid rgba(200,162,106,.25);border-radius:20px;
  background:rgba(8,6,4,.75);color:#c8a26a;
  font-family:'DM Mono',monospace;font-size:.62rem;
  letter-spacing:.14em;text-transform:uppercase;cursor:pointer;
  backdrop-filter:blur(8px);transition:all .2s;
}
.theme-btn:hover{background:rgba(200,162,106,.15)}
</style>
</head>
<body>

<canvas id="waves"></canvas>
<button class="theme-btn" onclick="toggleTheme()" id="tbtn">◐ Dark Club</button>

<div class="cabinet">
  <div class="tweeter-zone" id="tw">
    <div class="tw-body">
      <div class="tw-r1"></div><div class="tw-r2"></div><div class="tw-r3"></div>
      <div class="tw-dome"></div>
    </div>
  </div>
  <div class="woofer-zone">
    <div class="wf-frame">
      <div class="wf-surround"></div><div class="wf-surround2"></div>
      <div class="wf-cone" id="wfc">
        <div class="cr cr1"></div><div class="cr cr2"></div><div class="cr cr3"></div>
        <div class="cr cr4"></div><div class="cr cr5"></div>
        <div class="wf-spider"></div>
        <div class="wf-cap"></div>
      </div>
    </div>
  </div>
  <div class="port"></div>
</div>

<div class="panel">
  <div class="clock" id="clock">--:--:--</div>
  <div class="vu-wrap" id="vu">
    <div class="vs" style="height:14%"></div><div class="vs" style="height:20%"></div>
    <div class="vs" style="height:28%"></div><div class="vs" style="height:36%"></div>
    <div class="vs" style="height:45%"></div><div class="vs" style="height:54%"></div>
    <div class="vs" style="height:62%"></div><div class="vs" style="height:69%"></div>
    <div class="vs" style="height:75%"></div><div class="vs" style="height:81%"></div>
    <div class="vs" style="height:86%"></div><div class="vs" style="height:90%"></div>
    <div class="vs" style="height:94%"></div><div class="vs" style="height:97%"></div>
    <div class="vs" style="height:99%"></div><div class="vs" style="height:100%"></div>
  </div>
  <div class="status"><div class="led" id="led"></div><span id="stxt">Hi-Fi — Stéréo actif</span></div>
  <div class="presets">
    <button class="pb active" data-p="hifi"      onclick="setP(this)">Hi-Fi</button>
    <button class="pb"        data-p="jazz"      onclick="setP(this)">Jazz</button>
    <button class="pb"        data-p="rock"      onclick="setP(this)">Rock</button>
    <button class="pb"        data-p="classique" onclick="setP(this)">Classique</button>
    <button class="pb"        data-p="bass"      onclick="setP(this)">Bass Boost</button>
    <button class="pb"        data-p="synth"     onclick="setP(this)">Synth Wave</button>
    <button class="pb"        data-p="off"       onclick="setP(this)">Off</button>
  </div>
  <div class="brand">Kube HiFi Reference MK-II</div>
</div>

<script>
const P={
  hifi:     {pump:.045,speed:1.0, vu:.55,tw:.003,wAmp:.85, wCol:[[200,162,106]],              wFreq:1,   wLines:3, label:'Hi-Fi — Stéréo actif'},
  jazz:     {pump:.035,speed:.75, vu:.42,tw:.002,wAmp:.75, wCol:[[80,160,220],[120,200,255]], wFreq:1.5, wLines:4, label:'Jazz — Scène large'},
  rock:     {pump:.10, speed:1.55,vu:.82,tw:.008,wAmp:1.0, wCol:[[220,80,50],[255,140,60]],  wFreq:2,   wLines:5, label:'Rock — Puissance maximale'},
  classique:{pump:.025,speed:.45, vu:.32,tw:.001,wAmp:.55, wCol:[[160,200,140]],              wFreq:.8,  wLines:2, label:'Classique — Détail & air'},
  bass:     {pump:.16, speed:1.9, vu:.90,tw:.001,wAmp:1.0, wCol:[[140,80,220],[180,120,255]],wFreq:.5,  wLines:6, label:'Bass Boost — Subwoofer max'},
  synth:    {pump:.06, speed:2.4, vu:.70,tw:.018,wAmp:.95, wCol:[[0,220,200],[80,255,220],[140,180,255]],wFreq:4,wLines:5,label:'Synth Wave — Électronique'},
  off:      {pump:0,   speed:0,   vu:0,  tw:0,   wAmp:0,   wCol:[[200,162,106]],              wFreq:1,   wLines:1, label:'Système éteint'}
};

let cfg={...P.hifi},on=true,dark=false;
let t=0,vuPh=0,lastTs=0;
const wfc=document.getElementById('wfc');
const twEl=document.getElementById('tw');
const led=document.getElementById('led');
const stxt=document.getElementById('stxt');
const segs=[...document.querySelectorAll('.vs')];

function setLed(){
  led.style.cssText=on
    ?`width:6px;height:6px;border-radius:50%;background:var(--led);box-shadow:0 0 10px var(--led)`
    :'width:6px;height:6px;border-radius:50%;background:#222;box-shadow:none';
}

function setP(btn){
  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  cfg={...P[btn.dataset.p]};
  on=(btn.dataset.p!=='off');
  stxt.textContent=cfg.label;
  if(!on)waves=[];
  setLed();
}

function toggleTheme(){
  dark=!dark;
  document.body.classList.toggle('dark',dark);
  document.getElementById('tbtn').textContent=dark?'◑ Hi-Fi':'◐ Dark Club';
}

/* ══ WAVES ENGINE ══ */
const canvas=document.getElementById('waves');
const ctx=canvas.getContext('2d');
let waves=[];
let wCX=0,wCY=0,wR=0;

function resize(){
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const wz=document.querySelector('.woofer-zone');
  if(wz){
    const r=wz.getBoundingClientRect();
    wCX=r.left+r.width*.5;
    wCY=r.top+r.height*.5;
    wR=r.width*.5*.78*.55;
  }
}
window.addEventListener('resize',resize);
setTimeout(resize,120);

let wTimer=0;

function spawnWave(forceCol){
  const cols=cfg.wCol;
  const col=forceCol||cols[Math.floor(Math.random()*cols.length)];
  // spawn plusieurs anneaux légèrement décalés pour épaissir l'effet
  const n=cfg.wLines||3;
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      if(!on)return;
      waves.push({
        r:wR*.5+Math.random()*wR*.3,
        maxR:Math.max(canvas.width,canvas.height)*1.4,
        alpha:1,
        col,
        freq:cfg.wFreq,
        phase:Math.random()*Math.PI*2,
        wobbleAmp: 6+Math.random()*8,
        lw: 1+Math.random()*1.5
      });
    },i*28);
  }
}

function drawWaves(dt){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!on||cfg.wAmp===0){waves=[];return}

  const expandSpeed=200+cfg.speed*160;

  waves=waves.filter(w=>{
    w.r+=expandSpeed*dt;
    // fade: più lento all'inizio, poi rapido
    w.alpha=Math.pow(Math.max(0,1-(w.r/(w.maxR*.55))),1.4);
    return w.alpha>.003&&w.r<w.maxR;
  });

  // Glow ambiant autour du woofer (halo)
  if(waves.length>0){
    const topWave=waves[0];
    const grad=ctx.createRadialGradient(wCX,wCY,wR*.3,wCX,wCY,wR*2.5);
    const [r,g,b]=topWave.col;
    const haloA=(cfg.wAmp*.18*topWave.alpha).toFixed(3);
    grad.addColorStop(0,`rgba(${r},${g},${b},${haloA})`);
    grad.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.arc(wCX,wCY,wR*2.5,0,Math.PI*2);ctx.fill();
  }

  for(const w of waves){
    const [r,g,b]=w.col;
    const baseA=(w.alpha*cfg.wAmp).toFixed(3);

    // anneau principal ondulé
    const pts=96;
    ctx.beginPath();
    for(let i=0;i<=pts;i++){
      const a=(i/pts)*Math.PI*2;
      const wobble=w.wobbleAmp*Math.sin(a*w.freq*3+t*cfg.speed*5+w.phase)*(1-w.r/w.maxR);
      const wobble2=w.wobbleAmp*.4*Math.sin(a*w.freq*7-t*cfg.speed*3+w.phase)*(1-w.r/w.maxR);
      const rad=w.r+wobble+wobble2;
      const x=wCX+Math.cos(a)*rad;
      const y=wCY+Math.sin(a)*rad;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle=`rgba(${r},${g},${b},${baseA})`;
    ctx.lineWidth=w.lw;
    ctx.stroke();

    // double anneau légèrement plus large (épaisseur visuelle)
    if(w.alpha>.25){
      ctx.beginPath();
      for(let i=0;i<=pts;i++){
        const a=(i/pts)*Math.PI*2;
        const wobble=w.wobbleAmp*.6*Math.sin(a*w.freq*3+t*cfg.speed*5+w.phase+.4)*(1-w.r/w.maxR);
        const rad=w.r+wobble+w.lw*3;
        const x=wCX+Math.cos(a)*rad;
        const y=wCY+Math.sin(a)*rad;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.closePath();
      ctx.strokeStyle=`rgba(${r},${g},${b},${(w.alpha*cfg.wAmp*.35).toFixed(3)})`;
      ctx.lineWidth=w.lw*.6;
      ctx.stroke();
    }

    // remplissage très doux pour les petits rayons
    if(w.r<wR*2.2){
      ctx.beginPath();ctx.arc(wCX,wCY,w.r,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${r},${g},${b},${(w.alpha*cfg.wAmp*.12).toFixed(3)})`;
      ctx.lineWidth=w.r*.12;
      ctx.stroke();
    }
  }
}

/* ══ LOOP ══ */
function loop(ts){
  const dt=Math.min((ts-lastTs)/1000,.05);lastTs=ts;

  if(on&&cfg.speed>0){
    t+=dt;vuPh+=dt*cfg.speed*5;
    const raw=Math.sin(t*cfg.speed*Math.PI*2);
    wfc.style.transform=`scaleY(${(1-cfg.pump*Math.max(0,raw)).toFixed(4)}) scaleX(${(1+cfg.pump*.3*Math.max(0,raw)).toFixed(4)})`;
    const tx=cfg.tw*120*(Math.sin(t*95)+Math.sin(t*143)*.4);
    twEl.style.transform=`translateX(${tx.toFixed(2)}px)`;
    const lvl=Math.min(1,Math.max(0,cfg.vu+Math.sin(vuPh)*.13+Math.sin(vuPh*2.4)*.06));
    segs.forEach((s,i)=>s.classList.toggle('on',i<Math.round(lvl*segs.length)));

    wTimer+=dt;
    const wi=1/(cfg.speed*.9+.25);
    if(wTimer>=wi){wTimer=0;spawnWave();}
  } else {
    wfc.style.transform='scaleY(1) scaleX(1)';
    twEl.style.transform='translateX(0)';
    segs.forEach(s=>s.classList.remove('on'));
  }

  drawWaves(dt);
  requestAnimationFrame(loop);
}

setLed();

/* ══ HORLOGE ══ */
const clockEl=document.getElementById('clock');
function updateClock(){
  const n=new Date();
  const h=String(n.getHours()).padStart(2,'0');
  const m=String(n.getMinutes()).padStart(2,'0');
  const s=String(n.getSeconds()).padStart(2,'0');
  clockEl.textContent=`${h}:${m}:${s}`;
}
updateClock();setInterval(updateClock,1000);

requestAnimationFrame(loop);
</script>
</body>
</html>
