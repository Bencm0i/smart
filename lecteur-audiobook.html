<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Lecteur d'audiobook</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%A7%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #f4f2ec;
    --card: #ffffff;
    --text: #2c2c2a;
    --text-secondary: #5f5e5a;
    --text-muted: #888780;
    --border: #d3d1c7;
    --accent-bg: #e6f1fb;
    --accent-text: #185fa5;
    --accent-fill: #378add;
    --radius: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --card: #2c2c2a;
      --text: #f1efe8;
      --text-secondary: #b4b2a9;
      --text-muted: #888780;
      --border: #444441;
      --accent-bg: #0c447c;
      --accent-text: #b5d4f4;
      --accent-fill: #378add;
    }
  }
  [data-mode="dark"] {
    --bg: #1c1c1a;
    --card: #2c2c2a;
    --text: #f1efe8;
    --text-secondary: #b4b2a9;
    --text-muted: #888780;
    --border: #444441;
    --accent-bg: #0c447c;
    --accent-text: #b5d4f4;
    --accent-fill: #378add;
  }
  [data-mode="light"] {
    --bg: #f4f2ec;
    --card: #ffffff;
    --text: #2c2c2a;
    --text-secondary: #5f5e5a;
    --text-muted: #888780;
    --border: #d3d1c7;
    --accent-bg: #e6f1fb;
    --accent-text: #185fa5;
    --accent-fill: #378add;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
    padding: 24px 12px;
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .icon-btn {
    background: none;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text);
    font-size: 16px;
  }
  .drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 14px;
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 12px;
    transition: border-color 0.15s, background 0.15s;
  }
  .drop-zone.drag-over {
    border-color: var(--accent-fill);
    background: var(--accent-bg);
    color: var(--accent-text);
  }
  .volume-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .volume-row input[type="range"] { flex: 1; }
  .sleep-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-top: 10px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .sleep-status {
    font-size: 12px;
    color: var(--accent-text);
  }
  .bookmarks-card {
    background: var(--card);
    border-radius: 16px;
    border: 0.5px solid var(--border);
    padding: 12px;
    margin-top: 16px;
  }
  .bookmarks-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 8px 12px;
    font-size: 14px;
    font-weight: 500;
  }
  .add-bookmark-btn {
    font-size: 13px;
    border: 0.5px solid var(--border);
    background: none;
    color: var(--text);
    border-radius: 8px;
    padding: 4px 10px;
    cursor: pointer;
  }
  .bookmark-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
  }
  .bookmark-item:hover { background: var(--bg); }
  .bookmark-item .b-time {
    color: var(--accent-text);
    font-weight: 500;
    flex-shrink: 0;
    width: 46px;
  }
  .bookmark-item .b-label {
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-secondary);
  }
  .bookmark-item .b-remove {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 13px;
  }
  .playlist-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .playlist-item .remove-btn,
  .playlist-item .reorder-btn,
  .playlist-item .rename-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    padding: 4px;
    flex-shrink: 0;
  }
  .playlist-item .ch-progress {
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  kbd {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 11px;
  }
  .shortcuts-hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 14px;
    line-height: 1.8;
  }
  .app {
    width: 100%;
    max-width: 440px;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    margin: 0 0 16px;
    text-align: center;
  }
  .player-card {
    background: var(--card);
    border-radius: 16px;
    border: 0.5px solid var(--border);
    padding: 20px;
    margin-bottom: 16px;
  }
  .now-playing {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .icon-box {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    background: var(--accent-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 26px;
  }
  .now-playing-text { min-width: 0; }
  #track-title {
    font-weight: 500;
    font-size: 15px;
    margin: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #track-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 2px 0 0;
  }
  .upload-label {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 10px;
    cursor: pointer;
    margin-bottom: 16px;
    font-size: 14px;
    color: var(--text);
  }
  .upload-label:hover { border-color: var(--text-muted); }
  input[type="file"] { display: none; }
  input[type="range"] {
    width: 100%;
    accent-color: var(--accent-fill);
  }
  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin: 16px 0;
  }
  .ctrl-btn {
    background: none;
    border: 0.5px solid var(--border);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
  }
  .ctrl-btn:hover { background: var(--bg); }
  .ctrl-small { width: 44px; height: 44px; font-size: 12px; font-weight: 500; }
  .ctrl-play {
    width: 56px;
    height: 56px;
    background: var(--accent-fill);
    color: white;
    border: none;
    font-size: 22px;
  }
  .speed-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  select {
    font-size: 13px;
    padding: 4px 8px;
    border-radius: 6px;
    border: 0.5px solid var(--border);
    background: var(--card);
    color: var(--text);
  }
  .playlist-card {
    background: var(--card);
    border-radius: 16px;
    border: 0.5px solid var(--border);
    padding: 12px;
  }
  .playlist-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 8px 12px;
    font-size: 14px;
    font-weight: 500;
  }
  .playlist-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 8px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
  }
  .playlist-item:hover { background: var(--bg); }
  .playlist-item.active { background: var(--accent-bg); color: var(--accent-text); }
  .playlist-item .num {
    width: 22px;
    color: var(--text-muted);
    font-size: 13px;
    flex-shrink: 0;
    text-align: center;
  }
  .playlist-item .name {
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .empty-hint {
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    padding: 20px 8px;
  }
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <h1 style="margin:0;">Lecteur d'audiobook</h1>
    <button class="icon-btn" id="theme-toggle" aria-label="Changer de thème">🌓</button>
  </div>

  <div class="player-card">
    <div class="now-playing">
      <div class="icon-box">🎧</div>
      <div class="now-playing-text">
        <p id="track-title">Aucun chapitre chargé</p>
        <p id="track-sub">Ajoutez des fichiers audio ci-dessous</p>
      </div>
    </div>

    <div class="drop-zone" id="drop-zone">Glissez-déposez des fichiers audio ici, ou</div>
    <label class="upload-label" for="file-input">
      <span>➕ Ajouter des chapitres</span>
    </label>
    <input type="file" id="file-input" accept="audio/*,.mp3,.m4a,.m4b,.aac,.wav,.ogg,.oga,.flac,.wma,.opus" multiple />

    <audio id="audio"></audio>

    <input type="range" id="seek" min="0" max="100" value="0" step="0.1" />
    <div class="time-row">
      <span id="time-current">0:00</span>
      <span id="time-total">0:00</span>
    </div>

    <div class="controls">
      <button class="ctrl-btn ctrl-small" id="back15" aria-label="Reculer de 15 secondes">-15</button>
      <button class="ctrl-btn ctrl-play" id="play-pause" aria-label="Lecture">▶</button>
      <button class="ctrl-btn ctrl-small" id="fwd30" aria-label="Avancer de 30 secondes">+30</button>
    </div>

    <div class="speed-row">
      <span>Vitesse</span>
      <select id="speed">
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
    </div>

    <div class="volume-row">
      <span>🔊</span>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="1" />
    </div>

    <div class="sleep-row">
      <span>💤 Minuteur de sommeil</span>
      <select id="sleep-timer">
        <option value="0">Désactivé</option>
        <option value="10">10 min</option>
        <option value="20">20 min</option>
        <option value="30">30 min</option>
        <option value="45">45 min</option>
        <option value="60">60 min</option>
      </select>
    </div>
    <p class="sleep-status" id="sleep-status"></p>

    <button class="add-bookmark-btn" id="add-bookmark" style="width:100%;margin-top:12px;">🔖 Ajouter un marque-page ici</button>

    <p class="shortcuts-hint">
      <kbd>Espace</kbd> lecture/pause &nbsp; <kbd>←</kbd> -15s &nbsp; <kbd>→</kbd> +30s
    </p>
  </div>

  <div class="bookmarks-card">
    <div class="bookmarks-header">
      <span>Marque-pages</span>
      <span id="bookmark-count" style="color: var(--text-muted); font-weight: 400;">0</span>
    </div>
    <div id="bookmarks"></div>
  </div>

  <div class="playlist-card">
    <div class="playlist-header">
      <span>Chapitres</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <span id="chapter-count" style="color: var(--text-muted); font-weight: 400;">0</span>
        <button class="icon-btn" id="export-btn" aria-label="Exporter la progression" style="width:30px;height:30px;font-size:14px;">⬇</button>
        <button class="icon-btn" id="import-btn" aria-label="Importer la progression" style="width:30px;height:30px;font-size:14px;">⬆</button>
        <input type="file" id="import-input" accept="application/json,.json" style="display:none;" />
      </div>
    </div>
    <p id="total-remaining" style="font-size:12px;color:var(--text-muted);margin:0 8px 10px;"></p>
    <div id="playlist"></div>
  </div>
</div>

<script>
  const audio = document.getElementById('audio');
  const fileInput = document.getElementById('file-input');
  const playBtn = document.getElementById('play-pause');
  const seek = document.getElementById('seek');
  const timeCurrent = document.getElementById('time-current');
  const timeTotal = document.getElementById('time-total');
  const trackTitle = document.getElementById('track-title');
  const trackSub = document.getElementById('track-sub');
  const speedSelect = document.getElementById('speed');
  const playlistEl = document.getElementById('playlist');
  const chapterCount = document.getElementById('chapter-count');
  const backBtn = document.getElementById('back15');
  const fwdBtn = document.getElementById('fwd30');
  const totalRemainingEl = document.getElementById('total-remaining');
  const exportBtn = document.getElementById('export-btn');
  const importBtn = document.getElementById('import-btn');
  const importInput = document.getElementById('import-input');

  let playlist = [];
  let currentIndex = -1;

  function fmt(s) {
    if (!isFinite(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + String(sec).padStart(2, '0');
  }

  function renderPlaylist() {
    chapterCount.textContent = playlist.length;
    updateTotalRemaining();
    if (playlist.length === 0) {
      playlistEl.innerHTML = '<div class="empty-hint">Aucun chapitre pour le moment.<br>Ajoutez un ou plusieurs fichiers audio.</div>';
      return;
    }
    playlistEl.innerHTML = '';
    playlist.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'playlist-item' + (i === currentIndex ? ' active' : '');
      const progressLabel = item.lastTime ? fmt(item.lastTime) : '';
      const displayName = item.displayName || item.name;
      div.innerHTML =
        '<span class="num">' + (i + 1) + '</span>' +
        '<span class="name">' + displayName + '</span>' +
        (progressLabel ? '<span class="ch-progress">' + progressLabel + '</span>' : '') +
        '<button class="reorder-btn" aria-label="Monter" data-dir="-1">▲</button>' +
        '<button class="reorder-btn" aria-label="Descendre" data-dir="1">▼</button>' +
        '<button class="rename-btn" aria-label="Renommer">✎</button>' +
        '<button class="remove-btn" aria-label="Retirer ce chapitre">✕</button>';
      div.querySelector('.name').addEventListener('click', () => loadChapter(i, true));
      div.querySelector('.remove-btn').addEventListener('click', (ev) => {
        ev.stopPropagation();
        removeChapter(i);
      });
      div.querySelector('.rename-btn').addEventListener('click', (ev) => {
        ev.stopPropagation();
        renameChapter(i);
      });
      div.querySelectorAll('.reorder-btn').forEach(btn => {
        btn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          moveChapter(i, parseInt(btn.dataset.dir, 10));
        });
      });
      playlistEl.appendChild(div);
    });
  }

  function renameChapter(i) {
    const current = playlist[i].displayName || playlist[i].name;
    const newName = prompt('Nouveau nom du chapitre :', current);
    if (newName && newName.trim()) {
      playlist[i].displayName = newName.trim();
      if (i === currentIndex) trackTitle.textContent = newName.trim();
      renderPlaylist();
      saveProgress();
    }
  }

  function moveChapter(i, dir) {
    const j = i + dir;
    if (j < 0 || j >= playlist.length) return;
    [playlist[i], playlist[j]] = [playlist[j], playlist[i]];
    if (currentIndex === i) currentIndex = j;
    else if (currentIndex === j) currentIndex = i;
    renderPlaylist();
    saveProgress();
  }

  function updateTotalRemaining() {
    let totalRemaining = 0;
    let hasUnknown = false;
    playlist.forEach(p => {
      if (p.duration) {
        totalRemaining += Math.max(0, p.duration - (p.lastTime || 0));
      } else {
        hasUnknown = true;
      }
    });
    if (playlist.length === 0) {
      totalRemainingEl.textContent = '';
      return;
    }
    const h = Math.floor(totalRemaining / 3600);
    const m = Math.floor((totalRemaining % 3600) / 60);
    let label = h > 0 ? h + ' h ' + m + ' min' : m + ' min';
    totalRemainingEl.textContent = 'Temps restant estimé : ' + label + (hasUnknown ? ' (approx.)' : '');
  }

  function removeChapter(i) {
    const wasCurrent = i === currentIndex;
    playlist.splice(i, 1);
    if (wasCurrent) {
      audio.pause();
      audio.src = '';
      currentIndex = -1;
      trackTitle.textContent = 'Aucun chapitre chargé';
      trackSub.textContent = 'Ajoutez des fichiers audio ci-dessous';
    } else if (i < currentIndex) {
      currentIndex--;
    }
    renderPlaylist();
  }

  function loadChapter(index, autoplay) {
    if (index < 0 || index >= playlist.length) return;
    currentIndex = index;
    const item = playlist[index];
    audio.src = item.url;
    trackTitle.textContent = item.displayName || item.name;
    trackSub.textContent = 'Chapitre ' + (index + 1) + ' sur ' + playlist.length;
    renderPlaylist();
    if (autoplay) audio.play();
  }

  const dropZone = document.getElementById('drop-zone');
  const volumeSlider = document.getElementById('volume');
  const sleepSelect = document.getElementById('sleep-timer');
  const sleepStatus = document.getElementById('sleep-status');
  const addBookmarkBtn = document.getElementById('add-bookmark');
  const bookmarksEl = document.getElementById('bookmarks');
  const bookmarkCount = document.getElementById('bookmark-count');
  const themeToggle = document.getElementById('theme-toggle');

  let bookmarks = [];
  let sleepTimeoutId = null;
  let sleepEndsAt = null;
  let sleepIntervalId = null;

  function saveProgress() {
    try {
      const data = playlist.map(p => ({ name: p.name, size: p.size, displayName: p.displayName || null, duration: p.duration || 0, lastTime: p.lastTime || 0 }));
      localStorage.setItem('audiobook-progress', JSON.stringify(data));
      localStorage.setItem('audiobook-bookmarks', JSON.stringify(bookmarks));
    } catch (e) {}
  }

  function loadSavedProgress() {
    try {
      const raw = localStorage.getItem('audiobook-progress');
      return raw ? JSON.parse(raw) : [];
    } catch (e) { return []; }
  }

  function loadSavedBookmarks() {
    try {
      const raw = localStorage.getItem('audiobook-bookmarks');
      return raw ? JSON.parse(raw) : [];
    } catch (e) { return []; }
  }

  function addFiles(files) {
    const saved = loadSavedProgress();
    const wasEmpty = playlist.length === 0;
    files.forEach((file) => {
      const match = saved.find(s => s.name === file.name && s.size === file.size);
      playlist.push({
        name: file.name,
        size: file.size,
        url: URL.createObjectURL(file),
        displayName: match ? match.displayName : null,
        duration: match ? match.duration : 0,
        lastTime: match ? match.lastTime : 0
      });
    });
    renderPlaylist();
    if (wasEmpty && playlist.length > 0) loadChapter(0, true);
  }

  fileInput.addEventListener('change', (e) => {
    addFiles(Array.from(e.target.files));
    fileInput.value = '';
  });

  ['dragover', 'dragenter'].forEach(evt => {
    dropZone.addEventListener(evt, (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
  });
  ['dragleave', 'drop'].forEach(evt => {
    dropZone.addEventListener(evt, (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
    });
  });
  dropZone.addEventListener('drop', (e) => {
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('audio/'));
    if (files.length) addFiles(files);
  });

  audio.addEventListener('loadedmetadata', () => {
    seek.max = audio.duration;
    timeTotal.textContent = fmt(audio.duration);
    if (currentIndex >= 0) {
      playlist[currentIndex].duration = audio.duration;
      updateTotalRemaining();
      if (playlist[currentIndex].lastTime) {
        audio.currentTime = Math.min(playlist[currentIndex].lastTime, audio.duration - 1);
      }
    }
  });

  audio.addEventListener('timeupdate', () => {
    seek.value = audio.currentTime;
    timeCurrent.textContent = fmt(audio.currentTime);
    if (currentIndex >= 0) {
      playlist[currentIndex].lastTime = audio.currentTime;
      updateTotalRemaining();
    }
  });

  setInterval(saveProgress, 5000);
  window.addEventListener('beforeunload', saveProgress);

  volumeSlider.addEventListener('input', () => {
    audio.volume = parseFloat(volumeSlider.value);
  });

  function updateSleepStatus() {
    if (!sleepEndsAt) {
      sleepStatus.textContent = '';
      return;
    }
    const remaining = Math.max(0, Math.round((sleepEndsAt - Date.now()) / 60000));
    sleepStatus.textContent = 'Lecture arrêtée dans ' + remaining + ' min';
  }

  sleepSelect.addEventListener('change', () => {
    if (sleepTimeoutId) clearTimeout(sleepTimeoutId);
    if (sleepIntervalId) clearInterval(sleepIntervalId);
    const minutes = parseFloat(sleepSelect.value);
    if (!minutes) {
      sleepEndsAt = null;
      sleepStatus.textContent = '';
      return;
    }
    sleepEndsAt = Date.now() + minutes * 60000;
    updateSleepStatus();
    sleepIntervalId = setInterval(updateSleepStatus, 30000);
    sleepTimeoutId = setTimeout(() => {
      audio.pause();
      sleepEndsAt = null;
      sleepStatus.textContent = '';
      sleepSelect.value = '0';
      clearInterval(sleepIntervalId);
    }, minutes * 60000);
  });

  function renderBookmarks() {
    bookmarkCount.textContent = bookmarks.length;
    if (bookmarks.length === 0) {
      bookmarksEl.innerHTML = '<div class="empty-hint">Aucun marque-page pour le moment.</div>';
      return;
    }
    bookmarksEl.innerHTML = '';
    bookmarks.forEach((bm, i) => {
      const div = document.createElement('div');
      div.className = 'bookmark-item';
      div.innerHTML =
        '<span class="b-time">' + fmt(bm.time) + '</span>' +
        '<span class="b-label">' + bm.chapterName + '</span>' +
        '<button class="b-remove" aria-label="Supprimer le marque-page">✕</button>';
      div.querySelector('.b-label').addEventListener('click', () => jumpToBookmark(bm));
      div.querySelector('.b-time').addEventListener('click', () => jumpToBookmark(bm));
      div.querySelector('.b-remove').addEventListener('click', (ev) => {
        ev.stopPropagation();
        bookmarks.splice(i, 1);
        renderBookmarks();
        saveProgress();
      });
      bookmarksEl.appendChild(div);
    });
  }

  function jumpToBookmark(bm) {
    const idx = playlist.findIndex(p => p.name === bm.chapterName);
    if (idx === -1) return;
    if (idx !== currentIndex) {
      loadChapter(idx, false);
      audio.addEventListener('loadedmetadata', function once() {
        audio.currentTime = bm.time;
        audio.play();
        audio.removeEventListener('loadedmetadata', once);
      });
    } else {
      audio.currentTime = bm.time;
      audio.play();
    }
  }

  addBookmarkBtn.addEventListener('click', () => {
    if (currentIndex < 0) return;
    bookmarks.push({ chapterName: playlist[currentIndex].name, time: audio.currentTime });
    renderBookmarks();
    saveProgress();
  });

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') {
      e.preventDefault();
      playBtn.click();
    } else if (e.code === 'ArrowLeft') {
      backBtn.click();
    } else if (e.code === 'ArrowRight') {
      fwdBtn.click();
    }
  });

  function applyTheme(mode) {
    document.documentElement.setAttribute('data-mode', mode);
    try { localStorage.setItem('audiobook-theme', mode); } catch (e) {}
  }
  themeToggle.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-mode');
    const next = current === 'dark' ? 'light' : 'dark';
    applyTheme(next);
  });
  (function initTheme() {
    try {
      const saved = localStorage.getItem('audiobook-theme');
      if (saved) applyTheme(saved);
    } catch (e) {}
  })();

  exportBtn.addEventListener('click', () => {
    const data = {
      progress: playlist.map(p => ({ name: p.name, size: p.size, displayName: p.displayName || null, duration: p.duration || 0, lastTime: p.lastTime || 0 })),
      bookmarks: bookmarks
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'progression-audiobook.json';
    a.click();
    URL.revokeObjectURL(url);
  });

  importBtn.addEventListener('click', () => importInput.click());

  importInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (data.progress) {
          localStorage.setItem('audiobook-progress', JSON.stringify(data.progress));
          playlist.forEach(p => {
            const match = data.progress.find(s => s.name === p.name && s.size === p.size);
            if (match) {
              p.displayName = match.displayName;
              p.duration = match.duration;
              p.lastTime = match.lastTime;
            }
          });
        }
        if (data.bookmarks) {
          bookmarks = data.bookmarks;
          localStorage.setItem('audiobook-bookmarks', JSON.stringify(bookmarks));
          renderBookmarks();
        }
        renderPlaylist();
        alert('Progression importée. Rajoutez les mêmes fichiers audio si besoin pour que la reprise se synchronise.');
      } catch (err) {
        alert('Fichier de progression invalide.');
      }
    };
    reader.readAsText(file);
    importInput.value = '';
  });

  bookmarks = loadSavedBookmarks();
  renderBookmarks();
  renderPlaylist();

  audio.addEventListener('play', () => {
    playBtn.textContent = '⏸';
    playBtn.setAttribute('aria-label', 'Pause');
  });
  audio.addEventListener('pause', () => {
    playBtn.textContent = '▶';
    playBtn.setAttribute('aria-label', 'Lecture');
  });

  audio.addEventListener('ended', () => {
    if (currentIndex + 1 < playlist.length) {
      loadChapter(currentIndex + 1, true);
    }
  });

  playBtn.addEventListener('click', () => {
    if (!audio.src) return;
    if (audio.paused) audio.play();
    else audio.pause();
  });

  seek.addEventListener('input', () => {
    audio.currentTime = seek.value;
  });

  backBtn.addEventListener('click', () => {
    audio.currentTime = Math.max(0, audio.currentTime - 15);
  });
  fwdBtn.addEventListener('click', () => {
    audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 30);
  });

  speedSelect.addEventListener('change', () => {
    audio.playbackRate = parseFloat(speedSelect.value);
  });

  renderPlaylist();
</script>
</body>
</html>
