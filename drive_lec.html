<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Compteur Drive</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #EDECE8;
    --surface:   #FFFFFF;
    --surface2:  #F4F3EF;
    --border:    #DDDDD6;
    --text:      #18181A;
    --muted:     #6B6B6B;
    --hint:      #ABABAB;
    --green:     #16A249;
    --green-bg:  #EDFAF3;
    --green-bdr: #86EFAC;
    --action:    #18181A;
    --action-fg: #FFFFFF;
    --red:       #DC2626;
    --radius:    14px;
    --radius-sm: 9px;
  }

  body {
    background: var(--bg);
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 0;
  }
  header .title { font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; }
  header .sub   { font-size: 18px; font-weight: 600; color: var(--text); margin-top: 1px; }

  .app-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 9px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; color: var(--text);
    text-decoration: none; cursor: pointer;
    transition: background .15s;
  }
  .app-btn:active { background: var(--surface2); }
  .app-btn svg { width: 15px; height: 15px; stroke: var(--muted); flex-shrink: 0; }

  /* ── Main ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 16px 16px 24px;
  }

  /* ── Ordered input card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .card-label {
    font-size: 11px; font-weight: 600; color: var(--hint);
    letter-spacing: .07em; text-transform: uppercase;
    margin-bottom: 10px;
  }
  .stepper {
    display: flex; align-items: center; gap: 10px;
  }
  .step-btn {
    width: 42px; height: 42px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--surface2);
    font-size: 22px; color: var(--text); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .12s;
    flex-shrink: 0;
  }
  .step-btn:active { background: var(--border); }
  #totalInput {
    flex: 1; text-align: center;
    font-size: 26px; font-weight: 600; color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 8px; background: var(--surface2);
    -moz-appearance: textfield; appearance: textfield;
  }
  #totalInput::-webkit-outer-spin-button,
  #totalInput::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* ── Counter card ── */
  #counterCard {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 16px 18px;
    text-align: center;
    transition: border-color .3s;
  }
  #counterCard.done { border-color: var(--green-bdr); background: var(--green-bg); }

  .fraction {
    display: flex; align-items: baseline;
    justify-content: center; gap: 8px;
    margin: 6px 0 14px;
  }
  #receivedNum {
    font-size: 64px; font-weight: 700; line-height: 1;
    color: var(--text); transition: transform .1s;
  }
  #receivedNum.bump { transform: scale(1.18); }
  .sep { font-size: 30px; color: var(--hint); }
  #totalNum { font-size: 30px; font-weight: 500; color: var(--muted); }

  /* progress bar */
  .progress-track {
    height: 7px; background: var(--surface2);
    border-radius: 99px; overflow: hidden; margin-bottom: 12px;
  }
  #progressBar {
    height: 100%; width: 0%; border-radius: 99px;
    background: var(--green);
    transition: width .25s cubic-bezier(.4,0,.2,1), background .3s;
  }

  #statusMsg {
    font-size: 14px; color: var(--muted);
    min-height: 20px; transition: color .3s;
  }
  #statusMsg.done { color: var(--green); font-weight: 600; }

  /* ── Big action button ── */
  #incBtn {
    width: 100%; padding: 22px;
    font-size: 19px; font-weight: 600;
    background: var(--action); color: var(--action-fg);
    border: none; border-radius: var(--radius);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: opacity .12s, transform .1s;
    position: relative; overflow: hidden;
  }
  #incBtn:active { opacity: .85; transform: scale(.985); }
  #incBtn svg { width: 22px; height: 22px; stroke: currentColor; flex-shrink: 0; }

  /* ripple on button */
  .ripple-el {
    position: absolute; border-radius: 50%;
    background: rgba(255,255,255,.25);
    pointer-events: none;
    animation: btn-ripple .45s ease-out forwards;
  }
  @keyframes btn-ripple {
    from { transform: scale(0); opacity: 1; }
    to   { transform: scale(3.5); opacity: 0; }
  }

  /* ── Bottom row ── */
  .bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .sec-btn {
    padding: 13px; font-size: 14px; font-weight: 500;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface2); color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: background .12s, color .12s;
  }
  .sec-btn:active { background: var(--border); }
  .sec-btn svg { width: 16px; height: 16px; stroke: currentColor; flex-shrink: 0; }
  .sec-btn.danger { color: var(--red); }

  /* ── SUCCESS OVERLAY ── */
  #successOverlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(22, 162, 73, 0.97);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 24px;
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
  }
  #successOverlay.show { opacity: 1; pointer-events: all; }

  .success-circle {
    width: 110px; height: 110px;
    border-radius: 50%;
    background: rgba(255,255,255,.15);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  /* ripple rings */
  .success-circle::before,
  .success-circle::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.4);
    animation: ring-expand 1.4s ease-out infinite;
  }
  .success-circle::after { animation-delay: .7s; }
  @keyframes ring-expand {
    0%   { transform: scale(1); opacity: .8; }
    100% { transform: scale(2.2); opacity: 0; }
  }

  #checkSvg { width: 58px; height: 58px; }
  #checkPath {
    stroke: #FFFFFF; stroke-width: 5px;
    stroke-linecap: round; stroke-linejoin: round;
    fill: none;
    stroke-dasharray: 80;
    stroke-dashoffset: 80;
  }
  #checkPath.draw {
    animation: draw-check .45s .15s cubic-bezier(.4,0,.2,1) forwards;
  }
  @keyframes draw-check {
    to { stroke-dashoffset: 0; }
  }

  .success-text {
    font-size: 22px; font-weight: 700; color: #FFFFFF;
    letter-spacing: -.01em;
  }
  .success-sub {
    font-size: 15px; color: rgba(255,255,255,.8);
    margin-top: -18px;
  }

  /* saved badge */
  #savedBadge {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: #fff;
    font-size: 13px; font-weight: 500;
    padding: 9px 18px; border-radius: 99px;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
    white-space: nowrap; z-index: 50;
  }
  #savedBadge.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div>
    <div class="title">Vérification</div>
    <div class="sub">Drive Leclerc</div>
  </div>
  <a class="app-btn" href="https://drive.e-leclerc.fr" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
    </svg>
    Ouvrir l'app
  </a>
</header>

<main>

  <div class="card">
    <div class="card-label">Produits commandés</div>
    <div class="stepper">
      <button class="step-btn" onclick="adj(-1)" aria-label="Moins un">−</button>
      <input id="totalInput" type="number" min="0" value="0" inputmode="numeric" oninput="onTotalInput()" />
      <button class="step-btn" onclick="adj(1)" aria-label="Plus un">+</button>
    </div>
  </div>

  <div id="counterCard" class="card">
    <div class="card-label">Reçus / Commandés</div>
    <div class="fraction">
      <span id="receivedNum">0</span>
      <span class="sep">/</span>
      <span id="totalNum">0</span>
    </div>
    <div class="progress-track">
      <div id="progressBar"></div>
    </div>
    <div id="statusMsg">Saisir le nombre de produits commandés</div>
  </div>

  <button id="incBtn" onclick="increment(event)" aria-label="Ajouter un produit reçu">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Produit reçu
  </button>

  <div class="bottom-row">
    <button class="sec-btn" onclick="undo()" aria-label="Annuler le dernier ajout">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/>
      </svg>
      Annuler
    </button>
    <button class="sec-btn danger" onclick="confirmReset()" aria-label="Réinitialiser le compteur">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.85"/>
      </svg>
      Réinitialiser
    </button>
  </div>

</main>

<!-- SUCCESS OVERLAY -->
<div id="successOverlay" role="status" aria-live="polite" onclick="dismissSuccess()">
  <div class="success-circle">
    <svg id="checkSvg" viewBox="0 0 58 58">
      <path id="checkPath" d="M12 30 L24 42 L46 18"/>
    </svg>
  </div>
  <div class="success-text" id="successCount"></div>
  <div class="success-sub">Commande complète ✓</div>
</div>

<!-- SAVED BADGE -->
<div id="savedBadge">Sauvegardé</div>

<script>
const STORAGE_KEY = 'leclerc_drive_counter';

let received = 0;
let total    = 0;

(function load() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (s) {
      received = s.received || 0;
      total    = s.total    || 0;
      document.getElementById('totalInput').value = total;
    }
  } catch(e) {}
  render();
})();

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ received, total }));
    showSavedBadge();
  } catch(e) {}
}

function onTotalInput() {
  total = Math.max(0, parseInt(document.getElementById('totalInput').value) || 0);
  if (received > total) received = total;
  save(); render();
}

function adj(d) {
  total = Math.max(0, total + d);
  document.getElementById('totalInput').value = total;
  if (received > total) received = total;
  save(); render();
}

function increment(e) {
  if (total === 0) return;
  if (received >= total) return;
  received++;
  triggerRipple(e);
  bumpNumber();
  save();
  render();
  if (received === total) setTimeout(showSuccess, 180);
}

function undo() {
  if (received > 0) { received--; save(); render(); }
}

function confirmReset() {
  if (received === 0 && total === 0) return;
  if (confirm('Réinitialiser le compteur ?')) {
    received = 0;
    save(); render();
  }
}

function render() {
  const pct = total > 0 ? Math.round((received / total) * 100) : 0;

  document.getElementById('receivedNum').textContent = received;
  document.getElementById('totalNum').textContent    = total;
  document.getElementById('progressBar').style.width = pct + '%';

  const card   = document.getElementById('counterCard');
  const msg    = document.getElementById('statusMsg');
  const bar    = document.getElementById('progressBar');

  if (total === 0) {
    msg.textContent = 'Saisir le nombre de produits commandés';
    msg.className = '';
    card.className = 'card';
    bar.style.background = '#ABABAB';
  } else if (received === total) {
    msg.textContent = 'Commande complète — ' + total + ' produit' + (total > 1 ? 's' : '') + ' vérifiés';
    msg.className = 'done';
    card.className = 'card done';
    bar.style.background = '#16A249';
  } else {
    const rem = total - received;
    msg.textContent = pct + ' % — encore ' + rem + ' produit' + (rem > 1 ? 's' : '');
    msg.className = '';
    card.className = 'card';
    bar.style.background = '#16A249';
  }
}

function showSuccess() {
  const overlay = document.getElementById('successOverlay');
  const path    = document.getElementById('checkPath');
  document.getElementById('successCount').textContent =
    total + ' produit' + (total > 1 ? 's' : '') + ' reçu' + (total > 1 ? 's' : '');

  path.classList.remove('draw');
  void path.offsetWidth;
  path.classList.add('draw');

  overlay.classList.add('show');
  setTimeout(dismissSuccess, 2800);
}

function dismissSuccess() {
  document.getElementById('successOverlay').classList.remove('show');
}

function triggerRipple(e) {
  const btn = document.getElementById('incBtn');
  const r = document.createElement('span');
  r.className = 'ripple-el';
  const size = 80;
  const rect = btn.getBoundingClientRect();
  const x = (e && e.clientX ? e.clientX : rect.left + rect.width / 2) - rect.left - size / 2;
  const y = (e && e.clientY ? e.clientY : rect.top + rect.height / 2) - rect.top - size / 2;
  r.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;`;
  btn.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

function bumpNumber() {
  const el = document.getElementById('receivedNum');
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
  el.addEventListener('transitionend', () => el.classList.remove('bump'), { once: true });
}

let badgeTimer;
function showSavedBadge() {
  const b = document.getElementById('savedBadge');
  b.classList.add('show');
  clearTimeout(badgeTimer);
  badgeTimer = setTimeout(() => b.classList.remove('show'), 1400);
}
</script>
</body>
</html>
